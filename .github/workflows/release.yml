name: Release

on:
  push:
    tags:
      - "v0.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "v0.Y.Z tag to release. Empty means snapshot."
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Validate release tag
        if: ${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/') }}
        run: ./scripts/ensure-v0-release-tag.sh "${{ inputs.tag || github.ref_name }}"

      - name: Determine GoReleaser args
        id: goreleaser-args
        shell: sh
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          args="release --clean"
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ] && [ -z "$INPUT_TAG" ]; then
            args="release --snapshot --clean"
          fi
          printf 'args=%s\n' "$args" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: ${{ steps.goreleaser-args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
