    description: "Can use appropriate technical terminology when exchanging information or discussing their area of specialisation with other specialists."

  - scale: "interviewing_and_being_interviewed"
    level: "a1"
    code: "reply_in_interview_to_simple_direct_questions_about_personal_details"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.reply_in_interview_to_simple_direct_questions_about_personal_details.a1"
    description: "Can reply in an interview to simple direct questions, put very slowly and clearly in direct, non-idiomatic language, about personal details."

  - scale: "interviewing_and_being_interviewed"
    level: "a1"
    code: "state_in_simple_language_nature_of_problem_to_health_professional"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.state_in_simple_language_nature_of_problem_to_health_professional.a1"
    description: "Can state in simple language the nature of a problem to a health professional and answer simple questions such as “Does that hurt?” even though they have to rely on gestures and body language to reinforce the message."

  - scale: "interviewing_and_being_interviewed"
    level: "a2"
    code: "make_themselves_understood_in_interview_and_communicate_ideas_and_information_on_familiar_topics"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.make_themselves_understood_in_interview_and_communicate_ideas_and_information_on_familiar_topics.a2"
    description: "Can make themselves understood in an interview and communicate ideas and information on familiar topics, provided they can ask for clarification occasionally, and are given some help to express what they want to."

  - scale: "interviewing_and_being_interviewed"
    level: "a2"
    code: "describe_to_doctor_very_basic_symptoms_and_ailments"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.describe_to_doctor_very_basic_symptoms_and_ailments.a2"
    description: "Can describe to a doctor very basic symptoms and ailments such as a cold or the flu."

  - scale: "interviewing_and_being_interviewed"
    level: "a2"
    code: "answer_simple_questions_and_respond_to_simple_statements_in_interview"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.answer_simple_questions_and_respond_to_simple_statements_in_interview.a2"
    description: "Can answer simple questions and respond to simple statements in an interview."

  - scale: "interviewing_and_being_interviewed"
    level: "a2"
    code: "indicate_in_simple_language_nature_of_problem_to_health_professional"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.indicate_in_simple_language_nature_of_problem_to_health_professional.a2"
    description: "Can indicate in simple language the nature of a problem to a health professional, perhaps using gestures and body language."

  - scale: "interviewing_and_being_interviewed"
    level: "b1"
    code: "provide_concrete_information_required_in_interview_or_consultation"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.provide_concrete_information_required_in_interview_or_consultation.b1"
    description: "Can provide concrete information required in an interview/consultation (e.g. describe symptoms to a doctor), but with limited precision."

  - scale: "interviewing_and_being_interviewed"
    level: "b1"
    code: "carry_out_prepared_interview_checking_and_confirming_information"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.carry_out_prepared_interview_checking_and_confirming_information.b1"
    description: "Can carry out a prepared interview, checking and confirming information, though they may occasionally have to ask for repetition if the other person’s response is rapid or extended."

  - scale: "interviewing_and_being_interviewed"
    level: "b1"
    code: "take_some_initiative_in_interview_or_consultation_but_is_dependent_on_interviewer"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.take_some_initiative_in_interview_or_consultation_but_is_dependent_on_interviewer.b1"
    description: "Can take some initiative in an interview/consultation (e.g. to bring up a new subject) but is very dependent on the interviewer in the interaction."

  - scale: "interviewing_and_being_interviewed"
    level: "b1"
    code: "describe_symptoms_in_simple_way_and_ask_for_advice_when_using_health_services"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.describe_symptoms_in_simple_way_and_ask_for_advice_when_using_health_services.b1"
    description: "Can describe symptoms in a simple way and ask for advice when using health services, and can understand the answer, provided this is given clearly in everyday language."

  - scale: "interviewing_and_being_interviewed"
    level: "b1"
    code: "use_prepared_questionnaire_to_carry_out_structured_interview_with_some_follow_up_questions"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.use_prepared_questionnaire_to_carry_out_structured_interview_with_some_follow_up_questions.b1"
    description: "Can use a prepared questionnaire to carry out a structured interview, with some spontaneous follow-up questions."

  - scale: "interviewing_and_being_interviewed"
    level: "b2"
    code: "carry_out_effective_fluent_interview_departing_spontaneously_from_prepared_questions"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.carry_out_effective_fluent_interview_departing_spontaneously_from_prepared_questions.b2"
    description: "Can carry out an effective, fluent interview, departing spontaneously from prepared questions, following up and probing interesting replies."

  - scale: "interviewing_and_being_interviewed"
    level: "b2"
    code: "take_initiative_in_interview_and_expand_and_develop_ideas_with_little_help"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.take_initiative_in_interview_and_expand_and_develop_ideas_with_little_help.b2"
    description: "Can take the initiative in an interview, and expand and develop ideas with little help or prodding from an interviewer."

  - scale: "interviewing_and_being_interviewed"
    level: "c1"
    code: "participate_fully_in_interview_expanding_and_developing_point_fluently_without_support"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.participate_fully_in_interview_expanding_and_developing_point_fluently_without_support.c1"
    description: "Can participate fully in an interview, as either interviewer or interviewee, expanding and developing the point being discussed fluently without any support, and handling interjections well."

  - scale: "interviewing_and_being_interviewed"
    level: "c2"
    code: "keep_up_their_side_of_dialogue_extremely_well_structuring_discourse_and_interacting_authoritatively"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed.keep_up_their_side_of_dialogue_extremely_well_structuring_discourse_and_interacting_authoritatively.c2"
    description: "Can keep up their side of the dialogue extremely well, structuring the discourse and interacting authoritatively with effortless fluency as interviewer or interviewee, at no disadvantage to other participants."

  - scale: "using_telecommunications"
    level: "a2"
    code: "use_telecommunications_with_friends_to_exchange_simple_news_make_plans_and_arrange_to_meet"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_with_friends_to_exchange_simple_news_make_plans_and_arrange_to_meet.a2"
    description: "Can use telecommunications with their friends to exchange simple news, make plans and arrange to meet."

  - scale: "using_telecommunications"
    level: "a2"
    code: "participate_in_short_simple_phone_conversation_on_predictable_topic_given_repetition_and_clarifications"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.participate_in_short_simple_phone_conversation_on_predictable_topic_given_repetition_and_clarifications.a2"
    description: "Can, given repetition and clarifications, participate in a short, simple phone conversation with a known person on a predictable topic, e.g. arrival times, arrangements to meet."

  - scale: "using_telecommunications"
    level: "a2"
    code: "understand_simple_message_confirm_details_and_pass_it_on_by_phone"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.understand_simple_message_confirm_details_and_pass_it_on_by_phone.a2"
    description: "Can understand a simple message (e.g. “My flight is late. I will arrive at 10 o’clock.”), confirm details of the message and pass it on by phone to other people concerned."

  - scale: "using_telecommunications"
    level: "b1"
    code: "use_telecommunications_for_everyday_personal_or_professional_purposes"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_for_everyday_personal_or_professional_purposes.b1"
    description: "Can use telecommunications for everyday personal or professional purposes, provided they can ask for clarification from time to time."

  - scale: "using_telecommunications"
    level: "b1"
    code: "give_important_details_over_phone_concerning_unexpected_incident"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.give_important_details_over_phone_concerning_unexpected_incident.b1"
    description: "Can give important details over the (video)phone concerning an unexpected incident (e.g. a problem in a hotel, with travel arrangements, with a hire car)."

  - scale: "using_telecommunications"
    level: "b1"
    code: "use_telecommunications_to_have_relatively_simple_but_extended_conversations_with_people_they_know"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_to_have_relatively_simple_but_extended_conversations_with_people_they_know.b1"
    description: "Can use telecommunications to have relatively simple but extended conversations with people they know personally."

  - scale: "using_telecommunications"
    level: "b1"
    code: "use_telecommunications_for_routine_messages_and_to_obtain_basic_services"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_for_routine_messages_and_to_obtain_basic_services.b1"
    description: "Can use telecommunications for routine messages (e.g. arrangements for a meeting) and to obtain basic services (e.g. book a hotel room or make a medical appointment)."

  - scale: "using_telecommunications"
    level: "b2"
    code: "use_telecommunications_for_variety_of_personal_and_professional_purposes"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_for_variety_of_personal_and_professional_purposes.b2"
    description: "Can use telecommunications for a variety of personal and professional purposes, provided they can ask for clarification if the accent or terminology is unfamiliar."

  - scale: "using_telecommunications"
    level: "b2"
    code: "participate_in_extended_casual_conversation_over_phone_with_known_person_on_variety_of_topics"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.participate_in_extended_casual_conversation_over_phone_with_known_person_on_variety_of_topics.b2"
    description: "Can participate in extended casual conversation over the phone with a known person on a variety of topics."

  - scale: "using_telecommunications"
    level: "c1"
    code: "use_telecommunications_effectively_for_most_professional_or_personal_purposes"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_effectively_for_most_professional_or_personal_purposes.c1"
    description: "Can use telecommunications effectively for most professional or personal purposes."

  - scale: "using_telecommunications"
    level: "c2"
    code: "use_telecommunications_confidently_and_effectively_for_both_personal_and_professional_purposes"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications.use_telecommunications_confidently_and_effectively_for_both_personal_and_professional_purposes.c2"
    description: "Can use telecommunications confidently and effectively for both personal and professional purposes, even if there is some interference (noise) or the caller has a less familiar accent."
