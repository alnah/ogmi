id: "cefr.interaction.speaking.descriptors"
version: "1"

catalog:
  - code: "overall_oral_interaction"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction"
    description:
      - "Oral interaction is understood to include both spoken interaction and live, face-to-face signing."
      - "The scales are once again organised by the three macro-functions “interpersonal”, “transactional” and “evaluative”, with certain specialised genres added on."
      - "The scales begin with “Understanding an interlocutor”."
      - "“Interlocutor” is a somewhat technical term that means the person with whom one is conversing directly in a dialogue."
      - "As mentioned before, the metaphor behind the scales for oral comprehension is that of a series of concentric circles."
      - "Here we are at the centre of those circles: the user/learner is actively involved in an interaction with the interlocutor."
      - "The other scales then follow:"
      - "interpersonal: “Conversation”;"
      - "evaluative: “Informal discussion (with friends)”; “Formal discussion (meetings)”; “Goal-oriented collaboration”;"
      - "transactional: “Information exchange”, “Obtaining goods and services”, “Interviewing and being interviewed”, and “Using telecommunications”."

  - code: "understanding_an_interlocutor"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor"
    description:
      - "This scale concerns understanding a person with whom you are conversing directly in an interaction, with the possibility of negotiating meaning."
      - "Key concepts operationalised in the scale include the following:"
      - "topic and setting: from personal details and everyday needs to complex and abstract topics of a specialist nature;"
      - "type of delivery by the interlocutor: from careful and slow to standard language and less familiar varieties;"
      - "degree of accommodation by the interlocutor: from sympathetic repetition and taking the trouble to help, to just confirming details if the accent is less familiar."

  - code: "conversation"
    id: "cefr.interaction.speaking.descriptors.conversation"
    description:
      - "This scale concerns interaction with a primarily social function: the establishment and maintenance of personal relationships."
      - "Key concepts operationalised in the scale include the following:"
      - "setting: from short exchanges, through maintaining a conversation and sustaining relationships, to flexible use for social purposes;"
      - "topics: from personal news, through familiar topics of personal interest, to most general topics;"
      - "language functions: from greetings, etc., through offers, invitations and permission, to degrees of emotion and allusive, joking usage."

  - code: "informal_discussion_with_friends"
    id: "cefr.interaction.speaking.descriptors.informal_discussion_with_friends"
    description:
      - "This scale includes aspects of both the interpersonal and evaluative use of language, since these tend to be interwoven in everyday interaction."
      - "Key concepts operationalised in the scale include the following:"
      - "topics: from what to do and where to go, to abstract, complex and even unfamiliar topics and sensitive issues;"
      - "ability to follow the discussion: from identifying the topic, through following the main points, to keeping up with animated discussion and understanding colloquial references;"
      - "language functions: from discussing and (dis)agreeing in a limited way to expressing ideas with precision and dealing diplomatically with disagreement and criticism."

  - code: "formal_discussion_meetings"
    id: "cefr.interaction.speaking.descriptors.formal_discussion_meetings"
    description:
      - "This scale is concerned with more formal discussion, mainly in a professional or academic context."
      - "Key concepts operationalised in the scale are very similar to those in informal discussion, but also include the following:"
      - "type of meeting and topics: from exchanges on practical problems to discussion of abstract, complex, unfamiliar issues;"
      - "ability to follow the discussion: from needing repetition and clarification to understanding points given prominence and keeping up with animated debate;"
      - "ability to contribute: from needing to rehearse and get help with formulation to probing, evaluating and challenging the contributions of others and arguing one’s own position convincingly."

  - code: "goal_oriented_co_operation"
    id: "cefr.interaction.speaking.descriptors.goal_oriented_co_operation"
    description:
      - "This scale concerns collaborative, task-focused work, which is a daily occurrence in real life, especially in professional contexts."
      - "As with the conversation and discussion scales, this scale includes similar descriptors on the ability to follow discussion."
      - "Key concepts operationalised in the scale include the following:"
      - "following the discussion: from understanding simple instructions explained directly to them to understanding detailed instructions reliably;"
      - "active contribution to the work: from simply asking for things and giving things to speculating about causes and consequences and organising the entire task."

  - code: "obtaining_goods_and_services"
    id: "cefr.interaction.speaking.descriptors.obtaining_goods_and_services"
    description:
      - "This scale mainly concerns service encounters in restaurants, shops, banks, etc."
      - "Effectively making a complaint appears at B1, and above this level the scale focuses on following up a complaint or problem and negotiating a solution."
      - "Key concepts operationalised in the scale include the following:"
      - "types of situation: from simple everyday transactions to disputes about responsibility and sensitive transactions in public, professional or academic life;"
      - "getting service: from asking for food and drink to asking detailed questions about more complex services;"
      - "demanding satisfaction: from making a complaint (B1) to negotiating a solution to a dispute or a sensitive transaction."

  - code: "information_exchange"
    id: "cefr.interaction.speaking.descriptors.information_exchange"
    description:
      - "This scale does not contain descriptors for the C levels, because merely exchanging factual information is no longer a main focus in learning objectives for proficient users."
      - "Key concepts operationalised in the scale include the following:"
      - "type of transaction: from simple questions, instructions and directions, through simple, routine exchanges, to exchanging information with other specialists;"
      - "type of information: from personal details, dates, prices, etc., through habits, routines, pastimes and straightforward factual information, to detailed and complex information or advice."

  - code: "interviewing_and_being_interviewed"
    id: "cefr.interaction.speaking.descriptors.interviewing_and_being_interviewed"
    description:
      - "This scale concerns the specialised roles associated with doctor’s appointments and job applications as well as other forms of examination, plus surveys and, in an educational context, projects."
      - "In relation to signing, there is an assumption that the interlocutor can also sign."
      - "Key concepts operationalised in the scale include the following:"
      - "independence from the interlocutor: from requiring direct, slow, clear standard language to acting without any support, at no disadvantage to the other person(s);"
      - "taking the initiative: from bringing up new subjects (B1) to participating fully, developing a point fluently and handling interjections well;"
      - "conducting the actual interview: from using a prepared questionnaire (B1), through departing spontaneously from prepared questions and following up and probing interesting replies, to structuring the discourse and interacting authoritatively."

  - code: "using_telecommunications"
    id: "cefr.interaction.speaking.descriptors.using_telecommunications"
    description:
      - "This new 2018 scale concerns use of the phone and internet-based apps for remote communication."
      - "Key concepts operationalised in the scale include the following:"
      - "range of information and transactions involved: from simple messages and conversations on predictable topics like arrival times, routine messages and basic services to use for a variety of personal and professional purposes;"
      - "interlocutor: from a known person to unknown persons with less familiar accents;"
      - "length of exchange: from short, simple exchanges to extended casual conversation."

entries:
  - scale: "overall_oral_interaction"
    level: "pre_a1"
    code: "ask_and_answer_questions_about_themselves_and_daily_routines"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.ask_and_answer_questions_about_themselves_and_daily_routines.pre_a1"
    description: "Can ask and answer questions about themselves and daily routines, using short, formulaic expressions and relying on gestures to reinforce the information."

  - scale: "overall_oral_interaction"
    level: "a1"
    code: "interact_in_simple_way_depending_on_repetition_rephrasing_and_repair"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.interact_in_simple_way_depending_on_repetition_rephrasing_and_repair.a1"
    description: "Can interact in a simple way but communication is totally dependent on repetition at a slower rate, rephrasing and repair. Can ask and answer simple questions, initiate and respond to simple statements in areas of immediate need or on very familiar topics."

  - scale: "overall_oral_interaction"
    level: "a2"
    code: "interact_with_reasonable_ease_in_structured_situations_and_short_conversations"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.interact_with_reasonable_ease_in_structured_situations_and_short_conversations.a2"
    description: "Can interact with reasonable ease in structured situations and short conversations, provided the other person helps if necessary. Can manage simple, routine exchanges without undue effort; can ask and answer questions and exchange ideas and information on familiar topics in predictable everyday situations."

  - scale: "overall_oral_interaction"
    level: "a2"
    code: "communicate_in_simple_and_routine_tasks_requiring_direct_exchange_of_information"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.communicate_in_simple_and_routine_tasks_requiring_direct_exchange_of_information.a2"
    description: "Can communicate in simple and routine tasks requiring a simple and direct exchange of information on familiar and routine matters to do with work and free time. Can handle very short social exchanges but is rarely able to understand enough to keep conversation going of their own accord."

  - scale: "overall_oral_interaction"
    level: "b1"
    code: "communicate_with_some_confidence_on_familiar_routine_and_non_routine_matters"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.communicate_with_some_confidence_on_familiar_routine_and_non_routine_matters.b1"
    description: "Can communicate with some confidence on familiar routine and non-routine matters related to their interests and professional field. Can exchange, check and confirm information, deal with less routine situations and explain why something is a problem. Can express thoughts on more abstract, cultural topics such as films, books, music, etc."

  - scale: "overall_oral_interaction"
    level: "b1"
    code: "exploit_wide_range_of_simple_language_to_deal_with_most_situations_while_travelling"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.exploit_wide_range_of_simple_language_to_deal_with_most_situations_while_travelling.b1"
    description: "Can exploit a wide range of simple language to deal with most situations likely to arise while travelling. Can enter unprepared into conversation on familiar topics, and express personal opinions and exchange information on topics that are familiar, of personal interest or pertinent to everyday life (e.g. family, hobbies, work, travel and current events)."

  - scale: "overall_oral_interaction"
    level: "b2"
    code: "use_language_fluently_accurately_and_effectively_on_wide_range_of_topics"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.use_language_fluently_accurately_and_effectively_on_wide_range_of_topics.b2"
    description: "Can use the language fluently, accurately and effectively on a wide range of general, academic, vocational or leisure topics, marking clearly the relationships between ideas. Can communicate spontaneously with good grammatical control without much sign of having to restrict what they want to say, adopting a level of formality appropriate to the circumstances."

  - scale: "overall_oral_interaction"
    level: "b2"
    code: "interact_with_fluency_and_spontaneity_making_regular_interaction_possible"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.interact_with_fluency_and_spontaneity_making_regular_interaction_possible.b2"
    description: "Can interact with a degree of fluency and spontaneity that makes regular interaction, and sustained relationships with users of the target language, quite possible without imposing strain on either party. Can highlight the personal significance of events and experiences, and account for and sustain views clearly by providing relevant explanations and arguments."

  - scale: "overall_oral_interaction"
    level: "c1"
    code: "express_themselves_fluently_and_spontaneously_almost_effortlessly"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.express_themselves_fluently_and_spontaneously_almost_effortlessly.c1"
    description: "Can express themselves fluently and spontaneously, almost effortlessly. Has a good command of a broad lexical repertoire allowing gaps to be readily overcome with circumlocutions. There is little obvious searching for expressions or avoidance strategies; only a conceptually difficult subject can hinder a natural, smooth flow of language."

  - scale: "overall_oral_interaction"
    level: "c2"
    code: "have_good_command_of_idiomatic_expressions_and_convey_finer_shades_of_meaning_precisely"
    id: "cefr.interaction.speaking.descriptors.overall_oral_interaction.have_good_command_of_idiomatic_expressions_and_convey_finer_shades_of_meaning_precisely.c2"
    description: "Has a good command of idiomatic expressions and colloquialisms with awareness of connotative levels of meaning. Can convey finer shades of meaning precisely by using, with reasonable accuracy, a wide range of modification devices. Can backtrack and restructure around a difficulty so smoothly that the interlocutor is hardly aware of it."

  - scale: "understanding_an_interlocutor"
    level: "pre_a1"
    code: "understand_simple_questions_that_directly_concern_them"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_simple_questions_that_directly_concern_them.pre_a1"
    description: "Can understand simple questions that directly concern them (e.g. name, age and address), if the person is asking slowly and clearly."

  - scale: "understanding_an_interlocutor"
    level: "pre_a1"
    code: "understand_simple_personal_information_when_people_introduce_themselves_slowly_and_clearly"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_simple_personal_information_when_people_introduce_themselves_slowly_and_clearly.pre_a1"
    description: "Can understand simple personal information (e.g. name, age, place of residence, origin) when other people introduce themselves slowly and clearly, directly to them, and can understand questions on this theme addressed to them, though the questions may need to be repeated."

  - scale: "understanding_an_interlocutor"
    level: "pre_a1"
    code: "understand_number_of_familiar_words_and_recognise_key_information_when_delivery_is_very_slow"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_number_of_familiar_words_and_recognise_key_information_when_delivery_is_very_slow.pre_a1"
    description: "Can understand a number of familiar words/signs and recognise key information (e.g. numbers, prices, dates and days of the week), provided the delivery is very slow, with repetition if necessary."

  - scale: "understanding_an_interlocutor"
    level: "a1"
    code: "understand_everyday_expressions_aimed_at_satisfaction_of_simple_needs"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_everyday_expressions_aimed_at_satisfaction_of_simple_needs.a1"
    description: "Can understand everyday expressions aimed at the satisfaction of simple needs of a concrete type, delivered directly to them clearly and slowly, with repetition, by a sympathetic interlocutor."

  - scale: "understanding_an_interlocutor"
    level: "a1"
    code: "understand_questions_and_instructions_addressed_carefully_and_slowly"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_questions_and_instructions_addressed_carefully_and_slowly.a1"
    description: "Can understand questions and instructions addressed carefully and slowly to them and follow short, simple directions."

  - scale: "understanding_an_interlocutor"
    level: "a2"
    code: "understand_enough_to_manage_simple_routine_exchanges_without_undue_effort"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_enough_to_manage_simple_routine_exchanges_without_undue_effort.a2"
    description: "Can understand enough to manage simple, routine exchanges without undue effort."

  - scale: "understanding_an_interlocutor"
    level: "a2"
    code: "generally_understand_clear_standard_speech_on_familiar_matters_directed_at_them"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.generally_understand_clear_standard_speech_on_familiar_matters_directed_at_them.a2"
    description: "Can generally understand clear, standard speech/sign on familiar matters directed at them, provided they can ask for repetition or reformulation from time to time."

  - scale: "understanding_an_interlocutor"
    level: "a2"
    code: "understand_what_is_said_clearly_slowly_and_directly_in_simple_everyday_conversation"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_what_is_said_clearly_slowly_and_directly_in_simple_everyday_conversation.a2"
    description: "Can understand what is said clearly, slowly and directly to them in simple everyday conversation; can be made to understand, if the interlocutor can take the trouble."

  - scale: "understanding_an_interlocutor"
    level: "b1"
    code: "follow_clearly_articulated_speech_directed_at_them_in_everyday_conversation"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.follow_clearly_articulated_speech_directed_at_them_in_everyday_conversation.b1"
    description: "Can follow clearly articulated speech/sign directed at them in everyday conversation, though will sometimes have to ask for repetition of particular words/signs and phrases."

  - scale: "understanding_an_interlocutor"
    level: "b2"
    code: "understand_in_detail_what_is_said_in_standard_language_even_in_noisy_environment"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_in_detail_what_is_said_in_standard_language_even_in_noisy_environment.b2"
    description: "Can understand in detail what is said to them in the standard language or a familiar variety even in a [audially/visually] noisy environment."

  - scale: "understanding_an_interlocutor"
    level: "c1"
    code: "understand_interlocutor_in_detail_on_abstract_and_complex_topics_beyond_own_field"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_interlocutor_in_detail_on_abstract_and_complex_topics_beyond_own_field.c1"
    description: "Can understand an interlocutor in detail on abstract and complex topics of a specialist nature beyond their own field, though they may need to confirm occasional details, especially if the variety is unfamiliar."

  - scale: "understanding_an_interlocutor"
    level: "c2"
    code: "understand_any_interlocutor_even_on_abstract_and_complex_topics_of_specialist_nature"
    id: "cefr.interaction.speaking.descriptors.understanding_an_interlocutor.understand_any_interlocutor_even_on_abstract_and_complex_topics_of_specialist_nature.c2"
    description: "Can understand any interlocutor, even on abstract and complex topics of a specialist nature beyond their own field, given an opportunity to adjust to a less familiar variety."

  - scale: "conversation"
    level: "pre_a1"
    code: "understand_and_use_basic_formulaic_expressions"
    id: "cefr.interaction.speaking.descriptors.conversation.understand_and_use_basic_formulaic_expressions.pre_a1"
    description: "Can understand and use basic, formulaic expressions such as “Yes”, “No”, “Excuse me”, “Please”, “Thank you”, “No thank you”, “Sorry”."

  - scale: "conversation"
    level: "pre_a1"
    code: "recognise_simple_greetings"
    id: "cefr.interaction.speaking.descriptors.conversation.recognise_simple_greetings.pre_a1"
    description: "Can recognise simple greetings."

  - scale: "conversation"
    level: "pre_a1"
    code: "greet_people_state_name_and_take_leave_in_simple_way"
    id: "cefr.interaction.speaking.descriptors.conversation.greet_people_state_name_and_take_leave_in_simple_way.pre_a1"
    description: "Can greet people, state their name and take leave in a simple way."

  - scale: "conversation"
    level: "a1"
    code: "understand_everyday_expressions_for_simple_needs_delivered_clearly_slowly_and_repeatedly"
    id: "cefr.interaction.speaking.descriptors.conversation.understand_everyday_expressions_for_simple_needs_delivered_clearly_slowly_and_repeatedly.a1"
    description: "Can understand everyday expressions aimed at the satisfaction of simple needs of a concrete type, delivered directly to them in clear, slow and repeated language by a sympathetic interlocutor."

  - scale: "conversation"
    level: "a1"
    code: "take_part_in_simple_conversation_on_predictable_topic"
    id: "cefr.interaction.speaking.descriptors.conversation.take_part_in_simple_conversation_on_predictable_topic.a1"
    description: "Can take part in a simple conversation of a basic factual nature on a predictable topic (e.g. their home country, family, school)."

  - scale: "conversation"
    level: "a1"
    code: "make_introduction_and_use_basic_greeting_and_leave_taking_expressions"
    id: "cefr.interaction.speaking.descriptors.conversation.make_introduction_and_use_basic_greeting_and_leave_taking_expressions.a1"
    description: "Can make an introduction and use basic greeting and leave-taking expressions."

  - scale: "conversation"
    level: "a1"
    code: "ask_how_people_are_and_react_to_news"
    id: "cefr.interaction.speaking.descriptors.conversation.ask_how_people_are_and_react_to_news.a1"
    description: "Can ask how people are and react to news."

  - scale: "conversation"
    level: "a2"
    code: "establish_social_contact"
    id: "cefr.interaction.speaking.descriptors.conversation.establish_social_contact.a2"
    description: "Can establish social contact (e.g. greetings and farewells, introductions, giving thanks)."

  - scale: "conversation"
    level: "a2"
    code: "generally_understand_clear_standard_language_on_familiar_matters_directed_at_them"
    id: "cefr.interaction.speaking.descriptors.conversation.generally_understand_clear_standard_language_on_familiar_matters_directed_at_them.a2"
    description: "Can generally understand clear, standard language on familiar matters directed at them, provided they can ask for repetition or reformulation from time to time."

  - scale: "conversation"
    level: "a2"
    code: "participate_in_short_conversations_in_routine_contexts_on_topics_of_interest"
    id: "cefr.interaction.speaking.descriptors.conversation.participate_in_short_conversations_in_routine_contexts_on_topics_of_interest.a2"
    description: "Can participate in short conversations in routine contexts on topics of interest."

  - scale: "conversation"
    level: "a2"
    code: "express_how_they_feel_in_simple_terms_and_express_thanks"
    id: "cefr.interaction.speaking.descriptors.conversation.express_how_they_feel_in_simple_terms_and_express_thanks.a2"
    description: "Can express how they feel in simple terms, and express thanks."

  - scale: "conversation"
    level: "a2"
    code: "ask_offer_and_respond_to_favours"
    id: "cefr.interaction.speaking.descriptors.conversation.ask_offer_and_respond_to_favours.a2"
    description: "Can ask for a favour (e.g. to borrow something), can offer a favour, and can respond if someone asks them to do a favour for them."

  - scale: "conversation"
    level: "a2"
    code: "handle_very_short_social_exchanges_but_rarely_keep_conversation_going"
    id: "cefr.interaction.speaking.descriptors.conversation.handle_very_short_social_exchanges_but_rarely_keep_conversation_going.a2"
    description: "Can handle very short social exchanges but is rarely able to understand enough to keep conversation going of their own accord, though they can be made to understand if the interlocutor will take the trouble."

  - scale: "conversation"
    level: "a2"
    code: "use_simple_everyday_polite_forms_of_greeting_and_address"
    id: "cefr.interaction.speaking.descriptors.conversation.use_simple_everyday_polite_forms_of_greeting_and_address.a2"
    description: "Can use simple, everyday, polite forms of greeting and address."

  - scale: "conversation"
    level: "a2"
    code: "converse_in_simple_language_on_most_routine_matters"
    id: "cefr.interaction.speaking.descriptors.conversation.converse_in_simple_language_on_most_routine_matters.a2"
    description: "Can converse in simple language with peers, colleagues or members of a host family, asking questions and understanding answers relating to most routine matters."

  - scale: "conversation"
    level: "a2"
    code: "make_and_respond_to_invitations_suggestions_and_apologies"
    id: "cefr.interaction.speaking.descriptors.conversation.make_and_respond_to_invitations_suggestions_and_apologies.a2"
    description: "Can make and respond to invitations, suggestions and apologies."

  - scale: "conversation"
    level: "a2"
    code: "express_how_they_are_feeling_using_very_basic_stock_expressions"
    id: "cefr.interaction.speaking.descriptors.conversation.express_how_they_are_feeling_using_very_basic_stock_expressions.a2"
    description: "Can express how they are feeling, using very basic stock expressions."

  - scale: "conversation"
    level: "a2"
    code: "state_what_they_like_and_dislike"
    id: "cefr.interaction.speaking.descriptors.conversation.state_what_they_like_and_dislike.a2"
    description: "Can state what they like and dislike."

  - scale: "conversation"
    level: "b1"
    code: "start_up_conversation_and_help_keep_it_going_on_familiar_subjects"
    id: "cefr.interaction.speaking.descriptors.conversation.start_up_conversation_and_help_keep_it_going_on_familiar_subjects.b1"
    description: "Can start up a conversation and help keep it going by asking people relatively spontaneous questions about a special experience or event, expressing reactions and opinions on familiar subjects."

  - scale: "conversation"
    level: "b1"
    code: "have_relatively_long_conversations_on_subjects_of_common_interest_with_support"
    id: "cefr.interaction.speaking.descriptors.conversation.have_relatively_long_conversations_on_subjects_of_common_interest_with_support.b1"
    description: "Can have relatively long conversations on subjects of common interest, provided the interlocutor makes an effort to support understanding."

  - scale: "conversation"
    level: "b1"
    code: "enter_unprepared_into_conversations_on_familiar_topics"
    id: "cefr.interaction.speaking.descriptors.conversation.enter_unprepared_into_conversations_on_familiar_topics.b1"
    description: "Can enter unprepared into conversations on familiar topics."

  - scale: "conversation"
    level: "b1"
    code: "follow_clearly_articulated_language_directed_at_them_in_everyday_conversation"
    id: "cefr.interaction.speaking.descriptors.conversation.follow_clearly_articulated_language_directed_at_them_in_everyday_conversation.b1"
    description: "Can follow clearly articulated language directed at them in everyday conversation, though will sometimes have to ask for repetition of particular words/signs."

  - scale: "conversation"
    level: "b1"
    code: "maintain_conversation_or_discussion_but_may_be_difficult_to_follow_when_expressing_exact_meaning"
    id: "cefr.interaction.speaking.descriptors.conversation.maintain_conversation_or_discussion_but_may_be_difficult_to_follow_when_expressing_exact_meaning.b1"
    description: "Can maintain a conversation or discussion but may sometimes be difficult to follow when trying to express exactly what they would like to."

  - scale: "conversation"
    level: "b1"
