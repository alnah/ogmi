id: "cefr.interaction.writing.descriptors"
version: "1"

catalog:
  - code: "overall_written_interaction"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction"
    description:
      - "Written interaction concerns interactive communication through the medium of script or sign."
      - "There are two scales: “Correspondence” and “Notes, messages and forms”."
      - "The former focuses on an interpersonal exchange, while the latter concerns information transfer."
      - "In written interaction the language used is similar to oral language."
      - "In addition, most interactive situations are tolerant of some error and confusion and have some contextual support."
      - "There is usually an opportunity to use interaction strategies like asking for clarification or asking for help with formulation and to repair misunderstandings."
      - "Finally, the requirement to produce carefully structured, accurate text is less of a priority."
      - "Online interaction is dealt with separately because it is multimodal (see next section)."

  - code: "correspondence"
    id: "cefr.interaction.writing.descriptors.correspondence"
    description:
      - "The 2001 scale concerned only personal correspondence."
      - "The update augments this with descriptors for formal correspondence, since this is an activity that some user/learners need to carry out."
      - "Key concepts operationalised in the scale therefore include the following:"
      - "type of message: from simple, personal messages, to in-depth, personal and professional correspondence;"
      - "type of language: from formulaic expressions to emotional, allusive and joking usage and writing with good expression in an appropriate tone and style."

  - code: "notes_messages_and_forms"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms"
    description:
      - "This scale encompasses a range of transactional interactive writing."
      - "At the A levels it includes filling in forms with personal details."
      - "From A2 the focus is on taking or leaving messages and writing/signing short notes."
      - "Key concepts operationalised in the scale therefore include the following:"
      - "filling in forms with personal details (Pre-A1 to A2);"
      - "leaving and taking messages, from simple messages about time, through messages containing several points, to complex personal or professional messages;"
      - "formulating notes: from short and simple to more developed notes to friends, service people, teachers, etc."

entries:
  - scale: "overall_written_interaction"
    level: "pre_a1"
    code: "convey_basic_information_in_short_phrases_on_form_or_note_with_dictionary"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.convey_basic_information_in_short_phrases_on_form_or_note_with_dictionary.pre_a1"
    description: "Can convey basic information (e.g. name, address, family) in short phrases on a form or in a note, with the use of a dictionary."

  - scale: "overall_written_interaction"
    level: "a1"
    code: "ask_for_or_pass_on_personal_details"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.ask_for_or_pass_on_personal_details.a1"
    description: "Can ask for or pass on personal details."

  - scale: "overall_written_interaction"
    level: "a2"
    code: "compose_short_simple_formulaic_notes_relating_to_matters_in_areas_of_immediate_need"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.compose_short_simple_formulaic_notes_relating_to_matters_in_areas_of_immediate_need.a2"
    description: "Can compose short, simple formulaic notes relating to matters in areas of immediate need."

  - scale: "overall_written_interaction"
    level: "b1"
    code: "convey_information_and_ideas_on_abstract_and_concrete_topics_and_check_information"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.convey_information_and_ideas_on_abstract_and_concrete_topics_and_check_information.b1"
    description: "Can convey information and ideas on abstract as well as concrete topics, check information, and ask about or explain problems with reasonable precision."

  - scale: "overall_written_interaction"
    level: "b1"
    code: "compose_personal_letters_and_notes_asking_for_or_conveying_simple_information"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.compose_personal_letters_and_notes_asking_for_or_conveying_simple_information.b1"
    description: "Can compose personal letters and notes asking for or conveying simple information of immediate relevance, getting across the point they feel to be important."

  - scale: "overall_written_interaction"
    level: "b2"
    code: "express_news_and_views_effectively_in_writing_and_relate_to_those_of_others"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.express_news_and_views_effectively_in_writing_and_relate_to_those_of_others.b2"
    description: "Can express news and views effectively in writing, and relate to those of others."

  - scale: "overall_written_interaction"
    level: "c1"
    code: "express_themselves_with_clarity_and_precision_relate_to_addressee_flexibly_and_effectively"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.express_themselves_with_clarity_and_precision_relate_to_addressee_flexibly_and_effectively.c1"
    description: "Can express themselves with clarity and precision, relating to the addressee flexibly and effectively."

  - scale: "overall_written_interaction"
    level: "c2"
    code: "express_themselves_in_appropriate_tone_and_style_in_virtually_any_formal_and_informal_interaction"
    id: "cefr.interaction.writing.descriptors.overall_written_interaction.express_themselves_in_appropriate_tone_and_style_in_virtually_any_formal_and_informal_interaction.c2"
    description: "Can express themselves in an appropriate tone and style in virtually any type of formal and informal interaction."

  - scale: "correspondence"
    level: "pre_a1"
    code: "convey_basic_personal_information_in_short_phrases_and_sentences_with_dictionary"
    id: "cefr.interaction.writing.descriptors.correspondence.convey_basic_personal_information_in_short_phrases_and_sentences_with_dictionary.pre_a1"
    description: "Can convey basic personal information in short phrases and sentences, with reference to a dictionary."

  - scale: "correspondence"
    level: "a1"
    code: "compose_messages_and_online_postings_as_series_of_very_short_sentences"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_messages_and_online_postings_as_series_of_very_short_sentences.a1"
    description: "Can compose messages and online postings as a series of very short sentences about hobbies and likes/dislikes, using simple words and formulaic expressions, with reference to a dictionary."

  - scale: "correspondence"
    level: "a1"
    code: "compose_short_simple_postcard"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_short_simple_postcard.a1"
    description: "Can compose a short, simple postcard."

  - scale: "correspondence"
    level: "a1"
    code: "compose_short_very_simple_message_to_friends"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_short_very_simple_message_to_friends.a1"
    description: "Can compose a short, very simple message (e.g. a text message) to friends to give them a piece of information or to ask them a question."

  - scale: "correspondence"
    level: "a2"
    code: "exchange_information_by_text_message_email_or_short_letters"
    id: "cefr.interaction.writing.descriptors.correspondence.exchange_information_by_text_message_email_or_short_letters.a2"
    description: "Can exchange information by text message, by e-mail or in short letters, responding to questions from the other person (e.g. about a new product or activity)."

  - scale: "correspondence"
    level: "a2"
    code: "convey_personal_information_of_routine_nature_in_short_email_or_letter"
    id: "cefr.interaction.writing.descriptors.correspondence.convey_personal_information_of_routine_nature_in_short_email_or_letter.a2"
    description: "Can convey personal information of a routine nature, for example in a short e-mail or letter introducing themselves."

  - scale: "correspondence"
    level: "a2"
    code: "compose_very_simple_personal_letters_expressing_thanks_and_apology"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_very_simple_personal_letters_expressing_thanks_and_apology.a2"
    description: "Can compose very simple personal letters expressing thanks and apology."

  - scale: "correspondence"
    level: "a2"
    code: "compose_short_simple_notes_emails_and_text_messages"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_short_simple_notes_emails_and_text_messages.a2"
    description: "Can compose short, simple notes, e-mails and text messages (e.g. to send or reply to an invitation, to confirm or change an arrangement)."

  - scale: "correspondence"
    level: "a2"
    code: "compose_short_text_in_greetings_card"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_short_text_in_greetings_card.a2"
    description: "Can compose a short text in a greetings card (e.g. for someone’s birthday or to wish them a Happy New Year)."

  - scale: "correspondence"
    level: "b1"
    code: "compose_personal_letters_giving_news_and_expressing_thoughts_about_abstract_or_cultural_topics"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_personal_letters_giving_news_and_expressing_thoughts_about_abstract_or_cultural_topics.b1"
    description: "Can compose personal letters giving news and expressing thoughts about abstract or cultural topics such as music or film."

  - scale: "correspondence"
    level: "b1"
    code: "compose_letters_expressing_different_opinions_and_giving_detailed_accounts"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_letters_expressing_different_opinions_and_giving_detailed_accounts.b1"
    description: "Can compose letters expressing different opinions and giving detailed accounts of personal feelings and experiences."

  - scale: "correspondence"
    level: "b1"
    code: "reply_to_advertisement_and_ask_for_further_information"
    id: "cefr.interaction.writing.descriptors.correspondence.reply_to_advertisement_and_ask_for_further_information.b1"
    description: "Can reply to an advertisement in writing and ask for further information on items that interest them."

  - scale: "correspondence"
    level: "b1"
    code: "compose_basic_formal_emails_or_letters"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_basic_formal_emails_or_letters.b1"
    description: "Can compose basic formal e-mails/letters (e.g. to make a complaint and request action)."

  - scale: "correspondence"
    level: "b1"
    code: "compose_personal_letters_describing_experiences_feelings_and_events_in_some_detail"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_personal_letters_describing_experiences_feelings_and_events_in_some_detail.b1"
    description: "Can compose personal letters describing experiences, feelings and events in some detail."

  - scale: "correspondence"
    level: "b1"
    code: "compose_basic_emails_or_letters_of_factual_nature"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_basic_emails_or_letters_of_factual_nature.b1"
    description: "Can compose basic e-mails/letters of a factual nature (e.g. to request information or to ask for and give confirmation)."

  - scale: "correspondence"
    level: "b1"
    code: "compose_basic_letter_of_application_with_limited_supporting_details"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_basic_letter_of_application_with_limited_supporting_details.b1"
    description: "Can compose a basic letter of application with limited supporting details."

  - scale: "correspondence"
    level: "b2"
    code: "compose_letters_conveying_degrees_of_emotion_and_highlighting_personal_significance"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_letters_conveying_degrees_of_emotion_and_highlighting_personal_significance.b2"
    description: "Can compose letters conveying degrees of emotion and highlighting the personal significance of events and experiences and commenting on the correspondent’s news and views."

  - scale: "correspondence"
    level: "b2"
    code: "use_formality_and_conventions_appropriate_to_context_in_personal_and_professional_letters"
    id: "cefr.interaction.writing.descriptors.correspondence.use_formality_and_conventions_appropriate_to_context_in_personal_and_professional_letters.b2"
    description: "Can use formality and conventions appropriate to the context when writing personal and professional letters and e-mails."

  - scale: "correspondence"
    level: "b2"
    code: "compose_formal_emails_or_letters_of_invitation_thanks_or_apology"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_formal_emails_or_letters_of_invitation_thanks_or_apology.b2"
    description: "Can compose formal e-mails/letters of invitation, thanks or apology using appropriate registers and conventions."

  - scale: "correspondence"
    level: "b2"
    code: "compose_non_routine_professional_letters_using_appropriate_structure_and_conventions"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_non_routine_professional_letters_using_appropriate_structure_and_conventions.b2"
    description: "Can compose non-routine professional letters, using appropriate structure and conventions, provided these are restricted to matters of fact."

  - scale: "correspondence"
    level: "b2"
    code: "obtain_collate_and_forward_information_by_letter_or_email"
    id: "cefr.interaction.writing.descriptors.correspondence.obtain_collate_and_forward_information_by_letter_or_email.b2"
    description: "Can obtain, by letter or e-mail, information required for a particular purpose, collate it and forward it by e-mail to other people."

  - scale: "correspondence"
    level: "b2"
    code: "maintain_relationship_through_personal_correspondence_with_fluency_and_effectiveness"
    id: "cefr.interaction.writing.descriptors.correspondence.maintain_relationship_through_personal_correspondence_with_fluency_and_effectiveness.b2"
    description: "Can maintain a relationship through personal correspondence using the language fluently and effectively to give detailed descriptions of experiences, pose sympathetic questions and follow up issues of mutual interest."

  - scale: "correspondence"
    level: "b2"
    code: "understand_and_use_common_idiomatic_expressions_and_colloquialisms_in_correspondence"
    id: "cefr.interaction.writing.descriptors.correspondence.understand_and_use_common_idiomatic_expressions_and_colloquialisms_in_correspondence.b2"
    description: "Can in most cases understand idiomatic expressions and colloquialisms in correspondence and other communications and use the most common ones themselves as appropriate to the situation."

  - scale: "correspondence"
    level: "b2"
    code: "compose_formal_correspondence_such_as_letters_of_enquiry_request_application_and_complaint"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_formal_correspondence_such_as_letters_of_enquiry_request_application_and_complaint.b2"
    description: "Can compose formal correspondence such as letters of enquiry, request, application and complaint using appropriate register, structure and conventions."

  - scale: "correspondence"
    level: "b2"
    code: "compose_forceful_but_polite_letter_of_complaint_with_supporting_details"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_forceful_but_polite_letter_of_complaint_with_supporting_details.b2"
    description: "Can compose a forceful but polite letter of complaint, including supporting details and a statement of the desired outcome."

  - scale: "correspondence"
    level: "c1"
    code: "express_themselves_with_clarity_and_precision_in_personal_correspondence"
    id: "cefr.interaction.writing.descriptors.correspondence.express_themselves_with_clarity_and_precision_in_personal_correspondence.c1"
    description: "Can express themselves with clarity and precision in personal correspondence, using language flexibly and effectively, including emotional, allusive and joking usage."

  - scale: "correspondence"
    level: "c1"
    code: "compose_formal_correspondence_with_good_expression_and_accuracy"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_formal_correspondence_with_good_expression_and_accuracy.c1"
    description: "Can, with good expression and accuracy, compose formal correspondence such as letters of clarification, application, recommendation, reference, complaint, sympathy and condolence."

  - scale: "correspondence"
    level: "c2"
    code: "compose_virtually_any_type_of_correspondence_necessary_in_professional_life"
    id: "cefr.interaction.writing.descriptors.correspondence.compose_virtually_any_type_of_correspondence_necessary_in_professional_life.c2"
    description: "Can compose virtually any type of correspondence necessary in the course of their professional life in an appropriate tone and style."

  - scale: "notes_messages_and_forms"
    level: "pre_a1"
    code: "fill_in_very_simple_registration_forms_with_basic_personal_details"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.fill_in_very_simple_registration_forms_with_basic_personal_details.pre_a1"
    description: "Can fill in very simple registration forms with basic personal details: name, address, nationality, marital status."

  - scale: "notes_messages_and_forms"
    level: "a1"
    code: "fill_in_numbers_dates_name_nationality_address_age_and_birth_or_arrival_details"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.fill_in_numbers_dates_name_nationality_address_age_and_birth_or_arrival_details.a1"
    description: "Can fill in numbers and dates, own name, nationality, address, age, date of birth or arrival in the country, etc., e.g. on a hotel registration form."

  - scale: "notes_messages_and_forms"
    level: "a1"
    code: "leave_simple_message_giving_information_about_where_they_have_gone_or_when_they_will_be_back"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.leave_simple_message_giving_information_about_where_they_have_gone_or_when_they_will_be_back.a1"
    description: "Can leave a simple message giving information regarding for instance where they have gone, or what time they will be back (e.g. “Shopping: back at 5 p.m.”)."

  - scale: "notes_messages_and_forms"
    level: "a2"
    code: "take_short_simple_message_provided_they_can_ask_for_repetition_and_reformulation"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_short_simple_message_provided_they_can_ask_for_repetition_and_reformulation.a2"
    description: "Can take a short, simple message provided they can ask for repetition and reformulation."

  - scale: "notes_messages_and_forms"
    level: "a2"
    code: "formulate_short_simple_notes_and_messages_relating_to_matters_in_areas_of_immediate_need"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.formulate_short_simple_notes_and_messages_relating_to_matters_in_areas_of_immediate_need.a2"
    description: "Can formulate short, simple notes and messages relating to matters in areas of immediate need."

  - scale: "notes_messages_and_forms"
    level: "a2"
    code: "fill_in_personal_and_other_details_on_most_everyday_forms"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.fill_in_personal_and_other_details_on_most_everyday_forms.a2"
    description: "Can fill in personal and other details on most everyday forms (e.g. to open a bank account, or to send a letter by recorded delivery)."

  - scale: "notes_messages_and_forms"
    level: "b1"
    code: "take_routine_messages_in_personal_professional_or_academic_context"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_routine_messages_in_personal_professional_or_academic_context.b1"
    description: "Can take routine messages that are likely to occur in a personal, professional or academic context."

  - scale: "notes_messages_and_forms"
    level: "b1"
    code: "take_messages_communicating_enquiries_and_explaining_problems"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_messages_communicating_enquiries_and_explaining_problems.b1"
    description: "Can take messages communicating enquiries and explaining problems."

  - scale: "notes_messages_and_forms"
    level: "b1"
    code: "formulate_notes_conveying_simple_information_of_immediate_relevance"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.formulate_notes_conveying_simple_information_of_immediate_relevance.b1"
    description: "Can formulate notes conveying simple information of immediate relevance to friends, service people, teachers and others who feature in their everyday life, getting across comprehensibly the points they feel are important."

  - scale: "notes_messages_and_forms"
    level: "b1"
    code: "take_messages_over_phone_containing_several_points"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_messages_over_phone_containing_several_points.b1"
    description: "Can take messages over the phone containing several points, provided the caller dictates these clearly and sympathetically."

  - scale: "notes_messages_and_forms"
    level: "b2"
    code: "take_or_leave_complex_personal_or_professional_messages"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_or_leave_complex_personal_or_professional_messages.b2"
    description: "Can take or leave complex personal or professional messages, provided they can ask for clarification or elaboration if necessary."

  - scale: "notes_messages_and_forms"
    level: "c1"
    code: "take_or_leave_complex_personal_or_professional_messages"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_or_leave_complex_personal_or_professional_messages.c1"
    description: "Can take or leave complex personal or professional messages, provided they can ask for clarification or elaboration if necessary."

  - scale: "notes_messages_and_forms"
    level: "c2"
    code: "take_or_leave_complex_personal_or_professional_messages"
    id: "cefr.interaction.writing.descriptors.notes_messages_and_forms.take_or_leave_complex_personal_or_professional_messages.c2"
    description: "Can take or leave complex personal or professional messages, provided they can ask for clarification or elaboration if necessary."
