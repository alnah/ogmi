id: "cefr.mediation.concepts.descriptors"
version: "1"

catalog:
  - code: "facilitating_collaborative_interaction_with_peers"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers"
    description:
      - "The user/learner contributes to successful collaboration in a group that they belong to, usually with a specific shared objective or communicative task in mind."
      - "They are concerned with making conscious interventions where appropriate to orient the discussion, balance contributions and help to overcome communication difficulties within the group."
      - "They do not have a designated lead role in the group, and are not concerned with creating a lead role for themselves, being concerned solely with successful collaboration."
      - "Key concepts operationalised in the scale include the following:"
      - "collaborative participation by consciously managing one’s own role and contributions to group communication;"
      - "active orientation of teamwork by helping to review key points and consider or define next steps;"
      - "use of questions and contributions to move the discussion forward in a productive way;"
      - "use of questions and turntaking to balance contributions from other group members with their own contributions."
      - "Progression up the scale is characterised as follows: at A2, the user/learner can collaborate actively in simple, shared tasks, provided someone helps them express their suggestions."
      - "At B1, the focus is on posing questions and inviting others to contribute."
      - "By B2, the learner/user can refocus the discussion, helping to define goals and comparing ways of achieving them."
      - "At C1, they can help steer a discussion tactfully towards a conclusion."

  - code: "collaborating_to_construct_meaning"
    id: "cefr.mediation.concepts.descriptors.collaborating_to_construct_meaning"
    description:
      - "This scale is concerned with stimulating and developing ideas as a member of a group."
      - "It is particularly relevant to collaborative work in problem solving, brainstorming, concept development and project work."
      - "Key concepts operationalised in the scale include the following:"
      - "cognitively framing collaborative tasks by deciding on aims, processes and steps;"
      - "co-constructing ideas/solutions;"
      - "asking others to explain their thinking and identifying inconsistencies in their thought processes;"
      - "summarising the discussion and deciding on next steps."
      - "Progression up the scale is characterised as follows: the scale moves from simple questioning techniques and the organisation of tasks at B1 to further developing other people’s ideas and opinions, co-developing ideas (B2/B2+) to evaluating problems, challenges and proposals, highlighting inconsistencies in thinking (C1), and guiding discussion effectively to a consensus at C2."

  - code: "managing_interaction"
    id: "cefr.mediation.concepts.descriptors.managing_interaction"
    description:
      - "This scale is intended for situations in which the user/learner has a designated lead role to organise communicative activity between members of a group or several groups, for example as a teacher, workshop facilitator, trainer or meeting chair."
      - "They have a conscious approach to managing phases of communication that may include both plenary communication with the whole group, and/or management of communication within and between sub-groups."
      - "Key concepts operationalised in the scale include the following:"
      - "leading plenary activity;"
      - "giving instructions and checking understanding of communicative task objectives;"
      - "monitoring and facilitating communication within the group or sub-groups without impeding the flow of communication between group participants;"
      - "reorienting communication in the group or sub-groups; intervening to put a group back on task;"
      - "adapting one’s own contributions and interactive role to support group communication, according to need."
      - "Progression up the scale is characterised as follows: at B1 the user/learner can give clear instructions, allocate turns, and bring participants in a group back to the task."
      - "These aspects are extended at B2 with explanations of different roles, ground rules and an ability to put a group back on task with new instructions or to encourage more balanced participation."
      - "Several descriptors on monitoring clustered at B2+; only one of these has been kept in the scale."
      - "By C1, the user/learner can organise a varied and balanced sequence of plenary, group and individual work, ensuring smooth transitions between the phases, intervening diplomatically in order to redirect discussion, to prevent one person dominating or to confront disruptive behaviour."
      - "At C2, they can take on different roles as appropriate, recognise undercurrents and give appropriate guidance, and provide individualised support."

  - code: "encouraging_conceptual_talk"
    id: "cefr.mediation.concepts.descriptors.encouraging_conceptual_talk"
    description:
      - "Encouraging conceptual talk involves providing scaffolding to enable another person or persons to themselves construct a new concept, rather than passively following a lead."
      - "The user/learner may do this as a member of a group, taking temporarily the role of facilitator, or they may have the designated role of an expert (for example, an animator, teacher, trainer or manager) who is leading the group in order to help them understand concepts."
      - "Key concepts operationalised in the scale include the following:"
      - "asking questions to stimulate logical reasoning (dialogic talk);"
      - "building contributions into logical, coherent discourse."
      - "Progression up the scale is characterised as follows: the scale moves from showing interest at A1, through asking simple questions to bring someone into a discussion or to ask someone’s opinion at A2, to monitoring discussion and posing higher order questions at B2+ and above, in order to encourage logical reasoning, justification of ideas and the construction of coherent lines of thinking."

entries:
  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "a1"
    code: "invite_others_contributions_to_very_simple_tasks_with_prepared_simple_phrases"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.invite_others_contributions_to_very_simple_tasks_with_prepared_simple_phrases.a1"
    description: "Can invite others’ contributions to very simple tasks using short, simple phrases prepared in advance. Can indicate that they understand and ask whether others understand."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "a2"
    code: "collaborate_in_simple_shared_tasks_and_help_others_contribute"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.collaborate_in_simple_shared_tasks_and_help_others_contribute.a2"
    description: "Can collaborate in simple, shared tasks, provided other participants articulate slowly and one or more people help them contribute and express their suggestions."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "a2"
    code: "collaborate_in_simple_practical_tasks_asking_others_think_and_making_suggestions"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.collaborate_in_simple_practical_tasks_asking_others_think_and_making_suggestions.a2"
    description: "Can collaborate in simple, practical tasks, asking what others think, making suggestions and understanding responses, provided they can ask for repetition or reformulation from time to time."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b1"
    code: "collaborate_on_shared_task_formulating_and_responding_to_suggestions"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.collaborate_on_shared_task_formulating_and_responding_to_suggestions.b1"
    description: "Can collaborate on a shared task, e.g. formulating and responding to suggestions, asking whether people agree, and proposing alternative approaches."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b1"
    code: "collaborate_in_simple_shared_tasks_towards_common_goal_by_asking_and_answering_questions"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.collaborate_in_simple_shared_tasks_towards_common_goal_by_asking_and_answering_questions.b1"
    description: "Can collaborate in simple, shared tasks and work towards a common goal in a group by asking and answering straightforward questions."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b1"
    code: "define_task_in_basic_terms_and_ask_others_to_contribute_expertise_and_experience"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.define_task_in_basic_terms_and_ask_others_to_contribute_expertise_and_experience.b1"
    description: "Can define the task in basic terms in a discussion and ask others to contribute their expertise and experience."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b1"
    code: "invite_other_people_in_group_to_contribute_their_views"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.invite_other_people_in_group_to_contribute_their_views.b1"
    description: "Can invite other people in a group to contribute their views."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b2"
    code: "based_on_reactions_adjust_formulate_questions_and_intervene_in_group_interaction"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.based_on_reactions_adjust_formulate_questions_and_intervene_in_group_interaction.b2"
    description: "Can, based on people’s reactions, adjust the way they formulate questions and/or intervene in a group interaction."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b2"
    code: "act_as_rapporteur_noting_ideas_and_decisions_and_giving_summary"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.act_as_rapporteur_noting_ideas_and_decisions_and_giving_summary.b2"
    description: "Can act as rapporteur in a group discussion, noting ideas and decisions, discussing these with the group and later giving a summary of the group’s view(s) in a plenary."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b2"
    code: "ask_questions_to_stimulate_discussion_on_how_to_organise_collaborative_work"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.ask_questions_to_stimulate_discussion_on_how_to_organise_collaborative_work.b2"
    description: "Can ask questions to stimulate discussion on how to organise collaborative work."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b2"
    code: "help_define_goals_for_teamwork_and_compare_options_for_how_to_achieve_them"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.help_define_goals_for_teamwork_and_compare_options_for_how_to_achieve_them.b2"
    description: "Can help define goals for teamwork and compare options for how to achieve them."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "b2"
    code: "refocus_discussion_by_suggesting_what_to_consider_next_and_how_to_proceed"
    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.refocus_discussion_by_suggesting_what_to_consider_next_and_how_to_proceed.b2"
    description: "Can refocus a discussion by suggesting what to consider next, and how to proceed."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "c1"
