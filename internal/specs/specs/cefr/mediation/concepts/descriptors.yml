    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.develop_interaction_and_tactfully_help_steer_it_towards_conclusion.c1"
    description: "Can develop the interaction and tactfully help steer it towards a conclusion."

