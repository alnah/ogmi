    id: "cefr.mediation.concepts.descriptors.facilitating_collaborative_interaction_with_peers.show_sensitivity_to_different_perspectives_minimising_offence.c1"
    description: "Can show sensitivity to different perspectives within a group, acknowledging contributions and formulating any reservations, disagreements or criticisms in such a way as to avoid or minimise any offence."

  - scale: "facilitating_collaborative_interaction_with_peers"
    level: "c1"
