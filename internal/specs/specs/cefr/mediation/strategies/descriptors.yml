id: "cefr.mediation.strategies.descriptors"
version: "1"

catalog:
  - code: "linking_to_previous_knowledge"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge"
    description:
      - "Establishing links to previous knowledge is a significant part of the mediation process since it is an essential part of the learning process."
      - "The mediator may explain new information by making comparisons, by describing how it relates to something the recipient already knows or by helping recipients activate previous knowledge, for example."
      - "Links may be made to other texts, relating new information and concepts to previous material, and to background knowledge of the world."
      - "Key concepts operationalised in the scale include the following:"
      - "posing questions to encourage people to activate prior knowledge;"
      - "making comparisons and/or links between new and prior knowledge;"
      - "providing examples and definitions."
      - "Progression up the scale is characterised as follows: there is a progression from comparison to familiar everyday experience at B1, through awareness raising with clear explanations of links at B2, to extended, spontaneous definition of complex concepts that draw on previous knowledge at C2."

  - code: "adapting_language"
    id: "cefr.mediation.strategies.descriptors.adapting_language"
    description:
      - "The user/learner may need to employ shifts in use of language, style and/or register in order to incorporate the content of a text into a new text of a different genre and register."
      - "This may be done through the inclusion of synonyms, similes, simplification or paraphrasing."
      - "Key concepts operationalised in the scale include the following:"
      - "paraphrasing;"
      - "adapting delivery;"
      - "explaining technical terminology."
      - "Progression up the scale is characterised as follows: from A2 to B2 the user/learner can exploit paraphrasing and simplification to make the content of texts more accessible. B2 descriptors concern paraphrasing difficult concepts and technical topics comprehensible with paraphrasing, and conscious adaptation of the language used. At the C levels, concepts are technical or complex, and the user/learner is able to present the content in a different genre or register that is appropriate for the audience and purpose."

  - code: "breaking_down_complicated_information"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information"
    description:
      - "Understanding can often be enhanced by breaking down complicated information into constituent parts, and showing how these parts fit together to give the whole picture."
      - "Key concepts operationalised in the scale include the following:"
      - "breaking a process into a series of steps;"
      - "presenting ideas or instructions as bullet points;"
      - "presenting separately the main points in a chain of argument."
      - "Progression up the scale is characterised as follows: at B1 the user/learner can present instructions or informational text one point at a time. At B2, they can break down complicated processes or arguments and present their components separately. At C1, there is an added emphasis on reinforcement and recapitulation, and at C2 the user/learner can explain the relationship of parts to the whole and encourage different ways of analysing the issue."

  - code: "amplifying_a_dense_text"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text"
    description:
      - "Density of information is often an obstacle to understanding."
      - "This scale is concerned with the expansion of the input source through the inclusion of helpful information, examples, details, background information, reasoning and explanatory comments."
      - "Key concepts operationalised in the scale include the following:"
      - "using repetition and redundancy, for example by paraphrasing in different ways;"
      - "modifying style to explain things more explicitly;"
      - "giving examples."
      - "Progression up the scale is characterised as follows: at B1 and B2 the emphasis is on providing repetition and further examples, whereas at the C levels the focus is more on elaboration and explanation, adding helpful detail."

  - code: "streamlining_a_text"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text"
    description:
      - "This scale is concerned with the opposite to “Amplifying” in the scale above, namely pruning a written text to its essential message(s)."
      - "This may involve expressing the same information more economically by eliminating repetition and digressions, and excluding those sections of the source that do not add relevant new information."
      - "However, it may also involve regrouping the source ideas in order to highlight important points, to draw conclusions or to compare and contrast them."
      - "Key concepts operationalised in the scale include the following:"
      - "highlighting key information;"
      - "eliminating repetition and digressions;"
      - "excluding what is not relevant for the audience."
      - "Progression up the scale is characterised as follows: highlighting may be simply underlining or inserting marks in the margin at A2+/B1 but becomes a complete rewrite of the source text at C2. At B2, the learner is able to edit the source text to remove irrelevance and repetition. At the C levels, the focus switches to tailoring a source text for a particular audience."

entries:
  - scale: "linking_to_previous_knowledge"
    level: "b1"
    code: "explain_how_something_works_by_providing_everyday_examples"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.explain_how_something_works_by_providing_everyday_examples.b1"
    description: "Can explain how something works by providing examples that draw on people’s everyday experiences."

  - scale: "linking_to_previous_knowledge"
    level: "b1"
    code: "show_how_new_information_is_related_to_what_people_are_familiar_with"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.show_how_new_information_is_related_to_what_people_are_familiar_with.b1"
    description: "Can show how new information is related to what people are familiar with by asking simple questions."

  - scale: "linking_to_previous_knowledge"
    level: "b2"
    code: "clearly_explain_connections_between_goals_of_task_and_prior_knowledge"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.clearly_explain_connections_between_goals_of_task_and_prior_knowledge.b2"
    description: "Can clearly explain the connections between the goals of the task and previously acquired knowledge and experiences of the participant(s)."

  - scale: "linking_to_previous_knowledge"
    level: "b2"
    code: "formulate_questions_and_give_feedback_to_encourage_connections_to_previous_knowledge"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.formulate_questions_and_give_feedback_to_encourage_connections_to_previous_knowledge.b2"
    description: "Can formulate questions and give feedback to encourage people to make connections to previous knowledge and experiences."

  - scale: "linking_to_previous_knowledge"
    level: "c1"
    code: "spontaneously_pose_series_of_questions_to_encourage_prior_knowledge_and_establish_link"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.spontaneously_pose_series_of_questions_to_encourage_prior_knowledge_and_establish_link.c1"
    description: "Can spontaneously pose a series of questions to encourage people to think about their prior knowledge of an abstract issue and help them establish a link to what is going to be explained."

  - scale: "linking_to_previous_knowledge"
    level: "c2"
    code: "introduce_complex_concept_by_providing_extended_definitions_and_explanations"
    id: "cefr.mediation.strategies.descriptors.linking_to_previous_knowledge.introduce_complex_concept_by_providing_extended_definitions_and_explanations.c2"
    description: "Can introduce complex concepts (e.g. scientific notions) by providing extended definitions and explanations that draw on previous knowledge that can be assumed."

  - scale: "adapting_language"
    level: "a2"
    code: "repeat_main_point_of_simple_message_on_everyday_subject_using_different_formulation"
    id: "cefr.mediation.strategies.descriptors.adapting_language.repeat_main_point_of_simple_message_on_everyday_subject_using_different_formulation.a2"
    description: "Can repeat the main point of a simple message on an everyday subject, using different formulation to help someone else understand it."

  - scale: "adapting_language"
    level: "b1"
    code: "paraphrase_more_simply_main_points_in_short_straightforward_texts"
    id: "cefr.mediation.strategies.descriptors.adapting_language.paraphrase_more_simply_main_points_in_short_straightforward_texts.b1"
    description: "Can paraphrase more simply the main points made in short, straightforward texts on familiar subjects (e.g. short news items, interviews or documentaries) to make the contents accessible for others."

  - scale: "adapting_language"
    level: "b1"
    code: "paraphrase_short_passages_in_simple_fashion_using_original_order"
    id: "cefr.mediation.strategies.descriptors.adapting_language.paraphrase_short_passages_in_simple_fashion_using_original_order.b1"
    description: "Can paraphrase short passages in a simple fashion, using the original order of the text."

  - scale: "adapting_language"
    level: "b2"
    code: "make_accessible_for_others_main_contents_of_text_on_subject_of_interest_by_paraphrasing"
    id: "cefr.mediation.strategies.descriptors.adapting_language.make_accessible_for_others_main_contents_of_text_on_subject_of_interest_by_paraphrasing.b2"
    description: "Can make accessible for others the main contents of a text on a subject of interest (e.g. an essay, a forum discussion, a presentation) by paraphrasing in simpler language."

  - scale: "adapting_language"
    level: "b2"
    code: "make_specific_complex_piece_of_information_clearer_and_more_explicit"
    id: "cefr.mediation.strategies.descriptors.adapting_language.make_specific_complex_piece_of_information_clearer_and_more_explicit.b2"
    description: "Can make a specific, complex piece of information in their field clearer and more explicit for others by paraphrasing it in simpler language."

  - scale: "adapting_language"
    level: "b2"
    code: "explain_technical_topics_within_their_field_using_suitably_adapted_non_technical_language"
    id: "cefr.mediation.strategies.descriptors.adapting_language.explain_technical_topics_within_their_field_using_suitably_adapted_non_technical_language.b2"
    description: "Can explain technical topics within their field, using suitably adapted non-technical language for recipients who do not have specialist knowledge."

  - scale: "adapting_language"
    level: "c1"
    code: "explain_technical_terminology_and_difficult_concepts_for_non_experts"
    id: "cefr.mediation.strategies.descriptors.adapting_language.explain_technical_terminology_and_difficult_concepts_for_non_experts.c1"
    description: "Can explain technical terminology and difficult concepts when communicating with non-experts about matters within their own field."

  - scale: "adapting_language"
    level: "c1"
    code: "paraphrase_and_make_accessible_complex_specialist_topic_jargon"
    id: "cefr.mediation.strategies.descriptors.adapting_language.paraphrase_and_make_accessible_complex_specialist_topic_jargon.c1"
    description: "Can paraphrase and make accessible to a person concerned difficult material on a complex specialist topic, using suitably adapted language."

  - scale: "adapting_language"
    level: "c2"
    code: "adapt_language_of_wide_range_of_texts_to_main_content_in_register_appropriate_to_audience"
    id: "cefr.mediation.strategies.descriptors.adapting_language.adapt_language_of_wide_range_of_texts_to_main_content_in_register_appropriate_to_audience.c2"
    description: "Can adapt the language of a very wide range of texts in order to present the main content in a register and degree of sophistication and detail appropriate to the audience concerned."

  - scale: "breaking_down_complicated_information"
    level: "b1"
    code: "make_short_instructional_or_informational_text_easier_by_presenting_it_as_list"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.make_short_instructional_or_informational_text_easier_by_presenting_it_as_list.b1"
    description: "Can make a short instructional or informational text easier to understand by presenting it as a list of separate points."

  - scale: "breaking_down_complicated_information"
    level: "b1"
    code: "make_set_of_instructions_easier_by_repeating_slowly_with_verbal_nonverbal_emphasis"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.make_set_of_instructions_easier_by_repeating_slowly_with_verbal_nonverbal_emphasis.b1"
    description: "Can make a set of instructions easier to understand by repeating them slowly, a few words/signs at a time, employing verbal and non-verbal emphasis to facilitate understanding."

  - scale: "breaking_down_complicated_information"
    level: "b2"
    code: "make_complicated_process_easier_to_understand_by_breaking_it_into_smaller_steps"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.make_complicated_process_easier_to_understand_by_breaking_it_into_smaller_steps.b2"
    description: "Can make a complicated process easier to understand by breaking it down into a series of smaller steps."

  - scale: "breaking_down_complicated_information"
    level: "b2"
    code: "make_complicated_issue_easier_to_understand_by_presenting_components_separately"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.make_complicated_issue_easier_to_understand_by_presenting_components_separately.b2"
    description: "Can make a complicated issue easier to understand by presenting the components of the argument separately."

  - scale: "breaking_down_complicated_information"
    level: "c1"
    code: "facilitate_understanding_of_complex_issue_by_highlighting_main_points_and_repeating_key_aspects"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.facilitate_understanding_of_complex_issue_by_highlighting_main_points_and_repeating_key_aspects.c1"
    description: "Can facilitate understanding of a complex issue by highlighting and categorising the main points, and by repeating and reinforcing the message by repeating the key aspects in different ways."

  - scale: "breaking_down_complicated_information"
    level: "c2"
    code: "facilitate_understanding_of_complex_issue_by_explaining_relationship_of_parts_to_whole"
    id: "cefr.mediation.strategies.descriptors.breaking_down_complicated_information.facilitate_understanding_of_complex_issue_by_explaining_relationship_of_parts_to_whole.c2"
    description: "Can facilitate understanding of a complex issue by explaining the relationship of parts to the whole and encourage different ways of approaching it."

  - scale: "amplifying_a_dense_text"
    level: "b1"
    code: "make_aspect_of_everyday_topic_clearer_and_more_explicit_by_conveying_main_information_another_way"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_aspect_of_everyday_topic_clearer_and_more_explicit_by_conveying_main_information_another_way.b1"
    description: "Can make an aspect of an everyday topic clearer and more explicit by conveying the main information in another way."

  - scale: "amplifying_a_dense_text"
    level: "b1"
    code: "make_aspect_of_everyday_topic_clearer_by_providing_simple_examples"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_aspect_of_everyday_topic_clearer_by_providing_simple_examples.b1"
    description: "Can make an aspect of an everyday topic clearer by providing simple examples."

  - scale: "amplifying_a_dense_text"
    level: "b2"
    code: "make_concepts_in_subjects_of_interest_more_accessible_with_examples_recapitulation_and_illustrations"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_concepts_in_subjects_of_interest_more_accessible_with_examples_recapitulation_and_illustrations.b2"
    description: "Can make concepts on subjects in their fields of interest more accessible by giving concrete examples, recapitulating step by step and repeating the main points."

  - scale: "amplifying_a_dense_text"
    level: "b2"
    code: "make_new_information_more_accessible_by_using_repetition_and_adding_illustrations"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_new_information_more_accessible_by_using_repetition_and_adding_illustrations.b2"
    description: "Can make new information more accessible by using repetition and adding illustrations."

  - scale: "amplifying_a_dense_text"
    level: "c1"
    code: "make_main_points_in_complex_text_more_accessible_by_adding_redundancy_explaining_and_modifying_style"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_main_points_in_complex_text_more_accessible_by_adding_redundancy_explaining_and_modifying_style.c1"
    description: "Can make the main points contained in a complex text more accessible to the target audience by adding redundancy, explaining, and modifying style and register."

  - scale: "amplifying_a_dense_text"
    level: "c1"
    code: "make_content_of_text_on_subject_of_interest_more_accessible_by_adding_examples_reasoning_and_explanatory_comments"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_content_of_text_on_subject_of_interest_more_accessible_by_adding_examples_reasoning_and_explanatory_comments.c1"
    description: "Can make the content of a text on a subject in their fields of interest more accessible to a target audience by adding examples, reasoning and explanatory comments."

  - scale: "amplifying_a_dense_text"
    level: "c2"
    code: "make_complex_challenging_content_more_accessible_by_explaining_difficult_aspects_more_explicitly"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.make_complex_challenging_content_more_accessible_by_explaining_difficult_aspects_more_explicitly.c2"
    description: "Can make complex, challenging content more accessible by explaining difficult aspects more explicitly and adding helpful detail."

  - scale: "amplifying_a_dense_text"
    level: "c2"
    code: "elucidate_information_given_in_texts_on_complex_topics_by_elaborating_and_providing_examples"
    id: "cefr.mediation.strategies.descriptors.amplifying_a_dense_text.elucidate_information_given_in_texts_on_complex_topics_by_elaborating_and_providing_examples.c2"
    description: "Can elucidate the information given in texts on complex academic or professional topics by elaborating and providing examples."

  - scale: "streamlining_a_text"
    level: "b1"
    code: "identify_and_mark_key_sentences_in_short_everyday_text"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.identify_and_mark_key_sentences_in_short_everyday_text.b1"
    description: "Can identify and mark (e.g. underline, highlight) the key sentences in a short everyday text."

  - scale: "streamlining_a_text"
    level: "b1"
    code: "identify_and_mark_essential_information_in_straightforward_informational_text"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.identify_and_mark_essential_information_in_straightforward_informational_text.b1"
    description: "Can identify and mark (e.g. underline, highlight) the essential information in a straightforward, informational text, in order to pass this information on to someone else."

  - scale: "streamlining_a_text"
    level: "b2"
    code: "identify_related_or_repeated_information_and_merge_it_to_make_message_clearer"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.identify_related_or_repeated_information_and_merge_it_to_make_message_clearer.b2"
    description: "Can identify related or repeated information in different parts of a text and merge it in order to make the essential message clearer."

  - scale: "streamlining_a_text"
    level: "b2"
    code: "edit_source_text_by_deleting_parts_that_do_not_add_new_information"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.edit_source_text_by_deleting_parts_that_do_not_add_new_information.b2"
    description: "Can edit a source text by deleting the parts that do not add new information that is relevant for a given audience, in order to make the significant content more accessible for them."

  - scale: "streamlining_a_text"
    level: "c1"
    code: "simplify_source_text_by_excluding_nonrelevant_or_repetitive_information"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.simplify_source_text_by_excluding_nonrelevant_or_repetitive_information.c1"
    description: "Can simplify a source text by excluding non-relevant or repetitive information, taking into consideration the intended audience."

  - scale: "streamlining_a_text"
    level: "c2"
    code: "reorganise_complex_source_text_to_focus_on_points_most_relevant_to_target_audience"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.reorganise_complex_source_text_to_focus_on_points_most_relevant_to_target_audience.c2"
    description: "Can reorganise a complex source text in order to focus on the points most relevant to the target audience."

  - scale: "streamlining_a_text"
    level: "c2"
    code: "redraft_complex_source_text_improving_coherence_cohesion_and_flow_while_removing_unnecessary_sections"
    id: "cefr.mediation.strategies.descriptors.streamlining_a_text.redraft_complex_source_text_improving_coherence_cohesion_and_flow_while_removing_unnecessary_sections.c2"
    description: "Can redraft a complex source text, improving coherence, cohesion and the flow of an argument, while removing sections unnecessary for its purpose."
