id: "cefr.production.writing.descriptors"
version: "1"

catalog:
  - code: "overall_written_production"
    id: "cefr.production.writing.descriptors.overall_written_production"
    description:
      - "In the categories for written production, the macro-functions “transactional language use” and “evaluative language use” are not separated because they are normally interwoven (“Reading for information and argument” also combined these two aspects)."
      - "Creative writing” is the equivalent of “Sustained monologue: describing experience”, and focuses on description and narrative."
      - "As an alternative to writing, signers sometimes produce and send a video."

  - code: "creative_writing"
    id: "cefr.production.writing.descriptors.creative_writing"
    description:
      - "This scale involves personal, imaginative expression in a variety of text types in written and signed modalities."
      - "Key concepts operationalised in the scale include the following:"
      - "aspects described, from simple everyday information, through a variety of subjects related to fields of interest, to engaging stories and descriptions of experience;"
      - "types of text: from diary entries and short, imaginary biographies and simple poems to well-structured and developed descriptions and imaginative texts;"
      - "complexity of discourse: from simple words/signs and phrases, through clear connected text, to following established conventions of the genre concerned in clear, well-structured, smoothly flowing text;"
      - "use of language: from basic vocabulary and simple sentences to an assured, personal, natural style appropriate to both the genre adopted and the reader."

  - code: "reports_and_essays"
    id: "cefr.production.writing.descriptors.reports_and_essays"
    description:
      - "This scale covers more formal types of transactional and evaluative writing and signed production."
      - "Key concepts operationalised in the scale include the following:"
      - "content: from familiar subjects of interest and routine factual information to complex academic and professional topics, distinguishing one’s own viewpoints from those in the sources;"
      - "types of text: from short reports and posters to complex texts that present a case, or provide critical appreciation of proposals or literary works;"
      - "complexity of discourse: from linking sentences with simple connectors to smoothly flowing expositions with effective logical structure."

entries:
  - scale: "overall_written_production"
    level: "pre_a1"
    code: "give_basic_personal_information_perhaps_with_dictionary"
    id: "cefr.production.writing.descriptors.overall_written_production.give_basic_personal_information_perhaps_with_dictionary.pre_a1"
    description: "Can give basic personal information (e.g. name, address, nationality), perhaps with the use of a dictionary."

  - scale: "overall_written_production"
    level: "a1"
    code: "give_information_about_matters_of_personal_relevance_using_simple_words"
    id: "cefr.production.writing.descriptors.overall_written_production.give_information_about_matters_of_personal_relevance_using_simple_words.a1"
    description: "Can give information about matters of personal relevance (e.g. likes and dislikes, family, pets) using simple words/signs and basic expressions."

  - scale: "overall_written_production"
    level: "a1"
    code: "produce_simple_isolated_phrases_and_sentences"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_simple_isolated_phrases_and_sentences.a1"
    description: "Can produce simple isolated phrases and sentences."

  - scale: "overall_written_production"
    level: "a2"
    code: "produce_series_of_simple_phrases_and_sentences_linked_with_simple_connectors"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_series_of_simple_phrases_and_sentences_linked_with_simple_connectors.a2"
    description: "Can produce a series of simple phrases and sentences linked with simple connectors like “and”, “but” and “because”."

  - scale: "overall_written_production"
    level: "b1"
    code: "produce_straightforward_connected_texts_on_familiar_subjects"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_straightforward_connected_texts_on_familiar_subjects.b1"
    description: "Can produce straightforward connected texts on a range of familiar subjects within their field of interest, by linking a series of shorter discrete elements into a linear sequence."

  - scale: "overall_written_production"
    level: "b2"
    code: "produce_clear_detailed_texts_synthesising_and_evaluating_information_and_arguments"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_clear_detailed_texts_synthesising_and_evaluating_information_and_arguments.b2"
    description: "Can produce clear, detailed texts on a variety of subjects related to their field of interest, synthesising and evaluating information and arguments from a number of sources."

  - scale: "overall_written_production"
    level: "c1"
    code: "produce_clear_well_structured_texts_of_complex_subjects_with_supported_points_of_view"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_clear_well_structured_texts_of_complex_subjects_with_supported_points_of_view.c1"
    description: "Can produce clear, well-structured texts of complex subjects, underlining the relevant salient issues, expanding and supporting points of view at some length with subsidiary points, reasons and relevant examples, and rounding off with an appropriate conclusion."

  - scale: "overall_written_production"
    level: "c1"
    code: "employ_structure_and_conventions_of_variety_of_genres"
    id: "cefr.production.writing.descriptors.overall_written_production.employ_structure_and_conventions_of_variety_of_genres.c1"
    description: "Can employ the structure and conventions of a variety of genres, varying the tone, style and register according to addressee, text type and theme."

  - scale: "overall_written_production"
    level: "c2"
    code: "produce_clear_smoothly_flowing_complex_texts_in_appropriate_and_effective_style"
    id: "cefr.production.writing.descriptors.overall_written_production.produce_clear_smoothly_flowing_complex_texts_in_appropriate_and_effective_style.c2"
    description: "Can produce clear, smoothly flowing, complex texts in an appropriate and effective style and a logical structure which helps the reader identify significant points."

  - scale: "creative_writing"
    level: "a1"
    code: "produce_simple_phrases_and_sentences_about_themselves_and_imaginary_people"
    id: "cefr.production.writing.descriptors.creative_writing.produce_simple_phrases_and_sentences_about_themselves_and_imaginary_people.a1"
    description: "Can produce simple phrases and sentences about themselves and imaginary people, where they live and what they do."

  - scale: "creative_writing"
    level: "a1"
    code: "describe_in_very_simple_language_what_a_room_looks_like"
    id: "cefr.production.writing.descriptors.creative_writing.describe_in_very_simple_language_what_a_room_looks_like.a1"
    description: "Can describe in very simple language what a room looks like."

  - scale: "creative_writing"
    level: "a1"
    code: "use_simple_words_and_phrases_to_describe_everyday_objects"
    id: "cefr.production.writing.descriptors.creative_writing.use_simple_words_and_phrases_to_describe_everyday_objects.a1"
    description: "Can use simple words/signs and phrases to describe certain everyday objects (e.g. the colour of a car, whether it is big or small)."

  - scale: "creative_writing"
    level: "a2"
    code: "describe_everyday_aspects_of_environment_in_linked_sentences"
    id: "cefr.production.writing.descriptors.creative_writing.describe_everyday_aspects_of_environment_in_linked_sentences.a2"
    description: "Can describe everyday aspects of their environment e.g. people, places, a job or study experience in linked sentences."

  - scale: "creative_writing"
    level: "a2"
    code: "give_very_short_basic_descriptions_of_events_activities_and_personal_experiences"
    id: "cefr.production.writing.descriptors.creative_writing.give_very_short_basic_descriptions_of_events_activities_and_personal_experiences.a2"
    description: "Can give very short, basic descriptions of events, past activities and personal experiences."

  - scale: "creative_writing"
    level: "a2"
    code: "tell_simple_story"
    id: "cefr.production.writing.descriptors.creative_writing.tell_simple_story.a2"
    description: "Can tell a simple story (e.g. about events on a holiday or about life in the distant future)."

  - scale: "creative_writing"
    level: "a2"
    code: "produce_series_of_simple_phrases_and_sentences_about_family_and_background"
    id: "cefr.production.writing.descriptors.creative_writing.produce_series_of_simple_phrases_and_sentences_about_family_and_background.a2"
    description: "Can produce a series of simple phrases and sentences about their family, living conditions, educational background, or present or most recent job."

  - scale: "creative_writing"
    level: "a2"
    code: "create_short_simple_imaginary_biographies_and_simple_poems"
    id: "cefr.production.writing.descriptors.creative_writing.create_short_simple_imaginary_biographies_and_simple_poems.a2"
    description: "Can create short, simple imaginary biographies and simple poems about people."

  - scale: "creative_writing"
    level: "a2"
    code: "create_diary_entries_describing_activities_people_and_places"
    id: "cefr.production.writing.descriptors.creative_writing.create_diary_entries_describing_activities_people_and_places.a2"
    description: "Can create diary entries that describe activities (e.g. daily routine, outings, sports, hobbies), people and places, using basic, concrete vocabulary and simple phrases and sentences with simple connectives like “and”, “but” and “because”."

  - scale: "creative_writing"
    level: "a2"
    code: "compose_introduction_to_story_or_continue_story_with_dictionary_and_references"
    id: "cefr.production.writing.descriptors.creative_writing.compose_introduction_to_story_or_continue_story_with_dictionary_and_references.a2"
    description: "Can compose an introduction to a story or continue a story, provided they can consult a dictionary and references (e.g. tables of verb tenses in a course book)."

  - scale: "creative_writing"
    level: "b1"
    code: "clearly_signal_chronological_sequence_in_narrative_text"
    id: "cefr.production.writing.descriptors.creative_writing.clearly_signal_chronological_sequence_in_narrative_text.b1"
    description: "Can clearly signal chronological sequence in narrative text."

  - scale: "creative_writing"
    level: "b1"
    code: "give_simple_review_of_film_book_or_tv_programme_using_limited_language"
    id: "cefr.production.writing.descriptors.creative_writing.give_simple_review_of_film_book_or_tv_programme_using_limited_language.b1"
    description: "Can give a simple review of a film, book or TV programme using a limited range of language."

  - scale: "creative_writing"
    level: "b1"
    code: "give_straightforward_detailed_descriptions_on_range_of_familiar_subjects"
    id: "cefr.production.writing.descriptors.creative_writing.give_straightforward_detailed_descriptions_on_range_of_familiar_subjects.b1"
    description: "Can give straightforward, detailed descriptions on a range of familiar subjects within their field of interest."

  - scale: "creative_writing"
    level: "b1"
    code: "give_accounts_of_experiences_describing_feelings_and_reactions_in_connected_text"
    id: "cefr.production.writing.descriptors.creative_writing.give_accounts_of_experiences_describing_feelings_and_reactions_in_connected_text.b1"
    description: "Can give accounts of experiences, describing feelings and reactions in simple, connected text."

  - scale: "creative_writing"
    level: "b1"
    code: "give_description_of_event_or_recent_trip_real_or_imagined"
    id: "cefr.production.writing.descriptors.creative_writing.give_description_of_event_or_recent_trip_real_or_imagined.b1"
    description: "Can give a description of an event, a recent trip – real or imagined."

  - scale: "creative_writing"
    level: "b1"
    code: "narrate_story"
    id: "cefr.production.writing.descriptors.creative_writing.narrate_story.b1"
    description: "Can narrate a story."

  - scale: "creative_writing"
    level: "b2"
    code: "give_clear_detailed_descriptions_of_real_or_imaginary_events_and_experiences"
    id: "cefr.production.writing.descriptors.creative_writing.give_clear_detailed_descriptions_of_real_or_imaginary_events_and_experiences.b2"
    description: "Can give clear, detailed descriptions of real or imaginary events and experiences marking the relationship between ideas in clear connected text, and following established conventions of the genre concerned."

  - scale: "creative_writing"
    level: "b2"
    code: "give_clear_detailed_descriptions_on_variety_of_subjects_related_to_field_of_interest"
    id: "cefr.production.writing.descriptors.creative_writing.give_clear_detailed_descriptions_on_variety_of_subjects_related_to_field_of_interest.b2"
    description: "Can give clear, detailed descriptions on a variety of subjects related to their field of interest."

  - scale: "creative_writing"
    level: "b2"
    code: "give_review_of_film_book_or_play"
    id: "cefr.production.writing.descriptors.creative_writing.give_review_of_film_book_or_play.b2"
    description: "Can give a review of a film, book or play."

  - scale: "creative_writing"
    level: "c1"
    code: "produce_clear_detailed_well_structured_and_developed_descriptions_and_imaginative_texts"
    id: "cefr.production.writing.descriptors.creative_writing.produce_clear_detailed_well_structured_and_developed_descriptions_and_imaginative_texts.c1"
    description: "Can produce clear, detailed, well-structured and developed descriptions and imaginative texts in an assured, personal, natural style appropriate to the reader in mind."

  - scale: "creative_writing"
    level: "c1"
    code: "incorporate_idiom_and_humour"
    id: "cefr.production.writing.descriptors.creative_writing.incorporate_idiom_and_humour.c1"
    description: "Can incorporate idiom and humour, though use of the latter is not always appropriate."

  - scale: "creative_writing"
    level: "c1"
    code: "give_detailed_critical_review_of_cultural_events_or_literary_works"
    id: "cefr.production.writing.descriptors.creative_writing.give_detailed_critical_review_of_cultural_events_or_literary_works.c1"
    description: "Can give a detailed critical review of cultural events (e.g. plays, films, concerts) or literary works."

  - scale: "creative_writing"
    level: "c2"
    code: "relate_clear_smoothly_flowing_and_engaging_stories_and_descriptions_of_experience"
    id: "cefr.production.writing.descriptors.creative_writing.relate_clear_smoothly_flowing_and_engaging_stories_and_descriptions_of_experience.c2"
    description: "Can relate clear, smoothly flowing and engaging stories and descriptions of experience in a style appropriate to the genre adopted."

  - scale: "creative_writing"
    level: "c2"
    code: "exploit_idiom_and_humour_appropriately_to_enhance_impact_of_text"
    id: "cefr.production.writing.descriptors.creative_writing.exploit_idiom_and_humour_appropriately_to_enhance_impact_of_text.c2"
    description: "Can exploit idiom and humour appropriately to enhance the impact of the text."

  - scale: "reports_and_essays"
    level: "a2"
    code: "produce_simple_texts_on_familiar_subjects_of_interest_with_simple_connectors"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_simple_texts_on_familiar_subjects_of_interest_with_simple_connectors.a2"
    description: "Can produce simple texts on familiar subjects of interest, linking sentences with connectors like “and”, “because” or “then”."

  - scale: "reports_and_essays"
    level: "a2"
    code: "give_impressions_and_opinions_about_topics_of_personal_interest"
    id: "cefr.production.writing.descriptors.reports_and_essays.give_impressions_and_opinions_about_topics_of_personal_interest.a2"
    description: "Can give their impressions and opinions about topics of personal interest (e.g. lifestyles and culture, stories), using basic everyday vocabulary and expressions."

  - scale: "reports_and_essays"
    level: "b1"
    code: "produce_short_simple_essays_on_topics_of_interest"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_short_simple_essays_on_topics_of_interest.b1"
    description: "Can produce short, simple essays on topics of interest."

  - scale: "reports_and_essays"
    level: "b1"
    code: "produce_text_on_topical_subject_using_simple_language_to_list_advantages_and_disadvantages"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_text_on_topical_subject_using_simple_language_to_list_advantages_and_disadvantages.b1"
    description: "Can produce a text on a topical subject of personal interest, using simple language to list advantages and disadvantages, and give and justify their opinion."

  - scale: "reports_and_essays"
    level: "b1"
    code: "summarise_report_and_give_opinion_about_accumulated_factual_information"
    id: "cefr.production.writing.descriptors.reports_and_essays.summarise_report_and_give_opinion_about_accumulated_factual_information.b1"
    description: "Can summarise, report and give their opinion about accumulated factual information on familiar routine and non-routine matters within their field with some confidence."

  - scale: "reports_and_essays"
    level: "b1"
    code: "produce_very_brief_reports_in_standard_conventionalised_format"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_very_brief_reports_in_standard_conventionalised_format.b1"
    description: "Can produce very brief reports in a standard conventionalised format, which pass on routine factual information and state reasons for actions."

  - scale: "reports_and_essays"
    level: "b1"
    code: "present_topic_in_short_report_or_poster_using_photographs_and_short_blocks_of_text"
    id: "cefr.production.writing.descriptors.reports_and_essays.present_topic_in_short_report_or_poster_using_photographs_and_short_blocks_of_text.b1"
    description: "Can present a topic in a short report or poster, using photographs and short blocks of text."

  - scale: "reports_and_essays"
    level: "b2"
    code: "produce_essay_or_report_developing_argument_systematically"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_essay_or_report_developing_argument_systematically.b2"
    description: "Can produce an essay or report which develops an argument systematically with appropriate highlighting of significant points and relevant supporting detail."

  - scale: "reports_and_essays"
    level: "b2"
    code: "produce_detailed_description_of_complex_process"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_detailed_description_of_complex_process.b2"
    description: "Can produce a detailed description of a complex process."

  - scale: "reports_and_essays"
    level: "b2"
    code: "evaluate_different_ideas_or_solutions_to_problem"
    id: "cefr.production.writing.descriptors.reports_and_essays.evaluate_different_ideas_or_solutions_to_problem.b2"
    description: "Can evaluate different ideas or solutions to a problem."

  - scale: "reports_and_essays"
    level: "b2"
    code: "produce_essay_or_report_developing_argument_with_reasons_and_options"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_essay_or_report_developing_argument_with_reasons_and_options.b2"
    description: "Can produce an essay or report which develops an argument, giving reasons in support of or against a particular point of view and explaining the advantages and disadvantages of various options."

  - scale: "reports_and_essays"
    level: "b2"
    code: "synthesise_information_and_arguments_from_number_of_sources"
    id: "cefr.production.writing.descriptors.reports_and_essays.synthesise_information_and_arguments_from_number_of_sources.b2"
    description: "Can synthesise information and arguments from a number of sources."

  - scale: "reports_and_essays"
    level: "c1"
    code: "produce_clear_well_structured_expositions_of_complex_subjects"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_clear_well_structured_expositions_of_complex_subjects.c1"
    description: "Can produce clear, well-structured expositions of complex subjects, underlining the relevant salient issues."

  - scale: "reports_and_essays"
    level: "c1"
    code: "expand_and_support_points_of_view_at_length_with_reasons_and_examples"
    id: "cefr.production.writing.descriptors.reports_and_essays.expand_and_support_points_of_view_at_length_with_reasons_and_examples.c1"
    description: "Can expand and support points of view at some length with subsidiary points, reasons and relevant examples."

  - scale: "reports_and_essays"
    level: "c1"
    code: "produce_suitable_introduction_and_conclusion_to_longer_report_article_or_dissertation"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_suitable_introduction_and_conclusion_to_longer_report_article_or_dissertation.c1"
    description: "Can produce a suitable introduction and conclusion to a longer report, article or dissertation on a complex academic or professional topic provided the topic is within their field of interest and there are opportunities for redrafting and revision."

  - scale: "reports_and_essays"
    level: "c2"
    code: "produce_clear_smoothly_flowing_complex_reports_articles_or_essays"
    id: "cefr.production.writing.descriptors.reports_and_essays.produce_clear_smoothly_flowing_complex_reports_articles_or_essays.c2"
    description: "Can produce clear, smoothly flowing, complex reports, articles or essays which present a case, or give critical appreciation of proposals or literary works."

  - scale: "reports_and_essays"
    level: "c2"
    code: "provide_appropriate_and_effective_logical_structure_helping_reader_identify_significant_points"
    id: "cefr.production.writing.descriptors.reports_and_essays.provide_appropriate_and_effective_logical_structure_helping_reader_identify_significant_points.c2"
    description: "Can provide an appropriate and effective logical structure which helps the reader identify significant points."

  - scale: "reports_and_essays"
    level: "c2"
    code: "set_out_multiple_perspectives_on_complex_academic_or_professional_topics"
    id: "cefr.production.writing.descriptors.reports_and_essays.set_out_multiple_perspectives_on_complex_academic_or_professional_topics.c2"
    description: "Can set out multiple perspectives on complex academic or professional topics, clearly distinguishing their own ideas and opinions from those in the sources."
