id: "cefr.reception.reading.descriptors"
version: "1"

catalog:
  - code: "overall_reading_comprehension"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension"
    description:
      - "Reading comprehension is taken to include both written and signed texts."
      - "The categories for reading are a mixture between reading purpose and reading particular genres with specific functions."
      - "In terms of reading purpose, there is a fundamental difference between “Reading for orientation” and “Reading for information and argument”."
      - "The former is sometimes called search reading and mainly takes two forms: firstly, reading a text “diagonally” at speed in order to decide whether to read (parts of) it properly (= “skimming”), and secondly, looking quickly through a text, searching for something specific – usually a piece of information (= “scanning”)."
      - "The latter is the way one reads artefacts like bus or train timetables, but sometimes one searches through a long prose text looking for something in particular."
      - "Then there is a fundamental difference between “Reading for information and argument” and “Reading as a leisure activity”."
      - "The latter may well involve non-fiction, but not necessarily literature."
      - "It will also encompass magazines and newspapers, vlogs/blogs, biographies, etc. – and possibly even texts that another person would read only for work or study purposes, depending on one’s interests."
      - "Finally, there are texts that one reads in a particular way – like “Reading instructions”, a specialised form of reading for information."
      - "Reading correspondence” is different again, and this is offered first since the scales start in each category with interpersonal language use."
      - "“Reading as a leisure activity” is listed last purely because it was added in 2018."

  - code: "reading_correspondence"
    id: "cefr.reception.reading.descriptors.reading_correspondence"
    description:
      - "This scale encompasses reading both personal and formal correspondence."
      - "Key concepts operationalised in the scale include the following:"
      - "length and complexity/simplicity of message;"
      - "concreteness of information, whether it follows a routine format;"
      - "the extent to which language is standard, colloquial, idiomatic;"
      - "the extent to which the subject is an everyday one, or if it is related to interests, or specialised."

  - code: "reading_for_orientation"
    id: "cefr.reception.reading.descriptors.reading_for_orientation"
    description:
      - "Reading for orientation – search reading – involves “skimming”: reading at speed in order to judge relevance and “scanning”: searching for specific information."
      - "In relation to signed texts, both functions are achieved by putting the video into “fast forward”."
      - "Key concepts operationalised in the scale include the following:"
      - "the types of text (from notices, leaflets, etc. to articles and books);"
      - "picking out concrete information like times and prices from texts that are visual artefacts, rather than prose text, with helpful layout;"
      - "identifying important information;"
      - "scanning prose text for relevance;"
      - "speed, mentioned in B2."

  - code: "reading_for_information_and_argument"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument"
    description:
      - "Reading for information and argument – detailed reading – involves careful study of a written or signed text that one has judged to be relevant for a purpose at hand."
      - "It is often associated with study and professional life."
      - "Key concepts operationalised in the scale include the following:"
      - "types of text, from simple, short, illustrated informational material to complex reports and articles;"
      - "subjects of text, from familiar everyday subjects of personal interest to topics outside their area of interest;"
      - "depth of understanding, from getting an idea of the content to understanding the finer points and implications."

  - code: "reading_instructions"
    id: "cefr.reception.reading.descriptors.reading_instructions"
    description:
      - "Reading instructions is a specialised form of reading for information, and again concerns written or signed text."
      - "Key concepts operationalised in the scale include the following:"
      - "topic of instructions, from routine prohibitions on simple notices and simple directions to detailed conditions and complex instructions on something unfamiliar, possibly outside their area of expertise;"
      - "degree of contextualisation and familiarity;"
      - "length, from a few words/signs to detailed and lengthy, complex instructions in continuous text."

  - code: "reading_as_a_leisure_activity"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity"
    description:
      - "This scale involves both fiction and non-fiction written and signed texts."
      - "These may include creative texts, different forms of literature, magazine and newspaper articles, blogs or biographies, among other types of text – depending on one’s interests."
      - "Key concepts operationalised in the scale include the following:"
      - "length, variety of texts and whether there are illustrations;"
      - "types of text, from simple descriptions of people and places, through different types of narrative text, to contemporary and classical writings in different genres;"
      - "topics, from everyday topics (for example hobbies, sports, leisure activities, animals) and concrete situations to a full range of abstract and literary topics;"
      - "type of language: from simple to stylistically complex;"
      - "ease of reading: from guessing with the help of images, through reading with a large degree of independence to appreciating the variety of texts;"
      - "depth of understanding: from understanding in outline/the main points to understanding implicit as well as explicit meaning."

entries:
  - scale: "overall_reading_comprehension"
    level: "pre_a1"
    code: "recognise_familiar_words_accompanied_by_pictures"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.recognise_familiar_words_accompanied_by_pictures.pre_a1"
    description: "Can recognise familiar words/signs accompanied by pictures, such as a fast-food restaurant menu illustrated with photos or a picture book using familiar vocabulary."

  - scale: "overall_reading_comprehension"
    level: "a1"
    code: "understand_very_short_simple_texts_one_phrase_at_a_time"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_very_short_simple_texts_one_phrase_at_a_time.a1"
    description: "Can understand very short, simple texts a single phrase at a time, picking up familiar names, words and basic phrases and rereading as required."

  - scale: "overall_reading_comprehension"
    level: "a2"
    code: "understand_short_simple_texts_on_familiar_concrete_matters"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_short_simple_texts_on_familiar_concrete_matters.a2"
    description: "Can understand short, simple texts on familiar matters of a concrete type which consist of high frequency everyday or job-related language."

  - scale: "overall_reading_comprehension"
    level: "a2"
    code: "understand_short_simple_texts_with_high_frequency_vocabulary"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_short_simple_texts_with_high_frequency_vocabulary.a2"
    description: "Can understand short, simple texts containing the highest frequency vocabulary, including a proportion of shared international vocabulary items."

  - scale: "overall_reading_comprehension"
    level: "b1"
    code: "read_straightforward_factual_texts_on_subjects_of_interest"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.read_straightforward_factual_texts_on_subjects_of_interest.b1"
    description: "Can read straightforward factual texts on subjects related to their field of interest with a satisfactory level of comprehension."

  - scale: "overall_reading_comprehension"
    level: "b2"
    code: "read_independently_adapting_style_and_speed_to_texts_and_purposes"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.read_independently_adapting_style_and_speed_to_texts_and_purposes.b2"
    description: "Can read with a large degree of independence, adapting style and speed of reading to different texts and purposes, and using appropriate reference sources selectively. Has a broad active reading vocabulary, but may experience some difficulty with low-frequency idioms."

  - scale: "overall_reading_comprehension"
    level: "c1"
    code: "understand_in_detail_lengthy_complex_texts_with_rereading"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_in_detail_lengthy_complex_texts_with_rereading.c1"
    description: "Can understand in detail lengthy, complex texts, whether or not these relate to their own area of speciality, provided they can reread difficult sections."

  - scale: "overall_reading_comprehension"
    level: "c1"
    code: "understand_wide_variety_of_texts_with_rereading_and_reference_tools"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_wide_variety_of_texts_with_rereading_and_reference_tools.c1"
    description: "Can understand a wide variety of texts including literary writings, newspaper or magazine articles, and specialised academic or professional publications, provided there are opportunities for rereading and they have access to reference tools."

  - scale: "overall_reading_comprehension"
    level: "c2"
    code: "understand_virtually_all_types_of_complex_or_colloquial_texts"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_virtually_all_types_of_complex_or_colloquial_texts.c2"
    description: "Can understand virtually all types of texts including abstract, structurally complex, or highly colloquial literary and non-literary writings."

  - scale: "overall_reading_comprehension"
    level: "c2"
    code: "understand_wide_range_of_long_and_complex_texts_with_subtle_distinctions"
    id: "cefr.reception.reading.descriptors.overall_reading_comprehension.understand_wide_range_of_long_and_complex_texts_with_subtle_distinctions.c2"
    description: "Can understand a wide range of long and complex texts, appreciating subtle distinctions of style and implicit as well as explicit meaning."

  - scale: "reading_correspondence"
    level: "pre_a1"
    code: "understand_invitation_event_and_basic_time_place_information_in_simple_messages"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_invitation_event_and_basic_time_place_information_in_simple_messages.pre_a1"
    description: "Can understand from a letter, card or e-mail the event to which they are being invited and the information given about day, time and location."

  - scale: "reading_correspondence"
    level: "pre_a1"
    code: "recognise_times_and_places_in_very_simple_notes_and_text_messages"
    id: "cefr.reception.reading.descriptors.reading_correspondence.recognise_times_and_places_in_very_simple_notes_and_text_messages.pre_a1"
    description: "Can recognise times and places in very simple notes and text messages from friends or colleagues (e.g. “Back at 4 o’clock” or “In the meeting room”), provided there are no abbreviations."

  - scale: "reading_correspondence"
    level: "a1"
    code: "understand_short_simple_messages_on_postcards"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_short_simple_messages_on_postcards.a1"
    description: "Can understand short, simple messages on postcards."

  - scale: "reading_correspondence"
    level: "a1"
    code: "understand_short_simple_messages_sent_via_social_media_or_email"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_short_simple_messages_sent_via_social_media_or_email.a1"
    description: "Can understand short, simple messages sent via social media or e-mail (e.g. proposing what to do, when and where to meet)."

  - scale: "reading_correspondence"
    level: "a2"
    code: "understand_simple_personal_letters_emails_or_posts_on_familiar_subjects"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_simple_personal_letters_emails_or_posts_on_familiar_subjects.a2"
    description: "Can understand a simple personal letter, e-mail or post in which the person writing is talking about familiar subjects (such as friends or family) or asking questions on these subjects."

  - scale: "reading_correspondence"
    level: "a2"
    code: "understand_basic_types_of_standard_routine_letters_and_faxes"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_basic_types_of_standard_routine_letters_and_faxes.a2"
    description: "Can understand basic types of standard routine letters and faxes (enquiries, orders, letters of confirmation, etc.) on familiar topics."

  - scale: "reading_correspondence"
    level: "a2"
    code: "understand_short_simple_personal_letters"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_short_simple_personal_letters.a2"
    description: "Can understand short, simple personal letters."

  - scale: "reading_correspondence"
    level: "a2"
    code: "understand_very_simple_formal_emails_and_letters"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_very_simple_formal_emails_and_letters.a2"
    description: "Can understand very simple formal e-mails and letters (e.g. confirmation of a booking or online purchase)."

  - scale: "reading_correspondence"
    level: "b1"
    code: "understand_formal_correspondence_on_less_familiar_subjects_well_enough_to_redirect_it"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_formal_correspondence_on_less_familiar_subjects_well_enough_to_redirect_it.b1"
    description: "Can understand formal correspondence on less familiar subjects well enough to redirect it to someone else."

  - scale: "reading_correspondence"
    level: "b1"
    code: "understand_description_of_events_feelings_and_wishes_in_personal_letters"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_description_of_events_feelings_and_wishes_in_personal_letters.b1"
    description: "Can understand the description of events, feelings and wishes in personal letters well enough to correspond regularly with a pen friend."

  - scale: "reading_correspondence"
    level: "b1"
    code: "understand_straightforward_personal_letters_emails_or_postings_about_events_and_experiences"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_straightforward_personal_letters_emails_or_postings_about_events_and_experiences.b1"
    description: "Can understand straightforward personal letters, e-mails or postings giving a relatively detailed account of events and experiences."

  - scale: "reading_correspondence"
    level: "b1"
    code: "understand_standard_formal_correspondence_and_online_postings_in_professional_area"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_standard_formal_correspondence_and_online_postings_in_professional_area.b1"
    description: "Can understand standard formal correspondence and online postings in their area of professional interest."

  - scale: "reading_correspondence"
    level: "b2"
    code: "read_correspondence_relating_to_their_field_of_interest_and_grasp_essential_meaning"
    id: "cefr.reception.reading.descriptors.reading_correspondence.read_correspondence_relating_to_their_field_of_interest_and_grasp_essential_meaning.b2"
    description: "Can read correspondence relating to their field of interest and readily grasp the essential meaning."

  - scale: "reading_correspondence"
    level: "b2"
    code: "understand_personal_email_or_posting_with_some_colloquial_language"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_personal_email_or_posting_with_some_colloquial_language.b2"
    description: "Can understand what is said in a personal e-mail or posting even where some colloquial language is used."

  - scale: "reading_correspondence"
    level: "c1"
    code: "understand_any_correspondence_with_occasional_use_of_dictionary"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_any_correspondence_with_occasional_use_of_dictionary.c1"
    description: "Can understand any correspondence given the occasional use of a dictionary."

  - scale: "reading_correspondence"
    level: "c1"
    code: "understand_implicit_and_explicit_attitudes_emotions_and_opinions_in_online_correspondence"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_implicit_and_explicit_attitudes_emotions_and_opinions_in_online_correspondence.c1"
    description: "Can understand implicit as well as explicit attitudes, emotions and opinions expressed in e-mails, discussion forums, vlogs/blogs, etc., provided there are opportunities for rereading and they have access to reference tools."

  - scale: "reading_correspondence"
    level: "c1"
    code: "understand_slang_idiomatic_expressions_and_jokes_in_private_correspondence"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_slang_idiomatic_expressions_and_jokes_in_private_correspondence.c1"
    description: "Can understand slang, idiomatic expressions and jokes in private correspondence."

  - scale: "reading_correspondence"
    level: "c2"
    code: "understand_specialised_formal_correspondence_on_complex_topic"
    id: "cefr.reception.reading.descriptors.reading_correspondence.understand_specialised_formal_correspondence_on_complex_topic.c2"
    description: "Can understand specialised, formal correspondence on a complex topic."

  - scale: "reading_for_orientation"
    level: "pre_a1"
    code: "understand_simple_everyday_signs"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_simple_everyday_signs.pre_a1"
    description: "Can understand simple everyday signs such as “Parking”, “Station”, “Dining room”, “No smoking”, etc."

  - scale: "reading_for_orientation"
    level: "pre_a1"
    code: "find_information_about_places_times_and_prices_on_posters_and_notices"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.find_information_about_places_times_and_prices_on_posters_and_notices.pre_a1"
    description: "Can find information about places, times and prices on posters, flyers and notices."

  - scale: "reading_for_orientation"
    level: "a1"
    code: "recognise_familiar_names_words_and_basic_phrases_on_simple_notices"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.recognise_familiar_names_words_and_basic_phrases_on_simple_notices.a1"
    description: "Can recognise familiar names, words/signs and very basic phrases on simple notices in the most common everyday situations."

  - scale: "reading_for_orientation"
    level: "a1"
    code: "understand_store_guides_and_basic_directions"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_store_guides_and_basic_directions.a1"
    description: "Can understand store guides (information on which floors departments are on) and directions (e.g. where to find lifts)."

  - scale: "reading_for_orientation"
    level: "a1"
    code: "understand_basic_hotel_information"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_basic_hotel_information.a1"
    description: "Can understand basic hotel information (e.g. times when meals are served)."

  - scale: "reading_for_orientation"
    level: "a1"
    code: "find_and_understand_simple_important_information_in_advertisements_and_brochures"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.find_and_understand_simple_important_information_in_advertisements_and_brochures.a1"
    description: "Can find and understand simple, important information in advertisements, programmes for special events, leaflets and brochures (e.g. what is proposed, costs, the date and place of the event, departure times)."

  - scale: "reading_for_orientation"
    level: "a2"
    code: "find_specific_information_in_practical_concrete_predictable_texts"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.find_specific_information_in_practical_concrete_predictable_texts.a2"
    description: "Can find specific information in practical, concrete, predictable texts (e.g. travel guidebooks, recipes), provided they are produced in simple language."

  - scale: "reading_for_orientation"
    level: "a2"
    code: "understand_main_information_in_short_simple_descriptions_of_goods"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_main_information_in_short_simple_descriptions_of_goods.a2"
    description: "Can understand the main information in short and simple descriptions of goods in brochures and websites (e.g. portable digital devices, cameras)."

  - scale: "reading_for_orientation"
    level: "a2"
    code: "find_specific_predictable_information_in_simple_everyday_material"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.find_specific_predictable_information_in_simple_everyday_material.a2"
    description: "Can find specific, predictable information in simple everyday material such as advertisements, prospectuses, menus, reference lists and timetables."

  - scale: "reading_for_orientation"
    level: "a2"
    code: "locate_specific_information_in_lists_and_isolate_required_information"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.locate_specific_information_in_lists_and_isolate_required_information.a2"
    description: "Can locate specific information in lists and isolate the information required (e.g. use the Yellow Pages to find a service or tradesman)."

  - scale: "reading_for_orientation"
    level: "a2"
    code: "understand_everyday_signs_and_notices_in_public_places_and_workplaces"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_everyday_signs_and_notices_in_public_places_and_workplaces.a2"
    description: "Can understand everyday signs and notices, etc. in public places, such as streets, restaurants, railway stations; in workplaces, such as directions, instructions, hazard warnings."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "scan_longer_texts_to_locate_desired_information_and_gather_information_for_task"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_longer_texts_to_locate_desired_information_and_gather_information_for_task.b1"
    description: "Can scan longer texts in order to locate desired information, and gather information from different parts of a text, or from different texts in order to fulfil a specific task."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "scan_straightforward_factual_texts_and_decide_practical_usefulness"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_straightforward_factual_texts_and_decide_practical_usefulness.b1"
    description: "Can scan through straightforward, factual texts in magazines, brochures or on the web, identify what they are about and decide whether they contain information that might be of practical use."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "find_and_understand_relevant_information_in_everyday_material"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.find_and_understand_relevant_information_in_everyday_material.b1"
    description: "Can find and understand relevant information in everyday material, such as letters, brochures and short official documents."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "pick_out_important_information_on_labels_of_foodstuff_and_medicine"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.pick_out_important_information_on_labels_of_foodstuff_and_medicine.b1"
    description: "Can pick out important information about preparation and usage on the labels on foodstuff and medicine."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "assess_whether_article_report_or_review_is_on_required_topic"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.assess_whether_article_report_or_review_is_on_required_topic.b1"
    description: "Can assess whether an article, report or review is on the required topic."

  - scale: "reading_for_orientation"
    level: "b1"
    code: "understand_important_information_in_simple_clearly_drafted_adverts"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.understand_important_information_in_simple_clearly_drafted_adverts.b1"
    description: "Can understand the important information in simple, clearly drafted adverts in newspapers or magazines, provided there are not too many abbreviations."

  - scale: "reading_for_orientation"
    level: "b2"
    code: "scan_quickly_through_several_sources_in_parallel_and_identify_relevance"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_several_sources_in_parallel_and_identify_relevance.b2"
    description: "Can scan quickly through several sources (articles, reports, websites, books, etc.) in parallel, in both their own field and in related fields, and can identify the relevance and usefulness of particular sections for the task at hand."

  - scale: "reading_for_orientation"
    level: "b2"
    code: "scan_quickly_through_long_and_complex_texts_locating_relevant_details"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_long_and_complex_texts_locating_relevant_details.b2"
    description: "Can scan quickly through long and complex texts, locating relevant details."

  - scale: "reading_for_orientation"
    level: "b2"
    code: "quickly_identify_content_and_relevance_of_news_items_articles_and_reports"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.quickly_identify_content_and_relevance_of_news_items_articles_and_reports.b2"
    description: "Can quickly identify the content and relevance of news items, articles and reports on a wide range of professional topics, deciding whether closer study is worthwhile."

  - scale: "reading_for_orientation"
    level: "c1"
    code: "scan_quickly_through_several_sources_in_parallel_and_identify_relevance"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_several_sources_in_parallel_and_identify_relevance.c1"
    description: "Can scan quickly through several sources (articles, reports, websites, books, etc.) in parallel, in both their own field and in related fields, and can identify the relevance and usefulness of particular sections for the task at hand."

  - scale: "reading_for_orientation"
    level: "c1"
    code: "scan_quickly_through_long_and_complex_texts_locating_relevant_details"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_long_and_complex_texts_locating_relevant_details.c1"
    description: "Can scan quickly through long and complex texts, locating relevant details."

  - scale: "reading_for_orientation"
    level: "c1"
    code: "quickly_identify_content_and_relevance_of_news_items_articles_and_reports"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.quickly_identify_content_and_relevance_of_news_items_articles_and_reports.c1"
    description: "Can quickly identify the content and relevance of news items, articles and reports on a wide range of professional topics, deciding whether closer study is worthwhile."

  - scale: "reading_for_orientation"
    level: "c2"
    code: "scan_quickly_through_several_sources_in_parallel_and_identify_relevance"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_several_sources_in_parallel_and_identify_relevance.c2"
    description: "Can scan quickly through several sources (articles, reports, websites, books, etc.) in parallel, in both their own field and in related fields, and can identify the relevance and usefulness of particular sections for the task at hand."

  - scale: "reading_for_orientation"
    level: "c2"
    code: "scan_quickly_through_long_and_complex_texts_locating_relevant_details"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.scan_quickly_through_long_and_complex_texts_locating_relevant_details.c2"
    description: "Can scan quickly through long and complex texts, locating relevant details."

  - scale: "reading_for_orientation"
    level: "c2"
    code: "quickly_identify_content_and_relevance_of_news_items_articles_and_reports"
    id: "cefr.reception.reading.descriptors.reading_for_orientation.quickly_identify_content_and_relevance_of_news_items_articles_and_reports.c2"
    description: "Can quickly identify the content and relevance of news items, articles and reports on a wide range of professional topics, deciding whether closer study is worthwhile."

  - scale: "reading_for_information_and_argument"
    level: "pre_a1"
    code: "understand_simplest_informational_material_illustrated_with_photos_or_simple_words"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_simplest_informational_material_illustrated_with_photos_or_simple_words.pre_a1"
    description: "Can understand the simplest informational material such as a fast-food restaurant menu illustrated with photos or an illustrated story formulated in very simple everyday words/signs."

  - scale: "reading_for_information_and_argument"
    level: "a1"
    code: "get_idea_of_content_of_simple_informational_material_with_visual_support"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.get_idea_of_content_of_simple_informational_material_with_visual_support.a1"
    description: "Can get an idea of the content of simpler informational material and short, simple descriptions, especially if there is visual support."

  - scale: "reading_for_information_and_argument"
    level: "a1"
    code: "understand_short_texts_on_personal_interest_in_very_simple_language"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_short_texts_on_personal_interest_in_very_simple_language.a1"
    description: "Can understand short texts on subjects of personal interest (e.g. news flashes about sports, music, travel or stories) composed in very simple language and supported by illustrations and pictures."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "identify_specific_information_in_simpler_material_describing_events"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.identify_specific_information_in_simpler_material_describing_events.a2"
    description: "Can identify specific information in simpler material they encounter such as letters, brochures and short news articles describing events."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "follow_general_outline_of_news_report_on_familiar_event"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.follow_general_outline_of_news_report_on_familiar_event.a2"
    description: "Can follow the general outline of a news report on a familiar type of event, provided the contents are familiar and predictable."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "pick_out_main_information_in_short_news_reports_or_simple_articles"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.pick_out_main_information_in_short_news_reports_or_simple_articles.a2"
    description: "Can pick out the main information in short news reports or simple articles in which figures, names, illustrations and titles play a prominent role and support the meaning of the text."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_main_points_of_short_texts_on_everyday_topics"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_main_points_of_short_texts_on_everyday_topics.a2"
    description: "Can understand the main points of short texts dealing with everyday topics (e.g. lifestyle, hobbies, sports, weather)."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_texts_describing_people_places_everyday_life_and_culture"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_texts_describing_people_places_everyday_life_and_culture.a2"
    description: "Can understand texts describing people, places, everyday life and culture, etc., provided they use simple language."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_information_in_illustrated_brochures_and_maps"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_information_in_illustrated_brochures_and_maps.a2"
    description: "Can understand information given in illustrated brochures and maps (e.g. the principal attractions of a city)."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_main_points_in_short_news_items_on_personal_interest"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_main_points_in_short_news_items_on_personal_interest.a2"
    description: "Can understand the main points in short news items on subjects of personal interest (e.g. sport, celebrities)."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_short_factual_description_or_report_within_their_field"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_short_factual_description_or_report_within_their_field.a2"
    description: "Can understand a short factual description or report within their own field, provided simple language is used and that it does not contain unpredictable detail."

  - scale: "reading_for_information_and_argument"
    level: "a2"
    code: "understand_most_of_what_people_say_about_themselves_in_personal_ads_or_posts"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_most_of_what_people_say_about_themselves_in_personal_ads_or_posts.a2"
    description: "Can understand most of what people say about themselves in a personal ad or post and what they say they like in other people."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "understand_straightforward_factual_texts_on_subjects_related_to_interests_or_studies"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_straightforward_factual_texts_on_subjects_related_to_interests_or_studies.b1"
    description: "Can understand straightforward, factual texts on subjects relating to their interests or studies."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "understand_short_texts_with_points_of_view_on_familiar_or_current_topics"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_short_texts_with_points_of_view_on_familiar_or_current_topics.b1"
    description: "Can understand short texts on subjects that are familiar or of current interest, in which people give their points of view (e.g. critical contributions to an online discussion forum or readers’ letters to the editor)."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "identify_main_conclusions_in_clearly_signalled_argumentative_texts"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.identify_main_conclusions_in_clearly_signalled_argumentative_texts.b1"
    description: "Can identify the main conclusions in clearly signalled argumentative texts."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "recognise_line_of_argument_in_treatment_of_issue_presented"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.recognise_line_of_argument_in_treatment_of_issue_presented.b1"
    description: "Can recognise the line of argument in the treatment of the issue presented, though not necessarily in detail."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "recognise_significant_points_in_straightforward_news_articles"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.recognise_significant_points_in_straightforward_news_articles.b1"
    description: "Can recognise significant points in straightforward news articles on familiar subjects."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "understand_most_factual_information_on_familiar_subjects_of_interest"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_most_factual_information_on_familiar_subjects_of_interest.b1"
    description: "Can understand most factual information that they are likely to come across on familiar subjects of interest, provided they have sufficient time for rereading."

  - scale: "reading_for_information_and_argument"
    level: "b1"
    code: "understand_main_points_in_descriptive_notes_on_exhibits_and_boards"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_main_points_in_descriptive_notes_on_exhibits_and_boards.b1"
    description: "Can understand the main points in descriptive notes such as those on museum exhibits and explanatory boards in exhibitions."

  - scale: "reading_for_information_and_argument"
    level: "b2"
    code: "obtain_information_ideas_and_opinions_from_highly_specialised_sources_within_field"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.obtain_information_ideas_and_opinions_from_highly_specialised_sources_within_field.b2"
    description: "Can obtain information, ideas and opinions from highly specialised sources within their field."

  - scale: "reading_for_information_and_argument"
    level: "b2"
    code: "understand_specialised_articles_outside_field_with_occasional_dictionary_use"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_specialised_articles_outside_field_with_occasional_dictionary_use.b2"
    description: "Can understand specialised articles outside their field, provided they can use a dictionary occasionally to confirm their interpretation of terminology."

  - scale: "reading_for_information_and_argument"
    level: "b2"
    code: "understand_articles_and_reports_on_contemporary_problems_with_viewpoints"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_articles_and_reports_on_contemporary_problems_with_viewpoints.b2"
    description: "Can understand articles and reports concerned with contemporary problems in which particular stances or viewpoints are adopted."

  - scale: "reading_for_information_and_argument"
    level: "b2"
    code: "recognise_when_text_provides_factual_information_or_seeks_to_convince"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.recognise_when_text_provides_factual_information_or_seeks_to_convince.b2"
    description: "Can recognise when a text provides factual information and when it seeks to convince readers of something."

  - scale: "reading_for_information_and_argument"
    level: "b2"
    code: "recognise_structures_in_discursive_text"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.recognise_structures_in_discursive_text.b2"
    description: "Can recognise different structures in discursive text: contrasting arguments, problem–solution presentation and cause–effect relationships."

  - scale: "reading_for_information_and_argument"
    level: "c1"
    code: "understand_in_detail_wide_range_of_lengthy_complex_texts_and_identify_finer_points"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_in_detail_wide_range_of_lengthy_complex_texts_and_identify_finer_points.c1"
    description: "Can understand in detail a wide range of lengthy, complex texts likely to be encountered in social, professional or academic life, identifying finer points of detail including attitudes and implied as well as stated opinions."

  - scale: "reading_for_information_and_argument"
    level: "c2"
    code: "understand_finer_points_and_implications_of_complex_report_or_article_outside_specialisation"
    id: "cefr.reception.reading.descriptors.reading_for_information_and_argument.understand_finer_points_and_implications_of_complex_report_or_article_outside_specialisation.c2"
    description: "Can understand the finer points and implications of a complex report or article even outside their area of specialisation."

  - scale: "reading_instructions"
    level: "pre_a1"
    code: "understand_very_short_simple_instructions_in_familiar_everyday_contexts"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_very_short_simple_instructions_in_familiar_everyday_contexts.pre_a1"
    description: "Can understand very short, simple, instructions used in familiar everyday contexts (e.g. “No parking”, “No food or drink”), especially if there are illustrations."

  - scale: "reading_instructions"
    level: "a1"
    code: "follow_short_simple_directions"
    id: "cefr.reception.reading.descriptors.reading_instructions.follow_short_simple_directions.a1"
    description: "Can follow short, simple directions (e.g. to go from X to Y)."

  - scale: "reading_instructions"
    level: "a2"
    code: "understand_regulations_when_expressed_in_simple_language"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_regulations_when_expressed_in_simple_language.a2"
    description: "Can understand regulations, for example safety, when expressed in simple language."

  - scale: "reading_instructions"
    level: "a2"
    code: "understand_short_instructions_illustrated_step_by_step"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_short_instructions_illustrated_step_by_step.a2"
    description: "Can understand short instructions illustrated step by step (e.g. for installing new technology)."

  - scale: "reading_instructions"
    level: "a2"
    code: "understand_simple_instructions_on_everyday_equipment"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_simple_instructions_on_everyday_equipment.a2"
    description: "Can understand simple instructions on equipment encountered in everyday life – such as a public telephone."

  - scale: "reading_instructions"
    level: "a2"
    code: "understand_simple_brief_instructions_when_illustrated"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_simple_brief_instructions_when_illustrated.a2"
    description: "Can understand simple, brief instructions, provided they are illustrated and not presented in continuous text."

  - scale: "reading_instructions"
    level: "a2"
    code: "understand_instructions_on_medicine_labels_expressed_as_simple_command"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_instructions_on_medicine_labels_expressed_as_simple_command.a2"
    description: "Can understand instructions on medicine labels expressed as a simple command (e.g. “Take before meals” or “Do not take if driving”)."

  - scale: "reading_instructions"
    level: "a2"
    code: "follow_simple_recipe_with_pictures"
    id: "cefr.reception.reading.descriptors.reading_instructions.follow_simple_recipe_with_pictures.a2"
    description: "Can follow a simple recipe, especially if there are pictures to illustrate the most important steps."

  - scale: "reading_instructions"
    level: "b1"
    code: "understand_instructions_and_procedures_in_continuous_text_for_familiar_process"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_instructions_and_procedures_in_continuous_text_for_familiar_process.b1"
    description: "Can understand instructions and procedures in the form of a continuous text, for instance in a manual, provided they are familiar with the type of process or product concerned."

  - scale: "reading_instructions"
    level: "b1"
    code: "understand_clearly_expressed_straightforward_instructions_for_equipment"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_clearly_expressed_straightforward_instructions_for_equipment.b1"
    description: "Can understand clearly expressed, straightforward instructions for a piece of equipment."

  - scale: "reading_instructions"
    level: "b1"
    code: "follow_simple_instructions_given_on_packaging"
    id: "cefr.reception.reading.descriptors.reading_instructions.follow_simple_instructions_given_on_packaging.b1"
    description: "Can follow simple instructions given on packaging (e.g. cooking instructions)."

  - scale: "reading_instructions"
    level: "b1"
    code: "understand_most_short_safety_instructions"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_most_short_safety_instructions.b1"
    description: "Can understand most short safety instructions, e.g. on public transport or in manuals for the use of electrical equipment)."

  - scale: "reading_instructions"
    level: "b2"
    code: "understand_lengthy_complex_instructions_in_their_field"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_lengthy_complex_instructions_in_their_field.b2"
    description: "Can understand lengthy, complex instructions in their field, including details on conditions and warnings, provided they can reread difficult sections."

  - scale: "reading_instructions"
    level: "c1"
    code: "understand_in_detail_lengthy_complex_instructions_on_new_machine_or_procedure"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_in_detail_lengthy_complex_instructions_on_new_machine_or_procedure.c1"
    description: "Can understand in detail lengthy, complex instructions on a new machine or procedure, whether or not the instructions relate to their own area of speciality, provided they can reread difficult sections."

  - scale: "reading_instructions"
    level: "c2"
    code: "understand_in_detail_lengthy_complex_instructions_on_new_machine_or_procedure"
    id: "cefr.reception.reading.descriptors.reading_instructions.understand_in_detail_lengthy_complex_instructions_on_new_machine_or_procedure.c2"
    description: "Can understand in detail lengthy, complex instructions on a new machine or procedure, whether or not the instructions relate to their own area of speciality, provided they can reread difficult sections."

  - scale: "reading_as_a_leisure_activity"
    level: "a1"
    code: "understand_short_illustrated_narratives_about_everyday_activities"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_short_illustrated_narratives_about_everyday_activities.a1"
    description: "Can understand short, illustrated narratives about everyday activities described in simple words."

  - scale: "reading_as_a_leisure_activity"
    level: "a1"
    code: "understand_in_outline_short_texts_in_illustrated_stories"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_in_outline_short_texts_in_illustrated_stories.a1"
    description: "Can understand in outline short texts in illustrated stories, provided the images help them to guess at a lot of the content."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_enough_to_read_short_simple_stories_and_comic_strips"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_enough_to_read_short_simple_stories_and_comic_strips.a2"
    description: "Can understand enough to read short, simple stories and comic strips involving familiar, concrete situations described in high frequency everyday language."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_main_points_in_short_magazine_reports_or_guide_entries"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_main_points_in_short_magazine_reports_or_guide_entries.a2"
    description: "Can understand the main points made in short magazine reports or guide entries that deal with concrete everyday topics (e.g. hobbies, sports, leisure activities, animals)."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_short_narratives_and_descriptions_of_someones_life"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_short_narratives_and_descriptions_of_someones_life.a2"
    description: "Can understand short narratives and descriptions of someone’s life composed in simple language."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_what_is_happening_in_photo_story_and_form_impression_of_characters"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_what_is_happening_in_photo_story_and_form_impression_of_characters.a2"
    description: "Can understand what is happening in a photo story (e.g. in a lifestyle magazine) and form an impression of what the characters are like."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_much_of_information_in_short_description_of_person"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_much_of_information_in_short_description_of_person.a2"
    description: "Can understand much of the information provided in a short description of a person (e.g. a celebrity)."

  - scale: "reading_as_a_leisure_activity"
    level: "a2"
    code: "understand_main_point_of_short_article_reporting_predictable_event"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_main_point_of_short_article_reporting_predictable_event.a2"
    description: "Can understand the main point of a short article reporting an event that follows a predictable pattern (e.g. the Oscars), provided it is composed clearly in simple language."

  - scale: "reading_as_a_leisure_activity"
    level: "b1"
    code: "read_newspaper_or_magazine_accounts_of_films_books_concerts_and_understand_main_points"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.read_newspaper_or_magazine_accounts_of_films_books_concerts_and_understand_main_points.b1"
    description: "Can read newspaper/magazine accounts of films, books, concerts, etc. produced for a wider audience and understand the main points."

  - scale: "reading_as_a_leisure_activity"
    level: "b1"
    code: "understand_simple_poems_and_song_lyrics_with_straightforward_language_and_style"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_simple_poems_and_song_lyrics_with_straightforward_language_and_style.b1"
    description: "Can understand simple poems and song lyrics provided these employ straightforward language and style."

  - scale: "reading_as_a_leisure_activity"
    level: "b1"
    code: "understand_descriptions_of_places_events_feelings_and_perspectives_in_everyday_language"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_descriptions_of_places_events_feelings_and_perspectives_in_everyday_language.b1"
    description: "Can understand descriptions of places, events, explicitly expressed feelings and perspectives in narratives, guides and magazine articles that employ high frequency everyday language."

  - scale: "reading_as_a_leisure_activity"
    level: "b1"
    code: "understand_travel_diary_describing_events_experiences_and_discoveries"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.understand_travel_diary_describing_events_experiences_and_discoveries.b1"
    description: "Can understand a travel diary mainly describing the events of a journey and the experiences and discoveries of the writer."

  - scale: "reading_as_a_leisure_activity"
    level: "b1"
    code: "follow_plot_of_stories_simple_novels_and_comics_with_dictionary"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.follow_plot_of_stories_simple_novels_and_comics_with_dictionary.b1"
    description: "Can follow the plot of stories, simple novels and comics with a clear linear storyline and high frequency everyday language, given regular use of a dictionary."

  - scale: "reading_as_a_leisure_activity"
    level: "b2"
    code: "read_for_pleasure_with_large_degree_of_independence"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.read_for_pleasure_with_large_degree_of_independence.b2"
    description: "Can read for pleasure with a large degree of independence, adapting style and speed of reading to different texts (e.g. magazines, more straightforward novels, history books, biographies, travelogues, guides, lyrics, poems), using appropriate reference sources selectively."

  - scale: "reading_as_a_leisure_activity"
    level: "b2"
    code: "read_novels_with_strong_narrative_plot_and_straightforward_language"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.read_novels_with_strong_narrative_plot_and_straightforward_language.b2"
    description: "Can read novels with a strong, narrative plot and that use straightforward, unelaborated language, provided they can take their time and use a dictionary."

  - scale: "reading_as_a_leisure_activity"
    level: "c1"
    code: "read_and_appreciate_variety_of_literary_texts_with_rereading_and_reference_tools"
    id: "cefr.reception.reading.descriptors.reading_as_a_leisure_activity.read_and_appreciate_variety_of_literary_texts_with_rereading_and_reference_tools.c1"
    description: "Can read and appreciate a variety of literary texts, provided they can reread certain sections and that they can access reference tools if they wish."

  - scale: "reading_as_a_leisure_activity"
    level: "c1"
