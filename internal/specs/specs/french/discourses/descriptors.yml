id: "french.discourses.descriptors"
version: "1"

catalog:
  - code: "fonctions_interactives"
    id: "french.discourses.descriptors.fonctions_interactives"
    description:
      - "Interpeller."
      - "Interrompre poliment pour faire répéter."
      - "Engager et/ou terminer une conversation."
      - "Indiquer qu’on veut prendre la parole."
      - "S’assurer que l’interlocuteur a bien compris."
      - "Lancer et terminer une discussion."
      - "Faire avancer la discussion en invitant autrui à s’y joindre, à dire ce qu’il pense, etc."
      - "Prendre / Reprendre la parole ; aborder un nouveau sujet, introduire une idée."
      - "Répéter ce que quelqu’un a dit (pour s’assurer de la compréhension)."
      - "Recadrer une discussion et faire le point."
      - "Résumer et approfondir les arguments principaux d’une discussion ; faire un bilan."

  - code: "structuration_de_la_production"
    id: "french.discourses.descriptors.structuration_de_la_production"
    description:
      - "Introduire un thème."
      - "Introduire un argument."
      - "Organiser son discours (l’introduction, le développement, les exemples, la conclusion...)."
      - "Illustrer."
      - "Mettre en relief le thème central et les éléments pertinents."
      - "Confirmer ou souligner un point de vue par des arguments secondaires et des exemples pertinents."
      - "Faire une transition."
      - "Ouvrir ou fermer une digression."
      - "Référence anaphorique."
      - "Reformuler un propos."
      - "Introduire une conclusion indépendante des arguments antérieurs."
      - "Synthétiser."
      - "Conclure."

entries:
  - scale: "fonctions_interactives"
    level: "pre_a1"
    code: "interpeller"
    id: "french.discourses.descriptors.fonctions_interactives.interpeller.pre_a1"
    description:
      - "Bonjour."
      - "Salut."
      - "Excusez-moi."
      - "Excuse-moi."
      - "S’il vous plaît."
      - "S’il te plaît."

  - scale: "fonctions_interactives"
    level: "pre_a1"
    code: "interrompre_poliment_pour_faire_repeter"
    id: "french.discourses.descriptors.fonctions_interactives.interrompre_poliment_pour_faire_repeter.pre_a1"
    description:
      - "Pardon ?"
      - "Répétez, s’il vous plaît."
      - "Répète, s’il te plaît."
      - "Encore une fois, s’il vous plaît."
      - "Encore une fois, s’il te plaît."

  - scale: "fonctions_interactives"
    level: "pre_a1"
    code: "engager_ou_terminer_une_conversation"
    id: "french.discourses.descriptors.fonctions_interactives.engager_ou_terminer_une_conversation.pre_a1"
    description:
      - "Bonjour, je m’appelle Inès."
      - "Salut, moi c’est Hugo."
      - "Moi, c’est Hugo."
      - "Au revoir."
      - "À bientôt."

  - scale: "fonctions_interactives"
    level: "a1"
    code: "interpeller"
    id: "french.discourses.descriptors.fonctions_interactives.interpeller.a1"
    description:
      - "Bonjour !"
      - "S’il vous plaît !"
      - "Excusez-moi !"

  - scale: "fonctions_interactives"
    level: "a1"
    code: "interrompre_poliment_pour_faire_repeter"
    id: "french.discourses.descriptors.fonctions_interactives.interrompre_poliment_pour_faire_repeter.a1"
    description:
      - "Pardon ! Excusez-moi, je ne comprends pas."
      - "Excuse-moi, tu peux répéter (la question) ?"

  - scale: "fonctions_interactives"
    level: "a2"
    code: "interpeller"
    id: "french.discourses.descriptors.fonctions_interactives.interpeller.a2"
    description:
      - "Bonjour ! S’il vous plaît !"
      - "Pardon !"
      - "Excusez-moi, Monsieur !"

  - scale: "fonctions_interactives"
    level: "a2"
    code: "interrompre_poliment_pour_faire_repeter"
    id: "french.discourses.descriptors.fonctions_interactives.interrompre_poliment_pour_faire_repeter.a2"
    description:
      - "Pardon, qu’est-ce que tu as dit ?"
      - "Est-ce que tu peux répéter, s’il te plaît ?"

  - scale: "fonctions_interactives"
    level: "a2"
    code: "engager_ou_terminer_une_conversation"
    id: "french.discourses.descriptors.fonctions_interactives.engager_ou_terminer_une_conversation.a2"
    description:
      - "Dis-moi, tu sais à quelle heure commence le film ?"
      - "Je voudrais te parler de la réunion."
      - "Je peux te parler ?"
      - "Excusez-moi, je dois partir."

  - scale: "fonctions_interactives"
    level: "a2"
    code: "indiquer_qu_on_souhaite_prendre_la_parole"
    id: "french.discourses.descriptors.fonctions_interactives.indiquer_qu_on_souhaite_prendre_la_parole.a2"
    description:
      - "J’ai quelque chose à dire."
      - "Pardon, je voudrais dire quelque chose."

  - scale: "fonctions_interactives"
    level: "a2"
    code: "verifier_que_l_interlocuteur_a_bien_compris"
    id: "french.discourses.descriptors.fonctions_interactives.verifier_que_l_interlocuteur_a_bien_compris.a2"
    description:
      - "C’est clair ?"
      - "Tu as compris ?"

  - scale: "structuration_de_la_production"
    level: "a2"
    code: "introduire_un_theme"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_un_theme.a2"
    description:
      - "Je vais vous parler de Picasso."
      - "Tu as regardé le match de foot, hier ? Qu’est-ce que tu en penses ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "engager_ou_terminer_une_conversation"
    id: "french.discourses.descriptors.fonctions_interactives.engager_ou_terminer_une_conversation.b1"
    description:
      - "Pardon, tu as une minute ?"
      - "Voilà, j’ai quelque chose à te dire."
      - "Dis, Serge, je cherche Magalie, tu sais où elle est ?"
      - "Bon, excusez-moi, mais je dois vous laisser, j’ai un rendez-vous dans 10 minutes."
      - "Eh bien, je suis désolé, mais je dois m’en aller."

  - scale: "fonctions_interactives"
    level: "b1"
    code: "indiquer_qu_on_souhaite_prendre_la_parole"
    id: "french.discourses.descriptors.fonctions_interactives.indiquer_qu_on_souhaite_prendre_la_parole.b1"
    description:
      - "Un instant, je voudrais vous communiquer quelque chose."
      - "Attends, j’ai quelque chose à te dire."
      - "Écoutez, je dois ajouter un autre commentaire."
      - "Est-ce que je peux ajouter quelque chose ?"
      - "Bon, alors, je voudrais ajouter quelques détails à ce qui a été dit."
      - "Oui, mais, je voudrais dire autre chose."
      - "Excusez-moi, je pourrais faire une petite remarque ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "verifier_que_l_interlocuteur_a_bien_compris"
    id: "french.discourses.descriptors.fonctions_interactives.verifier_que_l_interlocuteur_a_bien_compris.b1"
    description:
      - "Vous avez des questions ? Un doute ?"
      - "Tu vois / Tu comprends ce que je veux dire ?"
      - "Ça va ? Tout est compréhensible ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "lancer_et_terminer_une_discussion"
    id: "french.discourses.descriptors.fonctions_interactives.lancer_et_terminer_une_discussion.b1"
    description:
      - "Il faut qu’on parle."
      - "Alors, qu’est-ce qu’on prend comme décision ?"
      - "C’est tout, je n’ai plus rien à dire."
      - "Très bien, on peut passer à autre chose ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "faire_avancer_la_discussion_en_invitant_autrui_a_participer"
    id: "french.discourses.descriptors.fonctions_interactives.faire_avancer_la_discussion_en_invitant_autrui_a_participer.b1"
    description:
      - "Et toi, qu’est-ce que tu en penses ?"
      - "Vous ne partagez pas notre opinion ?"
      - "À mon avis, il faudrait parler aussi bien des avantages que des inconvénients."
      - "On pourrait parler des inconvénients aussi ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point"
    id: "french.discourses.descriptors.fonctions_interactives.prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point.b1"
    description:
      - "Je pourrais peut-être dire quelque chose à ce sujet."
      - "Je peux commencer, si vous voulez."
      - "Laissez-moi ajouter quelque chose."
      - "Est-ce qu’on pourrait parler du projet maintenant ?"

  - scale: "fonctions_interactives"
    level: "b1"
    code: "reformuler_les_propos_de_l_autre_pour_verifier_la_comprehension"
    id: "french.discourses.descriptors.fonctions_interactives.reformuler_les_propos_de_l_autre_pour_verifier_la_comprehension.b1"
    description:
      - "Tu as bien dit à 17h ? C’est bien ça ? Tu confirmes ?"
      - "Tu veux dire qu’il ne faut pas compter sur lui, c’est ça ?"
      - "On est d’accord : tu as bien dit « devant le cinéma » pour notre rendez-vous ?"

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "introduire_un_theme"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_un_theme.b1"
    description:
      - "Tu as vu la bande annonce du film qui est sorti hier ?"
      - "Et pour l’anniversaire de Luc, qui s’occupe du cadeau ?"
      - "À propos de Marc, est-ce qu’il t’a invité à son mariage ?"
      - "Et si on parlait de ton nouveau travail ?"

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "organiser_son_discours"
    id: "french.discourses.descriptors.structuration_de_la_production.organiser_son_discours.b1"
    description:
      - "D’abord, il faut savoir de quoi nous allons parler."
      - "Premièrement, on va s’occuper de l’itinéraire."
      - "Nous passons maintenant à la deuxième question : les langues étrangères à l’école, quel avenir ?"
      - "D’un côté elle est contente d’avoir réussi le bac, d’un autre côté elle est triste parce qu’elle doit quitter ses amis."
      - "C’est vrai qu’il a beaucoup de talent mais il est insupportable."
      - "Vous vous souvenez de cet acteur qui a grossi de 30 kilos pour un nouveau rôle ?"
      - "Finalement, ils sont partis sans prévenir personne."
      - "En conclusion, on ne sait pas encore qui est le responsable."

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "illustrer"
    id: "french.discourses.descriptors.structuration_de_la_production.illustrer.b1"
    description:
      - "Par exemple, on peut parler d’une invention moderne, du portable."
      - "Manon sera l’actrice principale, en effet c’est la préférée du directeur."
      - "Il est vraiment étourdi : hier il a oublié l’anniversaire de sa mère."

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "reference_anaphorique"
    id: "french.discourses.descriptors.structuration_de_la_production.reference_anaphorique.b1"
    description:
      - "J’aime toutes les chansons de son dernier album mais je préfère la deuxième."
      - "Il adore les romans d’Erik Orsenna, et spécialement le dernier qu’il vient de publier."
      - "Ce livre est aussi intéressant que le précédent."
      - "Passons au thème suivant."

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "synthetiser"
    id: "french.discourses.descriptors.structuration_de_la_production.synthetiser.b1"
    description:
      - "Bref, on a trois réunions en deux jours sans compter les visites des journalistes."
      - "En conclusion, on ne peut rien y faire."
      - "En résumé, les rapports que tu as présentés ont été pris en considération."
      - "Une décision qui, au final, n’a surpris personne."

  - scale: "structuration_de_la_production"
    level: "b1"
    code: "conclure"
    id: "french.discourses.descriptors.structuration_de_la_production.conclure.b1"
    description:
      - "Et voilà, comment toute leur amitié a disparu ce jour-là."
      - "Finalement, il a pris la décision de vendre son entreprise."
      - "Et c’est ainsi qu’on est tombés amoureux et qu’on s’est mariés."
      - "Pour terminer, je dois remercier toute ma famille qui m’a beaucoup aidé dans ces moments difficiles."
      - "Obtenir un bon résultat est, finalement, son seul objectif."
      - "Après tout ce travail, enfin il a obtenu son diplôme."

  - scale: "fonctions_interactives"
    level: "b2"
    code: "lancer_et_terminer_une_discussion"
    id: "french.discourses.descriptors.fonctions_interactives.lancer_et_terminer_une_discussion.b2"
    description:
      - "Laura, tu aimerais démarrer ?"
      - "On s’y met ?"
      - "En résumé, on peut dire que les résultats sont bons."
      - "Je crois que nous avons fait le tour de la question."
      - "Je vous remercie de votre attention."

  - scale: "fonctions_interactives"
    level: "b2"
    code: "prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point"
    id: "french.discourses.descriptors.fonctions_interactives.prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point.b2"
    description:
      - "Permettez-moi de revenir sur cette question épineuse."
      - "Si vous le permettez, je commencerai par le premier point."
      - "Oui, je pense qu’il est important d’apporter une précision sur ce point."
      - "Mes compétences dans ce domaine pourraient aider à clarifier la situation."

  - scale: "fonctions_interactives"
    level: "b2"
    code: "reformuler_les_propos_de_l_autre_pour_verifier_la_comprehension"
    id: "french.discourses.descriptors.fonctions_interactives.reformuler_les_propos_de_l_autre_pour_verifier_la_comprehension.b2"
    description:
      - "Ça vous semble logique ce que vous venez de dire ?"
      - "Si je comprends bien, il n’y a pas de projets pour samedi."
      - "Vous voulez dire que je ne peux pas parler avec le responsable tout de suite ?"
      - "Tu essaies de me dire que tu ne veux plus sortir avec moi ?"
      - "Voyons si j’ai tout bien saisi."
      - "Alors, ce que vous voulez vraiment dire, c’est que..."

  - scale: "fonctions_interactives"
    level: "b2"
    code: "faire_avancer_la_discussion_en_invitant_autrui_a_participer"
    id: "french.discourses.descriptors.fonctions_interactives.faire_avancer_la_discussion_en_invitant_autrui_a_participer.b2"
    description:
      - "Patricia, vous pouvez nous tenir au courant de la réorganisation du département des Ressources Humaines ?"
      - "Quelles en seront les conséquences dans votre département, Rose ?"
      - "Et si nous passions à autre chose ? On ne va pas s’éterniser sur cette question."
      - "Vous nous dites que c’est la meilleure solution. Mais pour quelle raison ?"

  - scale: "fonctions_interactives"
    level: "b2"
    code: "recadrer_une_discussion_et_faire_le_point"
    id: "french.discourses.descriptors.fonctions_interactives.recadrer_une_discussion_et_faire_le_point.b2"
    description:
      - "Nous n’avons pas le temps de voir ça maintenant."
      - "Recadrons la réunion et recentrons-nous sur le problème qui nous intéresse."
      - "C’est un autre sujet, me semble-t-il."
      - "Nous pouvons revenir sur ce point, s’il vous plaît ?"
      - "Bien, faisons le point sur ce sujet : nous avons décidé d’attendre la suite des événements."
      - "En bref, nous avons fait le tour de la question, passons au point B."

  - scale: "fonctions_interactives"
    level: "b2"
    code: "resumer_et_approfondir_une_discussion"
    id: "french.discourses.descriptors.fonctions_interactives.resumer_et_approfondir_une_discussion.b2"
    description:
      - "Pour en revenir à ce que je disais..."
      - "Je suis convaincu que nous sommes sur la bonne voie, mais à mon avis, il reste des points à consolider sur les éventuelles conséquences d’une telle décision."
      - "En résumé, notre conclusion est qu’il est préférable d’abandonner le projet."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "introduire_un_argument"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_un_argument.b2"
    description:
      - "Il a la condition physique pour remporter cette compétition. De plus, en travaillant sa technique, il a toutes ses chances."
      - "D’ailleurs, penser que cette pathologie peut seulement être soignée par les médicaments est maintenant un sujet dans l’air du temps."
      - "Il a toutes les chances de réussir et même de finir major de promotion."
      - "Quant à notre position sur l’énergie nucléaire, non seulement elle n’a pas changé mais elle est maintenant soutenue par d’autres organisations."
      - "Nous sommes prêts à nous investir, or vous ne vous montrez pas très coopérants."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "organiser_son_discours"
    id: "french.discourses.descriptors.structuration_de_la_production.organiser_son_discours.b2"
    description:
      - "Le rôle de l’école n’est pas de substituer les parents dans l’éducation. Chacun a ses responsabilités. Nous débuterons notre démonstration par une définition des responsabilités de l’école et de celles des parents dans l’éducation des enfants. Pour cela, nous nous appuierons sur des exemples bien concrets. Pour finir, nous nous pencherons sur le partage de ces devoirs, respectivement dans le milieu familial et scolaire."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "illustrer"
    id: "french.discourses.descriptors.structuration_de_la_production.illustrer.b2"
    description:
      - "Tu vois, par exemple, Pierre est quelqu’un sur qui on peut compter."
      - "Adèle est experte dans le domaine de la chanson française. D’ailleurs, elle connaît tout sur les artistes actuels."
      - "Oui, c’est comme ce chanteur qui a brûlé un billet en direct dans l’émission de 20h."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "mettre_en_relief_le_theme_central"
    id: "french.discourses.descriptors.structuration_de_la_production.mettre_en_relief_le_theme_central.b2"
    description:
      - "C’est par souci d’économie que nous avons adopté cette solution."
      - "C’est l’installation du nouveau logiciel qui va nous permettre d’être à la pointe du progrès."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "renforcer_un_point_de_vue_par_des_arguments_et_des_exemples"
    id: "french.discourses.descriptors.structuration_de_la_production.renforcer_un_point_de_vue_par_des_arguments_et_des_exemples.b2"
    description:
      - "Il est important de mettre en avant, à la fois, les avantages et les inconvénients de cette proposition de loi. De plus, il faudra prendre en compte la réaction des entreprises, concernant les répercussions sur les salaires."
      - "Chiffres à l’appui, nous affirmons la bonne santé de notre entreprise."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "reference_anaphorique_avec_premier_deuxieme_dernier_precedent_et_suivant"
    id: "french.discourses.descriptors.structuration_de_la_production.reference_anaphorique_avec_premier_deuxieme_dernier_precedent_et_suivant.b2"
    description:
      - "De tous les inscrits, seul le quatrième a été retenu."
      - "Et voici, Monsieur Morel, c’est le premier vainqueur de cette édition."
      - "Le thème suivant va soulever une polémique au sein de cette communauté, le dernier, quant à lui, sera beaucoup moins discuté."
      - "Il faut consulter la page 6 ainsi que les précédentes."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi"
    id: "french.discourses.descriptors.structuration_de_la_production.reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi.b2"
    description:
      - "Cette chanteuse est divine ; une telle voix est exceptionnelle."
      - "Il a choisi de partir, j’ai fait de même."
      - "Semblable comportement est inadmissible."
      - "Si j’avais été à sa place, j’aurais fait pareil."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "reformuler_un_propos"
    id: "french.discourses.descriptors.structuration_de_la_production.reformuler_un_propos.b2"
    description:
      - "Il reste encore plusieurs points à traiter, autrement dit, nous devons attendre encore quelques semaines avant de conclure les négociations."
      - "En ce moment, notre emploi de temps est surchargé ; en un mot, c’est actuellement impossible de répondre à votre demande."
      - "Les circonstances sont inacceptables, en d’autres termes, nous mettons fin à cette situation bancale."
      - "Nous avons plusieurs possibilités, c’est-à-dire que vous pouvez composer votre séjour selon vos goûts."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "introduire_une_conclusion_independante"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_une_conclusion_independante.b2"
    description:
      - "De toute façon, nous ne pouvons pas poursuivre cette conversation maintenant."
      - "En tout cas, sur ce point, elle était dans son tort."
      - "Quoi qu’il en soit, cette vente doit être négociée au plus vite."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "synthetiser"
    id: "french.discourses.descriptors.structuration_de_la_production.synthetiser.b2"
    description:
      - "En bref, je dirais que plus nous dépensons en publicité, plus nos ventes augmentent."
      - "En résumé, si nous ne pouvons pas gagner plus d’argent, personne ne touchera de prime cette année."
      - "En conclusion, nous pourrons dire que cette expérience a été bénéfique."
      - "En un mot, c’est une personne qui a des qualités pour accéder à ce poste."

  - scale: "structuration_de_la_production"
    level: "b2"
    code: "conclure"
    id: "french.discourses.descriptors.structuration_de_la_production.conclure.b2"
    description:
      - "En définitive, je suis plutôt pour la semaine de travail à 35 heures."
      - "Après tout, partir deux ans à l’étranger pour le boulot sera une expérience enrichissante."
      - "Tout bien considéré, l’entreprise a opté pour des horaires plus flexibles."

  - scale: "fonctions_interactives"
    level: "c1"
    code: "recadrer_une_discussion_et_faire_le_point"
    id: "french.discourses.descriptors.fonctions_interactives.recadrer_une_discussion_et_faire_le_point.c1"
    description:
      - "Revenons à nos moutons. Ne nous égarons pas."
      - "Fermons la parenthèse."
      - "Bien, en conclusion, voici ce qui nous reste encore à discuter."
      - "En guise de conclusion, je vous propose de nous répartir le travail de la manière suivante."
      - "Si je reprends point par point vos commentaires, je constate qu’ils concernent essentiellement des aspects économiques."
      - "Alors où en sommes-nous ? Faisons le point : il nous reste encore ces deux aspects du problème à traiter."
      - "Trêve de bavardage, nous nous éloignons du sujet."

  - scale: "fonctions_interactives"
    level: "c1"
    code: "resumer_et_approfondir_une_discussion"
    id: "french.discourses.descriptors.fonctions_interactives.resumer_et_approfondir_une_discussion.c1"
    description:
      - "En supposant que l’on se recentre sur l’argument retenu lors de notre première intervention, quels liens pourrions-nous alors établir entre ces deux problématiques ?"
      - "Dans cet ordre d’idées, je suggère que nous prenions en compte les résultats des derniers chiffres obtenus."
      - "Nous devons non seulement considérer tous les niveaux de solution, mais aussi examiner de plus près les répercussions qu’ils pourraient engendrer."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "organiser_son_discours"
    id: "french.discourses.descriptors.structuration_de_la_production.organiser_son_discours.c1"
    description:
      - "Chaque mercredi, dans les salles de cinéma, sortent des dizaines de nouveaux films produits dans le pays. Or, il semble que le public ne réponde pas toujours présent pour venir découvrir la production cinématographique nationale... Nous nous intéresserons à la déclaration suivante faite par un professionnel du cinéma : « Notre cinéma s’appauvrit en qualité, les scénarios ne sont pas assez travaillés, le public a besoin de meilleurs films... »... Si cette affirmation contient une part de réalité, il convient toutefois de s’interroger sur d’autres facteurs pouvant expliquer le rejet de beaucoup de films nationaux par nos concitoyens. Lorsque les films réalisés chez nous attirent les foules, c’est souvent parce que le processus d’identification avec les personnages est évident. Par ailleurs, la qualité indéniable apportée à leur film par certains de nos plus grands réalisateurs garantit, à quelques exceptions près, un succès auprès du public... Néanmoins, nous pouvons nous interroger sur la profusion de l’offre hebdomadaire : y a-t-il assez de place pour que tous les films sortant trouvent un écho auprès du public ? D’autre part, non seulement les critiques, mais certains professionnels eux-mêmes déplorent le manque de rigueur dans l’écriture d’un film sur deux. Notre cinéma est reconnu à travers le monde ; malgré cela, l’échec de nombreux films met en danger l’ensemble de notre système de production. Une révision du système des aides ministérielles à la production cinématographique ainsi qu’une attention accrue apportée à toutes les étapes de la fabrication du film s’annonceraient-elles finalement comme les seules solutions envisageables ?"

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "mettre_en_relief_le_theme_central"
    id: "french.discourses.descriptors.structuration_de_la_production.mettre_en_relief_le_theme_central.c1"
    description:
      - "Ce que réclament les habitants de ce quartier, c’est davantage d’espaces verts."
      - "Ce sur quoi j’ai été piégé, ce sont les constructions verbales."
      - "Si je reprends de ce gâteau, c’est vraiment qu’il est succulent."
      - "Qu’il devienne un excellent acteur, je n’en doute pas."
      - "Ce serait une grave erreur que de le croire."
      - "C’est décomposée qu’elle était, pas pâle."
      - "Triste nouvelle que la fermeture de cette entreprise."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "renforcer_un_point_de_vue_par_des_arguments_et_des_exemples"
    id: "french.discourses.descriptors.structuration_de_la_production.renforcer_un_point_de_vue_par_des_arguments_et_des_exemples.c1"
    description:
      - "On se doit de souligner le travail remarquable accompli par nos confrères."
      - "Les résultats de l’enquête menée dans le cadre de la nouvelle circulaire tendent à confirmer une hausse particulièrement surprenante."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "faire_une_transition"
    id: "french.discourses.descriptors.structuration_de_la_production.faire_une_transition.c1"
    description:
      - "Sans transition maintenant, voici l’actu musicale, ça bouge sur les ondes."
      - "Passons maintenant au fait du jour."
      - "Qui dit travail dit congés."
      - "Voici donc le dossier de cette édition. Toute la rédaction vous propose un tour de France de ce qu’il sera possible de faire cet été sur les plages de l’Hexagone avec vos chérubins."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "ouvrir_ou_fermer_une_digression"
    id: "french.discourses.descriptors.structuration_de_la_production.ouvrir_ou_fermer_une_digression.c1"
    description:
      - "Mais, ainsi que l’a dit, je crois, notre cher collaborateur, dans son style qui est le sien : “Mieux vaut tard que jamais”."
      - "Avant d’y revenir en guise de conclusion, évoquons rapidement mais intelligemment les processus permettant d’analyser ces données."
      - "Je me permets de rebondir sur vos propos et d’ouvrir, à ce sujet, une petite parenthèse."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi"
    id: "french.discourses.descriptors.structuration_de_la_production.reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi.c1"
    description:
      - "Patience, patience, tout le monde n’aurait donc que ce mot à la bouche : patience !"
      - "Ce film a remporté 10 prix. Un tel palmarès reste inégalé."
      - "Elle a préféré décliner la proposition à ce poste, j’aurais agi pareillement."
      - "Elle a tourné les talons, une attitude semblable n’aurait jamais été acceptée auparavant."
      - "Il ne jure que par l’automédication, et j’agis de même."
      - "En continuant ainsi, tu risques gros."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "reformuler_un_propos"
    id: "french.discourses.descriptors.structuration_de_la_production.reformuler_un_propos.c1"
    description:
      - "Que l’on soit novice ou expert, il est important de se familiariser avec les nouvelles technologies, autrement dit, un usage régulier est souhaité."
      - "Dans votre apprentissage, vous serez parfaitement libre, c’est-à-dire que vous pourrez, à votre guise, suivre le programme le plus adapté à votre personnalité."
      - "On constate de légères baisses de résultats, un manque de dynamisme, en d’autres termes, il serait urgent de se remettre au boulot."
      - "Cette jeune fille est pleine de charme, intelligente, modeste, discrète, douée, en un mot, elle a tout pour elle."

  - scale: "structuration_de_la_production"
    level: "c1"
    code: "introduire_une_conclusion_independante"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_une_conclusion_independante.c1"
    description:
      - "De toute façon, le dossier est clos. Inutile de revenir là-dessus."
      - "En tout cas, le contrat a été signé et il est impossible de faire machine arrière, tant les conséquences seraient nuisibles au bon fonctionnement de notre institution."
      - "Quoi qu’il en soit, la situation est grave et il convient de la traiter dans les plus brefs délais."
      - "De toute manière, elle a claqué la porte et n’est pas prête de remettre les pieds ici."

  - scale: "fonctions_interactives"
    level: "c2"
    code: "prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point"
    id: "french.discourses.descriptors.fonctions_interactives.prendre_ou_reprendre_la_parole_et_introduire_un_nouveau_point.c2"
    description:
      - "Je reviens sur ce que vous venez de dire, parce que c’est là que le désaccord apparaît."
      - "Avant qu’on passe à autre chose, j’ajoute une nuance importante."
      - "Je reformule la question, parce que chacun parle d’autre chose."
      - "Il y a un point qu’on laisse de côté depuis tout à l’heure, et il mérite qu’on s’y arrête."

  - scale: "fonctions_interactives"
    level: "c2"
    code: "faire_avancer_la_discussion_en_invitant_autrui_a_participer"
    id: "french.discourses.descriptors.fonctions_interactives.faire_avancer_la_discussion_en_invitant_autrui_a_participer.c2"
    description:
      - "Ce que dit Marie rejoint ce qu’a dit Karim. Du coup, laquelle des deux hypothèses vous paraît la plus solide ?"
      - "Votre remarque va dans le même sens. Concrètement, ça changerait quoi ?"
      - "On voit deux options se dessiner. Qui veut commencer par défendre la première ?"
      - "Si on est d’accord sur le constat, essayons maintenant de voir ce qu’on décide."

  - scale: "fonctions_interactives"
    level: "c2"
    code: "recadrer_une_discussion_et_faire_le_point"
    id: "french.discourses.descriptors.fonctions_interactives.recadrer_une_discussion_et_faire_le_point.c2"
    description:
      - "Là, on s’éloigne un peu. Revenons à la question de départ."
      - "Si je résume, on a déjà validé trois points. Le blocage se situe maintenant dans la mise en pratique."
      - "Je ferme la parenthèse et je reviens au vrai sujet."
      - "Avant d’aller plus loin, on fait le point : sur le fond, on avance. Sur la méthode, les positions restent éloignées."

  - scale: "fonctions_interactives"
    level: "c2"
    code: "resumer_et_approfondir_une_discussion"
    id: "french.discourses.descriptors.fonctions_interactives.resumer_et_approfondir_une_discussion.c2"
    description:
      - "Si on résume, il y a deux logiques : aller vite tout de suite, ou prendre plus de temps pour que ça tienne dans la durée."
      - "En clair, on se rejoint sur le constat. Le désaccord porte encore sur la méthode."
      - "Si on pousse votre raisonnement, ça fait apparaître une conséquence restée de côté jusqu’ici."
      - "À ce stade, le cadre est posé et les objections sont sur la table. Il faut maintenant trancher."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "organiser_son_discours"
    id: "french.discourses.descriptors.structuration_de_la_production.organiser_son_discours.c2"
    description:
      - "On entend souvent dire que le télétravail a réglé beaucoup de choses : moins de trajets, plus de souplesse, parfois un meilleur équilibre. Sur le papier, c’est convaincant. Dans la réalité, c’est plus irrégulier. Certains y gagnent en autonomie. D’autres voient les horaires déborder, les échanges se raréfier ou le collectif s’effilocher. Au fond, le débat dépasse le pour ou contre. Tout dépend du cadre, des habitudes d’équipe et de la manière dont le travail circule."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "mettre_en_relief_le_theme_central"
    id: "french.discourses.descriptors.structuration_de_la_production.mettre_en_relief_le_theme_central.c2"
    description:
      - "Le point central, c’est le décalage entre l’objectif affiché et les moyens engagés."
      - "L’attention doit surtout porter sur ce qui manque concrètement pour que ça marche."
      - "Petit à petit, on voit apparaître un problème de fond."
      - "Cette crise révèle surtout la fragilité d’un modèle qu’on pensait solide."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "renforcer_un_point_de_vue_par_des_arguments_et_des_exemples"
    id: "french.discourses.descriptors.structuration_de_la_production.renforcer_un_point_de_vue_par_des_arguments_et_des_exemples.c2"
    description:
      - "Si on regarde l’ensemble des éléments, tout va dans le même sens : les chiffres convergent, les retours du terrain aussi, et les autres pistes restent plus fragiles."
      - "Même en nuançant un peu ces résultats, on retombe sur la même tendance de fond."
      - "Dès qu’on met les faits et les témoignages côte à côte, cette lecture devient difficile à contester."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "faire_une_transition"
    id: "french.discourses.descriptors.structuration_de_la_production.faire_une_transition.c2"
    description:
      - "Bon, maintenant qu’on a posé le cadre, regardons ce que ça change concrètement."
      - "À partir de là, on peut passer des grands principes aux effets réels."
      - "Une fois ce point clarifié, on peut attaquer la question des responsabilités."
      - "Cela dit, revenons à ce qui nous occupe."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "ouvrir_ou_fermer_une_digression"
    id: "french.discourses.descriptors.structuration_de_la_production.ouvrir_ou_fermer_une_digression.c2"
    description:
      - "J’ouvre juste une parenthèse, parce que c’est un point qu’on oublie souvent."
      - "Je referme la parenthèse. Ça reste secondaire."
      - "Cela dit, revenons au fil principal, sinon on va se disperser."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi"
    id: "french.discourses.descriptors.structuration_de_la_production.reference_anaphorique_avec_tel_pareil_de_meme_semblable_et_ainsi.c2"
    description:
      - "Une telle réaction, ça devient difficile à défendre."
      - "Le premier protocole posait problème. Le second aussi, mais pour d’autres raisons."
      - "Ils ont refusé de bouger, et les autres ont fait pareil."
      - "Dans une situation semblable, j’aurais sans doute réagi autrement."
      - "Ainsi formulée, votre idée devient tout de suite plus claire."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "reformuler_un_propos"
    id: "french.discourses.descriptors.structuration_de_la_production.reformuler_un_propos.c2"
    description:
      - "Pour être plus précis, l’idée nous intéresse, mais sa version actuelle pose encore problème."
      - "Autrement dit, le point de friction, c’est le calendrier."
      - "En d’autres termes, on peut y aller, à condition de poser des garde-fous."
      - "En un mot, l’idée est bonne, mais elle arrive trop tôt."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "introduire_une_conclusion_independante"
    id: "french.discourses.descriptors.structuration_de_la_production.introduire_une_conclusion_independante.c2"
    description:
      - "Quoi qu’on en pense, il faudra décider avant la fin du trimestre."
      - "De toute façon, cette contrainte budgétaire, on devra faire avec."
      - "Le débat peut continuer, mais l’urgence reste là."
      - "En tout cas, la question des responsabilités finit toujours par revenir."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "synthetiser"
    id: "french.discourses.descriptors.structuration_de_la_production.synthetiser.c2"
    description:
      - "Si on résume, tout nous ramène à la même conclusion : la réforme devient nécessaire, avec un accompagnement solide."
      - "Au total, les avantages sont là, mais leur mise en place demande un vrai cadre."
      - "Au fond, on voit surtout un changement durable se dessiner."
      - "Pour résumer, on se dispute moins sur le constat que sur le rythme."

  - scale: "structuration_de_la_production"
    level: "c2"
    code: "conclure"
    id: "french.discourses.descriptors.structuration_de_la_production.conclure.c2"
    description:
      - "Au final, il faut surtout trouver comment agir sans créer plus de déséquilibres."
      - "Tout bien pesé, l’option la plus solide reste celle-là : elle est faisable, plus juste et plus stable dans le temps."
      - "Au fond, tout va dépendre de la cohérence d’ensemble."
      - "Au bout du compte, mieux vaut ralentir un peu maintenant que réparer dans l’urgence plus tard."
