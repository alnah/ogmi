      - "Bonjour."
      - "Bonsoir."
      - "Salut."
      - "Au revoir."

  - scale: "socioculturel"
    level: "pre_a1"
    code: "formules_sociales"
    id: "french.sociocultural.descriptors.socioculturel.formules_sociales.pre_a1"
    description:
      - "Moi, c’est Inès."
      - "Et toi ?"
      - "Oui."
      - "Non."
      - "Pardon ?"

  - scale: "socioculturel"
    level: "pre_a1"
    code: "invitations_remerciements_et_excuses"
    id: "french.sociocultural.descriptors.socioculturel.invitations_remerciements_et_excuses.pre_a1"
    description:
      - "S’il te plaît."
      - "S’il vous plaît."
      - "Merci."
      - "Non merci."
      - "Désolé."

  - scale: "socioculturel"
    level: "pre_a1"
    code: "lettre_amicale_et_courriel"
    id: "french.sociocultural.descriptors.socioculturel.lettre_amicale_et_courriel.pre_a1"
    description:
      - "Bonjour."
      - "Salut."
      - "À bientôt."
      - "Bises."

  - scale: "socioculturel"
    level: "pre_a1"
    code: "conversation_au_telephone"
    id: "french.sociocultural.descriptors.socioculturel.conversation_au_telephone.pre_a1"
    description:
      - "Allô ?"
      - "Oui."
      - "Un moment."
      - "Au revoir."

  - scale: "socioculturel"
    level: "a1"
    code: "salutations"
    id: "french.sociocultural.descriptors.socioculturel.salutations.a1"
    description:
      - "Bonjour Alain, comment ça va ?"
      - "Bonsoir monsieur Jolicour."
      - "Bonne journée."
      - "Bonne soirée."

  - scale: "socioculturel"
    level: "a1"
    code: "formules_sociales"
    id: "french.sociocultural.descriptors.socioculturel.formules_sociales.a1"
    description:
      - "Comment allez-vous ?"
      - "Ça va ?"
      - "Très bien et vous / toi ?"

  - scale: "socioculturel"
    level: "a1"
    code: "invitations_remerciements_et_excuses"
    id: "french.sociocultural.descriptors.socioculturel.invitations_remerciements_et_excuses.a1"
    description:
      - "Tu veux aller au cinéma ?"
      - "Merci (beaucoup)."
      - "Désolé, je ne peux pas."
      - "Bonne idée !"

  - scale: "socioculturel"
    level: "a1"
    code: "lettre_amicale_et_courriel"
    id: "french.sociocultural.descriptors.socioculturel.lettre_amicale_et_courriel.a1"
    description:
      - "Cher David."
      - "Salut Jean."
      - "Ton ami Paul."
      - "Bises."
      - "Bisou."

  - scale: "socioculturel"
    level: "a1"
    code: "conversation_au_telephone"
    id: "french.sociocultural.descriptors.socioculturel.conversation_au_telephone.a1"
    description:
      - "Bonjour ! Jean-Marc est là ?"
      - "Un moment, s’il vous plaît."
      - "À plus tard."
      - "Au revoir."
      - "Salut."

  - scale: "socioculturel"
    level: "a2"
    code: "formules_sociales"
    id: "french.sociocultural.descriptors.socioculturel.formules_sociales.a2"
    description:
      - "Tu vas bien ?"
      - "Bonsoir madame, monsieur."
      - "Salut !"
      - "Enchanté !"
      - "Je vous souhaite un bon appétit."

  - scale: "socioculturel"
    level: "a2"
    code: "invitations_remerciements_et_excuses"
    id: "french.sociocultural.descriptors.socioculturel.invitations_remerciements_et_excuses.a2"
    description:
      - "Vous voulez jouer au tennis ?"
      - "Avec plaisir !"
      - "Pourquoi pas ?"
      - "Désolé(e), je suis fatigué(e)."
      - "J’aimerais bien, mais je suis occupé(e)."

  - scale: "socioculturel"
    level: "a2"
    code: "lettre_amicale_et_courriel"
    id: "french.sociocultural.descriptors.socioculturel.lettre_amicale_et_courriel.a2"
    description:
      - "Bonjour, Paul."
      - "Mon cher Paul."
      - "Je t’embrasse."
      - "À bientôt !"

  - scale: "socioculturel"
    level: "a2"
    code: "conversation_au_telephone"
    id: "french.sociocultural.descriptors.socioculturel.conversation_au_telephone.a2"
    description:
      - "Bonsoir, ici Jean-Paul."
      - "Je voudrais parler à Jeanne, s’il vous plaît ?"
      - "Est-ce que Marie est là, s’il vous plaît ?"
      - "C’est de la part de qui ?"
      - "Ne quittez pas."
      - "Un instant, s’il vous plaît."
      - "Merci de votre appel."

  - scale: "socioculturel"
    level: "a2"
    code: "usages_autour_de_l_argent"
    id: "french.sociocultural.descriptors.socioculturel.usages_autour_de_l_argent.a2"
    description:
      - "Je t’invite."
      - "C’est pour moi."

  - scale: "socioculturel"
    level: "a2"
    code: "lettre_formelle_et_commerciale"
    id: "french.sociocultural.descriptors.socioculturel.lettre_formelle_et_commerciale.a2"
    description:
      - "Chère madame Leclair."
      - "Sincères salutations."
      - "Cordialement."

  - scale: "socioculturel"
    level: "b1"
    code: "conversation_au_telephone"
    id: "french.sociocultural.descriptors.socioculturel.conversation_au_telephone.b1"
    description:
      - "Société Kia, bonjour !"
      - "Bonjour, je voudrais parler à Monsieur Durand, s’il vous plaît."
      - "C’est de la part de qui ? - De Sophie Gérard."
      - "Ne quittez pas, patientez un petit moment... je vous passe."
      - "Voulez-vous laisser un message ?"

  - scale: "socioculturel"
    level: "b1"
    code: "usages_autour_de_l_argent"
    id: "french.sociocultural.descriptors.socioculturel.usages_autour_de_l_argent.b1"
    description:
      - "C’est moi qui paie."
      - "C’est ma tournée."
      - "Non, non, on partage."
      - "Cette fois-ci, c’est moi qui t’invite."
      - "J’insiste, ça me fait plaisir."

  - scale: "socioculturel"
    level: "b1"
    code: "lettre_formelle_et_commerciale"
    id: "french.sociocultural.descriptors.socioculturel.lettre_formelle_et_commerciale.b1"
    description:
      - "Monsieur le Directeur, comme convenu dans la lettre du 7 janvier, nous vous envoyons les documents dont vous avez besoin pour annuler la réservation."
      - "Je vous adresse cette lettre afin de pouvoir réserver une chambre double, pour le 4 mars."
      - "En attendant votre réponse, je vous prie d’agréer, Monsieur, l’expression de mes sentiments les plus distingués."

  - scale: "socioculturel"
    level: "b1"
    code: "exposes_en_reunion"
    id: "french.sociocultural.descriptors.socioculturel.exposes_en_reunion.b1"
    description:
      - "Aujourd’hui, je voudrais parler d’un problème qui concerne beaucoup de personnes."
      - "C’est une situation, comment je peux dire ça, euh... complexe."
      - "C’est une question non seulement sociale mais aussi sanitaire."
      - "D’abord, je parlerai des avantages du projet, ensuite de ses inconvénients."
      - "Si vous avez des questions, n’hésitez pas à les poser."
      - "Pour conclure, je dirais que tout a été possible grâce aux efforts de tous mes collègues."
      - "Merci de votre attention."

  - scale: "socioculturel"
    level: "b1"
    code: "communication_ecrite_en_entreprise"
    id: "french.sociocultural.descriptors.socioculturel.communication_ecrite_en_entreprise.b1"
    description:
      - "Monsieur Dubois a appelé et il demande que vous le contactiez le plus rapidement possible."
      - "Je m’excuse, je ne pourrai pas assister à la journée de formation qui aura lieu le lundi 15 avril, pour des raisons personnelles. Merci de votre compréhension."
      - "Chers collègues, pourrions-nous fixer une date pour faire le bilan sur le dossier « Cerise » ?"
      - "Vous trouverez ci-joint les documents à télécharger."

  - scale: "socioculturel"
    level: "b1"
    code: "echanges_formels_en_contexte_professionnel"
    id: "french.sociocultural.descriptors.socioculturel.echanges_formels_en_contexte_professionnel.b1"
    description:
      - "À court terme, que voudriez-vous faire dans cette entreprise ? Quels seraient vos principaux objectifs ?"
      - "Je n’ai pas de grandes connaissances en allemand mais je suis prêt à apprendre et si nécessaire à m’inscrire à des cours."
      - "Veuillez me suivre dans mon bureau."
      - "Asseyez-vous, je vous prie."

  - scale: "socioculturel"
    level: "b2"
    code: "lettre_formelle_et_commerciale"
    id: "french.sociocultural.descriptors.socioculturel.lettre_formelle_et_commerciale.b2"
    description:
      - "Je vous prie d’agréer, Monsieur, mes sentiments dévoués."
      - "Suite à votre courriel, j’ai le regret de vous annoncer que nous ne pouvons pas procéder au remboursement du produit que vous avez acheté."
      - "L’écran ayant été fortement endommagé, veuillez me faire parvenir dans les meilleurs délais un nouvel ordinateur."

  - scale: "socioculturel"
    level: "b2"
    code: "exposes_en_reunion"
    id: "french.sociocultural.descriptors.socioculturel.exposes_en_reunion.b2"
    description:
      - "Pour commencer cette réunion, j’aimerais aborder une question délicate."
      - "Il est intéressant de souligner que notre chiffre d’affaires a doublé cette année grâce aux nombreuses commandes de nos nouveaux clients."
      - "Il faudra également définir les enjeux de cette nouvelle alliance."
      - "Une question importante a été soulevée lors de notre dernière réunion. Il est fondamental d’y revenir."

  - scale: "socioculturel"
    level: "b2"
    code: "communication_ecrite_en_entreprise"
    id: "french.sociocultural.descriptors.socioculturel.communication_ecrite_en_entreprise.b2"
    description:
      - "Suite à notre dernière réunion, il a été convenu que les salaires de cette année seront gelés."
      - "Chers collègues, veuillez trouver sur le panneau d’affichage la circulaire expliquant les mesures à prendre par rapport au développement durable."
      - "Je vous prierais de prendre connaissance des fichiers en annexe."

  - scale: "socioculturel"
    level: "b2"
    code: "registres_de_langue"
    id: "french.sociocultural.descriptors.socioculturel.registres_de_langue.b2"
    description:
      - "Elle vient de se faire larguer par son mec. / Son ami vient de rompre."
      - "Ils se sont cassés sans dire au revoir. / Ils ont tourné les talons sans nous saluer."
      - "Je n’ai pas envie de me prendre la tête. / Je ne souhaite pas me torturer l’esprit."

  - scale: "socioculturel"
    level: "b2"
    code: "echanges_formels_en_contexte_professionnel"
    id: "french.sociocultural.descriptors.socioculturel.echanges_formels_en_contexte_professionnel.b2"
    description:
      - "Je vous présente notre stagiaire qui sera parmi nous durant les prochains mois et auquel je vous demande de réserver le meilleur accueil."
      - "Seriez-vous en mesure de nous communiquer les derniers résultats afin que nous puissions les exploiter ?"

  - scale: "socioculturel"
    level: "b2"
    code: "conduite_des_discussions_formelles_et_informelles"
    id: "french.sociocultural.descriptors.socioculturel.conduite_des_discussions_formelles_et_informelles.b2"
    description:
      - "Pourriez-vous parler plus fort ? Nous ne vous avons pas entendu."
      - "Monsieur le président, puis-je prendre la parole pour ajouter une précision sur les chiffres donnés ?"
      - "Vous permettez que je termine, s’il vous plaît ?"

  - scale: "socioculturel"
    level: "b2"
    code: "reunions_formelles_et_professionnelles"
    id: "french.sociocultural.descriptors.socioculturel.reunions_formelles_et_professionnelles.b2"
    description:
      - "Contrairement à nos concurrents, nous soutenons qu’il vaut mieux se focaliser sur le marché asiatique."
      - "Nos partenaires sous-entendent que les chiffres fournis sont erronés."
      - "En conclusion, merci de bien vouloir prévoir un compte rendu pour la prochaine réunion."
      - "Je vous remercie de votre écoute et vous donne rendez-vous lors de notre prochaine assemblée."

  - scale: "socioculturel"
    level: "b2"
    code: "debat_et_argumentation"
    id: "french.sociocultural.descriptors.socioculturel.debat_et_argumentation.b2"
    description:
      - "Pour commencer, je rappelle que le temps de parole imparti à chaque candidat est identique."
      - "Je ne vous permettrai pas de remettre en question ce que nous avons construit ces dernières années."
      - "Laissez-moi illustrer ces propos à l’aide d’exemples concrets."
      - "Vous nous attaquez. Toutefois, vos arguments ne sont pas fondés."
      - "Notre débat touche à sa fin, prenons cinq minutes pour un dernier tour de table récapitulatif."

  - scale: "socioculturel"
    level: "b2"
    code: "langue_litteraire_au_quotidien"
    id: "french.sociocultural.descriptors.socioculturel.langue_litteraire_au_quotidien.b2"
    description:
      - "Je fus surpris(e) qu’il prenne une telle décision."
      - "Ce fut un temps où nous aimions nous promener près de la rivière, entendre le murmure de l’eau et respirer le parfum des fleurs qui embaumait l’air."

  - scale: "socioculturel"
    level: "c1"
    code: "registres_de_langue"
    id: "french.sociocultural.descriptors.socioculturel.registres_de_langue.c1"
    description:
      - "Il n’avait qu’à décider avant ! / Il était utile qu’il décide plus tôt ! / Il aurait été de bon ton qu’il prenne une décision dans les meilleurs délais !"
      - "Allez, bouge-toi maintenant, on va être à la bourre. / Dépêche-toi un peu, on va être en retard. / Pourriez-vous, je vous prie, vous presser afin que nous ne fassions pas trop attendre nos hôtes."

  - scale: "socioculturel"
    level: "c1"
    code: "echanges_formels_en_contexte_professionnel"
    id: "french.sociocultural.descriptors.socioculturel.echanges_formels_en_contexte_professionnel.c1"
    description:
      - "Qu’avez-vous pensé de l’intervention de ce DRH à propos de l’image des rapports professionnels véhiculée au sein de cette entreprise ?"
      - "Je viens de prendre connaissance de la nouvelle plaquette et j’émets des doutes quant à son aspect incisif."
      - "Dans le but de faciliter la communication, permettez que je vous propose ces quelques conseils pratiques."
      - "Dans le cadre de la restructuration de notre service, il semblerait que nous soyons à un tournant stratégique de notre évolution, d’où la nécessité de se recentrer sur une économie plus libérale."

  - scale: "socioculturel"
    level: "c1"
    code: "conduite_des_discussions_formelles_et_informelles"
    id: "french.sociocultural.descriptors.socioculturel.conduite_des_discussions_formelles_et_informelles.c1"
    description:
      - "Mon cher confrère, j’ai écouté avec une grande attention vos points de vue, que je considère comme beaucoup trop éparpillés. Je m’adresse donc à vous sans quoi que ce soit à dissimuler, mais plutôt dans un esprit conciliateur."
      - "Cher Monsieur, n’y voyez pas la moindre arrogance de ma part, car j’assume mes positions, mais j’ai une preuve à vous donner, sans passer comme vous le faites, par des formules creuses."
      - "Mais enfin, pour qui vous prenez-vous ? Vous êtes en plein délire, mon cher ami ! Merci de me laisser terminer ; il me semble que je vous ai laissé exprimer vos élucubrations. Ne me coupez pas la parole pendant que je rectifie vos données ; vous serez bien aimable."
      - "Ah, c’est à vous. Nous attendons votre intervention avec la plus grande impatience car votre point de vue est toujours éclairant !"
      - "Pour permettre à chacun de pouvoir exprimer son opinion, veuillez, s’il vous plaît, lever la main lorsque vous voudrez prendre la parole. Toutes les suggestions seront prises en considération."

  - scale: "socioculturel"
    level: "c1"
    code: "reunions_formelles_et_professionnelles"
    id: "french.sociocultural.descriptors.socioculturel.reunions_formelles_et_professionnelles.c1"
    description:
      - "Mesdames, messieurs, je vous prie de bien vouloir prendre place autour de la table afin que j’ouvre la séance et que nous attaquions l’ordre du jour."
      - "C’est le moment opportun pour que nous nous recentrions sur ce qui a fait le nerf de notre politique : notre savoir-faire ancestral que nous ont toujours envié nos concurrents."
      - "Il faut statuer sur ce point. Je propose que nous procédions au vote à main levée ; nous adopterons cette mesure si le quorum est atteint."
      - "Notre connexion est désormais établie et nous allons pouvoir discuter par écran interposé avec nos partenaires de l’accroche du slogan que nous avons retenu."
      - "Si vous vous reportez au diagramme de la page 26 du rapport annuel, vous constaterez par vous-mêmes que nos pertes sont en deçà des prévisions faites au début de la crise que nous avons traversée."
      - "Bien, je tiens à vous remercier de votre implication. La séance est levée, vous en recevrez un compte rendu détaillé dans les meilleurs délais."

  - scale: "socioculturel"
    level: "c1"
    code: "debat_et_argumentation"
    id: "french.sociocultural.descriptors.socioculturel.debat_et_argumentation.c1"
    description:
      - "Notre rencontre va s’articuler autour de trois axes qui donneront à voir les différents aspects du problème et en rendront donc toute la complexité."
      - "Je crois, bien au contraire, que d’autres alternatives existent, moins réductrices, moins sectaires et pourtant tout aussi effectives dans le traitement de la situation."
      - "Le débat va donc se clore sur cette ultime remarque et laisser le champ de la réflexion ouvert jusqu’à notre prochaine rencontre prévue ici même le mois prochain."

  - scale: "socioculturel"
    level: "c1"
    code: "implicite_et_connotations"
    id: "french.sociocultural.descriptors.socioculturel.implicite_et_connotations.c1"
    description:
      - "Quelle jolie maisonnette, un vrai petit cocon !"
      - "Les photographes ont fait des clichés absolument magiques de l’événement. Tu veux parler de ces paparazzi qui volent la vie privée des gens ?!"
      - "Elle s’est acheté un beau vison, Madame ne se refuse rien."
      - "Je vois que tu as encore tout compris !"

  - scale: "socioculturel"
    level: "c1"
    code: "tonalites_du_discours"
    id: "french.sociocultural.descriptors.socioculturel.tonalites_du_discours.c1"
    description:
      - "Bravo, continue comme ça, je pense que tu es sur la bonne voie ! dit-il, en levant les yeux au ciel."
      - "Tu devrais parler un peu plus fort, je ne suis pas sûre que les personnes au bout de la rue aient bien entendu ! (en faisant mine de se boucher les oreilles)"
      - "Si, si, je suis en pleine forme, ça ne se voit pas ? dit-il, en maugréant."
      - "Laissez-moi parler, je vous prie ! dit-il, d’un ton sec."
      - "Et donc, c’est maintenant que vous me transmettez l’information ? Information qui, soit dit en passant, aurait dû être communiquée il y a plus de deux jours !"
      - "Ce n’est pas si simple, qu’est-ce que vous croyez ?"
      - "Heureusement que vous m’avez précisé le fond de votre pensée, car je n’étais effectivement pas sûr d’avoir saisi la nuance, fine, certes, existant entre une chaise et une table."
      - "Ah ! Quelle belle preuve d’intelligence !"
      - "Très drôle ! Tu te trouves malin ?"
      - "Tu parles d’un sourire radieux ! Fais un effort !"
      - "Tout à fait, je ne vois pas effectivement pourquoi je ne me réjouirais pas à l’idée de devoir faire le pitre devant toute cette assemblée !"
      - "Nous n’avons pas chômé, nous avons fait du bon boulot, nos objectifs sont atteints. Mission accomplie !"
      - "Quelle finesse de tact et de jeu (voix qui monte), un chef-d’œuvre !"
      - "Mouais, il est pas mal, ce film, enfin... il n’y a pas de quoi en faire tout un plat !"

  - scale: "socioculturel"
    level: "c1"
    code: "expressions_idiomatiques"
    id: "french.sociocultural.descriptors.socioculturel.expressions_idiomatiques.c1"
    description:
      - "Depuis qu’il est à la tête de l’entreprise, il remue ciel et terre pour la création d’une crèche."
      - "Mon nouveau voisin, ah non, je ne le porte pas spécialement dans mon cœur."
      - "Quand l’avion décolle, Amélie a toujours une peur bleue, elle devient blanche comme un linge et se met à trembler comme une feuille."
      - "Depuis quelque temps, Anne se fait une montagne de tout, et du coup, pour un oui, pour un non, elle se fait des cheveux blancs."

  - scale: "socioculturel"
    level: "c1"
    code: "humour"
    id: "french.sociocultural.descriptors.socioculturel.humour.c1"
    description:
      - "Attendez, là, j’en ai une bonne à vous raconter !"
      - "Je vous garantis que vous allez être tordus de rire."
      - "MDR !"
      - "Quand je lui ai raconté la blague, il était plié de rire."
      - "Elle est bonne celle-là !"
      - "Trop drôle !"
      - "Je suis content que ça fasse marrer tout le monde."
      - "On était tous écroulés."
      - "On était bidonnés."
      - "J’en pleurais de rire."

  - scale: "socioculturel"
    level: "c1"
    code: "types_d_ecrits_scolaires_et_professionnels"
    id: "french.sociocultural.descriptors.socioculturel.types_d_ecrits_scolaires_et_professionnels.c1"
    description:
      - "En nous appuyant sur les données citées dans le texte ci-dessus, nous nous pencherons sur la façon dont l’information a été traitée en faisant attention aux paradoxes que pourrait entraîner une mauvaise interprétation de ces chiffres."
      - "Pour des raisons indépendantes de notre volonté, nous nous voyons dans l’obligation de reporter notre réunion à une date ultérieure."
      - "Comme mentionné dans la note de service affichée sur le tableau destiné à cet effet, vous serez priés de prendre en considération les nouveaux horaires de notre établissement."
      - "Par la présente, nous vous annonçons le départ à la retraite anticipée de notre cher collègue."

  - scale: "socioculturel"
    level: "c1"
    code: "langue_litteraire_au_quotidien"
    id: "french.sociocultural.descriptors.socioculturel.langue_litteraire_au_quotidien.c1"
    description:
      - "Toutes ses velléités de dénigrement s’étaient évanouies sous la légèreté désarmante de la soirée qui s’annonçait."
      - "Il y a le charme vénéneux de cette île bretonne, rugueuse, vivante, embrumée de vieilles légendes."
      - "Encore, aurait-il fallu que j’en eusse été informé !"
      - "La ville et ses environs sont complètement engorgés et je crains fort, Monsieur le Premier ministre, que nous ayons désormais quelque retard ; aussi hâtons-nous, je vous en prie."

  - scale: "socioculturel"
    level: "c1"
    code: "styles_narratifs_descriptifs_burlesques_et_lyriques"
    id: "french.sociocultural.descriptors.socioculturel.styles_narratifs_descriptifs_burlesques_et_lyriques.c1"
    description:
      - "Le dîner de cons (extrait)."
      - "Il s’appelle Juste Leblanc."
      - "Ah bon, il n’a pas de prénom ?"
      - "Je viens de vous le dire, Juste Leblanc... Votre prénom c’est François, c’est juste ? Eh bien, lui, c’est pareil, c’est Juste."
      - "Le père Noël est une ordure (extrait)."
      - "Qu’est-ce que vous avez foutu dans les cases ? Ça déborde."
      - "Eh ben ouais, y a pas assez de place pour les réponses."
      - "Exercez-vous une activité professionnelle ? « Ça dépend »..."
      - "Oui, ça, évidemment, on vous demande de répondre par « oui » ou par « non » alors : ça dépend, ça dépasse !"
      - "Figurez-vous que Thérèse n’est pas moche. Elle n’a pas un physique facile... C’est différent."
      - "Je n’aime pas dire du mal des gens, mais effectivement elle est gentille."
      - "Je ne vous jette pas la pierre, Pierre, mais j’étais à deux doigts de m’agacer."
      - "Le Petit Prince - Antoine de Saint-Exupéry (extrait)."
      - "Comme le petit prince s’endormait, je le pris dans mes bras, et me remis en route. J’étais ému. Il me semblait porter un trésor fragile sur la Terre. Je regardais, à la lumière de la lune, ce front pâle, ces yeux clos, ces mèches de cheveux qui tremblaient au vent, et je me disais : « Ce que je vois là n’est qu’une écorce. Le plus important est invisible. » Comme ses lèvres entr’ouvertes ébauchaient un demi-sourire, je me dis encore : « Ce qui m’émeut si fort de ce petit prince endormi, c’est sa fidélité pour une fleur ; c’est l’image d’une rose qui rayonne en lui comme la flamme d’une lampe, même quand il dort... » Et je le devinai plus fragile encore. Il faut bien protéger les lampes : un coup de vent peut les éteindre... Et, marchant ainsi, je découvris le puits au lever du jour."
      - "Le Horla - Guy de Maupassant (extrait)."
      - "J’avais allumé mes deux lampes et les huit bougies de ma cheminée, comme si j’eusse pu, dans cette clarté, le découvrir. En face de moi, mon lit, un vieux lit de chêne à colonnes ; à droite, ma cheminée ; à gauche, ma porte fermée avec soin, après l’avoir laissée longtemps ouverte, afin de l’attirer ; derrière moi, une très haute armoire à glace, qui me servait chaque jour pour me raser, pour m’habiller, et où j’avais coutume de me regarder, de la tête aux pieds, chaque fois que je passais devant. Donc, je faisais semblant d’écrire, pour le tromper, car il m’épiait lui aussi ; et soudain, je sentis, je fus certain qu’il lisait par-dessus mon épaule, qu’il était là, frôlant mon oreille."
      - "Le corbeau et le renard - La Fontaine (extrait)."
      - "Maître Corbeau, sur un arbre perché, tenait en son bec un fromage."
      - "Maître Renard, par l’odeur alléché, lui tint à peu près ce langage :"
      - "Et bonjour, Monsieur du Corbeau. Que vous êtes joli ! Que vous me semblez beau ! Sans mentir, si votre ramage se rapporte à votre plumage, vous êtes le Phénix des hôtes de ces bois."
      - "Peau d’âne - Charles Perrault (extrait)."
      - "Je sais, dit-elle, en voyant la Princesse, ce qui vous fait venir ici, je sais de votre cœur la profonde tristesse ; mais avec moi n’ayez plus de souci. Il n’est rien qui vous puisse nuire pourvu qu’à mes conseils vous vous laissiez conduire. Votre Père, il est vrai, voudrait vous épouser ; écouter sa folle demande serait une faute bien grande, mais sans le contredire on le peut refuser."

  - scale: "socioculturel"
    level: "c1"
    code: "citations"
    id: "french.sociocultural.descriptors.socioculturel.citations.c1"
    description:
      - "Comme l’a si bien dit cet artiste que nous ne présenterons plus : « L’art est un mensonge qui nous permet d’approcher la vérité. »"
      - "Comme dirait l’autre, elle n’a pas inventé le fil à couper le beurre !"
      - "Il a répliqué, je cite : « Adieu et ne cherchez plus à me joindre. »"
      - "Il vient une heure où protester ne suffit plus : après la philosophie, il faut l’action, dixit Victor Hugo."
      - "Selon Coluche, ce ne sont pas ceux qui courent le plus vite qui sont les plus pressés."
      - "J’aimerais, en guise de conclusion, citer une personnalité qui m’émeut particulièrement. Il s’agit de Nelson Mandela qui a déclaré : « En faisant scintiller notre lumière, nous offrons aux autres la possibilité d’en faire autant. »"

  - scale: "socioculturel"
    level: "c2"
    code: "conversation_au_telephone"
    id: "french.sociocultural.descriptors.socioculturel.conversation_au_telephone.c2"
    description:
      - "Bonjour, ici Claire Martin. Je vous appelle au sujet du dossier Lambert. Est-ce que je peux parler à Madame Vasseur ?"
      - "Je vous entends mal. Vous pouvez reprendre le dernier point, s’il vous plaît ?"
      - "Si j’ai bien compris, on part sur un report au 17 juin. Vous me le confirmez par mail ?"
      - "Merci pour votre appel. Je vous transfère tout de suite au bon service."

  - scale: "socioculturel"
    level: "c2"
    code: "lettre_formelle_et_commerciale"
    id: "french.sociocultural.descriptors.socioculturel.lettre_formelle_et_commerciale.c2"
    description:
      - "Madame, Monsieur, après examen de votre dossier, voici les précisions utiles."
      - "Merci de nous transmettre, dans les meilleurs délais, les pièces complémentaires indiquées en annexe."
      - "Au vu des éléments reçus, nous ne pouvons malheureusement pas donner une suite favorable à votre demande."
      - "Nous vous prions d’agréer, Madame, Monsieur, l’expression de nos salutations distinguées."

  - scale: "socioculturel"
    level: "c2"
    code: "exposes_en_reunion"
    id: "french.sociocultural.descriptors.socioculturel.exposes_en_reunion.c2"
    description:
      - "Le point de friction est simple : on a deux scénarios, et aucun n’est neutre."
      - "Les chiffres frappent, mais ils ne racontent pas tous la même chose."
      - "Le vrai désaccord porte moins sur le principe que sur ses effets dans six mois."
      - "Au bout du compte, tout se joue sur ce qu’on accepte d’assumer maintenant."

  - scale: "socioculturel"
    level: "c2"
    code: "communication_ecrite_en_entreprise"
    id: "french.sociocultural.descriptors.socioculturel.communication_ecrite_en_entreprise.c2"
    description:
      - "Comme convenu ce matin, vous trouverez ci-joint la version consolidée du document pour validation."
      - "Sans retour argumenté d’ici vendredi midi, nous transmettrons la proposition à la direction."
      - "Merci de traiter ce dossier en priorité : ses enjeux juridiques et budgétaires sont sensibles."
      - "Je reprends ci-dessous les décisions actées, avec les responsables concernés."

  - scale: "socioculturel"
    level: "c2"
    code: "registres_de_langue"
    id: "french.sociocultural.descriptors.socioculturel.registres_de_langue.c2"
    description:
      - "La décision aurait dû tomber plus tôt. / Il aurait mieux valu décider plus tôt. / On a trop attendu. / Il fallait s’y prendre avant."
      - "Pourriez-vous accélérer un peu pour qu’on ne fasse pas attendre nos invités ? / On se dépêche un peu, sinon on va être en retard. / Bouge, ils nous attendent."

  - scale: "socioculturel"
    level: "c2"
    code: "echanges_formels_en_contexte_professionnel"
    id: "french.sociocultural.descriptors.socioculturel.echanges_formels_en_contexte_professionnel.c2"
    description:
      - "Au vu de ce qu’on sait aujourd’hui, je pense qu’il faut rouvrir la discussion sur la trajectoire choisie."
      - "Sauf erreur de ma part, votre analyse minimise un facteur qui peut changer l’ensemble du dossier."
      - "Je formulerais quand même une réserve : à court terme, cette option crée plus de problèmes qu’elle n’en résout."
      - "Vos objections ne portent pas toutes sur la même chose. C’est là que ça coince."

  - scale: "socioculturel"
    level: "c2"
    code: "conduite_des_discussions_formelles_et_informelles"
    id: "french.sociocultural.descriptors.socioculturel.conduite_des_discussions_formelles_et_informelles.c2"
    description:
      - "Si vous me le permettez, je reviens sur ce point, parce qu’il repose sur plusieurs implicites."
      - "Je vois l’objection, mais elle repose sur une lecture partielle de la situation."
      - "Quand vous dites « recentrage stratégique », vous mettez quoi exactement derrière cette formule ?"
      - "Je vous rends la parole juste après. Laissez-moi finir, sinon on mélange deux sujets."

  - scale: "socioculturel"
    level: "c2"
    code: "reunions_formelles_et_professionnelles"
    id: "french.sociocultural.descriptors.socioculturel.reunions_formelles_et_professionnelles.c2"
    description:
      - "Si personne n’y voit d’objection, on ouvre la séance et on part sur l’ordre du jour qui vous a été envoyé."
      - "On a clairement deux options. Prenons-les l’une après l’autre avant de trancher."
      - "S’il n’y a pas d’autre remarque, cette formulation est retenue et figurera au procès-verbal."
      - "Merci à tous. Le compte rendu des arbitrages vous sera envoyé avant la fin de la journée."

  - scale: "socioculturel"
    level: "c2"
    code: "debat_et_argumentation"
    id: "french.sociocultural.descriptors.socioculturel.debat_et_argumentation.c2"
    description:
      - "Votre objection est recevable, mais elle ne remet pas en cause le raisonnement dans son ensemble."
      - "Si on pousse votre hypothèse jusqu’au bout, on arrive à une conclusion dont les conséquences me paraissent difficiles à défendre."
      - "L’intuition de départ se défend, mais ici on confond corrélation et causalité."
      - "Là, on mélange les causes et les responsabilités. Ce n’est pas le même plan."
      - "Je vous rejoins sur le premier point. Pour le reste, les données conduisent à une autre lecture."

  - scale: "socioculturel"
    level: "c2"
    code: "implicite_et_connotations"
    id: "french.sociocultural.descriptors.socioculturel.implicite_et_connotations.c2"
    description:
      - "C’est une proposition audacieuse. / Audacieuse, oui... si on accepte d’oublier tout ce qu’elle laisse de côté."
      - "Il a un rapport très personnel à la ponctualité."
      - "Disons que votre intervention est... originale."
      - "On sent que cette décision a été prise un peu à la légère."

  - scale: "socioculturel"
    level: "c2"
    code: "tonalites_du_discours"
    id: "french.sociocultural.descriptors.socioculturel.tonalites_du_discours.c2"
    description:
      - "Quelle élégance : réussir à simplifier à ce point un problème aussi complexe."
      - "Je vois qu’on continue, avec une remarquable constance, à confondre vitesse et précipitation."
      - "Parfait. C’est exactement l’imprévu dont on avait besoin."
      - "Je suis ravi, évidemment, de reprendre pour la troisième fois un dossier déjà validé."
      - "Pour une fois, voilà une remarque utile."
      - "Quel sens du tact, franchement."

  - scale: "socioculturel"
    level: "c2"
    code: "expressions_idiomatiques"
    id: "french.sociocultural.descriptors.socioculturel.expressions_idiomatiques.c2"
    description:
      - "À force de vouloir ménager la chèvre et le chou, ils se sont mis tout le monde à dos."
      - "Sur ce dossier, pas la peine de tourner autour du pot : il faut appeler un chat un chat."
      - "Il a pris la mouche pour trois fois rien et il a claqué la porte."
      - "À vouloir aller plus vite que la musique, on a surtout mis la charrue avant les bœufs."

  - scale: "socioculturel"
    level: "c2"
    code: "humour"
    id: "french.sociocultural.descriptors.socioculturel.humour.c2"
    description:
      - "Rassurez-vous, je serai bref : je n’ai pas prévu de concurrencer un roman russe."
      - "Si on continue à ce rythme, on va finir par être en avance sur notre retard."
      - "Votre remarque mérite au moins le prix de l’originalité."
      - "On a ri au point d’en perdre le fil."
      - "Même les plus sérieux ont fini par lâcher prise."

  - scale: "socioculturel"
    level: "c2"
    code: "types_d_ecrits_scolaires_et_professionnels"
    id: "french.sociocultural.descriptors.socioculturel.types_d_ecrits_scolaires_et_professionnels.c2"
    description:
      - "Cette note de synthèse croise plusieurs lectures du dossier et en tire des conséquences concrètes."
      - "Le compte rendu ci-joint reprend les positions en présence et explique la décision retenue."
      - "Vous trouverez en annexe une analyse croisée des données pour faire ressortir, sans ambiguïté, les points décisifs."
      - "À la lumière des nouveaux éléments, nous reformulons nos recommandations et en précisons le périmètre d’application."

  - scale: "socioculturel"
    level: "c2"
    code: "langue_litteraire_au_quotidien"
    id: "french.sociocultural.descriptors.socioculturel.langue_litteraire_au_quotidien.c2"
    description:
      - "À peine avait-il franchi le seuil qu’un silence épais retomba sur la pièce."
      - "Il flottait dans la salle une fatigue sourde que personne ne voulait nommer."
      - "Encore fallait-il qu’on nous prévienne à temps."
      - "De cette promesse ne restait plus qu’une lumière faible, presque au bord de s’éteindre."

  - scale: "socioculturel"
    level: "c2"
    code: "styles_narratifs_descriptifs_burlesques_et_lyriques"
    id: "french.sociocultural.descriptors.socioculturel.styles_narratifs_descriptifs_burlesques_et_lyriques.c2"
    description:
      - "À l’aube, il a quitté la maison sans se retourner, comme si la nuit seule avait entendu sa décision."
      - "La ville s’étirait sous une brume cuivrée, entre toits mouillés et fenêtres encore closes."
      - "Avec le sérieux d’un ministre en conférence de presse, il s’est lancé dans une négociation avec la machine à café."
      - "Le matin posait sur les jardins une lumière pâle, et l’air semblait respirer plus large que nous."

  - scale: "socioculturel"
    level: "c2"
    code: "citations"
    id: "french.sociocultural.descriptors.socioculturel.citations.c2"
    description:
      - "Pour reprendre Saint-Exupéry, « le plus important est invisible ». Dans le passage entier, la phrase ne résonne pas de la même façon."
      - "Comme chez La Fontaine, « vous êtes le Phénix des hôtes de ces bois », la phrase flatte autant qu’elle manipule."
      - "Je cite ce passage pour ouvrir la discussion sur ce qu’il permet vraiment de soutenir."
      - "Sortie de son contexte, une citation fait vite dire autre chose que ce qu’elle disait."
