id: "themes.descriptors"
version: "1"

catalog:
  - code: "personal_identity"
    id: "themes.descriptors.personal_identity"
    description:
      - "Themes related to personal identity, self-presentation and life trajectory."
      - "This includes presenting oneself, relating origins and memories, situating oneself in time, expressing preferences and projecting oneself into the future. The focus is on personal profile and belonging rather than on relations, institutions or public issues."

  - code: "relations"
    id: "themes.descriptors.relations"
    description:
      - "Themes related to interpersonal relations, affective ties and social bonds."
      - "This includes family, friendship, love, cooperation, conflict, solidarity, trust and recognition, from basic courtesy to complex negotiations of closeness and distance. The focus is on relations between persons rather than on institutions or public life as such."

  - code: "food"
    id: "themes.descriptors.food"
    description:
      - "Themes related to food, meals and ways of eating."
      - "This includes hunger, meals, cooking, tastes, ingredients, table practices, hospitality, gastronomy and food choices, from simple preferences to conflicts over food models. The focus is on food practices and meanings rather than on medical care or economic systems alone."

  - code: "education"
    id: "themes.descriptors.education"
    description:
      - "Themes related to learning, schooling and training."
      - "This includes school life, subjects, methods, evaluation, orientation, diplomas, higher education and access to knowledge. The focus is on educational trajectories and institutions rather than on employment or public life in general."

  - code: "work"
    id: "themes.descriptors.work"
    description:
      - "Themes related to work, occupations and professional life."
      - "This includes jobs, tasks, workplaces, recruitment, careers, working conditions, organisations and professional identity. The focus is on activity and employment rather than on study, shopping or macroeconomic systems."

  - code: "leisure"
    id: "themes.descriptors.leisure"
    description:
      - "Themes related to free time, recreation and ordinary enjoyment."
      - "This includes hobbies, games, outings, holidays, sport as leisure, entertainment and ways of organising free time, from simple pastimes to critical reflection on the value of rest and pleasure. The focus is on leisure practices rather than on artistic critique or travel logistics."

  - code: "information_and_media"
    id: "themes.descriptors.information_and_media"
    description:
      - "Themes related to information, media and digital circulation."
      - "This includes press, audiovisual media, platforms, networks, messages, sources, algorithms, visibility, credibility and mediated public discourse. The focus is on channels, exposure and information dynamics rather than on devices or technical systems as such."

  - code: "housing"
    id: "themes.descriptors.housing"
    description:
      - "Themes related to housing, domestic space and local living conditions."
      - "This includes rooms, furniture, accommodation, cohabitation, neighbourhood life, rent, comfort and the everyday use of living space. The focus is on dwelling and residential conditions rather than on travel, geography or administrative services."

  - code: "services"
    id: "themes.descriptors.services"
    description:
      - "Themes related to practical, administrative and institutional services."
      - "This includes appointments, forms, counters, helpdesks, utilities, banking, postal services, customer support and access to assistance. The focus is on obtaining organised services and completing procedures rather than on shopping choices or public justice."

  - code: "shopping"
    id: "themes.descriptors.shopping"
    description:
      - "Themes related to buying, selling and everyday consumption decisions."
      - "This includes shops, products, prices, quantities, payment, comparison, delivery, returns, complaints and consumer choices, from simple purchases to critical reflection on consumption. The focus is on transactions and purchasing behaviour rather than on services or economic theory."

  - code: "health"
    id: "themes.descriptors.health"
    description:
      - "Themes related to health, care and bodily condition."
      - "This includes symptoms, appointments, treatment, prevention, wellbeing, the body, disability, health systems and public health debates. The focus is on care and health experience rather than on food practices or legal rights as such."

  - code: "travel"
    id: "themes.descriptors.travel"
    description:
      - "Themes related to travel, transport and movement between places."
      - "This includes directions, tickets, routes, departures, stays, tourism, transport choices and travel problems, from local journeys to contested regimes of mobility. The focus is on movement and travel experience rather than on housing or geographical knowledge alone."

  - code: "economy"
    id: "themes.descriptors.economy"
    description:
      - "Themes related to money, economic exchange and systems of value."
      - "This includes budgets, wages, prices, markets, production, inequality, finance, redistribution and economic policy, from personal expenses to macroeconomic debate. The focus is on economic relations and resource allocation rather than on one-off purchases or work tasks alone."

  - code: "science"
    id: "themes.descriptors.science"
    description:
      - "Themes related to science, research and evidence-based knowledge."
      - "This includes observation, experimentation, discovery, explanation, scientific communication, expertise and public controversies around science. The focus is on knowledge production and validation rather than on technical devices or media circulation."

  - code: "technology"
    id: "themes.descriptors.technology"
    description:
      - "Themes related to tools, devices, technical systems and innovation in use."
      - "This includes machines, household devices, phones, computers, digital tools, automation, artificial intelligence and technical infrastructures, from basic operation to ethical and political consequences. The focus is on technical artefacts and systems rather than on media circulation or scientific proof."

  - code: "environment"
    id: "themes.descriptors.environment"
    description:
      - "Themes related to ecosystems, ecological conditions and human impact on the natural world."
      - "This includes weather, local nature, pollution, waste, climate, biodiversity, resources and ecological transition, from immediate surroundings to planetary limits. The focus is on environmental conditions and ecological relations rather than on territorial representation or economic systems alone."

  - code: "society"
    id: "themes.descriptors.society"
    description:
      - "Themes related to collective life, institutions and public issues."
      - "This includes rules, citizenship, coexistence, rights, inequality, discrimination, solidarity, security, debate and social change, from basic fairness to historical injustice. The focus is on public organisation and common life rather than on private relations or economic mechanisms alone."

  - code: "art"
    id: "themes.descriptors.art"
    description:
      - "Themes related to art, artistic practices and cultural creation."
      - "This includes literature, music, film, visual arts, performance, heritage, interpretation, taste and artistic critique, from simple cultural references to contested meanings of works. The focus is on works and creation rather than on free-time habits alone."

  - code: "spirituality"
    id: "themes.descriptors.spirituality"
    description:
      - "Themes related to religion, spirituality and systems of belief."
      - "This includes sacred figures, rituals, prayer, festivals, spiritual practices, mysticism, astrology, paranormal beliefs, doubt and contemporary forms of belief. The focus is on transcendence, spiritual meaning and belief practices rather than on scientific validation or public institutions alone."

  - code: "geography"
    id: "themes.descriptors.geography"
    description:
      - "Themes related to places, territories and the spatial organisation of the world."
      - "This includes countries, regions, landscapes, climates, maps, borders, resources, urban and rural spaces, and spatial inequalities. The focus is on territorial knowledge and spatial representation rather than on travel experience or housing conditions."

