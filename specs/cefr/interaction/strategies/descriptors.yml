id: "cefr.interaction.strategies.descriptors"
version: "1"

catalog:
  - code: "turntaking"
    id: "cefr.interaction.strategies.descriptors.turntaking"
    description:
      - "This scale is concerned with the ability to take the initiative in discourse."
      - "As stated above, this ability can be viewed both as an interaction strategy (to take the turn) and as an integral aspect of discourse competence."
      - "Key concepts operationalised in the scale include the following:"
      - "initiating, maintaining and ending conversation;"
      - "intervening in an existing conversation or discussion, often using a prefabricated expression to do so, or to gain time to think."

  - code: "co_operating"
    id: "cefr.interaction.strategies.descriptors.co_operating"
    description:
      - "This scale concerns collaborative discourse moves intended to help a discussion develop."
      - "Key concepts operationalised in the scale include the following:"
      - "confirming comprehension (lower levels);"
      - "ability to give feedback and relate one’s own contribution to that of previous speakers/signers (higher levels);"
      - "summarising the point reached in the discussion in order to take stock (B levels);"
      - "inviting others to contribute."
      - "This scale is developed further in the scales for “Facilitating collaborative interaction with peers” and “Collaborating to construct meaning”."

  - code: "asking_for_clarification"
    id: "cefr.interaction.strategies.descriptors.asking_for_clarification"
    description:
      - "This scale concerns intervening in an interaction to indicate whether one is following or not, and to ask follow-up questions on certain points, to check comprehension."
      - "Key concepts operationalised in the scale include the following:"
      - "indicating comprehension or a comprehension problem (lower levels);"
      - "requesting repetition;"
      - "asking follow-up questions to check comprehension or request more details."

