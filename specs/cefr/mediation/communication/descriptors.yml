id: "cefr.mediation.communication.descriptors"
version: "1"

catalog:
  - code: "facilitating_pluricultural_space"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space"
    description:
      - "This scale reflects the notion of creating a shared space between linguistically and culturally different interlocutors (that is, the capacity to deal with “otherness”, to identify similarities and differences, to build on known and unknown cultural features, and so on) in order to enable communication and collaboration."
      - "The user/learner aims to facilitate a positive interactive environment for successful communication between participants of different cultural backgrounds, including in multicultural contexts."
      - "Rather than simply building on their pluricultural repertoire to gain acceptance and to enhance their own mission or message (see “Building on pluricultural repertoire”), they are engaged as a cultural mediator: creating a neutral, trusted, shared “space” in order to enhance communication between others."
      - "They aim to expand and deepen intercultural understanding between participants in order to avoid and/or overcome any potential communication difficulties arising from contrasting cultural viewpoints."
      - "Naturally, the mediator themselves needs a continually developing awareness of sociocultural and sociolinguistic differences affecting cross-cultural communication."
      - "Key concepts operationalised in the scale include the following:"
      - "using questions and showing interest to promote understanding of cultural norms and perspectives between participants;"
      - "demonstrating sensitivity to and respect for different sociocultural and sociolinguistic perspectives and norms;"
      - "anticipating, dealing with and/or repairing misunderstandings arising from sociocultural and sociolinguistic differences."
      - "Progression up the scale is characterised as follows: at B1 the emphasis is on introducing people and showing interest and empathy by asking and answering questions."
      - "By B2+, appreciation of different perspectives and flexibility are central: the ability to belong to a group yet maintain balance and distance, express oneself sensitively, clarify misunderstandings and explain how things were meant."
      - "This aspect is developed further in the C levels, where the user/learner can control their actions and expression according to context, making subtle adjustments in order to prevent and/or repair misunderstandings and cultural incidents."
      - "By C2, they can mediate effectively and naturally, taking account of sociocultural and sociolinguistic differences."

  - code: "acting_as_an_intermediary_in_informal_situations"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations"
    description:
      - "This scale is intended for situations in which the user/learner as a plurilingual individual mediates across languages and cultures to the best of their ability in an informal situation in the public, private, occupational or educational domain."
      - "The scale is therefore not concerned with the activities of professional interpreters."
      - "The mediation may be in one direction (for example, during a welcome speech) or in two directions (for example, during a conversation)."
      - "Key concepts operationalised in the scale include the following:"
      - "informally communicating the sense of what speakers/signers are saying in a conversation;"
      - "conveying important information (for example, in a situation at work);"
      - "repeating the sense of what is expressed in speeches and presentations."
      - "Progression up the scale is characterised as follows: at the A levels, the user/learner can assist in a very simple manner, but by A2+ and B1 they can mediate in predictable everyday situations."
      - "However, such assistance is dependent on the interlocutors being supportive in that they alter their expression or will repeat information as necessary."
      - "At B2, the user/learner can mediate competently within their fields of interest, given the pauses to do so, and by C1 they can do this fluently on a wide range of subjects."
      - "At C2 the user/learner can also convey the meaning of the interlocutors faithfully, reflecting the style, register and cultural context."

  - code: "facilitating_communication_in_delicate_situations_and_disagreements"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements"
    description:
      - "This scale is intended for situations in which the user/learner may have a formal role to mediate in a disagreement between third parties, or may informally try to resolve a misunderstanding, delicate situation or disagreement between them."
      - "The user/learner is primarily concerned with clarifying what the problem is and what the parties want, helping them understand each other’s positions."
      - "They may well attempt to persuade the third parties to move closer to a resolution of the issue."
      - "They are not at all concerned with their own viewpoint, but seek balance in the representation of the viewpoints of the other parties involved in the discussion."
      - "Key concepts operationalised in the scale include the following:"
      - "exploring in a sensitive and balanced way the different viewpoints represented by participants in the dialogue;"
      - "elaborating on viewpoints expressed to enhance and deepen participants’ understanding of the issues discussed;"
      - "establishing common ground;"
      - "establishing possible areas of concession between participants;"
      - "mediating a shift in viewpoint of one or more participants, to move closer to an agreement or resolution."
      - "Progression up the scale is characterised as follows: at the A levels, the user/learner can recognise when disagreements occur."
      - "At B1, they can obtain explanations, demonstrate understanding of the issues and seek clarifications where necessary."
      - "At B2, they can outline the main issues and the positions of the parties concerned, identify common ground, highlight possible solutions and summarise what is agreed on."
      - "These skills are deepened at B2+, with the user/learner showing detailed awareness of the issues and eliciting possible solutions."
      - "At the C levels, they have the diplomatic and persuasive language to do this more effectively, guiding a delicate discussion sensitively."

entries:
  - scale: "facilitating_pluricultural_space"
    level: "a1"
    code: "facilitate_intercultural_exchange_by_showing_welcoming_attitude_and_interest"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.facilitate_intercultural_exchange_by_showing_welcoming_attitude_and_interest.a1"
    description: "Can facilitate an intercultural exchange by showing a welcoming attitude and interest with simple words/signs and non-verbal signals, by inviting others to contribute, and by indicating whether they understand when addressed directly."

  - scale: "facilitating_pluricultural_space"
    level: "a2"
    code: "contribute_to_intercultural_exchange_using_simple_words_to_ask_people_to_explain_and_clarify"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.contribute_to_intercultural_exchange_using_simple_words_to_ask_people_to_explain_and_clarify.a2"
    description: "Can contribute to an intercultural exchange, using simple words/signs to ask people to explain things and to get clarification of what they say, while exploiting a limited repertoire to express agreement, to invite, to thank, etc."

  - scale: "facilitating_pluricultural_space"
    level: "b1"
    code: "support_communication_across_cultures_by_initiating_conversation_showing_interest_and_empathy"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.support_communication_across_cultures_by_initiating_conversation_showing_interest_and_empathy.b1"
    description: "Can support communication across cultures by initiating conversation, showing interest and empathy by asking and answering simple questions, and expressing agreement and understanding."

  - scale: "facilitating_pluricultural_space"
    level: "b1"
    code: "act_in_supportive_manner_in_intercultural_encounters_recognising_feelings_and_worldviews"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.act_in_supportive_manner_in_intercultural_encounters_recognising_feelings_and_worldviews.b1"
    description: "Can act in a supportive manner in intercultural encounters, recognising the feelings and different worldviews of other members of the group."

  - scale: "facilitating_pluricultural_space"
    level: "b1"
    code: "support_intercultural_exchange_using_limited_repertoire_to_introduce_people_and_ask_and_answer_questions"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.support_intercultural_exchange_using_limited_repertoire_to_introduce_people_and_ask_and_answer_questions.b1"
    description: "Can support an intercultural exchange using a limited repertoire to introduce people from different cultural backgrounds and to ask and answer questions, showing awareness that some questions may be perceived differently in the cultures concerned."

  - scale: "facilitating_pluricultural_space"
    level: "b1"
    code: "help_develop_shared_communication_culture_by_exchanging_information_about_values_and_attitudes"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.help_develop_shared_communication_culture_by_exchanging_information_about_values_and_attitudes.b1"
    description: "Can help develop a shared communication culture, by exchanging information in a simple way about values and attitudes to language and culture."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "exploit_knowledge_of_sociocultural_conventions_to_establish_consensus_on_how_to_proceed"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.exploit_knowledge_of_sociocultural_conventions_to_establish_consensus_on_how_to_proceed.b2"
    description: "Can exploit knowledge of sociocultural conventions in order to establish a consensus on how to proceed in a particular situation that is unfamiliar to everyone involved."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "demonstrate_appreciation_of_other_perspectives_and_express_appropriately_to_context"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.demonstrate_appreciation_of_other_perspectives_and_express_appropriately_to_context.b2"
    description: "Can, in intercultural encounters, demonstrate appreciation of perspectives other than that of their own worldview, and express themselves in a way appropriate to the context."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "clarify_misunderstandings_and_misinterpretations_during_intercultural_encounters"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.clarify_misunderstandings_and_misinterpretations_during_intercultural_encounters.b2"
    description: "Can clarify misunderstandings and misinterpretations during intercultural encounters, suggesting how things were actually meant in order to clear the air and move the discussion forward."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "encourage_shared_communication_culture_by_expressing_understanding_and_appreciation_of_different_ideas"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.encourage_shared_communication_culture_by_expressing_understanding_and_appreciation_of_different_ideas.b2"
    description: "Can encourage a shared communication culture by expressing understanding and appreciation of different ideas, feelings and viewpoints, and inviting participants to contribute and react to each other’s ideas."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "work_collaboratively_with_people_of_different_cultural_orientations_discussing_similarities_and_differences"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.work_collaboratively_with_people_of_different_cultural_orientations_discussing_similarities_and_differences.b2"
    description: "Can work collaboratively with people who have different cultural orientations, discussing similarities and differences in views and perspectives."

  - scale: "facilitating_pluricultural_space"
    level: "b2"
    code: "adapt_way_of_work_when_collaborating_with_people_from_other_cultures"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.adapt_way_of_work_when_collaborating_with_people_from_other_cultures.b2"
    description: "Can, when collaborating with people from other cultures, adapt the way they work in order to create shared procedures."

  - scale: "facilitating_pluricultural_space"
    level: "c1"
    code: "act_as_mediator_in_intercultural_encounters_managing_ambiguity_and_heading_off_misunderstandings"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.act_as_mediator_in_intercultural_encounters_managing_ambiguity_and_heading_off_misunderstandings.c1"
    description: "Can act as a mediator in intercultural encounters, contributing to a shared communication culture by managing ambiguity, offering advice and support, and heading off misunderstandings."

  - scale: "facilitating_pluricultural_space"
    level: "c1"
    code: "anticipate_misunderstandings_and_help_maintain_positive_interaction_by_interpreting_cultural_perspectives"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.anticipate_misunderstandings_and_help_maintain_positive_interaction_by_interpreting_cultural_perspectives.c1"
    description: "Can anticipate how people might misunderstand what has been said or written and can help maintain positive interaction by commenting on and interpreting different cultural perspectives on the issue concerned."

  - scale: "facilitating_pluricultural_space"
    level: "c2"
    code: "mediate_effectively_and_naturally_between_members_of_own_and_other_communities"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.mediate_effectively_and_naturally_between_members_of_own_and_other_communities.c2"
    description: "Can mediate effectively and naturally between members of their own and other communities, taking account of sociocultural and sociolinguistic differences."

  - scale: "facilitating_pluricultural_space"
    level: "c2"
    code: "guide_sensitive_discussion_effectively_identifying_nuances_and_undercurrents"
    id: "cefr.mediation.communication.descriptors.facilitating_pluricultural_space.guide_sensitive_discussion_effectively_identifying_nuances_and_undercurrents.c2"
    description: "Can guide a sensitive discussion effectively, identifying nuances and undercurrents."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "a1"
    code: "communicate_other_peoples_personal_details_and_very_simple_predictable_information"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_other_peoples_personal_details_and_very_simple_predictable_information.a1"
    description: "Can communicate (in Language B) other people’s personal details and very simple, predictable information (in Language A), provided other people help with formulation."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "a2"
    code: "communicate_overall_sense_of_what_is_said_in_everyday_situations_following_basic_cultural_conventions"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_overall_sense_of_what_is_said_in_everyday_situations_following_basic_cultural_conventions.a2"
    description: "Can communicate (in Language B) the overall sense of what is said (in Language A) in everyday situations, following basic cultural conventions and conveying the essential information, provided this is articulated clearly and they can ask for repetition and clarification."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "a2"
    code: "communicate_main_point_in_predictable_everyday_situations_conveying_back_and_forth_information"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_main_point_in_predictable_everyday_situations_conveying_back_and_forth_information.a2"
    description: "Can communicate (in Language B) the main point of what is said (in Language A) in predictable everyday situations, conveying back and forth information about personal wants and needs, provided other people help with formulation."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "b1"
    code: "communicate_main_sense_on_subjects_within_field_of_interest_conveying_factual_information_and_cultural_references"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_main_sense_on_subjects_within_field_of_interest_conveying_factual_information_and_cultural_references.b1"
    description: "Can communicate (in Language B) the main sense of what is said (in Language A) on subjects within their fields of interest, conveying straightforward factual information and explicit cultural references, provided they can prepare beforehand and that the interlocutors articulate clearly in everyday language."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "b1"
    code: "communicate_main_sense_on_subjects_of_personal_interest_following_politeness_conventions"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_main_sense_on_subjects_of_personal_interest_following_politeness_conventions.b1"
    description: "Can communicate (in Language B) the main sense of what is said (in Language A) on subjects of personal interest, while following important politeness conventions, provided the interlocutors articulate clearly and they can ask for clarification and pause to plan how to express things."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "b2"
    code: "mediate_conveying_detailed_information_drawing_attention_to_background_and_sociocultural_cues"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.mediate_conveying_detailed_information_drawing_attention_to_background_and_sociocultural_cues.b2"
    description: "Can mediate (between Language A and Language B) conveying detailed information, drawing the attention of both sides to background information and sociocultural cues, and posing clarification and follow-up questions or statements as necessary."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "b2"
    code: "communicate_sense_of_welcome_address_anecdote_or_presentation_in_field_interpreting_cultural_cues"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_sense_of_welcome_address_anecdote_or_presentation_in_field_interpreting_cultural_cues.b2"
    description: "Can communicate (in Language B) the sense of what is said in a welcome address, anecdote or presentation in their field (given in Language A), interpreting cultural cues appropriately and giving additional explanations when necessary, provided the presenter stops frequently in order to allow time for them to do so."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "b2"
    code: "communicate_sense_on_subjects_within_fields_of_interest_conveying_significance_of_statements_and_viewpoints"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_sense_on_subjects_within_fields_of_interest_conveying_significance_of_statements_and_viewpoints.b2"
    description: "Can communicate (in Language B) the sense of what is said (in Language A) on subjects within their fields of interest, conveying and when necessary explaining the significance of important statements and viewpoints, provided the interlocutors give clarifications if needed."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "c1"
    code: "communicate_fluently_sense_of_what_is_said_on_wide_range_of_subjects_explaining_cultural_references"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_fluently_sense_of_what_is_said_on_wide_range_of_subjects_explaining_cultural_references.c1"
    description: "Can communicate fluently (in Language B) the sense of what is said (in Language A) on a wide range of subjects of personal, academic and professional interest, conveying significant information clearly and concisely as well as explaining cultural references."

  - scale: "acting_as_an_intermediary_in_informal_situations"
    level: "c2"
    code: "communicate_in_clear_fluent_well_structured_way_the_sense_of_what_is_said_on_wide_range_of_topics"
    id: "cefr.mediation.communication.descriptors.acting_as_an_intermediary_in_informal_situations.communicate_in_clear_fluent_well_structured_way_the_sense_of_what_is_said_on_wide_range_of_topics.c2"
    description: "Can communicate in a clear, fluent, well-structured way (in Language B) the sense of what is said (in Language A) on a wide range of general and specialised topics, maintaining appropriate style and register, conveying finer shades of meaning and elaborating on sociocultural implications."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "a1"
    code: "recognise_when_people_disagree_or_someone_has_problem_and_use_simple_expressions_to_indicate_sympathy"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.recognise_when_people_disagree_or_someone_has_problem_and_use_simple_expressions_to_indicate_sympathy.a1"
    description: "Can recognise when people disagree or when someone has a problem and can use memorised, simple expressions (e.g. “I understand” or “Are you okay?”) to indicate sympathy."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "a2"
    code: "recognise_when_people_disagree_or_difficulties_occur_and_adapt_memorised_simple_phrases"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.recognise_when_people_disagree_or_difficulties_occur_and_adapt_memorised_simple_phrases.a2"
    description: "Can recognise when people disagree or when difficulties occur in interaction and adapt memorised, simple phrases to seek compromise and agreement."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b1"
    code: "ask_parties_in_disagreement_to_explain_point_of_view_and_respond_briefly"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.ask_parties_in_disagreement_to_explain_point_of_view_and_respond_briefly.b1"
    description: "Can ask parties in a disagreement to explain their point of view, and can respond briefly to their explanations, provided the topic is familiar to them and the parties express themselves clearly."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b1"
    code: "demonstrate_understanding_of_key_issues_and_make_simple_requests_for_confirmation_or_clarification"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.demonstrate_understanding_of_key_issues_and_make_simple_requests_for_confirmation_or_clarification.b1"
    description: "Can demonstrate their understanding of the key issues in a disagreement on a topic familiar to them and make simple requests for confirmation and/or clarification."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "elicit_possible_solutions_from_parties_formulating_open_ended_neutral_questions"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.elicit_possible_solutions_from_parties_formulating_open_ended_neutral_questions.b2"
    description: "Can elicit possible solutions from parties in disagreement in order to help them to reach consensus, formulating open-ended, neutral questions to minimise embarrassment or offence."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "help_parties_better_understand_each_other_by_restating_and_reframing_positions"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.help_parties_better_understand_each_other_by_restating_and_reframing_positions.b2"
    description: "Can help the parties in a disagreement better understand each other by restating and reframing their positions more clearly and by prioritising needs and goals."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "formulate_clear_and_accurate_summary_of_what_has_been_agreed_and_expected"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.formulate_clear_and_accurate_summary_of_what_has_been_agreed_and_expected.b2"
    description: "Can formulate a clear and accurate summary of what has been agreed and what is expected from each of the parties."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "identify_areas_of_common_ground_and_invite_each_side_to_highlight_possible_solutions"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.identify_areas_of_common_ground_and_invite_each_side_to_highlight_possible_solutions.b2"
    description: "Can, by asking questions, identify areas of common ground and invite each side to highlight possible solutions."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "outline_main_points_in_disagreement_and_explain_positions_of_parties_involved"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.outline_main_points_in_disagreement_and_explain_positions_of_parties_involved.b2"
    description: "Can outline the main points in a disagreement with reasonable precision and explain the positions of the parties involved."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "b2"
    code: "summarise_statements_made_by_two_sides_highlighting_agreement_and_obstacles"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.summarise_statements_made_by_two_sides_highlighting_agreement_and_obstacles.b2"
    description: "Can summarise the statements made by the two sides, highlighting areas of agreement and obstacles to agreement."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "c1"
    code: "demonstrate_sensitivity_to_different_viewpoints_using_repetition_and_paraphrase_for_detailed_understanding"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.demonstrate_sensitivity_to_different_viewpoints_using_repetition_and_paraphrase_for_detailed_understanding.c1"
    description: "Can demonstrate sensitivity to different viewpoints, using repetition and paraphrase to demonstrate a detailed understanding of each party’s requirements for an agreement."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "c1"
    code: "formulate_diplomatic_request_to_each_side_to_determine_what_is_central_and_negotiable"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.formulate_diplomatic_request_to_each_side_to_determine_what_is_central_and_negotiable.c1"
    description: "Can formulate a diplomatic request to each side in a disagreement to determine what is central to their position, and what they may be willing to give up under certain circumstances."

  - scale: "facilitating_communication_in_delicate_situations_and_disagreements"
    level: "c1"
    code: "use_persuasive_language_to_suggest_shift_towards_new_position"
    id: "cefr.mediation.communication.descriptors.facilitating_communication_in_delicate_situations_and_disagreements.use_persuasive_language_to_suggest_shift_towards_new_position.c1"
    description: "Can use persuasive language to suggest that parties in disagreement shift towards a new position."

