id: "cefr.mediation.text.descriptors"
version: "1"

catalog:
  - code: "relaying_specific_information_in_speech_or_sign"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign"
    description:
      - "Relaying specific information refers to the way some particular piece of information of immediate relevance is extracted from the target text and relayed to someone else."
      - "Here, the emphasis is on the specific content that is relevant, rather than the main ideas or lines of argument presented in a text."
      - "“Relaying specific information” is related to “Reading for orientation” (although the information concerned may have been given orally in a public announcement or series of instructions)."
      - "The user/learner scans the source text for the necessary information and then relays this to a recipient."
      - "Key concepts operationalised in the two scales include the following:"
      - "relaying information on times, places, prices, etc. from announcements or written/signed artefacts;"
      - "relaying sets of directions or instructions;"
      - "relaying specific, relevant information from informational texts like guides and brochures, from correspondence, or from longer, complex texts like articles, reports, etc."
      - "Progression up the scales is characterised as follows: at Pre-A1 and A1 the user/learner can relay simple information like times, places and numbers, whereas at A2 they can cope with the information in simple texts like instructions and announcements."
      - "By B1, they can select and relay specific, relevant information in straightforward oral announcements and in texts like leaflets, brochure entries and letters."
      - "By B2, they can reliably relay detailed information from formal correspondence or particular sections of long, complex texts."
      - "As with the scale for “Information exchange”, there are no descriptors for the C levels since such purely informational tasks do not require a C level of proficiency."
      - "In the two scales, Language A and Language B may be different languages, varieties of the same language, registers of the same variety, modalities of the same language or variety, or any combination of the above."
      - "However, they may also be identical. In the former case, users should specify the languages/varieties/modalities concerned; in the latter case, users should simply remove the parts in brackets."

