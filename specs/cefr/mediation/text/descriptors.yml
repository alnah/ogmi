  - code: "processing_text_in_speech_or_sign"
    id: "cefr.mediation.text.descriptors.processing_text_in_speech_or_sign"
    description:
      - "Processing text involves understanding the information and/or arguments included in the source text and then transferring these to another text, usually in a more condensed form, in a way that is appropriate to the context."
      - "In other words, the outcome represents a condensing and/or reformulating of the original information and arguments, focusing on the main points and ideas in the source text."
      - "The key word in the processing scales is “summarising”."
      - "Whereas in “Relaying specific information” the user/learner will almost certainly not read the whole text (unless the information required is well hidden!), in “Processing text” they have first to fully understand all the main points in the source text."
      - "“Processing text” is thus related to “Reading for information and argument” (sometimes called reading for detail, or careful reading), although the information concerned may have been given orally in a presentation or lecture."
      - "The user/learner may then choose to present the information to the recipient in a completely different order, depending on the goal of the communicative encounter."
      - "Key concepts operationalised in the two scales include the following:"
      - "summarising the main points in a source text;"
      - "collating such information and arguments from different sources;"
      - "recognising and clarifying to the recipient the intended audience, the purpose and viewpoint of the original."
      - "Progression up the scale is characterised as follows: in general, as one moves up the scale, the more cognitively and linguistically demanding the process described by the descriptor, the greater the variety of text types, the higher the degree of complexity of the texts and the abstraction of the topics, and the more sophisticated the vocabulary."
      - "There is no descriptor for A1. At A2, the learner may need to supplement their limited repertoire with gestures, drawing or expressions embedded from other languages."
      - "At lower levels, source texts are simpler and more factual, concerning everyday topics and topics of immediate interest."
      - "By B1, texts include TV programmes, conversations and well-structured texts on topics of interest."
      - "By B2, the user/learner can synthesise and report information from a number of sources, for example interviews, documentaries, films and complex texts in their fields of interest."
      - "By the C levels, they can summarise long, demanding professional or academic texts in well-structured language, inferring attitudes and implicit opinions, and explaining subtle distinctions in the presentation or facts and arguments."
      - "In the two scales, Language A and Language B may be different languages, varieties of the same language, registers of the same variety, modalities of the same language or variety, or any combination of the above."
      - "However, they may also be identical. In the former case, users should specify the languages/varieties/modalities concerned; in the latter case, users should simply remove the parts in brackets."

