    level: "b2"
    code: "explain_viewpoint_articulated_in_complex_text_supporting_inferences_with_reference_to_original"
    id: "cefr.mediation.text.descriptors.processing_text_in_writing.explain_viewpoint_articulated_in_complex_text_supporting_inferences_with_reference_to_original.b2"
    description: "Can explain in writing (in Language B) the viewpoint articulated in a complex text (in Language A), supporting inferences they make with reference to specific information in the original."

  - scale: "processing_text_in_writing"
    level: "c1"
    code: "summarise_complex_texts_interpreting_content_appropriately_and_checking_precise_meaning_of_unusual_technical_terms"
    id: "cefr.mediation.text.descriptors.processing_text_in_writing.summarise_complex_texts_interpreting_content_appropriately_and_checking_precise_meaning_of_unusual_technical_terms.c1"
    description: "Can summarise in writing (in Language B) long, complex texts (in Language A), interpreting the content appropriately, provided they can occasionally check the precise meaning of unusual, technical terms."

  - scale: "processing_text_in_writing"
    level: "c1"
    code: "summarise_long_complex_text_for_specific_audience_respecting_style_and_register_of_original"
    id: "cefr.mediation.text.descriptors.processing_text_in_writing.summarise_long_complex_text_for_specific_audience_respecting_style_and_register_of_original.c1"
    description: "Can summarise in writing a long and complex text (in Language A) (e.g. an article, a political analysis, a novel extract, an editorial, a review, report or extract from a scientific book) for a specific audience, respecting the style and register of the original."

  - scale: "processing_text_in_writing"
    level: "c2"
    code: "explain_facts_and_arguments_presented_in_text_drawing_attention_to_understatement_veiled_criticism_irony_and_sarcasm"
    id: "cefr.mediation.text.descriptors.processing_text_in_writing.explain_facts_and_arguments_presented_in_text_drawing_attention_to_understatement_veiled_criticism_irony_and_sarcasm.c2"
    description: "Can explain in writing (in Language B) what facts and arguments are presented in a text (in Language A), particularly when these are reported selectively or when the text is being reported, drawing attention to the use of understatement, veiled criticism, irony and sarcasm."

  - scale: "processing_text_in_writing"
    level: "c2"
    code: "summarise_information_from_different_sources_reconstructing_arguments_and_accounts_in_coherent_presentation"
    id: "cefr.mediation.text.descriptors.processing_text_in_writing.summarise_information_from_different_sources_reconstructing_arguments_and_accounts_in_coherent_presentation.c2"
    description: "Can summarise information from different sources, reconstructing arguments and accounts in a coherent presentation of the overall result."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "a1"
    code: "provide_simple_rough_oral_translation_of_simple_everyday_words_signs_and_phrases"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_simple_rough_oral_translation_of_simple_everyday_words_signs_and_phrases.a1"
    description: "Can provide a simple, rough oral translation (into Language B) of simple everyday words/signs and phrases (written in Language A) that are encountered on signs and notices, posters, programmes, leaflets, etc."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "a2"
    code: "provide_simple_rough_oral_translation_of_short_simple_everyday_texts_capturing_essential_point"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_simple_rough_oral_translation_of_short_simple_everyday_texts_capturing_essential_point.a2"
    description: "Can provide a simple, rough oral translation (into Language B) of short, simple everyday texts (e.g. notices) written in Language A), capturing the most essential point."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "a2"
    code: "provide_simple_rough_oral_translation_of_routine_information_in_simple_sentences"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_simple_rough_oral_translation_of_routine_information_in_simple_sentences.a2"
    description: "Can provide a simple, rough oral translation (into Language B) of routine information on familiar everyday subjects that is written in simple sentences (in Language A) (e.g. personal news, short narratives, directions, notices or instructions)."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "b1"
    code: "provide_oral_translation_of_texts_containing_information_and_arguments_within_fields"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_oral_translation_of_texts_containing_information_and_arguments_within_fields.b1"
    description: "Can provide oral translation (into Language B) of texts (written in Language A) containing information and arguments on subjects within their fields of professional, academic and personal interest, provided they are written in uncomplicated standard language."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "b1"
    code: "provide_approximate_oral_translation_of_clear_well_structured_informational_texts_on_familiar_subjects"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_approximate_oral_translation_of_clear_well_structured_informational_texts_on_familiar_subjects.b1"
    description: "Can provide an approximate oral translation (into Language B) of clear, well-structured informational texts (written in Language A) on subjects that are familiar or of personal interest, although lexical limitations cause difficulty with formulation at times."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "b2"
    code: "provide_oral_translation_of_complex_texts_within_professional_academic_and_personal_interest"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_oral_translation_of_complex_texts_within_professional_academic_and_personal_interest.b2"
    description: "Can provide oral translation (into Language B) of complex texts (written in Language A) containing information and arguments on subjects within their fields of professional, academic and personal interest."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "c1"
    code: "provide_fluent_oral_translation_of_complex_texts_capturing_most_nuances"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_fluent_oral_translation_of_complex_texts_capturing_most_nuances.c1"
    description: "Can provide fluent oral translation (into Language B) of complex texts written in Language A) on a wide range of general and specialised topics, capturing most nuances."

  - scale: "translating_a_written_text_in_speech_or_sign"
    level: "c2"
    code: "provide_fluent_oral_translation_of_abstract_texts_conveying_evaluative_aspects_and_arguments"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign.provide_fluent_oral_translation_of_abstract_texts_conveying_evaluative_aspects_and_arguments.c2"
    description: "Can provide fluent oral translation (into Language B) of abstract texts written in Language A) on a wide range of subjects of personal, academic and professional interest, successfully conveying evaluative aspects and arguments, including the nuances and implications associated with them."

  - scale: "translating_a_written_text_in_writing"
    level: "a1"
    code: "translate_simple_words_and_phrases_with_help_of_dictionary"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.translate_simple_words_and_phrases_with_help_of_dictionary.a1"
    description: "Can, with the help of a dictionary, translate simple words/signs and phrases (from Language A into Language B), but may not always select the appropriate meaning."

  - scale: "translating_a_written_text_in_writing"
    level: "a2"
    code: "provide_approximate_translation_of_very_short_everyday_texts_containing_highest_frequency_vocabulary"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.provide_approximate_translation_of_very_short_everyday_texts_containing_highest_frequency_vocabulary.a2"
    description: "Can use simple language to provide an approximate translation (from Language A into Language B) of very short texts on familiar and everyday themes that contain the highest frequency vocabulary; despite errors, the translation remains comprehensible."

  - scale: "translating_a_written_text_in_writing"
    level: "b1"
    code: "produce_approximate_translations_of_straightforward_factual_texts_in_uncomplicated_standard_language"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.produce_approximate_translations_of_straightforward_factual_texts_in_uncomplicated_standard_language.b1"
    description: "Can produce approximate translations (from Language A into Language B) of straightforward, factual texts written in uncomplicated, standard language, closely following the structure of the original; though linguistic errors may occur, the translation remains comprehensible."

  - scale: "translating_a_written_text_in_writing"
    level: "b1"
    code: "produce_approximate_translations_of_factual_texts_with_clear_structure_on_familiar_subjects"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.produce_approximate_translations_of_factual_texts_with_clear_structure_on_familiar_subjects.b1"
    description: "Can produce approximate translations (from Language A into Language B) of informational texts with a clear structure on familiar subjects, in standard language; despite errors, the translation remains comprehensible."

  - scale: "translating_a_written_text_in_writing"
    level: "b2"
    code: "produce_translations_closely_following_sentence_and_paragraph_structure_of_original"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.produce_translations_closely_following_sentence_and_paragraph_structure_of_original.b2"
    description: "Can produce translations (into Language B) that closely follow the sentence and paragraph structure of the original text (in Language A), conveying the main points of the source text accurately, though the translation may read awkwardly."

  - scale: "translating_a_written_text_in_writing"
    level: "b2"
    code: "produce_approximate_translations_of_texts_containing_information_and_arguments_within_fields"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.produce_approximate_translations_of_texts_containing_information_and_arguments_within_fields.b2"
    description: "Can produce approximate translations (from Language A into Language B) of texts containing information and arguments on subjects within their fields of professional, academic and personal interest, provided they are written in uncomplicated, standard language; closely following the structure of the original, although linguistic errors may occur, the translation remains comprehensible."

  - scale: "translating_a_written_text_in_writing"
    level: "b2"
    code: "produce_clearly_organised_translations_using_conventions_of_target_language"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.produce_clearly_organised_translations_using_conventions_of_target_language.b2"
    description: "Can produce clearly organised translations (from Language A into Language B) that reflect normal language usage and conventions of the target language, but may be over-influenced by the order, paragraphing, punctuation and particular formulations of the original."

  - scale: "translating_a_written_text_in_writing"
    level: "c1"
    code: "translate_abstract_texts_successfully_conveying_implications_associated_with_arguments"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.translate_abstract_texts_successfully_conveying_implications_associated_with_arguments.c1"
    description: "Can translate (into Language B) abstract texts on social, academic and professional subjects in their field (written in Language A), successfully conveying evaluative aspects and arguments, including many of the implications associated with them, though some expression may be over-influenced by the original."

  - scale: "translating_a_written_text_in_writing"
    level: "c2"
    code: "translate_technical_material_outside_specialisation_with_subject_matter_accuracy_checked"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing.translate_technical_material_outside_specialisation_with_subject_matter_accuracy_checked.c2"
    description: "Can translate (into Language B) technical material outside their field of specialisation (written in Language A), provided subject matter accuracy is checked by a specialist in the field concerned."

  - scale: "note_taking"
    level: "a2"
    code: "take_simple_notes_at_presentation_or_demonstration_on_familiar_predictable_subject"
    id: "cefr.mediation.text.descriptors.note_taking.take_simple_notes_at_presentation_or_demonstration_on_familiar_predictable_subject.a2"
    description: "Can take simple notes at a presentation/demonstration where the subject matter is familiar and predictable and the presenter allows for clarification and note-taking."

  - scale: "note_taking"
    level: "b1"
    code: "take_notes_precise_enough_for_own_use_during_clear_well_structured_lecture"
    id: "cefr.mediation.text.descriptors.note_taking.take_notes_precise_enough_for_own_use_during_clear_well_structured_lecture.b1"
    description: "Can take notes during a lecture which are precise enough for their own use at a later date, provided the topic is within their field of interest and the lecture is clear and well structured."

  - scale: "note_taking"
    level: "b1"
    code: "take_notes_as_list_of_key_points_during_straightforward_lecture"
    id: "cefr.mediation.text.descriptors.note_taking.take_notes_as_list_of_key_points_during_straightforward_lecture.b1"
    description: "Can take notes as a list of key points during a straightforward lecture, provided the topic is familiar, and the lecture is both formulated in simple language and articulated clearly."

  - scale: "note_taking"
    level: "b1"
    code: "note_down_routine_instructions_in_meeting_on_familiar_subject"
    id: "cefr.mediation.text.descriptors.note_taking.note_down_routine_instructions_in_meeting_on_familiar_subject.b1"
    description: "Can note down routine instructions in a meeting on a familiar subject, provided these are formulated in simple language and they are given sufficient time to do so."

  - scale: "note_taking"
    level: "b2"
    code: "understand_clearly_structured_lecture_on_familiar_subject_and_take_notes_on_points_striking_as_important"
    id: "cefr.mediation.text.descriptors.note_taking.understand_clearly_structured_lecture_on_familiar_subject_and_take_notes_on_points_striking_as_important.b2"
    description: "Can understand a clearly structured lecture on a familiar subject, and can take notes on points which strike them as important, even though they tend to concentrate on the actual formulation and therefore to miss some information."

  - scale: "note_taking"
    level: "b2"
    code: "take_accurate_notes_in_meetings_and_seminars_on_most_matters_within_field"
    id: "cefr.mediation.text.descriptors.note_taking.take_accurate_notes_in_meetings_and_seminars_on_most_matters_within_field.b2"
    description: "Can take accurate notes in meetings and seminars on most matters likely to arise within their field of interest."

  - scale: "note_taking"
    level: "c1"
    code: "take_detailed_notes_during_lecture_recording_information_accurately_for_other_people"
    id: "cefr.mediation.text.descriptors.note_taking.take_detailed_notes_during_lecture_recording_information_accurately_for_other_people.c1"
    description: "Can take detailed notes during a lecture on topics in their field of interest, recording the information so accurately and so closely to the original that the notes could also be useful to other people."

  - scale: "note_taking"
    level: "c1"
    code: "make_decisions_about_what_to_note_and_what_to_omit_as_lecture_or_seminar_proceeds"
    id: "cefr.mediation.text.descriptors.note_taking.make_decisions_about_what_to_note_and_what_to_omit_as_lecture_or_seminar_proceeds.c1"
    description: "Can make decisions about what to note down and what to omit as the lecture or seminar proceeds, even on unfamiliar matters."

  - scale: "note_taking"
    level: "c1"
    code: "select_relevant_detailed_information_and_arguments_on_complex_abstract_topics_from_multiple_oral_sources"
    id: "cefr.mediation.text.descriptors.note_taking.select_relevant_detailed_information_and_arguments_on_complex_abstract_topics_from_multiple_oral_sources.c1"
    description: "Can select relevant, detailed information and arguments on complex, abstract topics from multiple oral sources (e.g. lectures, podcasts, formal discussions and debates, interviews), provided the delivery is at normal speed."

  - scale: "note_taking"
    level: "c2"
    code: "create_reliable_notes_or_minutes_for_absent_people_while_continuing_to_participate_in_meeting_or_seminar"
    id: "cefr.mediation.text.descriptors.note_taking.create_reliable_notes_or_minutes_for_absent_people_while_continuing_to_participate_in_meeting_or_seminar.c2"
    description: "Can, while continuing to participate in a meeting or seminar, create reliable notes (or minutes) for people who are not present, even when the subject matter is complex and/or unfamiliar."

  - scale: "note_taking"
    level: "c2"
    code: "be_aware_of_implications_and_allusions_and_take_notes_on_them_as_well_as_actual_words_used"
    id: "cefr.mediation.text.descriptors.note_taking.be_aware_of_implications_and_allusions_and_take_notes_on_them_as_well_as_actual_words_used.c2"
    description: "Is aware of the implications and allusions of what is said and can take notes on them as well as on the actual words used."

  - scale: "note_taking"
    level: "c2"
    code: "take_notes_selectively_paraphrasing_and_abbreviating_successfully_to_capture_abstract_concepts_and_relations"
    id: "cefr.mediation.text.descriptors.note_taking.take_notes_selectively_paraphrasing_and_abbreviating_successfully_to_capture_abstract_concepts_and_relations.c2"
    description: "Can take notes selectively, paraphrasing and abbreviating successfully to capture abstract concepts and relationships between ideas."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "a1"
    code: "use_simple_words_to_state_how_work_made_them_feel"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.use_simple_words_to_state_how_work_made_them_feel.a1"
    description: "Can use simple words/signs to state how a work made them feel."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "a2"
    code: "express_reactions_to_work_reporting_feelings_and_ideas_in_simple_language"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.express_reactions_to_work_reporting_feelings_and_ideas_in_simple_language.a2"
    description: "Can express their reactions to a work, reporting their feelings and ideas in simple language."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "a2"
    code: "state_in_simple_language_which_aspects_of_work_interested_them"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.state_in_simple_language_which_aspects_of_work_interested_them.a2"
    description: "Can state in simple language which aspects of a work especially interested them."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "a2"
    code: "state_whether_they_liked_work_or_not_and_explain_why_in_simple_language"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.state_whether_they_liked_work_or_not_and_explain_why_in_simple_language.a2"
    description: "Can state whether they liked a work or not and explain why in simple language."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "explain_why_certain_parts_or_aspects_of_work_especially_interested_them"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.explain_why_certain_parts_or_aspects_of_work_especially_interested_them.b1"
    description: "Can explain why certain parts or aspects of a work especially interested them."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "explain_in_some_detail_which_character_they_most_identified_with_and_why"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.explain_in_some_detail_which_character_they_most_identified_with_and_why.b1"
    description: "Can explain in some detail which character they most identified with and why."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "relate_events_in_story_film_or_play_to_similar_events_they_have_experienced_or_heard_about"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.relate_events_in_story_film_or_play_to_similar_events_they_have_experienced_or_heard_about.b1"
    description: "Can relate events in a story, film or play to similar events they have experienced or heard about."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "relate_emotions_experienced_by_character_to_emotions_they_have_experienced"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.relate_emotions_experienced_by_character_to_emotions_they_have_experienced.b1"
    description: "Can relate the emotions experienced by a character to emotions they have experienced."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "describe_emotions_experienced_at_certain_point_in_story_and_explain_why"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.describe_emotions_experienced_at_certain_point_in_story_and_explain_why.b1"
    description: "Can describe the emotions they experienced at a certain point in a story, e.g. the point(s) in a story when they became anxious for a character, and explain why."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "explain_briefly_feelings_and_opinions_work_provoked_in_them"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.explain_briefly_feelings_and_opinions_work_provoked_in_them.b1"
    description: "Can explain briefly the feelings and opinions that a work provoked in them."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "describe_personality_of_character"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.describe_personality_of_character.b1"
    description: "Can describe the personality of a character."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b1"
    code: "describe_characters_feelings_and_explain_reasons_for_them"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.describe_characters_feelings_and_explain_reasons_for_them.b1"
    description: "Can describe a character’s feelings and explain the reasons for them."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b2"
    code: "give_clear_presentation_of_reactions_to_work_developing_ideas_and_supporting_with_examples_and_arguments"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.give_clear_presentation_of_reactions_to_work_developing_ideas_and_supporting_with_examples_and_arguments.b2"
    description: "Can give a clear presentation of their reactions to a work, developing their ideas and supporting them with examples and arguments."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b2"
    code: "give_personal_interpretation_of_development_of_plot_characters_and_themes"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.give_personal_interpretation_of_development_of_plot_characters_and_themes.b2"
    description: "Can give a personal interpretation of the development of a plot, the characters and themes in a story, novel, film or play."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b2"
    code: "describe_emotional_response_to_work_and_elaborate_how_it_evoked_this_response"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.describe_emotional_response_to_work_and_elaborate_how_it_evoked_this_response.b2"
    description: "Can describe their emotional response to a work and elaborate on the way in which it has evoked this response."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "b2"
    code: "express_in_some_detail_reactions_to_form_of_expression_style_and_content_explaining_appreciation"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.express_in_some_detail_reactions_to_form_of_expression_style_and_content_explaining_appreciation.b2"
    description: "Can express in some detail their reactions to the form of expression, style and content of a work, explaining what they appreciated and why."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "c1"
    code: "describe_in_detail_personal_interpretation_of_work_outlining_reactions_and_explaining_significance"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.describe_in_detail_personal_interpretation_of_work_outlining_reactions_and_explaining_significance.c1"
    description: "Can describe in detail a personal interpretation of a work, outlining their reactions to certain features and explaining their significance."

  - scale: "expressing_a_personal_response_to_creative_texts"
    level: "c1"
    code: "outline_personal_interpretation_of_character_psychological_emotional_state_motives_and_consequences"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts.outline_personal_interpretation_of_character_psychological_emotional_state_motives_and_consequences.c1"
    description: "Can outline a personal interpretation of a character in a work: their psychological/emotional state, the motives for their actions and the consequences of these actions."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "a2"
    code: "identify_and_briefly_describe_key_themes_and_characters_in_short_simple_narratives"
