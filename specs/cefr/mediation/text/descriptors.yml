  - code: "explaining_data_in_speech_or_sign"
    id: "cefr.mediation.text.descriptors.explaining_data_in_speech_or_sign"
    description:
      - "This scale refers to the transformation into a verbal text of information found in figures (graphs, diagrams, etc.)."
      - "The user/learner might do this as part of a PowerPoint presentation, or when explaining to a friend or colleague the key information given in graphics accompanying an article, a weather forecast or financial information."
      - "Key concepts operationalised in the two scales include the following:"
      - "describing graphic material on familiar topics (e.g. flow charts, weather charts);"
      - "presenting trends in graphs;"
      - "commenting on bar charts;"
      - "selecting and interpreting the salient, relevant points of empirical data presented graphically."
      - "Progression up the scales is characterised as follows: the higher the level, the more complex the visual information is, from everyday visuals (e.g. weather charts) to complex visuals accompanying academic and highly professional texts."
      - "Secondly, the higher the level, the more complex the communicative acts involved (interpreting source data, describing the salient points, explaining in detail)."
      - "There are no descriptors at A1 and A2. At A2+ the user/learner can describe simple visuals on familiar topics, while at B1 they can describe overall trends and detailed information in diagrams in their fields of interest."
      - "At B2 the focus is on the reliable interpretation of complex data, while at C2 the user/learner can interpret and describe various forms of empirical data from conceptually complex research."
      - "In the two scales, Language A and Language B may be different languages, varieties of the same language, registers of the same variety, modalities of the same language or variety, or any combination of the above."
      - "However, they may also be identical. In the former case, users should specify the languages/varieties/modalities concerned; in the latter case, users should simply remove the parts in brackets."

