  - code: "translating_a_written_text_in_speech_or_sign"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_speech_or_sign"
    description:
      - "Translating a written text in speech or sign is a largely informal activity that is by no means uncommon in everyday personal and professional life."
      - "It is the process of spontaneously giving an oral translation of a written text, often a notice, letter, e-mail or other communication."
      - "Key concepts operationalised in the scale include the following:"
      - "providing a rough, approximate translation;"
      - "capturing the essential information;"
      - "capturing nuances (higher levels)."
      - "Progression up the scale is characterised as follows: the scale moves from rough translation of routine everyday information in simple texts at the lower levels to translation with increasing fluency and accuracy of texts that become increasingly more complex."
      - "The distinction between levels A1 to B1 is almost solely the type of texts involved."
      - "By B2, the user/learner can provide oral translation of complex texts containing information and arguments on subjects within their fields of professional, academic and personal interest, and at the C levels they can fluently translate complex texts on a wide range of general and specialised subjects, capturing nuances and implications."

  - code: "translating_a_written_text_in_writing"
    id: "cefr.mediation.text.descriptors.translating_a_written_text_in_writing"
    description:
      - "“Translating a written text in writing” is by its very nature a more formal process than providing an impromptu oral translation."
      - "However, this CEFR descriptor scale is not intended to relate to the activities of professional translators or to their training."
      - "Indeed, translating competences are not addressed in the scale."
      - "Furthermore, professional translators, like professional interpreters, develop their competences through their career."
      - "The language level necessary for a translation also depends on the type of text. Literary translation, for example, requires a level at or above C2."
      - "As mentioned when discussing CEFR levels in the section on key aspects of the CEFR, C2 is not the highest definable level of second/foreign language proficiency."
      - "It is in fact the middle level of a scale of five levels for literary translation produced in the PETRA project."
      - "On the other hand, plurilingual user/learners with a more modest level of proficiency sometimes find themselves in a situation in which they are asked to provide a written translation of a text in their professional or personal context."
      - "Here they are being asked to reproduce the substantive message of the source text, rather than necessarily interpret the style and tone of the original into an appropriate style and tone in the translation, as a professional translator would be expected to do."
      - "In using the descriptors in this scale it is particularly important to specify the languages involved because the scale deliberately does not address the issue of translating into and from the first language."
      - "This is partly because of the fact that, for increasing numbers of plurilingual persons, “first language” and “best language” are not always synonymous."
      - "What the scale provides is a functional description of the language ability necessary to reproduce a source text in another language."
      - "Key concepts operationalised in the scale include the following:"
      - "comprehensibility of the translation;"
      - "the extent to which the original formulations and structure (over-)influence the translation, as opposed to the text following relevant conventions in the target language;"
      - "capturing nuances in the original."
      - "Progression up the scale is shown in a very similar way to the previous scale. At the lower levels, translating involves approximate translations of short texts containing information that is straightforward and familiar, whereas at the higher levels, the source texts become increasingly more complex and the translation is more and more accurate and reflective of the original."
      - "In the two scales, Language A and Language B may be different languages, varieties of the same language, registers of the same variety, modalities of the same language or variety, or any combination of the above."
      - "However, they may also be identical. In the former case, users should specify the languages/varieties/modalities concerned; in the latter case, users should simply remove the parts in brackets."

  - code: "note_taking"
    id: "cefr.mediation.text.descriptors.note_taking"
    description:
      - "This scale concerns the ability to grasp key information and write coherent notes, which is valuable in academic and professional life."
      - "Key concepts operationalised in the scale include the following:"
      - "type of source text: from demonstrations and instructions, through straightforward lectures and meetings on subjects in their field, to meetings and seminars on unfamiliar, complex subjects;"
      - "consideration on the part of the speaker/signer (lower levels): from a slow and clear delivery, plus pauses to take notes, through clearly articulated, well-structured lectures, to multiple sources;"
      - "type of note-taking: from taking notes as a series of points (lower levels), through notes on what seems to them to be important, to appropriate selection of what to note and what to omit;"
      - "accuracy of the notes (higher levels): from notes precise enough for own use (B1), through accurate notes on meetings in their field (B2), to accurate capture of abstract concepts, relationships between ideas, implications and allusions."

  - code: "expressing_a_personal_response_to_creative_texts"
    id: "cefr.mediation.text.descriptors.expressing_a_personal_response_to_creative_texts"
    description:
      - "This first scale reflects the approach taken in school sectors and in adult reading circles."
      - "It focuses on expression of the effect that a work has on the user/learner as an individual."
      - "Key concepts operationalised in the scale include the following:"
      - "explaining what they liked, what interested them about the work;"
      - "describing characters, saying which they identified with;"
      - "relating aspects of the work to their own experience;"
      - "relating feelings and emotions;"
      - "personal interpretation of the work as a whole or of aspects of it."
      - "Progression up the scale is characterised as follows: at the lower levels the user/learner can say whether they liked the work, say how it made them feel, discuss characters and relate aspects of the work to their own experience, with increased detail at B1."
      - "At B2 they can give more elaborate explanations, comment on the form of expression and style and give their interpretation of the development of a plot, the characters and the themes in a story, novel, film or play."
      - "At the C levels, they can give broader and deeper interpretations, supporting them with details and examples."

  - code: "analysis_and_criticism_of_creative_texts"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts"
    description:
      - "This scale represents an approach more common at an upper secondary and university level."
      - "It concerns more formal, intellectual reactions."
      - "Aspects analysed include the significance of events in a novel, the treatment of the same themes in different works and other links between them, the extent to which a work follows conventions, and more global evaluation of the work as a whole."
      - "Key concepts operationalised in the scale include:"
      - "comparing different works;"
      - "giving a reasoned opinion of a work;"
      - "critically evaluating features of a work, including the effectiveness of its techniques."
      - "Progression up the scale is characterised as follows: there are no descriptors for A1 and A2. Until B2, the focus is on description rather than evaluation."
      - "At B2, the user/learner can analyse similarities and differences between works, giving a reasoned opinion and referring to the views of others."
      - "At C1, analysis becomes more subtle, concerned with the way the work engages the audience, the extent to which it is conventional, or whether it employs irony."
      - "At C2, the user/learner can recognise finer linguistic and stylistic subtleties, unpack connotations and give more critical appraisals of the way in which structure, language and rhetorical devices are exploited in a work of literature for a particular purpose."

entries:
  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "pre_a1"
    code: "relay_simple_instructions_about_places_and_times_given_very_slowly_and_clearly"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_simple_instructions_about_places_and_times_given_very_slowly_and_clearly.pre_a1"
    description: "Can relay (in Language B) simple instructions about places and times (given in Language A), provided these are repeated very slowly and clearly."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "pre_a1"
    code: "relay_very_basic_information_from_short_simple_illustrated_texts"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_very_basic_information_from_short_simple_illustrated_texts.pre_a1"
    description: "Can relay (in Language B) very basic information (e.g. numbers and prices) from short, simple, illustrated texts (in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "a1"
    code: "relay_simple_predictable_information_about_times_and_places_given_in_short_simple_statements"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_simple_predictable_information_about_times_and_places_given_in_short_simple_statements.a1"
    description: "Can relay (in Language B) simple, predictable information about times and places given in short, simple statements (delivered in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "a2"
    code: "relay_main_point_made_in_short_clear_simple_messages_instructions_and_announcements"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_main_point_made_in_short_clear_simple_messages_instructions_and_announcements.a2"
    description: "Can relay (in Language B) the main point made in short, clear, simple messages, instructions and announcements, provided these are expressed slowly and clearly in simple language (in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "a2"
    code: "relay_simple_way_series_of_short_simple_instructions_provided_clearly_and_slowly"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_simple_way_series_of_short_simple_instructions_provided_clearly_and_slowly.a2"
    description: "Can relay (in Language B) in a simple way a series of short, simple instructions, provided the original (in Language A) is clearly and slowly articulated."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b1"
    code: "relay_content_of_public_announcements_and_messages_on_familiar_subjects"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_content_of_public_announcements_and_messages_on_familiar_subjects.b1"
    description: "Can relay (in Language B) the content of public announcements and messages clearly articulated at normal speed (in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b1"
    code: "relay_content_of_clear_instructions_or_directions"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_content_of_clear_instructions_or_directions.b1"
    description: "Can relay (in Language B) the content of clear instructions or directions, provided these are clearly articulated (in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b1"
    code: "relay_specific_information_given_in_straightforward_informational_texts"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_specific_information_given_in_straightforward_informational_texts.b1"
    description: "Can relay (in Language B) specific information given in straightforward informational texts (e.g. leaflets, brochure entries, notices and letters or e-mails) in Language A."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b2"
    code: "explain_relevance_of_specific_information_found_in_particular_section_of_long_complex_text"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.explain_relevance_of_specific_information_found_in_particular_section_of_long_complex_text.b2"
    description: "Can explain (in Language B) the relevance of specific information found in a particular section of a long, complex text (in Language A)."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b2"
    code: "relay_presentations_or_articles_particularly_relevant_for_specific_purpose"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_presentations_or_articles_particularly_relevant_for_specific_purpose.b2"
    description: "Can relay (in Language B) which presentations given (in Language A) at a conference, or which articles in a book (in Language A) are particularly relevant for a specific purpose."

  - scale: "relaying_specific_information_in_speech_or_sign"
    level: "b2"
    code: "relay_main_points_contained_in_formal_correspondence_and_reports_on_general_or_interest_subjects"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_speech_or_sign.relay_main_points_contained_in_formal_correspondence_and_reports_on_general_or_interest_subjects.b2"
    description: "Can relay (in Language B) the main point(s) contained in formal correspondence and/or reports (in Language A) on general subjects and on subjects related to their fields of interest."

  - scale: "relaying_specific_information_in_writing"
    level: "pre_a1"
    code: "list_names_numbers_prices_and_very_simple_information_from_immediate_texts"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.list_names_numbers_prices_and_very_simple_information_from_immediate_texts.pre_a1"
    description: "Can list (in Language B) names, numbers, prices and very simple information from texts (in Language A) that are of immediate interest, that are composed in very simple language and contain illustrations."

  - scale: "relaying_specific_information_in_writing"
    level: "a1"
    code: "list_names_numbers_prices_and_very_simple_information_from_slow_clear_texts"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.list_names_numbers_prices_and_very_simple_information_from_slow_clear_texts.a1"
    description: "Can list (in Language B) names, numbers, prices and very simple information of interest from texts (in Language A), provided the articulation is very slow and clear, with repetition."

  - scale: "relaying_specific_information_in_writing"
    level: "a2"
    code: "list_main_points_of_short_clear_simple_messages_and_announcements"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.list_main_points_of_short_clear_simple_messages_and_announcements.a2"
    description: "Can list (in Language B) the main points of short, clear, simple messages and announcements (given in Language A), provided they are clearly and slowly articulated."

  - scale: "relaying_specific_information_in_writing"
    level: "a2"
    code: "list_specific_information_contained_in_simple_texts_on_immediate_interest"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.list_specific_information_contained_in_simple_texts_on_immediate_interest.a2"
    description: "Can list (in Language B) specific information contained in simple texts (in Language A) on everyday subjects of immediate interest or need."

  - scale: "relaying_specific_information_in_writing"
    level: "b1"
    code: "relay_specific_information_contained_in_short_simple_informational_texts_on_concrete_familiar_subjects"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.relay_specific_information_contained_in_short_simple_informational_texts_on_concrete_familiar_subjects.b1"
    description: "Can relay in writing (in Language B) specific information contained in short simple informational texts (in Language A), provided the texts concern concrete, familiar subjects and are composed in simple everyday language."

  - scale: "relaying_specific_information_in_writing"
    level: "b1"
    code: "relay_specific_relevant_information_in_straightforward_informational_texts"
    id: "cefr.mediation.text.descriptors.relaying_specific_information_in_writing.relay_specific_relevant_information_in_straightforward_informational_texts.b1"
    description: "Can relay in writing (in Language B) specific, relevant information contained in straightforward informational texts (in Language A) on familiar subjects."

