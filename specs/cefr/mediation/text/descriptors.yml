    description: "Can identify and briefly describe, in basic formulaic language, the key themes and characters in short, simple narratives involving familiar situations that contain only high frequency everyday language."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b1"
    code: "point_out_most_important_episodes_and_events_and_explain_significance_and_connections"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.point_out_most_important_episodes_and_events_and_explain_significance_and_connections.b1"
    description: "Can point out the most important episodes and events in a clearly structured narrative in everyday language and explain the significance of events and the connections between them."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b1"
    code: "describe_key_themes_and_characters_in_short_narratives_involving_familiar_situations"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.describe_key_themes_and_characters_in_short_narratives_involving_familiar_situations.b1"
    description: "Can describe the key themes and characters in short narratives involving familiar situations that contain only high frequency everyday language."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b2"
    code: "compare_two_works_exploring_similarities_contrasts_and_relevance_of_connections"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.compare_two_works_exploring_similarities_contrasts_and_relevance_of_connections.b2"
    description: "Can compare two works, considering themes, characters and scenes, exploring similarities and contrasts and explaining the relevance of the connections between them."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b2"
    code: "give_reasoned_opinion_of_work_showing_awareness_of_thematic_structural_and_formal_features"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.give_reasoned_opinion_of_work_showing_awareness_of_thematic_structural_and_formal_features.b2"
    description: "Can give a reasoned opinion of a work, showing awareness of the thematic, structural and formal features and referring to the opinions and arguments of others."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b2"
    code: "evaluate_way_work_encourages_identification_with_characters_giving_examples"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.evaluate_way_work_encourages_identification_with_characters_giving_examples.b2"
    description: "Can evaluate the way the work encourages identification with characters, giving examples."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "b2"
    code: "describe_way_different_works_differ_in_treatment_of_same_theme"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.describe_way_different_works_differ_in_treatment_of_same_theme.b2"
    description: "Can describe the way in which different works differ in their treatment of the same theme."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c1"
    code: "critically_appraise_wide_variety_of_texts_including_literary_works_of_different_periods_and_genres"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.critically_appraise_wide_variety_of_texts_including_literary_works_of_different_periods_and_genres.c1"
    description: "Can critically appraise a wide variety of texts including literary works of different periods and genres."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c1"
    code: "evaluate_extent_to_which_work_follows_conventions_of_genre"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.evaluate_extent_to_which_work_follows_conventions_of_genre.c1"
    description: "Can evaluate the extent to which a work follows the conventions of its genre."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c1"
    code: "describe_and_comment_on_ways_in_which_work_engages_audience"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.describe_and_comment_on_ways_in_which_work_engages_audience.c1"
    description: "Can describe and comment on ways in which the work engages the audience (e.g. by building up and subverting expectations)."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c2"
    code: "give_critical_appraisal_of_work_of_different_periods_and_genres_appreciating_subtle_distinctions"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.give_critical_appraisal_of_work_of_different_periods_and_genres_appreciating_subtle_distinctions.c2"
    description: "Can give a critical appraisal of work of different periods and genres (e.g. novels, poems and plays), appreciating subtle distinctions of style and implicit as well as explicit meaning."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c2"
    code: "recognise_finer_subtleties_of_nuanced_language_rhetorical_effect_and_stylistic_language_use"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.recognise_finer_subtleties_of_nuanced_language_rhetorical_effect_and_stylistic_language_use.c2"
    description: "Can recognise the finer subtleties of nuanced language, rhetorical effect and stylistic language use (e.g. metaphors, abnormal syntax, ambiguity), interpreting and “unpacking” meanings and connotations."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c2"
    code: "critically_evaluate_way_structure_language_and_rhetorical_devices_are_exploited_for_particular_purpose"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.critically_evaluate_way_structure_language_and_rhetorical_devices_are_exploited_for_particular_purpose.c2"
    description: "Can critically evaluate the way in which structure, language and rhetorical devices are exploited in a work for a particular purpose and give a reasoned argument concerning their appropriateness and effectiveness."

  - scale: "analysis_and_criticism_of_creative_texts"
    level: "c2"
    code: "give_critical_appreciation_of_deliberate_breaches_of_linguistic_conventions"
    id: "cefr.mediation.text.descriptors.analysis_and_criticism_of_creative_texts.give_critical_appreciation_of_deliberate_breaches_of_linguistic_conventions.c2"
    description: "Can give a critical appreciation of deliberate breaches of linguistic conventions in a piece of writing."
