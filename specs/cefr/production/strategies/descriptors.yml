id: "cefr.production.strategies.descriptors"
version: "1"

catalog:
  - code: "planning"
    id: "cefr.production.strategies.descriptors.planning"
    description:
      - "This scale is concerned with mental preparation before speaking, signing or writing."
      - "It can involve thinking consciously about what to say and how to formulate it; it can also involve rehearsal or the preparation of drafts."
      - "Key concepts operationalised in the scale include the following:"
      - "working out how to express the point that needs to be transmitted, and perhaps rehearsing expression;"
      - "considering how recipients may react to what is said."

  - code: "compensating"
    id: "cefr.production.strategies.descriptors.compensating"
    description:
      - "Compensating is a strategy for maintaining communication when one cannot think of the appropriate expression."
      - "Key concepts operationalised in the scale include the following:"
      - "accompanying gestures to support language;"
      - "deliberately using a “wrong” word/sign and qualifying it;"
      - "defining the missing concept;"
      - "paraphrase (circumlocution) and the extent to which such paraphrasing is evident."

  - code: "monitoring_and_repair"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair"
    description:
      - "This scale covers both (a) the spontaneous realisation that one has made a slip or run into a problem and (b) the more conscious and perhaps planned process of going back over what has been said and checking it for correctness and appropriateness."
      - "Key concepts operationalised in the scale include the following:"
      - "changing tack and using a different tactic – very obviously at A levels, very smoothly at C levels;"
      - "self-correcting slips, errors and “favourite mistakes”;"
      - "the extent to which a communication problem must be evident before repair is undertaken."

entries:
  - scale: "planning"
    level: "a2"
    code: "recall_and_rehearse_appropriate_set_of_phrases"
    id: "cefr.production.strategies.descriptors.planning.recall_and_rehearse_appropriate_set_of_phrases.a2"
    description: "Can recall and rehearse an appropriate set of phrases from their repertoire."

  - scale: "planning"
    level: "b1"
    code: "rehearse_and_try_out_new_combinations_and_expressions"
    id: "cefr.production.strategies.descriptors.planning.rehearse_and_try_out_new_combinations_and_expressions.b1"
    description: "Can rehearse and try out new combinations and expressions, inviting feedback."

  - scale: "planning"
    level: "b1"
    code: "work_out_how_to_communicate_main_points_with_available_resources"
    id: "cefr.production.strategies.descriptors.planning.work_out_how_to_communicate_main_points_with_available_resources.b1"
    description: "Can work out how to communicate the main point(s) they want to get across, exploiting any resources available and limiting the message to what they can recall or find the means to express."

  - scale: "planning"
    level: "b2"
    code: "plan_what_is_to_be_said_and_means_to_say_it_considering_effect_on_recipients"
    id: "cefr.production.strategies.descriptors.planning.plan_what_is_to_be_said_and_means_to_say_it_considering_effect_on_recipients.b2"
    description: "Can plan what is to be said and the means to say it, considering the effect on the recipient(s)."

  - scale: "planning"
    level: "b2"
    code: "plan_what_to_say_in_awkward_situation_considering_different_reactions"
    id: "cefr.production.strategies.descriptors.planning.plan_what_to_say_in_awkward_situation_considering_different_reactions.b2"
    description: "Can, in preparing for a potentially complicated or awkward situation, plan what to say in the event of different reactions, reflecting on what expression would be appropriate."

  - scale: "planning"
    level: "c1"
    code: "adopt_conventions_linked_to_particular_type_of_formal_text"
    id: "cefr.production.strategies.descriptors.planning.adopt_conventions_linked_to_particular_type_of_formal_text.c1"
    description: "Can, when preparing a more formal text, consciously adopt the conventions linked to the particular type of text concerned (e.g. structure, level of formality)."

  - scale: "planning"
    level: "c2"
    code: "adopt_conventions_linked_to_particular_type_of_formal_text"
    id: "cefr.production.strategies.descriptors.planning.adopt_conventions_linked_to_particular_type_of_formal_text.c2"
    description: "Can, when preparing a more formal text, consciously adopt the conventions linked to the particular type of text concerned (e.g. structure, level of formality)."

  - scale: "compensating"
    level: "pre_a1"
    code: "point_to_something_and_ask_what_it_is"
    id: "cefr.production.strategies.descriptors.compensating.point_to_something_and_ask_what_it_is.pre_a1"
    description: "Can point to something and ask what it is."

  - scale: "compensating"
    level: "a1"
    code: "use_gestures_to_support_simple_words_in_expressing_need"
    id: "cefr.production.strategies.descriptors.compensating.use_gestures_to_support_simple_words_in_expressing_need.a1"
    description: "Can use gestures to support simple words/signs in expressing a need."

  - scale: "compensating"
    level: "a2"
    code: "use_inadequate_word_and_gestures_to_clarify_meaning"
    id: "cefr.production.strategies.descriptors.compensating.use_inadequate_word_and_gestures_to_clarify_meaning.a2"
    description: "Can use an inadequate word/sign from their repertoire and use gestures to clarify what they mean."

  - scale: "compensating"
    level: "a2"
    code: "identify_what_they_mean_by_pointing_to_it"
    id: "cefr.production.strategies.descriptors.compensating.identify_what_they_mean_by_pointing_to_it.a2"
    description: "Can identify what they mean by pointing to it (e.g. “I’d like this, please”)."

  - scale: "compensating"
    level: "b1"
    code: "define_features_of_something_concrete_when_word_cannot_be_remembered"
    id: "cefr.production.strategies.descriptors.compensating.define_features_of_something_concrete_when_word_cannot_be_remembered.b1"
    description: "Can define the features of something concrete for which they can’t remember the word/sign."

  - scale: "compensating"
    level: "b1"
    code: "convey_meaning_by_qualifying_similar_word"
    id: "cefr.production.strategies.descriptors.compensating.convey_meaning_by_qualifying_similar_word.b1"
    description: "Can convey meaning by qualifying a word/sign meaning something similar (e.g. a truck for people = bus)."

  - scale: "compensating"
    level: "b1"
    code: "use_simple_similar_word_and_invite_correction"
    id: "cefr.production.strategies.descriptors.compensating.use_simple_similar_word_and_invite_correction.b1"
    description: "Can use a simple word/sign meaning something similar to the concept they want to convey and invite “correction”."

  - scale: "compensating"
    level: "b1"
    code: "foreignise_words_in_first_language_and_ask_for_confirmation"
    id: "cefr.production.strategies.descriptors.compensating.foreignise_words_in_first_language_and_ask_for_confirmation.b1"
    description: "Can “foreignise” word/signs in their first language and ask for confirmation."

  - scale: "compensating"
    level: "b2"
    code: "use_circumlocution_and_paraphrase_to_cover_gaps"
    id: "cefr.production.strategies.descriptors.compensating.use_circumlocution_and_paraphrase_to_cover_gaps.b2"
    description: "Can use circumlocution and paraphrase to cover gaps in vocabulary and structure."

  - scale: "compensating"
    level: "b2"
    code: "address_most_communication_problems_by_using_circumlocution_or_avoiding_difficult_expressions"
    id: "cefr.production.strategies.descriptors.compensating.address_most_communication_problems_by_using_circumlocution_or_avoiding_difficult_expressions.b2"
    description: "Can address most communication problems by using circumlocution, or by avoiding difficult expressions."

  - scale: "compensating"
    level: "c1"
    code: "exploit_vocabulary_options_creatively_to_use_circumlocution_effectively"
    id: "cefr.production.strategies.descriptors.compensating.exploit_vocabulary_options_creatively_to_use_circumlocution_effectively.c1"
    description: "Can exploit their range of vocabulary options creatively so as to readily and effectively use circumlocution in almost all situations."

  - scale: "compensating"
    level: "c2"
    code: "substitute_equivalent_term_so_smoothly_it_is_scarcely_noticeable"
    id: "cefr.production.strategies.descriptors.compensating.substitute_equivalent_term_so_smoothly_it_is_scarcely_noticeable.c2"
    description: "Can substitute an equivalent term for a word/sign they can’t recall, so smoothly that it is scarcely noticeable."

  - scale: "monitoring_and_repair"
    level: "b1"
    code: "correct_mix_ups_with_time_marking_or_expressions_when_problem_is_indicated"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.correct_mix_ups_with_time_marking_or_expressions_when_problem_is_indicated.b1"
    description: "Can correct mix-ups with the marking of time or expressions that lead to misunderstandings, provided the interlocutor indicates there is a problem."

  - scale: "monitoring_and_repair"
    level: "b1"
    code: "ask_for_confirmation_that_form_used_is_correct"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.ask_for_confirmation_that_form_used_is_correct.b1"
    description: "Can ask for confirmation that a form used is correct."

  - scale: "monitoring_and_repair"
    level: "b1"
    code: "start_again_using_different_tactic_when_communication_breaks_down"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.start_again_using_different_tactic_when_communication_breaks_down.b1"
    description: "Can start again using a different tactic when communication breaks down."

  - scale: "monitoring_and_repair"
    level: "b2"
    code: "retrospectively_self_correct_occasional_slips_or_non_systematic_errors"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.retrospectively_self_correct_occasional_slips_or_non_systematic_errors.b2"
    description: "Can often retrospectively self-correct their occasional “slips” or non-systematic errors and minor flaws in sentence structure."

  - scale: "monitoring_and_repair"
    level: "b2"
    code: "correct_slips_and_errors_that_become_conscious_or_lead_to_misunderstandings"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.correct_slips_and_errors_that_become_conscious_or_lead_to_misunderstandings.b2"
    description: "Can correct slips and errors that they become conscious of, or that have led to misunderstandings."

  - scale: "monitoring_and_repair"
    level: "b2"
    code: "make_note_of_recurring_mistakes_and_consciously_monitor_for_them"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.make_note_of_recurring_mistakes_and_consciously_monitor_for_them.b2"
    description: "Can make a note of their recurring mistakes and consciously monitor for them."

  - scale: "monitoring_and_repair"
    level: "c1"
    code: "backtrack_when_encountering_difficulty_and_reformulate_without_interrupting_flow"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.backtrack_when_encountering_difficulty_and_reformulate_without_interrupting_flow.c1"
    description: "Can backtrack when they encounter a difficulty and reformulate what they want to say without fully interrupting the flow of language."

  - scale: "monitoring_and_repair"
    level: "c1"
    code: "self_correct_with_high_degree_of_effectiveness"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.self_correct_with_high_degree_of_effectiveness.c1"
    description: "Can self-correct with a high degree of effectiveness."

  - scale: "monitoring_and_repair"
    level: "c2"
    code: "backtrack_and_restructure_around_difficulty_smoothly"
    id: "cefr.production.strategies.descriptors.monitoring_and_repair.backtrack_and_restructure_around_difficulty_smoothly.c2"
    description: "Can backtrack and restructure around a difficulty so smoothly that the interlocutor is hardly aware of it."
