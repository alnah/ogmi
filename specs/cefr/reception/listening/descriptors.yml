id: "cefr.reception.listening.descriptors"
version: "1"

catalog:
  - code: "overall_oral_comprehension"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension"
    description:
      - "The expression “oral comprehension” covers comprehension in live, face-to-face communication and its remote and/or recorded equivalent."
      - "It thus includes visuo-gestural and audio-vocal modalities."
      - "The aspects of oral comprehension included here under reception are different kinds of one-way comprehension, excluding “Understanding an interlocutor” (as a participant in interaction), which is included under interaction."
      - "The approach is strongly influenced by the metaphor of concentric circles as one moves out from a role as participant in an interaction towards a one-way role of an overhearer or bystander, to being a member of a live audience, to being a member of an audience at a distance – via media."
      - "Scales are provided for “Understanding conversation between other people” (as an overhearer) and for “Understanding as a member of a live audience”."
      - "To these scales particular media are added, with “Understanding announcements and instructions”, and “Understanding audio (or signed) media and recordings.”"
      - "There is also a separate scale for “Watching TV, film and video” included under audio-visual comprehension."

  - code: "understanding_conversation_between_people"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people"
    description:
      - "This scale concerns two main situations: the first is when other participants in a group interaction talk/sign across the user/learner to each other, so that the user/learner is no longer directly addressed."
      - "The second situation is when the user/learner is an overhearer to a conversation between other people nearby."
      - "Both situations are noticeably more difficult than when the user/learner is directly addressed, firstly because there is no element of accommodation to them and because the speakers/signers may have shared assumptions, experiences they refer to and even variants in usage, and secondly because the user/learner, not being an addressee, has no “right” to ask for clarification, repetition, etc."
      - "Key concepts operationalised in the scale include the following:"
      - "picking up and connecting words/signs, phrases, etc.;"
      - "catching enough to identify the topic, and changes of topic;"
      - "identifying chronological progression, for example a story;"
      - "identifying when people agree and disagree, and points made for and against an issue;"
      - "identifying attitudes and sociocultural implications (C levels)."

  - code: "understanding_as_a_member_of_a_live_audience"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience"
    description:
      - "This scale concerns understanding a speaker addressing an audience, for example in a meeting or seminar, at a conference or lecture, on a guided tour, or at a wedding or other celebration."
      - "Understanding the speaker/signer as a member of an audience is in fact usually easier than “Understanding conversation between other people”, even though the user/learner is even further away from being a participant in the discourse."
      - "This is firstly because the more structured nature of a monologue means that it is easier to bridge over sections that one does not understand and pick up the thread again."
      - "Secondly, the speaker/signer is more likely to be using a neutral register and projecting well so as to maximise the ability of the audience to follow."
      - "Key concepts operationalised in the scale include the following:"
      - "following a talk accompanying real artefacts (for example on a guided tour) and visual aids (for example PowerPoint);"
      - "the degree of accommodation to the audience (speed of delivery, extent to which usage is simplified);"
      - "familiarity of the situation and subject matter;"
      - "following a line of argument, distinguishing main points, etc."

  - code: "understanding_announcements_and_instructions"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions"
    description:
      - "This scale involves a different type of extremely focused comprehension in which the aim is to catch specific information."
      - "The situation is complicated by the fact that the announcement or instructions may well be delivered by a (possibly faulty) public address system, or called out/signed some considerable distance away."
      - "Key concepts operationalised in the scale include the following:"
      - "understanding directions and detailed instructions;"
      - "catching the main point of announcements;"
      - "degree of clarity, from slow and clear to normal speed with audio and/or visual distortion."

  - code: "understanding_audio_or_signed_media_and_recordings"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings"
    description:
      - "This scale involves broadcast audio and signed media and recorded materials unaccompanied by video, including messages, weather forecasts, narrated stories, news bulletins, interviews and documentaries."
      - "Key concepts operationalised in the scale include the following:"
      - "picking out concrete information;"
      - "understanding main points, essential information;"
      - "catching important information;"
      - "identifying speaker mood, attitudes and viewpoints."

entries:
  - scale: "overall_oral_comprehension"
    level: "pre_a1"
    code: "understand_short_very_simple_questions_and_statements_with_visual_support"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_short_very_simple_questions_and_statements_with_visual_support.pre_a1"
    description: "Can understand short, very simple questions and statements, provided they are delivered slowly and clearly and accompanied by visuals or manual gestures to support understanding and repeated if necessary."

  - scale: "overall_oral_comprehension"
    level: "pre_a1"
    code: "recognise_everyday_familiar_words_in_defined_familiar_context"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.recognise_everyday_familiar_words_in_defined_familiar_context.pre_a1"
    description: "Can recognise everyday, familiar words/signs, provided they are delivered clearly and slowly in a clearly defined, familiar everyday context."

  - scale: "overall_oral_comprehension"
    level: "pre_a1"
    code: "recognise_numbers_prices_dates_and_days_of_week_in_defined_context"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.recognise_numbers_prices_dates_and_days_of_week_in_defined_context.pre_a1"
    description: "Can recognise numbers, prices, dates and days of the week, provided they are delivered slowly and clearly in a defined, familiar everyday context."

  - scale: "overall_oral_comprehension"
    level: "a1"
    code: "recognise_concrete_information_on_familiar_topics"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.recognise_concrete_information_on_familiar_topics.a1"
    description: "Can recognise concrete information (e.g. places and times) on familiar topics encountered in everyday life, provided it is delivered slowly and clearly."

  - scale: "overall_oral_comprehension"
    level: "a1"
    code: "follow_very_slow_and_carefully_articulated_language"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.follow_very_slow_and_carefully_articulated_language.a1"
    description: "Can follow language which is very slow and carefully articulated, with long pauses for them to assimilate meaning."

  - scale: "overall_oral_comprehension"
    level: "a2"
    code: "understand_enough_to_meet_needs_of_a_concrete_type"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_enough_to_meet_needs_of_a_concrete_type.a2"
    description: "Can understand enough to be able to meet needs of a concrete type, provided people articulate clearly and slowly."

  - scale: "overall_oral_comprehension"
    level: "a2"
    code: "understand_phrases_and_expressions_related_to_immediate_priority"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_phrases_and_expressions_related_to_immediate_priority.a2"
    description: "Can understand phrases and expressions related to areas of most immediate priority (e.g. very basic personal and family information, shopping, local geography, employment), provided people articulate clearly and slowly."

  - scale: "overall_oral_comprehension"
    level: "b1"
    code: "understand_straightforward_factual_information_on_common_topics"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_straightforward_factual_information_on_common_topics.b1"
    description: "Can understand straightforward factual information about common everyday or job-related topics, identifying both general messages and specific details, provided people articulate clearly in a generally familiar variety."

  - scale: "overall_oral_comprehension"
    level: "b1"
    code: "understand_main_points_on_familiar_matters"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_main_points_on_familiar_matters.b1"
    description: "Can understand the main points made in clear standard language or a familiar variety on familiar matters regularly encountered at work, school, leisure, etc., including short narratives."

  - scale: "overall_oral_comprehension"
    level: "b2"
    code: "understand_standard_language_on_familiar_and_unfamiliar_topics"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_standard_language_on_familiar_and_unfamiliar_topics.b2"
    description: "Can understand standard language or a familiar variety, live or broadcast, on both familiar and unfamiliar topics normally encountered in personal, social, academic or vocational life. Only extreme [auditory/visual] background noise, inadequate discourse structure and/or idiomatic usage influence the ability to understand."

  - scale: "overall_oral_comprehension"
    level: "b2"
    code: "understand_main_ideas_of_complex_discourse"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_main_ideas_of_complex_discourse.b2"
    description: "Can understand the main ideas of propositionally and linguistically complex discourse on both concrete and abstract topics delivered in standard language or a familiar variety, including technical discussions in their field of specialisation."

  - scale: "overall_oral_comprehension"
    level: "b2"
    code: "follow_extended_discourse_and_complex_lines_of_argument"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.follow_extended_discourse_and_complex_lines_of_argument.b2"
    description: "Can follow extended discourse and complex lines of argument, provided the topic is reasonably familiar, and the direction of the argument is signposted by explicit markers."

  - scale: "overall_oral_comprehension"
    level: "c1"
    code: "follow_extended_discourse_on_abstract_and_complex_topics"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.follow_extended_discourse_on_abstract_and_complex_topics.c1"
    description: "Can understand enough to follow extended discourse on abstract and complex topics beyond their own field, though they may need to confirm occasional details, especially if the variety is unfamiliar."

  - scale: "overall_oral_comprehension"
    level: "c1"
    code: "recognise_wide_range_of_idiomatic_expressions_and_colloquialisms"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.recognise_wide_range_of_idiomatic_expressions_and_colloquialisms.c1"
    description: "Can recognise a wide range of idiomatic expressions and colloquialisms, appreciating register shifts."

  - scale: "overall_oral_comprehension"
    level: "c1"
    code: "follow_extended_discourse_when_structure_is_implicit"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.follow_extended_discourse_when_structure_is_implicit.c1"
    description: "Can follow extended discourse even when it is not clearly structured and when relationships are only implied and not signalled explicitly."

  - scale: "overall_oral_comprehension"
    level: "c2"
    code: "understand_virtually_any_kind_of_language_at_fast_natural_speed"
    id: "cefr.reception.listening.descriptors.overall_oral_comprehension.understand_virtually_any_kind_of_language_at_fast_natural_speed.c2"
    description: "Can understand with ease virtually any kind of language, whether live or broadcast, delivered at fast natural speed."

  - scale: "understanding_conversation_between_people"
    level: "a1"
    code: "understand_some_expressions_in_discussions_on_familiar_topics"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.understand_some_expressions_in_discussions_on_familiar_topics.a1"
    description: "Can understand some expressions when people are discussing them, family, school, hobbies or surroundings, provided the delivery is slow and clear."

  - scale: "understanding_conversation_between_people"
    level: "a1"
    code: "understand_words_and_short_sentences_in_simple_conversation"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.understand_words_and_short_sentences_in_simple_conversation.a1"
    description: "Can understand words/signs and short sentences in a simple conversation (e.g. between a customer and a salesperson in a shop), provided people communicate very slowly and very clearly."

  - scale: "understanding_conversation_between_people"
    level: "a2"
    code: "identify_topic_of_discussion_around_them"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.identify_topic_of_discussion_around_them.a2"
    description: "Can generally identify the topic of discussion around them when it is conducted slowly and clearly."

  - scale: "understanding_conversation_between_people"
    level: "a2"
    code: "recognise_when_people_agree_and_disagree"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.recognise_when_people_agree_and_disagree.a2"
    description: "Can recognise when people agree and disagree in a conversation conducted slowly and clearly."

  - scale: "understanding_conversation_between_people"
    level: "a2"
    code: "follow_short_simple_social_exchanges_in_outline"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.follow_short_simple_social_exchanges_in_outline.a2"
    description: "Can follow in outline short, simple social exchanges, conducted very slowly and clearly."

  - scale: "understanding_conversation_between_people"
    level: "b1"
    code: "follow_much_of_everyday_conversation_and_discussion"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.follow_much_of_everyday_conversation_and_discussion.b1"
    description: "Can follow much of everyday conversation and discussion, provided it is clearly articulated in standard language or in a familiar variety."

  - scale: "understanding_conversation_between_people"
    level: "b1"
    code: "follow_main_points_of_extended_discussion_around_them"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.follow_main_points_of_extended_discussion_around_them.b1"
    description: "Can generally follow the main points of extended discussion around them, provided it is clearly articulated in standard language or a familiar variety."

  - scale: "understanding_conversation_between_people"
    level: "b2"
    code: "keep_up_with_animated_conversation_between_proficient_users"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.keep_up_with_animated_conversation_between_proficient_users.b2"
    description: "Can keep up with an animated conversation between proficient users of the target language."

  - scale: "understanding_conversation_between_people"
    level: "b2"
    code: "catch_much_of_what_is_said_around_them_with_some_effort"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.catch_much_of_what_is_said_around_them_with_some_effort.b2"
    description: "Can with some effort catch much of what is said around them, but may find it difficult to participate effectively in discussion with several users of the target language who do not modify their language in any way."

  - scale: "understanding_conversation_between_people"
    level: "b2"
    code: "identify_main_reasons_for_and_against_an_argument"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.identify_main_reasons_for_and_against_an_argument.b2"
    description: "Can identify the main reasons for and against an argument or idea in a discussion conducted in clear standard language or a familiar variety."

  - scale: "understanding_conversation_between_people"
    level: "b2"
    code: "follow_chronological_sequence_in_extended_informal_discourse"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.follow_chronological_sequence_in_extended_informal_discourse.b2"
    description: "Can follow chronological sequence in extended informal discourse, e.g. in a story or anecdote."

  - scale: "understanding_conversation_between_people"
    level: "c1"
    code: "follow_complex_interactions_between_third_parties"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.follow_complex_interactions_between_third_parties.c1"
    description: "Can easily follow complex interactions between third parties in group discussion and debate, even on abstract, complex, unfamiliar topics."

  - scale: "understanding_conversation_between_people"
    level: "c1"
    code: "identify_attitude_of_each_participant_in_animated_discussion"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.identify_attitude_of_each_participant_in_animated_discussion.c1"
    description: "Can identify the attitude of each participant in an animated discussion characterised by overlapping turns, digressions and colloquialisms that is delivered at a natural speed in varieties that are familiar."

  - scale: "understanding_conversation_between_people"
    level: "c2"
    code: "identify_sociocultural_implications_in_colloquial_discussions"
    id: "cefr.reception.listening.descriptors.understanding_conversation_between_people.identify_sociocultural_implications_in_colloquial_discussions.c2"
    description: "Can identify the sociocultural implications of most of the language used in colloquial discussions that take place at a natural speed."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "a1"
    code: "understand_in_outline_very_simple_information_in_predictable_situations"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.understand_in_outline_very_simple_information_in_predictable_situations.a1"
    description: "Can understand in outline very simple information being explained in a predictable situation like a guided tour, provided the delivery is very slow and clear and that there are long pauses from time to time."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "a2"
    code: "follow_general_outline_of_demonstration_or_presentation"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_general_outline_of_demonstration_or_presentation.a2"
    description: "Can follow the general outline of a demonstration or presentation on a familiar or predictable topic, where the message is expressed slowly and clearly in simple language and there is visual support (e.g. slides, handouts)."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "a2"
    code: "follow_very_simple_well_structured_presentation_with_visual_support"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_very_simple_well_structured_presentation_with_visual_support.a2"
    description: "Can follow a very simple, well-structured presentation or demonstration, provided it is illustrated with slides, concrete examples or diagrams, it is delivered slowly and clearly with repetition, and the topic is familiar."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "a2"
    code: "understand_outline_of_simple_information_in_predictable_situations"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.understand_outline_of_simple_information_in_predictable_situations.a2"
    description: "Can understand the outline of simple information given in a predictable situation, such as on a guided tour (e.g. “This is where the President lives”)."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b1"
    code: "follow_lecture_or_talk_within_their_own_field"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_lecture_or_talk_within_their_own_field.b1"
    description: "Can follow a lecture or talk within their own field, provided the subject matter is familiar and the presentation straightforward and clearly structured."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b1"
    code: "distinguish_between_main_ideas_and_supporting_details_in_lectures"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.distinguish_between_main_ideas_and_supporting_details_in_lectures.b1"
    description: "Can distinguish between main ideas and supporting details in standard lectures on familiar subjects, provided these are delivered in clearly articulated standard language or a familiar variety."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b1"
    code: "follow_in_outline_straightforward_short_talks_on_familiar_topics"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_in_outline_straightforward_short_talks_on_familiar_topics.b1"
    description: "Can follow in outline straightforward short talks on familiar topics, provided these are delivered in clearly articulated standard language or a familiar variety."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b1"
    code: "follow_straightforward_conference_presentation_with_visual_support"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_straightforward_conference_presentation_with_visual_support.b1"
    description: "Can follow a straightforward conference presentation or demonstration with visual support (e.g. slides, handouts) on a topic or product within their field, understanding explanations given."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b1"
    code: "understand_main_points_of_straightforward_monologue"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.understand_main_points_of_straightforward_monologue.b1"
    description: "Can understand the main points of what is said in a straightforward monologue (e.g. a guided tour), provided the delivery is clear and relatively slow."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b2"
    code: "follow_essentials_of_complex_academic_or_professional_presentations"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_essentials_of_complex_academic_or_professional_presentations.b2"
    description: "Can follow the essentials of lectures, talks and reports and other forms of academic/professional presentation which are propositionally and linguistically complex."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b2"
    code: "understand_point_of_view_on_topics_of_current_or_specialised_interest"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.understand_point_of_view_on_topics_of_current_or_specialised_interest.b2"
    description: "Can understand the point of view expressed on topics that are of current interest or that relate to their specialised field, provided the talk is delivered in standard language or a familiar variety."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b2"
    code: "follow_complex_lines_of_argument_in_lecture"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_complex_lines_of_argument_in_lecture.b2"
    description: "Can follow complex lines of argument in a clearly articulated lecture, provided the topic is reasonably familiar."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b2"
    code: "distinguish_main_themes_from_asides_in_lecture_or_talk"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.distinguish_main_themes_from_asides_in_lecture_or_talk.b2"
    description: "Can distinguish main themes from asides, provided the lecture or talk is delivered in standard language or a familiar variety."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "b2"
    code: "recognise_point_of_view_and_distinguish_it_from_reported_facts"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.recognise_point_of_view_and_distinguish_it_from_reported_facts.b2"
    description: "Can recognise the point of view expressed and distinguish this from facts being reporting."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "c1"
    code: "follow_most_lectures_discussions_and_debates_with_relative_ease"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_most_lectures_discussions_and_debates_with_relative_ease.c1"
    description: "Can follow most lectures, discussions and debates with relative ease."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "c2"
    code: "follow_specialised_lectures_and_presentations_with_non_standard_usage"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.follow_specialised_lectures_and_presentations_with_non_standard_usage.c2"
    description: "Can follow specialised lectures and presentations employing colloquialism, regional usage or unfamiliar terminology."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "c2"
    code: "make_appropriate_inferences_when_links_are_implicit"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.make_appropriate_inferences_when_links_are_implicit.c2"
    description: "Can make appropriate inferences when links or implications are not made explicit."

  - scale: "understanding_as_a_member_of_a_live_audience"
    level: "c2"
    code: "get_the_point_of_jokes_or_allusions_in_presentation"
    id: "cefr.reception.listening.descriptors.understanding_as_a_member_of_a_live_audience.get_the_point_of_jokes_or_allusions_in_presentation.c2"
    description: "Can get the point of jokes or allusions in a presentation."

  - scale: "understanding_announcements_and_instructions"
    level: "pre_a1"
    code: "understand_very_short_simple_instructions_in_familiar_everyday_contexts"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_very_short_simple_instructions_in_familiar_everyday_contexts.pre_a1"
    description: "Can understand short, simple instructions for actions such as “Stop”, “Close the door”, etc., provided they are delivered slowly face-to-face, accompanied by pictures or manual gestures and repeated if necessary."

  - scale: "understanding_announcements_and_instructions"
    level: "a1"
    code: "understand_carefully_addressed_instructions_and_short_simple_directions"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_carefully_addressed_instructions_and_short_simple_directions.a1"
    description: "Can understand instructions addressed carefully and slowly to them and follow short, simple directions."

  - scale: "understanding_announcements_and_instructions"
    level: "a1"
    code: "understand_when_someone_explains_where_something_is"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_when_someone_explains_where_something_is.a1"
    description: "Can understand when someone tells them slowly and clearly where something is, provided the object is in the immediate environment."

  - scale: "understanding_announcements_and_instructions"
    level: "a1"
    code: "understand_figures_prices_and_times_in_loudspeaker_announcements"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_figures_prices_and_times_in_loudspeaker_announcements.a1"
    description: "Can understand figures, prices and times given slowly and clearly in an announcement by loudspeaker, e.g. at a railway station or in a shop."

  - scale: "understanding_announcements_and_instructions"
    level: "a2"
    code: "understand_and_follow_series_of_instructions_for_familiar_activities"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_and_follow_series_of_instructions_for_familiar_activities.a2"
    description: "Can understand and follow a series of instructions for familiar everyday activities such as sports, cooking, etc., provided they are delivered slowly and clearly."

  - scale: "understanding_announcements_and_instructions"
    level: "a2"
    code: "understand_straightforward_announcements_delivered_slowly_and_clearly"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_straightforward_announcements_delivered_slowly_and_clearly.a2"
    description: "Can understand straightforward announcements (e.g. of a cinema programme or sports event, that a train has been delayed), provided the delivery is slow and clear."

  - scale: "understanding_announcements_and_instructions"
    level: "a2"
    code: "catch_main_point_in_short_clear_simple_messages_and_announcements"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.catch_main_point_in_short_clear_simple_messages_and_announcements.a2"
    description: "Can catch the main point in short, clear, simple messages and announcements."

  - scale: "understanding_announcements_and_instructions"
    level: "a2"
    code: "understand_simple_directions_from_x_to_y"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_simple_directions_from_x_to_y.a2"
    description: "Can understand simple directions on how to get from X to Y, by foot or public transport."

  - scale: "understanding_announcements_and_instructions"
    level: "a2"
    code: "understand_basic_instructions_on_times_dates_numbers_and_routine_tasks"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_basic_instructions_on_times_dates_numbers_and_routine_tasks.a2"
    description: "Can understand basic instructions on times, dates and numbers, etc., and on routine tasks and assignments to be carried out."

  - scale: "understanding_announcements_and_instructions"
    level: "b1"
    code: "understand_simple_technical_information_for_everyday_equipment"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_simple_technical_information_for_everyday_equipment.b1"
    description: "Can understand simple technical information, such as operating instructions for everyday equipment."

  - scale: "understanding_announcements_and_instructions"
    level: "b1"
    code: "follow_detailed_directions"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.follow_detailed_directions.b1"
    description: "Can follow detailed directions."

  - scale: "understanding_announcements_and_instructions"
    level: "b1"
    code: "understand_public_announcements_with_minimum_background_noise"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_public_announcements_with_minimum_background_noise.b1"
    description: "Can understand public announcements at airports, stations and on planes, buses and trains, provided these are clearly articulated with minimum interference from [auditory/visual] background noise."

  - scale: "understanding_announcements_and_instructions"
    level: "b2"
    code: "understand_announcements_and_messages_on_concrete_and_abstract_topics"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_announcements_and_messages_on_concrete_and_abstract_topics.b2"
    description: "Can understand announcements and messages on concrete and abstract topics delivered in standard language or a familiar variety at normal speed."

  - scale: "understanding_announcements_and_instructions"
    level: "b2"
    code: "understand_detailed_instructions_well_enough_to_follow_them_successfully"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_detailed_instructions_well_enough_to_follow_them_successfully.b2"
    description: "Can understand detailed instructions well enough to be able to follow them successfully."

  - scale: "understanding_announcements_and_instructions"
    level: "c1"
    code: "extract_specific_information_from_distorted_public_announcements"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.extract_specific_information_from_distorted_public_announcements.c1"
    description: "Can extract specific information from poor quality, [audibly and/or visually] distorted public announcements, e.g. in a station or sports stadium, or on an old recording."

  - scale: "understanding_announcements_and_instructions"
    level: "c1"
    code: "understand_complex_technical_information_for_familiar_products_and_services"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_complex_technical_information_for_familiar_products_and_services.c1"
    description: "Can understand complex technical information, such as operating instructions or specifications for familiar products and services."

  - scale: "understanding_announcements_and_instructions"
    level: "c2"
    code: "extract_specific_information_from_distorted_public_announcements"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.extract_specific_information_from_distorted_public_announcements.c2"
    description: "Can extract specific information from poor quality, [audibly and/or visually] distorted public announcements, e.g. in a station or sports stadium, or on an old recording."

  - scale: "understanding_announcements_and_instructions"
    level: "c2"
    code: "understand_complex_technical_information_for_familiar_products_and_services"
    id: "cefr.reception.listening.descriptors.understanding_announcements_and_instructions.understand_complex_technical_information_for_familiar_products_and_services.c2"
    description: "Can understand complex technical information, such as operating instructions or specifications for familiar products and services."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "pre_a1"
    code: "recognise_words_names_and_numbers_in_simple_short_recordings"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.recognise_words_names_and_numbers_in_simple_short_recordings.pre_a1"
    description: "Can recognise words/signs, names and numbers that they already know in simple, short recordings, provided these are delivered very slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a1"
    code: "pick_out_concrete_information_from_short_recordings_on_familiar_topics"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.pick_out_concrete_information_from_short_recordings_on_familiar_topics.a1"
    description: "Can pick out concrete information (e.g. places and times) from short recordings on familiar everyday topics, provided they are delivered very slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a2"
    code: "understand_most_important_information_in_short_commercials"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_most_important_information_in_short_commercials.a2"
    description: "Can understand the most important information contained in short commercials concerning goods and services of interest (e.g. CDs, video games, travel)."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a2"
    code: "understand_preferences_and_activities_in_slow_clear_interviews"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_preferences_and_activities_in_slow_clear_interviews.a2"
    description: "Can understand in an interview what people say they do in their free time, what they particularly like doing and what they do not like doing, provided they speak slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a2"
    code: "understand_and_extract_essential_information_from_short_recorded_passages"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_and_extract_essential_information_from_short_recorded_passages.a2"
    description: "Can understand and extract the essential information from short, recorded passages dealing with predictable everyday matters which are delivered slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a2"
    code: "extract_important_information_from_short_broadcasts"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.extract_important_information_from_short_broadcasts.a2"
    description: "Can extract important information from short broadcasts (e.g. the weather forecast, concert announcements, sports results), provided people talk clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "a2"
    code: "understand_important_points_of_a_story_and_follow_the_plot"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_important_points_of_a_story_and_follow_the_plot.a2"
    description: "Can understand the important points of a story and manage to follow the plot, provided the story is told slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "b1"
    code: "understand_information_content_of_most_recorded_or_broadcast_material_of_personal_interest"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_information_content_of_most_recorded_or_broadcast_material_of_personal_interest.b1"
    description: "Can understand the information content of the majority of recorded or broadcast material on topics of personal interest delivered in clear standard language."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "b1"
    code: "understand_main_points_of_news_bulletins_and_simpler_recorded_material"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_main_points_of_news_bulletins_and_simpler_recorded_material.b1"
    description: "Can understand the main points of news bulletins and simpler recorded material about familiar subjects delivered relatively slowly and clearly."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "b1"
    code: "understand_main_points_and_important_details_in_stories_and_narratives"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_main_points_and_important_details_in_stories_and_narratives.b1"
    description: "Can understand the main points and important details in stories and other narratives (e.g. a description of a holiday), provided the delivery is slow and clear."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "b2"
    code: "understand_recordings_and_identify_viewpoints_attitudes_and_information_content"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_recordings_and_identify_viewpoints_attitudes_and_information_content.b2"
    description: "Can understand recordings in the standard form of the language likely to be encountered in social, professional or academic life and identify viewpoints and attitudes as well as the information content."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "b2"
    code: "understand_most_documentaries_and_identify_mood_and_attitude"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_most_documentaries_and_identify_mood_and_attitude.b2"
    description: "Can understand most documentaries and most other recorded or broadcast material delivered in the standard form of the language and can identify mood, attitude, etc."

  - scale: "understanding_audio_or_signed_media_and_recordings"
    level: "c1"
    code: "understand_wide_range_of_recorded_and_broadcast_material_and_identify_finer_points"
    id: "cefr.reception.listening.descriptors.understanding_audio_or_signed_media_and_recordings.understand_wide_range_of_recorded_and_broadcast_material_and_identify_finer_points.c1"
    description: "Can understand a wide range of recorded and broadcast material, including some non-standard usage, and identify finer points of detail including implicit attitudes and relationships between people."
