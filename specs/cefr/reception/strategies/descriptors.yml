id: "cefr.reception.strategies.descriptors"
version: "1"

catalog:
  - code: "identifying_cues_and_inferring"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring"
    description:
      - "In reception, understanding progresses through a combination of bottom-up/top-down processing and the use of content and formal schemata in inferencing."
      - "One scale is provided for the inferencing strategies that this involves."
      - "Key concepts operationalised in the scale include the following:"
      - "exploiting illustrations, formatting, headings, subtitles, position in the text, etc.;"
      - "deducing meaning from the co-text and linguistic context;"
      - "exploiting linguistic clues: from numbers and proper nouns, through word/sign roots, prefixes and suffixes, temporal connectors and logical connectors, to skilled use of a variety of strategies."

entries:
  - scale: "identifying_cues_and_inferring"
    level: "pre_a1"
    code: "deduce_meaning_of_word_from_accompanying_picture_or_icon"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.deduce_meaning_of_word_from_accompanying_picture_or_icon.pre_a1"
    description: "Can deduce the meaning of a word/sign from an accompanying picture or icon."

  - scale: "identifying_cues_and_inferring"
    level: "a1"
    code: "deduce_meaning_of_unknown_word_for_concrete_action_or_object"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.deduce_meaning_of_unknown_word_for_concrete_action_or_object.a1"
    description: "Can deduce the meaning of an unknown word/sign for a concrete action or object, provided the surrounding text is very simple, and on a familiar everyday subject."

  - scale: "identifying_cues_and_inferring"
    level: "a1"
    code: "guess_probable_meaning_of_unknown_similar_word"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.guess_probable_meaning_of_unknown_similar_word.a1"
    description: "Can guess the probable meaning of an unknown word/sign that is similar to one in the language they normally use."

  - scale: "identifying_cues_and_inferring"
    level: "a2"
    code: "use_overall_meaning_of_short_texts_to_derive_probable_meaning_of_unknown_words"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.use_overall_meaning_of_short_texts_to_derive_probable_meaning_of_unknown_words.a2"
    description: "Can use an idea of the overall meaning of short texts and utterances on everyday topics of a concrete type to derive the probable meaning of unknown words/signs from the context."

  - scale: "identifying_cues_and_inferring"
    level: "a2"
    code: "exploit_recognition_of_known_words_to_deduce_meaning_of_unfamiliar_words"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.exploit_recognition_of_known_words_to_deduce_meaning_of_unfamiliar_words.a2"
    description: "Can exploit their recognition of known words/signs to deduce the meaning of unfamiliar words/signs in short expressions used in routine everyday contexts."

  - scale: "identifying_cues_and_inferring"
    level: "a2"
    code: "exploit_format_appearance_and_typographic_features_to_identify_text_type"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.exploit_format_appearance_and_typographic_features_to_identify_text_type.a2"
    description: "Can exploit format, appearance and typographic features in order to identify the type of text: news story, promotional text, article, textbook, chat or forum, etc."

  - scale: "identifying_cues_and_inferring"
    level: "a2"
    code: "exploit_numbers_dates_names_and_proper_nouns_to_identify_topic"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.exploit_numbers_dates_names_and_proper_nouns_to_identify_topic.a2"
    description: "Can exploit numbers, dates, names, proper nouns, etc. to identify the topic of a text."

  - scale: "identifying_cues_and_inferring"
    level: "a2"
    code: "deduce_meaning_and_function_of_unknown_formulaic_expressions_from_position_in_text"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.deduce_meaning_and_function_of_unknown_formulaic_expressions_from_position_in_text.a2"
    description: "Can deduce the meaning and function of unknown formulaic expressions from their position in a text (e.g. at the beginning or end of a letter)."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "exploit_different_types_of_connectors_and_key_paragraphs_to_understand_argumentation"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.exploit_different_types_of_connectors_and_key_paragraphs_to_understand_argumentation.b1"
    description: "Can exploit different types of connectors (numerical, temporal, logical) and the role of key paragraphs in the overall organisation in order to better understand the argumentation in a text."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "extrapolate_meaning_of_section_by_taking_into_account_text_as_whole"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.extrapolate_meaning_of_section_by_taking_into_account_text_as_whole.b1"
    description: "Can extrapolate the meaning of a section of a text by taking into account the text as a whole."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "identify_meaning_of_unfamiliar_words_from_context_on_related_topics"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.identify_meaning_of_unfamiliar_words_from_context_on_related_topics.b1"
    description: "Can identify the meaning of unfamiliar words/signs from the context on topics related to their field and interests."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "extrapolate_meaning_of_occasional_unknown_words_and_deduce_sentence_meaning"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.extrapolate_meaning_of_occasional_unknown_words_and_deduce_sentence_meaning.b1"
    description: "Can extrapolate the meaning of occasional unknown words/signs from the context and deduce sentence meaning, provided the topic discussed is familiar."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "make_basic_inferences_or_predictions_from_headings_titles_or_headlines"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.make_basic_inferences_or_predictions_from_headings_titles_or_headlines.b1"
    description: "Can make basic inferences or predictions about text content from headings, titles or headlines."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "predict_what_will_happen_next_in_short_narrative"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.predict_what_will_happen_next_in_short_narrative.b1"
    description: "Can watch or listen to a short narrative and predict what will happen next."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "follow_line_of_argumentation_or_sequence_of_events_by_focusing_on_connectors"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.follow_line_of_argumentation_or_sequence_of_events_by_focusing_on_connectors.b1"
    description: "Can follow a line of argumentation or the sequence of events in a story, by focusing on common logical connectors (e.g. however, because) and temporal connectors (e.g. after that, beforehand)."

  - scale: "identifying_cues_and_inferring"
    level: "b1"
    code: "deduce_probable_meaning_of_unknown_words_by_identifying_constituent_parts"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.deduce_probable_meaning_of_unknown_words_by_identifying_constituent_parts.b1"
    description: "Can deduce the probable meaning of unknown words/signs in a text by identifying their constituent parts (e.g. identifying roots, lexical elements, suffixes and prefixes)."

  - scale: "identifying_cues_and_inferring"
    level: "b2"
    code: "use_variety_of_strategies_to_achieve_comprehension_and_check_contextual_clues"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.use_variety_of_strategies_to_achieve_comprehension_and_check_contextual_clues.b2"
    description: "Can use a variety of strategies to achieve comprehension, including watching out for main points and checking comprehension by using contextual clues."

  - scale: "identifying_cues_and_inferring"
    level: "c1"
    code: "use_contextual_grammatical_and_lexical_clues_to_infer_attitude_mood_and_intentions"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.use_contextual_grammatical_and_lexical_clues_to_infer_attitude_mood_and_intentions.c1"
    description: "Is skilled at using contextual, grammatical and lexical cues to infer attitude, mood and intentions and anticipate what will come next."

  - scale: "identifying_cues_and_inferring"
    level: "c2"
    code: "use_contextual_grammatical_and_lexical_clues_to_infer_attitude_mood_and_intentions"
    id: "cefr.reception.strategies.descriptors.identifying_cues_and_inferring.use_contextual_grammatical_and_lexical_clues_to_infer_attitude_mood_and_intentions.c2"
    description: "Is skilled at using contextual, grammatical and lexical cues to infer attitude, mood and intentions and anticipate what will come next."
