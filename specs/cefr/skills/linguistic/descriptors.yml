id: "cefr.skills.linguistic.descriptors"
version: "1"

catalog:
  - code: "general_linguistic_range"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range"
    description:
      - "Since the primary evidence for second language acquisition (that is, progress) is the emergence of new forms and not their mastery, the “range” of language at the user/learner’s disposal is a primary concern."
      - "Secondly, attempting to use more complex language, taking risks and moving beyond one’s comfort zone are essential parts of the learning process."
      - "When learners are tackling more complex tasks, their control of their language naturally suffers, and this is a healthy process."
      - "Learners will tend to have less control over more difficult, more recently learnt morphology and syntax than when they stay within their linguistic comfort zone, and this needs to be taken into consideration when viewing (lack of) accuracy."
      - "Key concepts operationalised in the scale include the following:"
      - "range of settings – from A1 to B2, then unrestricted;"
      - "type of language: from memorised phrases to a very wide range of language to formulate thoughts precisely, give emphasis, differentiate and eliminate ambiguity;"
      - "limitations: from frequent breakdown/misunderstanding in non-routine situations to no signs of having to restrict what they want to say."

  - code: "vocabulary_range"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range"
    description:
      - "This scale concerns the breadth and variety of expressions used."
      - "It is generally acquired through reading widely."
      - "Key concepts operationalised in the scale include the following:"
      - "range of settings – from A1 to B2, then unrestricted;"
      - "type of language: from a basic repertoire of words/signs and phrases to a very broad lexical repertoire including idiomatic expressions and colloquialisms."
      - "Vocabulary range is taken to apply to both reception and production."
      - "For sign languages, established and productive vocabulary is implied from A2+ to C2, with established vocabulary at A1 and A2."

  - code: "grammatical_accuracy"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy"
    description:
      - "This scale concerns both the user/learner’s ability to recall “prefabricated” expressions correctly and the capacity to focus on grammatical forms while articulating thought."
      - "This is difficult because, when formulating thoughts or performing more demanding tasks, the user/learner has to devote the majority of their mental processing capacity to fulfilling the task."
      - "This is why accuracy tends to drop during complex tasks."
      - "In addition, research in English, French and German suggests that inaccuracy increases at around B1 as the learner is beginning to use language more independently and creatively."
      - "The fact that accuracy does not increase in a linear manner is reflected in the descriptors."
      - "Key concepts operationalised in the scale include the following:"
      - "control of a specific repertoire (A1 to B1);"
      - "prominence of mistakes (B1 to B2);"
      - "degree of control (B2 to C2)."

  - code: "vocabulary_control"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control"
    description:
      - "This scale concerns the user/learner’s ability to choose an appropriate expression from their repertoire."
      - "As competence increases, such ability is driven increasingly by association in the form of collocations and lexical chunks, with one expression triggering another."
      - "Key concepts operationalised in the scale include the following:"
      - "familiarity of topics (A1 to B1);"
      - "degree of control (B2 to C2)."

  - code: "overall_phonological_control"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control"
    description:
      - "The 2001 scale has been replaced in this publication."
      - "The description of phonology in CEFR 2001 Section 5.2.1.4 is clear, thorough and sufficiently broad to encompass more recent reflections on aspects of phonology in second/foreign language education."
      - "However, the 2001 scale did not capture this conceptual apparatus and the progression appeared unrealistic."
      - "Because of a certain overlapping between sub-categories the scale operationalises the above-mentioned concepts into three categories: overall phonological control, sound articulation and prosodic features."
      - "Intelligibility has been a key factor in discriminating between levels."
      - "The focus is on how much effort is required from the interlocutor to decode the speaker’s message."
      - "Key concepts operationalised in the scale include the following:"
      - "intelligibility: how much effort is required from the interlocutor to decode the speaker’s message;"
      - "the extent of influence from other languages spoken;"
      - "control of sounds;"
      - "control of prosodic features."

  - code: "sound_articulation"
    id: "cefr.skills.linguistic.descriptors.sound_articulation"
    description:
      - "The focus is on familiarity and confidence with the target language sounds (the range of sounds a speaker can articulate and with what degree of precision)."
      - "The key concept operationalised in the scale is the degree of clarity and precision in the articulation of sounds."

  - code: "prosodic_features"
    id: "cefr.skills.linguistic.descriptors.prosodic_features"
    description:
      - "The focus is on the ability to effectively use prosodic features to convey meaning in an increasingly precise manner."
      - "Key concepts operationalised in the scale include the following:"
      - "control of stress, intonation and/or rhythm;"
      - "ability to exploit and/or vary stress and intonation to highlight their particular message."

  - code: "orthographic_control"
    id: "cefr.skills.linguistic.descriptors.orthographic_control"
    description:
      - "This scale concerns the ability to copy, spell and use layout and punctuation."
      - "Key concepts operationalised in the scale include the following:"
      - "copying words and sentences (at lower levels);"
      - "spelling;"
      - "intelligibility through a blend of spelling, punctuation and layout."

entries:
  - scale: "general_linguistic_range"
    level: "pre_a1"
    code: "use_isolated_words_and_basic_expressions_to_give_simple_information_about_themselves"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.use_isolated_words_and_basic_expressions_to_give_simple_information_about_themselves.pre_a1"
    description: "Can use isolated words/signs and basic expressions in order to give simple information about themselves."

  - scale: "general_linguistic_range"
    level: "a1"
    code: "have_very_basic_range_of_simple_expressions_about_personal_details_and_concrete_needs"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_very_basic_range_of_simple_expressions_about_personal_details_and_concrete_needs.a1"
    description: "Has a very basic range of simple expressions about personal details and needs of a concrete type."

  - scale: "general_linguistic_range"
    level: "a1"
    code: "use_some_basic_structures_in_one_clause_sentences_with_some_omission_or_reduction"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.use_some_basic_structures_in_one_clause_sentences_with_some_omission_or_reduction.a1"
    description: "Can use some basic structures in one-clause sentences with some omission or reduction of elements."

  - scale: "general_linguistic_range"
    level: "a2"
    code: "have_repertoire_of_basic_language_for_predictable_everyday_situations"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_repertoire_of_basic_language_for_predictable_everyday_situations.a2"
    description: "Has a repertoire of basic language which enables them to deal with everyday situations with predictable content, though they will generally have to compromise the message and search for words/signs."

  - scale: "general_linguistic_range"
    level: "a2"
    code: "produce_brief_everyday_expressions_for_simple_needs_of_concrete_type"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.produce_brief_everyday_expressions_for_simple_needs_of_concrete_type.a2"
    description: "Can produce brief, everyday expressions in order to satisfy simple needs of a concrete type (e.g. personal details, daily routines, wants and needs, requests for information)."

  - scale: "general_linguistic_range"
    level: "a2"
    code: "use_basic_sentence_patterns_and_memorised_phrases_about_self_and_others"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.use_basic_sentence_patterns_and_memorised_phrases_about_self_and_others.a2"
    description: "Can use basic sentence patterns and communicate with memorised phrases, groups of a few words/signs and formulae about themselves and other people, what they do, places, possessions, etc."

  - scale: "general_linguistic_range"
    level: "a2"
    code: "have_limited_repertoire_of_short_memorised_phrases_for_predictable_survival_situations"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_limited_repertoire_of_short_memorised_phrases_for_predictable_survival_situations.a2"
    description: "Has a limited repertoire of short, memorised phrases covering predictable survival situations; frequent breakdowns and misunderstandings occur in non-routine situations."

  - scale: "general_linguistic_range"
    level: "b1"
    code: "have_sufficient_range_of_language_to_describe_unpredictable_situations_and_express_thoughts"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_sufficient_range_of_language_to_describe_unpredictable_situations_and_express_thoughts.b1"
    description: "Has a sufficient range of language to describe unpredictable situations, explain the main points in an idea or problem with reasonable precision and express thoughts on abstract or cultural topics such as music and film."

  - scale: "general_linguistic_range"
    level: "b1"
    code: "have_enough_language_to_get_by_with_some_hesitation_and_circumlocutions"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_enough_language_to_get_by_with_some_hesitation_and_circumlocutions.b1"
    description: "Has enough language to get by, with sufficient vocabulary to express themselves with some hesitation and circumlocutions on topics such as family, hobbies and interests, work, travel and current events, but lexical limitations cause repetition and even difficulty with formulation at times."

  - scale: "general_linguistic_range"
    level: "b2"
    code: "express_themselves_clearly_without_much_sign_of_having_to_restrict_what_they_want_to_say"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.express_themselves_clearly_without_much_sign_of_having_to_restrict_what_they_want_to_say.b2"
    description: "Can express themselves clearly without much sign of having to restrict what they want to say."

  - scale: "general_linguistic_range"
    level: "b2"
    code: "have_sufficient_range_of_language_to_give_clear_descriptions_express_viewpoints_and_develop_arguments"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.have_sufficient_range_of_language_to_give_clear_descriptions_express_viewpoints_and_develop_arguments.b2"
    description: "Has a sufficient range of language to be able to give clear descriptions, express viewpoints and develop arguments without much conspicuous searching for words/signs, using some complex sentence forms to do so."

  - scale: "general_linguistic_range"
    level: "c1"
    code: "use_broad_range_of_complex_grammatical_structures_appropriately_and_flexibly"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.use_broad_range_of_complex_grammatical_structures_appropriately_and_flexibly.c1"
    description: "Can use a broad range of complex grammatical structures appropriately and with considerable flexibility."

  - scale: "general_linguistic_range"
    level: "c1"
    code: "select_appropriate_formulation_from_broad_range_of_language_without_restricting_expression"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.select_appropriate_formulation_from_broad_range_of_language_without_restricting_expression.c1"
    description: "Can select an appropriate formulation from a broad range of language to express themselves clearly, without having to restrict what they want to say."

  - scale: "general_linguistic_range"
    level: "c2"
    code: "exploit_comprehensive_and_reliable_mastery_of_very_wide_range_of_language"
    id: "cefr.skills.linguistic.descriptors.general_linguistic_range.exploit_comprehensive_and_reliable_mastery_of_very_wide_range_of_language.c2"
    description: "Can exploit a comprehensive and reliable mastery of a very wide range of language to formulate thoughts precisely, give emphasis, differentiate and eliminate ambiguity. No signs of having to restrict what they want to say."

  - scale: "vocabulary_range"
    level: "a1"
    code: "have_basic_vocabulary_repertoire_of_words_and_phrases_related_to_concrete_situations"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_basic_vocabulary_repertoire_of_words_and_phrases_related_to_concrete_situations.a1"
    description: "Has a basic vocabulary repertoire of words/signs and phrases related to particular concrete situations."

  - scale: "vocabulary_range"
    level: "a2"
    code: "have_sufficient_vocabulary_to_conduct_routine_everyday_transactions"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_sufficient_vocabulary_to_conduct_routine_everyday_transactions.a2"
    description: "Has sufficient vocabulary to conduct routine everyday transactions involving familiar situations and topics."

  - scale: "vocabulary_range"
    level: "a2"
    code: "have_sufficient_vocabulary_for_expression_of_basic_communicative_needs"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_sufficient_vocabulary_for_expression_of_basic_communicative_needs.a2"
    description: "Has sufficient vocabulary for the expression of basic communicative needs."

  - scale: "vocabulary_range"
    level: "a2"
    code: "have_sufficient_vocabulary_for_coping_with_simple_survival_needs"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_sufficient_vocabulary_for_coping_with_simple_survival_needs.a2"
    description: "Has sufficient vocabulary for coping with simple survival needs."

  - scale: "vocabulary_range"
    level: "b1"
    code: "have_good_range_of_vocabulary_related_to_familiar_topics_and_everyday_situations"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_good_range_of_vocabulary_related_to_familiar_topics_and_everyday_situations.b1"
    description: "Has a good range of vocabulary related to familiar topics and everyday situations."

  - scale: "vocabulary_range"
    level: "b1"
    code: "have_sufficient_vocabulary_to_express_themselves_with_some_circumlocutions"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_sufficient_vocabulary_to_express_themselves_with_some_circumlocutions.b1"
    description: "Has sufficient vocabulary to express themselves with some circumlocutions on most topics pertinent to their everyday life such as family, hobbies and interests, work, travel and current events."

  - scale: "vocabulary_range"
    level: "b2"
    code: "understand_and_use_main_technical_terminology_of_their_field"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.understand_and_use_main_technical_terminology_of_their_field.b2"
    description: "Can understand and use the main technical terminology of their field, when discussing their area of specialisation with other specialists."

  - scale: "vocabulary_range"
    level: "b2"
    code: "have_good_range_of_vocabulary_for_field_and_most_general_topics"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_good_range_of_vocabulary_for_field_and_most_general_topics.b2"
    description: "Has a good range of vocabulary for matters connected to their field and most general topics."

  - scale: "vocabulary_range"
    level: "b2"
    code: "vary_formulation_to_avoid_frequent_repetition_despite_some_lexical_gaps"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.vary_formulation_to_avoid_frequent_repetition_despite_some_lexical_gaps.b2"
    description: "Can vary formulation to avoid frequent repetition, but lexical gaps can still cause hesitation and circumlocution."

  - scale: "vocabulary_range"
    level: "b2"
    code: "produce_appropriate_collocations_of_many_words_in_most_contexts"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.produce_appropriate_collocations_of_many_words_in_most_contexts.b2"
    description: "Can produce appropriate collocations of many words/signs in most contexts fairly systematically."

  - scale: "vocabulary_range"
    level: "b2"
    code: "understand_and_use_much_of_specialist_vocabulary_with_some_problems_outside_field"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.understand_and_use_much_of_specialist_vocabulary_with_some_problems_outside_field.b2"
    description: "Can understand and use much of the specialist vocabulary of their field but has problems with specialist terminology outside it."

  - scale: "vocabulary_range"
    level: "c1"
    code: "have_good_command_of_broad_lexical_repertoire_allowing_gaps_to_be_overcome"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_good_command_of_broad_lexical_repertoire_allowing_gaps_to_be_overcome.c1"
    description: "Has a good command of a broad lexical repertoire allowing gaps to be readily overcome with circumlocutions; little obvious searching for expressions or avoidance strategies."

  - scale: "vocabulary_range"
    level: "c1"
    code: "select_from_several_vocabulary_options_in_almost_all_situations"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.select_from_several_vocabulary_options_in_almost_all_situations.c1"
    description: "Can select from several vocabulary options in almost all situations by exploiting synonyms of even words/signs less commonly encountered."

  - scale: "vocabulary_range"
    level: "c1"
    code: "have_good_command_of_common_idiomatic_expressions_and_colloquialisms"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_good_command_of_common_idiomatic_expressions_and_colloquialisms.c1"
    description: "Has a good command of common idiomatic expressions and colloquialisms; can play with words/signs fairly well."

  - scale: "vocabulary_range"
    level: "c1"
    code: "understand_and_use_appropriately_technical_vocabulary_and_idiomatic_expressions_of_specialisation"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.understand_and_use_appropriately_technical_vocabulary_and_idiomatic_expressions_of_specialisation.c1"
    description: "Can understand and use appropriately the range of technical vocabulary and idiomatic expressions common to their area of specialisation."

  - scale: "vocabulary_range"
    level: "c2"
    code: "have_good_command_of_very_broad_lexical_repertoire_including_idiomatic_expressions"
    id: "cefr.skills.linguistic.descriptors.vocabulary_range.have_good_command_of_very_broad_lexical_repertoire_including_idiomatic_expressions.c2"
    description: "Has a good command of a very broad lexical repertoire including idiomatic expressions and colloquialisms; shows awareness of connotative levels of meaning."

  - scale: "grammatical_accuracy"
    level: "pre_a1"
    code: "employ_very_simple_principles_of_word_order_in_short_statements"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.employ_very_simple_principles_of_word_order_in_short_statements.pre_a1"
    description: "Can employ very simple principles of word/sign order in short statements."

  - scale: "grammatical_accuracy"
    level: "a1"
    code: "show_limited_control_of_few_simple_grammatical_structures_and_sentence_patterns"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.show_limited_control_of_few_simple_grammatical_structures_and_sentence_patterns.a1"
    description: "Shows only limited control of a few simple grammatical structures and sentence patterns in a learnt repertoire."

  - scale: "grammatical_accuracy"
    level: "a2"
    code: "use_some_simple_structures_correctly_but_still_make_basic_mistakes"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.use_some_simple_structures_correctly_but_still_make_basic_mistakes.a2"
    description: "Uses some simple structures correctly, but still systematically makes basic mistakes; nevertheless, it is usually clear what they are trying to say."

  - scale: "grammatical_accuracy"
    level: "b1"
    code: "communicate_with_reasonable_accuracy_in_familiar_contexts"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.communicate_with_reasonable_accuracy_in_familiar_contexts.b1"
    description: "Communicates with reasonable accuracy in familiar contexts; generally good control, though with noticeable mother-tongue influence. Errors occur, but it is clear what they are trying to express."

  - scale: "grammatical_accuracy"
    level: "b1"
    code: "use_repertoire_of_frequently_used_routines_and_patterns_reasonably_accurately"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.use_repertoire_of_frequently_used_routines_and_patterns_reasonably_accurately.b1"
    description: "Uses reasonably accurately a repertoire of frequently used “routines” and patterns associated with more predictable situations."

  - scale: "grammatical_accuracy"
    level: "b2"
    code: "have_good_grammatical_control_with_only_occasional_slips_or_minor_flaws"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.have_good_grammatical_control_with_only_occasional_slips_or_minor_flaws.b2"
    description: "Good grammatical control; occasional “slips” or non-systematic errors and minor flaws in sentence structure may still occur, but they are rare and can often be corrected in retrospect."

  - scale: "grammatical_accuracy"
    level: "b2"
    code: "show_relatively_high_degree_of_grammatical_control_without_misunderstanding"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.show_relatively_high_degree_of_grammatical_control_without_misunderstanding.b2"
    description: "Shows a relatively high degree of grammatical control. Does not make mistakes which lead to misunderstanding."

  - scale: "grammatical_accuracy"
    level: "b2"
    code: "have_good_command_of_simple_structures_and_some_complex_forms_despite_inaccuracy"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.have_good_command_of_simple_structures_and_some_complex_forms_despite_inaccuracy.b2"
    description: "Has a good command of simple language structures and some complex grammatical forms, although they tend to use complex structures rigidly with some inaccuracy."

  - scale: "grammatical_accuracy"
    level: "c1"
    code: "consistently_maintain_high_degree_of_grammatical_accuracy"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.consistently_maintain_high_degree_of_grammatical_accuracy.c1"
    description: "Consistently maintains a high degree of grammatical accuracy; errors are rare and difficult to spot."

  - scale: "grammatical_accuracy"
    level: "c2"
    code: "maintain_consistent_grammatical_control_of_complex_language_even_when_attention_is_otherwise_engaged"
    id: "cefr.skills.linguistic.descriptors.grammatical_accuracy.maintain_consistent_grammatical_control_of_complex_language_even_when_attention_is_otherwise_engaged.c2"
    description: "Maintains consistent grammatical control of complex language, even while attention is otherwise engaged (e.g. in forward planning, in monitoring others’ reactions)."

  - scale: "vocabulary_control"
    level: "a2"
    code: "control_narrow_repertoire_dealing_with_concrete_everyday_needs"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.control_narrow_repertoire_dealing_with_concrete_everyday_needs.a2"
    description: "Can control a narrow repertoire dealing with concrete, everyday needs."

  - scale: "vocabulary_control"
    level: "b1"
    code: "show_good_control_of_elementary_vocabulary_but_with_major_errors_on_more_complex_thoughts"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.show_good_control_of_elementary_vocabulary_but_with_major_errors_on_more_complex_thoughts.b1"
    description: "Shows good control of elementary vocabulary but major errors still occur when expressing more complex thoughts or handling unfamiliar topics and situations."

  - scale: "vocabulary_control"
    level: "b1"
    code: "use_wide_range_of_simple_vocabulary_appropriately_on_familiar_topics"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.use_wide_range_of_simple_vocabulary_appropriately_on_familiar_topics.b1"
    description: "Uses a wide range of simple vocabulary appropriately when discussing familiar topics."

  - scale: "vocabulary_control"
    level: "b2"
    code: "lexical_accuracy_generally_high_despite_some_confusion_or_incorrect_choice"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.lexical_accuracy_generally_high_despite_some_confusion_or_incorrect_choice.b2"
    description: "Lexical accuracy is generally high, though some confusion and incorrect word/sign choice does occur without hindering communication."

  - scale: "vocabulary_control"
    level: "c1"
    code: "use_less_common_vocabulary_idiomatically_and_appropriately"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.use_less_common_vocabulary_idiomatically_and_appropriately.c1"
    description: "Uses less common vocabulary idiomatically and appropriately."

  - scale: "vocabulary_control"
    level: "c1"
    code: "have_occasional_minor_slips_but_no_significant_vocabulary_errors"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.have_occasional_minor_slips_but_no_significant_vocabulary_errors.c1"
    description: "Occasional minor slips, but no significant vocabulary errors."

  - scale: "vocabulary_control"
    level: "c2"
    code: "use_vocabulary_consistently_correctly_and_appropriately"
    id: "cefr.skills.linguistic.descriptors.vocabulary_control.use_vocabulary_consistently_correctly_and_appropriately.c2"
    description: "Consistently correct and appropriate use of vocabulary."

  - scale: "overall_phonological_control"
    level: "a1"
    code: "pronunciation_of_very_limited_repertoire_can_be_understood_with_some_effort"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.pronunciation_of_very_limited_repertoire_can_be_understood_with_some_effort.a1"
    description: "Pronunciation of a very limited repertoire of learnt words and phrases can be understood with some effort by interlocutors used to dealing with speakers of the language group concerned. Can produce a limited range of sounds as well as stress for simple, familiar words and phrases."

  - scale: "overall_phonological_control"
    level: "a2"
    code: "pronunciation_generally_clear_enough_in_simple_everyday_situations"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.pronunciation_generally_clear_enough_in_simple_everyday_situations.a2"
    description: "Pronunciation is generally clear enough to be understood, but conversational partners will need to ask for repetition from time to time. Strong influence from the other language(s) they speak on stress, rhythm and intonation may affect intelligibility, nevertheless pronunciation of familiar words is clear."

  - scale: "overall_phonological_control"
    level: "b1"
    code: "pronunciation_generally_intelligible_despite_regular_mispronunciation_of_less_familiar_sounds"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.pronunciation_generally_intelligible_despite_regular_mispronunciation_of_less_familiar_sounds.b1"
    description: "Pronunciation is generally intelligible. Intonation and stress at both utterance and word levels do not prevent understanding of the message. Accent is usually influenced by the other language(s) they speak."

  - scale: "overall_phonological_control"
    level: "b2"
    code: "generally_use_appropriate_intonation_place_stress_and_articulate_sounds_clearly"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.generally_use_appropriate_intonation_place_stress_and_articulate_sounds_clearly.b2"
    description: "Can generally use appropriate intonation, place stress correctly and articulate individual sounds clearly; accent tends to be influenced by the other language(s) they speak, but has little or no effect on intelligibility."

  - scale: "overall_phonological_control"
    level: "c1"
    code: "employ_full_range_of_phonological_features_with_sufficient_control_for_intelligibility"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.employ_full_range_of_phonological_features_with_sufficient_control_for_intelligibility.c1"
    description: "Can employ the full range of phonological features in the target language with sufficient control to ensure intelligibility throughout. Can articulate virtually all the sounds of a target language; some features of accent(s) retained from other language(s) may be noticeable, but they do not affect intelligibility."

  - scale: "overall_phonological_control"
    level: "c2"
    code: "employ_full_range_of_phonological_features_to_convey_finer_shades_of_meaning"
    id: "cefr.skills.linguistic.descriptors.overall_phonological_control.employ_full_range_of_phonological_features_to_convey_finer_shades_of_meaning.c2"
    description: "Can employ the full range of phonological features in the target language with a high level of control – including prosodic features such as word and sentence stress, rhythm and intonation – so that the finer points of their message are clear and precise. Intelligibility and effective conveyance and enhancement of meaning are not affected in any way by features of accent that may be retained from other language(s)."

  - scale: "sound_articulation"
    level: "a1"
    code: "reproduce_sounds_in_target_language_if_carefully_guided"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.reproduce_sounds_in_target_language_if_carefully_guided.a1"
    description: "Can reproduce sounds in the target language if carefully guided. Can articulate a limited number of sounds, so that speech is only intelligible if the interlocutor provides support (e.g. by repeating correctly and by eliciting repetition of new sounds)."

  - scale: "sound_articulation"
    level: "a2"
    code: "mispronunciation_of_phonemes_does_not_hinder_intelligibility_if_interlocutor_makes_effort"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.mispronunciation_of_phonemes_does_not_hinder_intelligibility_if_interlocutor_makes_effort.a2"
    description: "Pronunciation is generally intelligible when communicating in simple everyday situations, provided the interlocutor makes an effort to understand specific sounds. Systematic mispronunciation of phonemes does not hinder intelligibility, provided the interlocutor makes an effort to recognise and adjust to the influence of the speaker’s language background on pronunciation."

  - scale: "sound_articulation"
    level: "b1"
    code: "generally_intelligible_despite_regular_mispronunciation_of_individual_sounds"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.generally_intelligible_despite_regular_mispronunciation_of_individual_sounds.b1"
    description: "Is generally intelligible throughout despite regular mispronunciation of individual sounds and words they are less familiar with."

  - scale: "sound_articulation"
    level: "b2"
    code: "articulate_high_proportion_of_sounds_clearly_despite_few_systematic_mispronunciations"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.articulate_high_proportion_of_sounds_clearly_despite_few_systematic_mispronunciations.b2"
    description: "Can articulate a high proportion of the sounds in the target language clearly in extended stretches of production; is intelligible throughout, despite a few systematic mispronunciations."

  - scale: "sound_articulation"
    level: "c1"
    code: "articulate_virtually_all_sounds_with_high_degree_of_control"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.articulate_virtually_all_sounds_with_high_degree_of_control.c1"
    description: "Can articulate virtually all the sounds of the target language with a high degree of control. They can usually self-correct if they noticeably mispronounce a sound."

  - scale: "sound_articulation"
    level: "c2"
    code: "articulate_virtually_all_sounds_with_clarity_and_precision"
    id: "cefr.skills.linguistic.descriptors.sound_articulation.articulate_virtually_all_sounds_with_clarity_and_precision.c2"
    description: "Can articulate virtually all the sounds of the target language with clarity and precision."

  - scale: "prosodic_features"
    level: "a1"
    code: "use_prosodic_features_of_limited_repertoire_of_simple_words_and_phrases_intelligibly"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.use_prosodic_features_of_limited_repertoire_of_simple_words_and_phrases_intelligibly.a1"
    description: "Can use the prosodic features of a limited repertoire of simple words and phrases intelligibly, in spite of a very strong influence on stress, rhythm and/or intonation from the other language(s) they speak; their interlocutor needs to be collaborative."

  - scale: "prosodic_features"
    level: "a2"
    code: "prosodic_features_are_adequate_for_familiar_everyday_words_and_simple_utterances"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.prosodic_features_are_adequate_for_familiar_everyday_words_and_simple_utterances.a2"
    description: "Can use the prosodic features of everyday words and phrases intelligibly, in spite of a strong influence on stress, rhythm and/or intonation from the other language(s) they speak. Prosodic features (e.g. word stress) are adequate for familiar everyday words and simple utterances."

  - scale: "prosodic_features"
    level: "b1"
    code: "convey_message_intelligibly_despite_strong_influence_on_stress_and_rhythm"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.convey_message_intelligibly_despite_strong_influence_on_stress_and_rhythm.b1"
    description: "Can convey their message in an intelligible way in spite of a strong influence on stress, intonation and/or rhythm from the other language(s) they speak."

  - scale: "prosodic_features"
    level: "b2"
    code: "employ_prosodic_features_to_support_message_despite_some_influence"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.employ_prosodic_features_to_support_message_despite_some_influence.b2"
    description: "Can employ prosodic features (e.g. stress, intonation, rhythm) to support the message they intend to convey, though with some influence from the other languages they speak."

  - scale: "prosodic_features"
    level: "c1"
    code: "vary_intonation_and_place_stress_correctly_to_express_precisely"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.vary_intonation_and_place_stress_correctly_to_express_precisely.c1"
    description: "Can produce smooth intelligible spoken discourse with only occasional lapses in control of stress, rhythm and/or intonation, which do not affect intelligibility or effectiveness. Can vary intonation and place stress correctly in order to express precisely what they mean to say."

  - scale: "prosodic_features"
    level: "c2"
    code: "exploit_prosodic_features_to_convey_finer_shades_of_meaning"
    id: "cefr.skills.linguistic.descriptors.prosodic_features.exploit_prosodic_features_to_convey_finer_shades_of_meaning.c2"
    description: "Can exploit prosodic features (e.g. stress, rhythm and intonation) appropriately and effectively in order to convey finer shades of meaning (e.g. to differentiate and emphasise)."

  - scale: "orthographic_control"
    level: "a1"
    code: "copy_familiar_words_and_short_phrases"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.copy_familiar_words_and_short_phrases.a1"
    description: "Can copy familiar words and short phrases, e.g. simple signs or instructions, names of everyday objects, names of shops, and set phrases used regularly."

  - scale: "orthographic_control"
    level: "a1"
    code: "spell_address_nationality_and_other_personal_details"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.spell_address_nationality_and_other_personal_details.a1"
    description: "Can spell their address, nationality and other personal details."

  - scale: "orthographic_control"
    level: "a1"
    code: "use_basic_punctuation"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.use_basic_punctuation.a1"
    description: "Can use basic punctuation (e.g. full stops, question marks)."

  - scale: "orthographic_control"
    level: "a2"
    code: "copy_short_sentences_on_everyday_subjects"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.copy_short_sentences_on_everyday_subjects.a2"
    description: "Can copy short sentences on everyday subjects, e.g. directions on how to get somewhere."

  - scale: "orthographic_control"
    level: "a2"
    code: "write_short_words_with_reasonable_phonetic_accuracy"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.write_short_words_with_reasonable_phonetic_accuracy.a2"
    description: "Can write with reasonable phonetic accuracy (but not necessarily fully standard spelling) short words that are in their oral vocabulary."

  - scale: "orthographic_control"
    level: "b1"
    code: "produce_continuous_writing_generally_intelligible_throughout"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.produce_continuous_writing_generally_intelligible_throughout.b1"
    description: "Can produce continuous writing which is generally intelligible throughout."

  - scale: "orthographic_control"
    level: "b1"
    code: "spelling_punctuation_and_layout_are_accurate_enough_most_of_the_time"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.spelling_punctuation_and_layout_are_accurate_enough_most_of_the_time.b1"
    description: "Spelling, punctuation and layout are accurate enough to be followed most of the time."

  - scale: "orthographic_control"
    level: "b2"
    code: "produce_clearly_intelligible_continuous_writing_following_standard_layout_and_paragraphing"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.produce_clearly_intelligible_continuous_writing_following_standard_layout_and_paragraphing.b2"
    description: "Can produce clearly intelligible, continuous writing which follows standard layout and paragraphing conventions."

  - scale: "orthographic_control"
    level: "b2"
    code: "spelling_and_punctuation_are_reasonably_accurate_but_may_show_mother_tongue_influence"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.spelling_and_punctuation_are_reasonably_accurate_but_may_show_mother_tongue_influence.b2"
    description: "Spelling and punctuation are reasonably accurate but may show signs of mother-tongue influence."

  - scale: "orthographic_control"
    level: "c1"
    code: "layout_paragraphing_and_punctuation_are_consistent_and_helpful"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.layout_paragraphing_and_punctuation_are_consistent_and_helpful.c1"
    description: "Layout, paragraphing and punctuation are consistent and helpful."

  - scale: "orthographic_control"
    level: "c1"
    code: "spelling_is_accurate_apart_from_occasional_slips_of_the_pen"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.spelling_is_accurate_apart_from_occasional_slips_of_the_pen.c1"
    description: "Spelling is accurate, apart from occasional slips of the pen."

  - scale: "orthographic_control"
    level: "c2"
    code: "writing_is_orthographically_free_of_error"
    id: "cefr.skills.linguistic.descriptors.orthographic_control.writing_is_orthographically_free_of_error.c2"
    description: "Writing is orthographically free of error."
