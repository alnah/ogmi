    level: "pre_a1"
    code: "communicate_very_basic_information_about_personal_details_in_simple_way"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.communicate_very_basic_information_about_personal_details_in_simple_way.pre_a1"
    description: "Can communicate very basic information about personal details in a simple way."

  - scale: "propositional_precision"
    level: "a1"
    code: "communicate_basic_information_about_personal_details_and_concrete_needs_in_simple_way"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.communicate_basic_information_about_personal_details_and_concrete_needs_in_simple_way.a1"
    description: "Can communicate basic information about personal details and needs of a concrete type in a simple way."

  - scale: "propositional_precision"
    level: "a2"
    code: "communicate_wanted_message_in_simple_direct_exchange_of_limited_information"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.communicate_wanted_message_in_simple_direct_exchange_of_limited_information.a2"
    description: "Can communicate what they want to say in a simple and direct exchange of limited information on familiar and routine matters, but in other situations they generally have to compromise the message."

  - scale: "propositional_precision"
    level: "b1"
    code: "explain_main_points_in_idea_or_problem_with_reasonable_precision"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.explain_main_points_in_idea_or_problem_with_reasonable_precision.b1"
    description: "Can explain the main points in an idea or problem with reasonable precision."

  - scale: "propositional_precision"
    level: "b1"
    code: "convey_simple_straightforward_information_of_immediate_relevance"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.convey_simple_straightforward_information_of_immediate_relevance.b1"
    description: "Can convey simple, straightforward information of immediate relevance, getting across the point they feel is most important."

  - scale: "propositional_precision"
    level: "b1"
    code: "express_main_point_comprehensibly"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.express_main_point_comprehensibly.b1"
    description: "Can express the main point they want to make comprehensibly."

  - scale: "propositional_precision"
    level: "b2"
    code: "pass_on_detailed_information_reliably"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.pass_on_detailed_information_reliably.b2"
    description: "Can pass on detailed information reliably."

  - scale: "propositional_precision"
    level: "b2"
    code: "communicate_essential_points_even_in_more_demanding_situations"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.communicate_essential_points_even_in_more_demanding_situations.b2"
    description: "Can communicate the essential points even in more demanding situations, though their language lacks expressive power and idiomaticity."

  - scale: "propositional_precision"
    level: "c1"
    code: "qualify_opinions_and_statements_precisely_in_relation_to_degrees_of_certainty_and_likelihood"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.qualify_opinions_and_statements_precisely_in_relation_to_degrees_of_certainty_and_likelihood.c1"
    description: "Can qualify opinions and statements precisely in relation to degrees of, for example, certainty/uncertainty, belief/doubt, likelihood, etc."

  - scale: "propositional_precision"
    level: "c1"
    code: "make_effective_use_of_linguistic_modality_to_signal_strength_of_claim_or_argument"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.make_effective_use_of_linguistic_modality_to_signal_strength_of_claim_or_argument.c1"
    description: "Can make effective use of linguistic modality to signal the strength of a claim, an argument or a position."

  - scale: "propositional_precision"
    level: "c2"
    code: "convey_finer_shades_of_meaning_precisely_using_wide_range_of_qualifying_devices"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.convey_finer_shades_of_meaning_precisely_using_wide_range_of_qualifying_devices.c2"
    description: "Can convey finer shades of meaning precisely by using, with reasonable accuracy, a wide range of qualifying devices (e.g. adverbs expressing degree, clauses expressing limitations)."

  - scale: "propositional_precision"
    level: "c2"
    code: "give_emphasis_differentiate_and_eliminate_ambiguity"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision.give_emphasis_differentiate_and_eliminate_ambiguity.c2"
    description: "Can give emphasis, differentiate and eliminate ambiguity."

  - scale: "fluency"
    level: "pre_a1"
    code: "manage_very_short_isolated_rehearsed_utterances_using_gesture_and_signalled_requests_for_help"
    id: "cefr.skills.pragmatic.descriptors.fluency.manage_very_short_isolated_rehearsed_utterances_using_gesture_and_signalled_requests_for_help.pre_a1"
    description: "Can manage very short, isolated, rehearsed utterances using gesture and signalled requests for help when necessary."

  - scale: "fluency"
    level: "a1"
    code: "manage_very_short_isolated_mainly_pre_packaged_utterances_with_much_pausing"
    id: "cefr.skills.pragmatic.descriptors.fluency.manage_very_short_isolated_mainly_pre_packaged_utterances_with_much_pausing.a1"
    description: "Can manage very short, isolated, mainly pre-packaged utterances, with much pausing to search for expressions, to articulate less familiar words/signs, and to repair communication."

  - scale: "fluency"
    level: "a2"
    code: "make_themselves_understood_in_short_contributions_despite_evident_pauses_false_starts_and_reformulation"
    id: "cefr.skills.pragmatic.descriptors.fluency.make_themselves_understood_in_short_contributions_despite_evident_pauses_false_starts_and_reformulation.a2"
    description: "Can make themselves understood in short contributions, even though pauses, false starts and reformulation are very evident."

  - scale: "fluency"
    level: "a2"
    code: "construct_phrases_on_familiar_topics_with_sufficient_ease_to_handle_short_exchanges"
    id: "cefr.skills.pragmatic.descriptors.fluency.construct_phrases_on_familiar_topics_with_sufficient_ease_to_handle_short_exchanges.a2"
    description: "Can construct phrases on familiar topics with sufficient ease to handle short exchanges, despite very noticeable hesitation and false starts."

  - scale: "fluency"
    level: "b1"
    code: "express_themselves_with_relative_ease_despite_pauses_and_cul_de_sacs"
    id: "cefr.skills.pragmatic.descriptors.fluency.express_themselves_with_relative_ease_despite_pauses_and_cul_de_sacs.b1"
    description: "Can express themselves with relative ease. Despite some problems with formulation resulting in pauses and “cul-de-sacs”, they are able to keep going effectively without help."

  - scale: "fluency"
    level: "b1"
    code: "keep_going_comprehensibly_even_though_pausing_for_planning_and_repair_is_evident"
    id: "cefr.skills.pragmatic.descriptors.fluency.keep_going_comprehensibly_even_though_pausing_for_planning_and_repair_is_evident.b1"
    description: "Can keep going comprehensibly, even though pausing for grammatical and lexical planning and repair is very evident, especially in longer stretches of free production."

  - scale: "fluency"
    level: "b2"
    code: "communicate_spontaneously_showing_remarkable_fluency_and_ease_in_longer_complex_stretches"
    id: "cefr.skills.pragmatic.descriptors.fluency.communicate_spontaneously_showing_remarkable_fluency_and_ease_in_longer_complex_stretches.b2"
    description: "Can communicate spontaneously, often showing remarkable fluency and ease of expression in even longer complex stretches of language."

  - scale: "fluency"
    level: "b2"
    code: "produce_stretches_of_language_with_fairly_even_tempo_despite_some_hesitation"
    id: "cefr.skills.pragmatic.descriptors.fluency.produce_stretches_of_language_with_fairly_even_tempo_despite_some_hesitation.b2"
    description: "Can produce stretches of language with a fairly even tempo; although they can be hesitant as they search for patterns and expressions, there are few noticeably long pauses."

  - scale: "fluency"
    level: "b2"
    code: "interact_with_degree_of_fluency_and_spontaneity_that_makes_regular_interaction_possible"
    id: "cefr.skills.pragmatic.descriptors.fluency.interact_with_degree_of_fluency_and_spontaneity_that_makes_regular_interaction_possible.b2"
    description: "Can interact with a degree of fluency and spontaneity that makes regular interaction with users of the target language quite possible without imposing strain on either party."

  - scale: "fluency"
    level: "c1"
    code: "express_themselves_fluently_and_spontaneously_almost_effortlessly"
    id: "cefr.skills.pragmatic.descriptors.fluency.express_themselves_fluently_and_spontaneously_almost_effortlessly.c1"
    description: "Can express themselves fluently and spontaneously, almost effortlessly. Only a conceptually difficult subject can hinder a natural, smooth flow of language."

  - scale: "fluency"
    level: "c2"
    code: "express_themselves_at_length_with_natural_effortless_unhesitating_flow"
    id: "cefr.skills.pragmatic.descriptors.fluency.express_themselves_at_length_with_natural_effortless_unhesitating_flow.c2"
    description: "Can express themselves at length with a natural, effortless, unhesitating flow. Pauses only to reflect on precisely the right means to express their thoughts or to find an appropriate example or explanation."
