id: "cefr.skills.pragmatic.descriptors"
version: "1"

catalog:
  - code: "flexibility"
    id: "cefr.skills.pragmatic.descriptors.flexibility"
    description:
      - "Flexibility is concerned with the ability to adapt language learnt to new situations and to formulate thoughts in different ways."
      - "Key concepts operationalised in the scale include the following:"
      - "recombining learnt elements creatively (especially lower levels);"
      - "adapting language to the situation and to changes of direction in conversation and discussion;"
      - "reformulating points in different ways to emphasise points, express degrees of commitment and confidence, and avoid ambiguity."

  - code: "turntaking"
    id: "cefr.skills.pragmatic.descriptors.turntaking"
    description:
      - "Turntaking is concerned with the ability to take the discourse initiative."
      - "This ability can be viewed both as an interaction strategy (to take the floor) or as an integral aspect of discourse competence."
      - "For this reason this scale also appears in the section “Interaction strategies”."
      - "Key concepts operationalised in the scale include the following:"
      - "initiating, maintaining and ending conversation;"
      - "intervening in an existing conversation or discussion, often using a prefabricated expression to do so, or to gain time to think."
      - "This scale is repeated under “Interaction strategies”."

  - code: "thematic_development"
    id: "cefr.skills.pragmatic.descriptors.thematic_development"
    description:
      - "This scale is concerned with the way in which ideas are logically presented in a text and related to each other in a clear rhetorical structure."
      - "It also involves following relevant discourse conventions."
      - "Key concepts operationalised in the scale include the following:"
      - "telling a story/relating a narrative (lower levels);"
      - "developing a text, expanding and supporting points appropriately, for instance with examples;"
      - "developing an argument (especially B2 to C1)."

  - code: "coherence_and_cohesion"
    id: "cefr.skills.pragmatic.descriptors.coherence_and_cohesion"
    description:
      - "Coherence and cohesion refer to the way in which the separate elements of a text are interwoven into a coherent whole by exploiting linguistic devices such as referencing, substitution, ellipsis and other forms of textual cohesion, plus logical and temporal connectors and other forms of discourse markers."
      - "Both cohesion and coherence operate at the level of the sentence/utterance and at the level of the complete text."
      - "Key concepts operationalised in the scale include the following:"
      - "linking elements, mainly with logical and temporal connectors;"
      - "using paragraphs to emphasise text structure;"
      - "varying the types of cohesive devices used, with fewer “clunky” connectors (C levels)."

  - code: "propositional_precision"
    id: "cefr.skills.pragmatic.descriptors.propositional_precision"
    description:
      - "This scale concerns the ability to pinpoint how to formulate what one wishes to express."
      - "It concerns the extent to which the user/learner can communicate detail and shades of meaning, and can avoid compromising their ideally intended message."
      - "Key concepts operationalised in the scale include the following:"
      - "type of setting and information concerned (A1 to B1), with no restriction from B2, when the user/learner can communicate detail reliably, even in more demanding situations;"
      - "degree of detail and precision in information given;"
      - "ability to qualify, emphasise and disambiguate likelihood, commitment, belief, etc."

  - code: "fluency"
    id: "cefr.skills.pragmatic.descriptors.fluency"
    description:
      - "Fluency, as discussed above, has a broader, holistic meaning (= articulate speaker/signer) and a narrower, technical and more psycholinguistic meaning (= accessing one’s repertoire)."
      - "The broader interpretation would include “Propositional precision”, “Flexibility”, and at least to some extent “Thematic development” and “Coherence/cohesion”."
      - "For this reason, the scale below focuses more on the narrower, more traditional view of fluency."
      - "Key concepts operationalised in the scale include the following:"
      - "ability to construct utterances, despite hesitations and pauses (lower levels);"
      - "ability to maintain a lengthy production or conversation;"
      - "ease and spontaneity of expression."

