id: "cefr.skills.sociolinguistic.descriptors"
version: "1"

catalog:
  - code: "sociolinguistic_appropriateness"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness"
    description:
      - "One scale is offered for “Sociolinguistic appropriateness”."
      - "Key concepts operationalised in the scale include the following:"
      - "using polite forms and showing awareness of politeness conventions;"
      - "performing language functions in an appropriate way (at lower levels in a neutral register);"
      - "socialising, following basic routines at lower levels, without requiring the interlocutor(s) to behave differently (from B2 up) and employing idiomatic expressions, allusive usage and humour (at C levels);"
      - "recognising sociocultural cues, especially those pointing to differences, and acting accordingly;"
      - "adopting an appropriate register (from B2 up)."

entries:
  - scale: "sociolinguistic_appropriateness"
    level: "a1"
    code: "establish_basic_social_contact_using_simplest_everyday_polite_forms"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.establish_basic_social_contact_using_simplest_everyday_polite_forms.a1"
    description: "Can establish basic social contact by using the simplest everyday polite forms of: greetings and farewells; introductions; saying please, thank you, sorry, etc."

  - scale: "sociolinguistic_appropriateness"
    level: "a2"
    code: "perform_and_respond_to_basic_language_functions_and_express_opinions_simply"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.perform_and_respond_to_basic_language_functions_and_express_opinions_simply.a2"
    description: "Can perform and respond to basic language functions, e.g. information exchange and requests, and express opinions and attitudes in a simple way."

  - scale: "sociolinguistic_appropriateness"
    level: "a2"
    code: "socialise_simply_but_effectively_using_simplest_common_expressions_and_routines"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.socialise_simply_but_effectively_using_simplest_common_expressions_and_routines.a2"
    description: "Can socialise simply but effectively using the simplest common expressions and following basic routines."

  - scale: "sociolinguistic_appropriateness"
    level: "a2"
    code: "handle_very_short_social_exchanges_using_everyday_polite_forms"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.handle_very_short_social_exchanges_using_everyday_polite_forms.a2"
    description: "Can handle very short social exchanges, using everyday polite forms of greeting and address."

  - scale: "sociolinguistic_appropriateness"
    level: "a2"
    code: "make_and_respond_to_invitations_suggestions_and_apologies"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.make_and_respond_to_invitations_suggestions_and_apologies.a2"
    description: "Can make and respond to invitations, suggestions, apologies, etc."

  - scale: "sociolinguistic_appropriateness"
    level: "b1"
    code: "perform_and_respond_to_wide_range_of_language_functions_in_neutral_register"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.perform_and_respond_to_wide_range_of_language_functions_in_neutral_register.b1"
    description: "Can perform and respond to a wide range of language functions, using their most common exponents in a neutral register."

  - scale: "sociolinguistic_appropriateness"
    level: "b1"
    code: "be_aware_of_salient_politeness_conventions_and_act_appropriately"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.be_aware_of_salient_politeness_conventions_and_act_appropriately.b1"
    description: "Is aware of the salient politeness conventions and acts appropriately."

  - scale: "sociolinguistic_appropriateness"
    level: "b1"
    code: "be_aware_of_significant_differences_between_customs_usages_attitudes_values_and_beliefs"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.be_aware_of_significant_differences_between_customs_usages_attitudes_values_and_beliefs.b1"
    description: "Is aware of, and looks out for signs of, the most significant differences between the customs, usages, attitudes, values and beliefs prevalent in the community concerned and those of their own community."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "keep_up_with_and_contribute_to_group_discussions_even_when_talk_is_fast_and_colloquial"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.keep_up_with_and_contribute_to_group_discussions_even_when_talk_is_fast_and_colloquial.b2"
    description: "Can with some effort keep up with and contribute to group discussions even when talk is fast and colloquial."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "recognise_and_interpret_sociocultural_cues_and_modify_expression_appropriately"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.recognise_and_interpret_sociocultural_cues_and_modify_expression_appropriately.b2"
    description: "Can recognise and interpret sociocultural/sociolinguistic cues and consciously modify their linguistic forms of expression in order to express themselves appropriately in the situation."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "express_themselves_confidently_clearly_and_politely_in_formal_or_informal_register"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.express_themselves_confidently_clearly_and_politely_in_formal_or_informal_register.b2"
    description: "Can express themselves confidently, clearly and politely in a formal or informal register, appropriate to the situation and person(s) concerned."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "adjust_expression_to_make_some_distinction_between_formal_and_informal_registers"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.adjust_expression_to_make_some_distinction_between_formal_and_informal_registers.b2"
    description: "Can adjust their expression to make some distinction between formal and informal registers but may not always do so appropriately."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "sustain_relationships_without_unintentionally_amusing_or_irritating_others"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.sustain_relationships_without_unintentionally_amusing_or_irritating_others.b2"
    description: "Can sustain relationships with users of the target language without unintentionally amusing or irritating them or requiring them to behave other than they would with another proficient user."

  - scale: "sociolinguistic_appropriateness"
    level: "b2"
    code: "express_themselves_appropriately_in_situations_and_avoid_crass_errors"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.express_themselves_appropriately_in_situations_and_avoid_crass_errors.b2"
    description: "Can express themselves appropriately in situations and avoid crass errors of formulation."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "recognise_wide_range_of_idiomatic_expressions_and_colloquialisms_appreciating_register_shifts"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.recognise_wide_range_of_idiomatic_expressions_and_colloquialisms_appreciating_register_shifts.c1"
    description: "Can recognise a wide range of idiomatic expressions and colloquialisms, appreciating register shifts; may, however, need to confirm occasional details, especially if the accent is unfamiliar."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "understand_humour_irony_and_implicit_cultural_references_and_pick_up_nuances"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.understand_humour_irony_and_implicit_cultural_references_and_pick_up_nuances.c1"
    description: "Can understand humour, irony and implicit cultural references and pick up nuances of meaning."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "follow_films_employing_considerable_degree_of_slang_and_idiomatic_usage"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.follow_films_employing_considerable_degree_of_slang_and_idiomatic_usage.c1"
    description: "Can follow films employing a considerable degree of slang and idiomatic usage."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "use_language_flexibly_and_effectively_for_social_purposes"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.use_language_flexibly_and_effectively_for_social_purposes.c1"
    description: "Can use language flexibly and effectively for social purposes, including emotional, allusive and joking usage."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "adjust_level_of_formality_to_suit_social_context_and_maintain_consistent_register"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.adjust_level_of_formality_to_suit_social_context_and_maintain_consistent_register.c1"
    description: "Can adjust their level of formality (register and style) to suit the social context: formal, informal or colloquial as appropriate, and maintain a consistent register."

  - scale: "sociolinguistic_appropriateness"
    level: "c1"
    code: "frame_critical_remarks_or_express_strong_disagreement_diplomatically"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.frame_critical_remarks_or_express_strong_disagreement_diplomatically.c1"
    description: "Can frame critical remarks or express strong disagreement diplomatically."

  - scale: "sociolinguistic_appropriateness"
    level: "c2"
    code: "mediate_effectively_and_naturally_between_target_language_users_and_own_community"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.mediate_effectively_and_naturally_between_target_language_users_and_own_community.c2"
    description: "Can mediate effectively and naturally between users of the target language and members of their own community, taking account of sociocultural and sociolinguistic differences."

  - scale: "sociolinguistic_appropriateness"
    level: "c2"
    code: "have_good_command_of_idiomatic_expressions_and_colloquialisms_with_awareness_of_connotation"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.have_good_command_of_idiomatic_expressions_and_colloquialisms_with_awareness_of_connotation.c2"
    description: "Has a good command of idiomatic expressions and colloquialisms with awareness of connotative levels of meaning."

  - scale: "sociolinguistic_appropriateness"
    level: "c2"
    code: "appreciate_virtually_all_sociolinguistic_and_sociocultural_implications_and_react_accordingly"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.appreciate_virtually_all_sociolinguistic_and_sociocultural_implications_and_react_accordingly.c2"
    description: "Appreciates virtually all the sociolinguistic and sociocultural implications of language used by proficient users of the target language and can react accordingly."

  - scale: "sociolinguistic_appropriateness"
    level: "c2"
    code: "employ_wide_variety_of_sophisticated_language_to_command_argue_persuade_and_negotiate"
    id: "cefr.skills.sociolinguistic.descriptors.sociolinguistic_appropriateness.employ_wide_variety_of_sophisticated_language_to_command_argue_persuade_and_negotiate.c2"
    description: "Can effectively employ, both orally and in writing, a wide variety of sophisticated language to command, argue, persuade, dissuade, negotiate and counsel."
