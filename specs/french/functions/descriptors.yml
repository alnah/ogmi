    level: "b1"
    code: "demander_ou_proposer_de_l_aide"
    id: "french.functions.descriptors.interactions_sociales.demander_ou_proposer_de_l_aide.b1"
    description:
      - "Est-ce que tu pourrais m’aider à déménager, ce week-end ?"
      - "Si tu as besoin de moi, tu n’as qu’à m’appeler !"
      - "J’ai besoin de ton aide samedi prochain, tu es disponible ?"
      - "Je suis à votre entière disposition si vous avez besoin de moi."
      - "Tu peux toujours compter sur moi, même en pleine nuit."

  - scale: "interactions_sociales"
    level: "b1"
    code: "interagir_au_telephone"
    id: "french.functions.descriptors.interactions_sociales.interagir_au_telephone.b1"
    description:
      - "Allô, qui est à l’appareil ?"
      - "C’est de la part de Monsieur André. Pouvez-vous l’avertir ?"
      - "Attendez, ne raccrochez pas, je vous passe Madame Martin !"
      - "Je suis bien au 04 67 83 17 17 ?"

  - scale: "interactions_sociales"
    level: "b1"
    code: "faire_des_suggestions_et_reagir_a_des_propositions_acquiescer_accepter_refuser_s_excuser"
    id: "french.functions.descriptors.interactions_sociales.faire_des_suggestions_et_reagir_a_des_propositions_acquiescer_accepter_refuser_s_excuser.b1"
    description:
      - "Je vous conseille d’acheter le billet d’avion aujourd’hui même."
      - "Et si on faisait un voyage au Pérou ? Ce serait génial, non ?"
      - "Ça te plairait d’aller dans un bar ce week-end ?"
      - "Pourquoi pas !"
      - "Ça te dirait d’aller voir un film ?"
      - "Oh, bof, ça ne me dit pas grand-chose."

  - scale: "interactions_sociales"
    level: "b1"
    code: "donner_une_raison_et_expliquer_ses_choix"
    id: "french.functions.descriptors.interactions_sociales.donner_une_raison_et_expliquer_ses_choix.b1"
    description:
      - "Puisque tu ne veux pas que je parte, je ne partirai pas."
      - "Hier, je ne suis pas sorti, parce qu’il faisait trop froid."
      - "C’est pour revoir ma famille que je suis reparti au Canada."
      - "J’ai toujours préféré voyager en avion parce que c’est plus rapide et moins dangereux."

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_des_reserves_ou_son_opposition"
    id: "french.functions.descriptors.interactions_sociales.exprimer_des_reserves_ou_son_opposition.b1"
    description:
      - "Même si tu m’as téléphoné plusieurs fois, tu ne m’as pas convaincu."
      - "Malgré la qualité de tes arguments, j’ai des doutes ! Je crois que tu as tort !"
      - "C’est une honte ! Je suis totalement contre !"
      - "Je ne suis pas convaincue, je vais y réfléchir."
      - "Désolé, je regrette, mais je ne le ferai pas aujourd’hui ! Une autre fois, peut-être."

  - scale: "interactions_sociales"
    level: "b1"
    code: "parler_de_ce_qui_a_plu_ou_deplu"
    id: "french.functions.descriptors.interactions_sociales.parler_de_ce_qui_a_plu_ou_deplu.b1"
    description:
      - "Cette exposition lui a beaucoup plu."
      - "Dis ! C’est passionnant ton projet ! J’adore ce que tu as fait !"
      - "Voyager en bateau, ça a été une horreur, j’ai eu le mal de mer durant tout le trajet."
      - "Le film ne m’a pas plu, je n’ai pas du tout aimé l’interprétation des acteurs."

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_son_interet_ou_son_indifference"
    id: "french.functions.descriptors.interactions_sociales.exprimer_son_interet_ou_son_indifference.b1"
    description:
      - "Ça m’intéresse énormément !"
      - "Le dernier livre que j’ai lu m’a passionné !"
      - "Il a divorcé ? Ah bon ! Je ne savais pas. De toute façon, ce ne sont pas mes affaires !"

  - scale: "interactions_sociales"
    level: "b1"
    code: "organiser_quelque_chose_en_discutant_de_ce_qu_il_faut_faire"
    id: "french.functions.descriptors.interactions_sociales.organiser_quelque_chose_en_discutant_de_ce_qu_il_faut_faire.b1"
    description:
      - "En ce qui concerne les préparatifs de la soirée de samedi, prends des gâteaux chez le pâtissier du coin et quelques trucs à grignoter au supermarché. Je m’occupe du reste."
      - "Pour faire le gâteau cet après-midi, je voudrais que tu ailles à la petite épicerie du quartier, j’ai besoin de sucre."
      - "D’abord, il faut que tu achètes les boissons et après, que tu reviennes ici pour les mettre au réfrigérateur !"

  - scale: "interactions_sociales"
    level: "b1"
    code: "demander_et_donner_des_conseils"
    id: "french.functions.descriptors.interactions_sociales.demander_et_donner_des_conseils.b1"
    description:
      - "Pourquoi tu n’achètes pas une voiture plus économique ?"
      - "Alors, qu’est-ce que je devrais faire ?"
      - "Tu ferais mieux de faire un peu plus de sport !"
      - "À ta place, moi, je partirais immédiatement !"
      - "Vous devriez travailler moins et vous reposer un peu plus ! Un conseil : votre santé d’abord !"

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_une_volonte_et_proposer_ses_services"
    id: "french.functions.descriptors.interactions_sociales.exprimer_une_volonte_et_proposer_ses_services.b1"
    description:
      - "Je ferais bien une randonnée le week-end prochain."
      - "Elle voudrait bien que sa sœur revienne pour les vacances d’été, sinon, c’est décidé, elle ira la voir."
      - "Ils ont l’intention de déménager le mois prochain."
      - "Est-ce que je peux vous aider à faire ce travail ?"
      - "Est-ce que tu peux me rendre un service ? - Oui, je peux te donner un coup de main."

  - scale: "interactions_sociales"
    level: "b1"
    code: "avertir_mettre_en_garde"
    id: "french.functions.descriptors.interactions_sociales.avertir_mettre_en_garde.b1"
    description:
      - "Soyez attentif en traversant la route."
      - "Fais attention en traversant."
      - "Prends garde à toi, elle a des chiens très agressifs."

  - scale: "interactions_sociales"
    level: "b1"
    code: "parler_de_son_experience_professionnelle_et_de_son_environnement_de_travail"
    id: "french.functions.descriptors.interactions_sociales.parler_de_son_experience_professionnelle_et_de_son_environnement_de_travail.b1"
    description:
      - "Mon travail, c’est de créer des logiciels, je travaille pour la même société depuis 6 ans. Grâce à mon expérience professionnelle, j’ai obtenu un bon poste."
      - "Au bureau, mes collègues sont très coopératifs, on forme une bonne équipe de travail. On n’a pas trop d’expérience dans le monde du marketing mais on est très motivés."
      - "À l’office du tourisme où je travaille, je suis le plus jeune et le seul à parler 5 langues étrangères."

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_et_interagir_a_propos_de_ses_sentiments"
    id: "french.functions.descriptors.interactions_sociales.exprimer_et_interagir_a_propos_de_ses_sentiments.b1"
    description:
      - "Je me méfie d’eux. Je me sens mal à l’aise face à eux."
      - "Je me réjouis de te revoir demain."
      - "Je suis ravi de vous avoir rencontré ! C’était un vrai plaisir / Ça a été un vrai plaisir !"
      - "Il est démoralisé, il n’en peut plus au bureau !"
      - "J’en ai marre de voyager en bus ! C’est trop fatigant."
      - "Eh bien, qu’est-ce qui vous arrive ? Vous avez une drôle de tête ! Vous n’avez pas l’air en forme !"

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_des_souhaits_et_des_espoirs"
    id: "french.functions.descriptors.interactions_sociales.exprimer_des_souhaits_et_des_espoirs.b1"
    description:
      - "J’espère que tout va bien se dérouler."
      - "Ils souhaitent vraiment que vous veniez à leur mariage."
      - "J’aimerais que vous veniez me voir régulièrement."
      - "Eh bien oui, nous espérons que les enfants réussiront leur examen final."

  - scale: "interactions_sociales"
    level: "b1"
    code: "exprimer_des_intentions_et_des_ambitions"
    id: "french.functions.descriptors.interactions_sociales.exprimer_des_intentions_et_des_ambitions.b1"
    description:
      - "Je vais m’inscrire à la fac de droit. Les cours commencent début octobre."
      - "Il envisage de s’installer en France après ses études."
      - "Je voudrais faire des économies pour partir à New York l’été prochain."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "raconter_des_evenements_passes"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_des_evenements_passes.b1"
    description:
      - "Quand nous sommes allés au Brésil en 2010, nous sommes arrivés en plein carnaval. Ça a été une expérience extraordinaire, il y avait des danseurs et de la musique partout. Quand nous sommes revenus en France, on a pris des cours de samba."
      - "L’hiver dernier, comme nous avions quelques jours de vacances, nous sommes allés skier au cœur des Alpes. Nous avions réservé à Chamonix. Nous avons payé un forfait pour une semaine et nous nous sommes inscrits à des cours de perfectionnement. Le dernier jour, pendant que Philippe faisait du snowboard, j’ai fait une belle et longue promenade en pleine montagne. Nous nous sommes vraiment amusés."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "raconter_un_souvenir_ou_une_anecdote_ou_une_suite_de_faits"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_un_souvenir_ou_une_anecdote_ou_une_suite_de_faits.b1"
    description:
      - "Quand j’avais douze ans, pour Noël, mes parents m’ont acheté un magnifique vélo orange. J’étais super content. Le lendemain de Noël, j’ai voulu le montrer à mes amis. Après avoir demandé la permission à mes parents, je suis sorti à toute vitesse de chez moi. Malheureusement, au bout de la rue, j’ai glissé et j’ai cassé mon vélo."
      - "Comme je devais absolument réussir mon DELF B1, je me suis fait un vrai programme : je suis allé à la bibliothèque pour chercher des informations, j’ai utilisé internet pour réviser et j’ai rédigé des fiches. Au final, tout s’est bien passé puisque j’ai réussi mon examen avec 85 points sur cent."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "raconter_des_faits_divers"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_des_faits_divers.b1"
    description:
      - "Tout s’est passé très vite : il est entré dans la banque, il a sorti son revolver, il a pris l’argent et il a disparu aussi vite qu’il était entré."
      - "Quand les policiers sont arrivés, la jeune fille était allongée par terre, inconsciente, et sans son sac à main."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "raconter_une_experience_passee"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_une_experience_passee.b1"
    description:
      - "Quand j’étais petit, je devais faire beaucoup de tâches ménagères. Comme mes parents étaient toujours absents, je faisais souvent la vaisselle et même les courses."
      - "L’année dernière, comme je ne pouvais pas continuer mes études près de chez moi, je suis partie vivre à Lyon. J’ai dû louer un appartement près de l’université où je m’étais inscrite. Au début, ça a été un peu difficile mais avec le temps, je me suis habituée à vivre loin de chez moi."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "raconter_l_intrigue_d_un_livre_ou_d_un_film"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_l_intrigue_d_un_livre_ou_d_un_film.b1"
    description:
      - "« Ensemble, c’est tout » est l’histoire de deux personnes solitaires. Le roman parle de la solitude des gens de générations différentes. Les personnages sont touchants."
      - "« Intouchables » est un film merveilleux. Il s’agit d’une histoire entre deux hommes totalement différents. Philippe est un riche aristocrate tétraplégique et Driss est un jeune de banlieue tout juste sorti de prison. Ensemble, ils vivront des situations tristes, folles et en même temps très drôles. Une amitié très spéciale va naître entre ces deux personnages."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "decrire_une_situation_hypothetique"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_une_situation_hypothetique.b1"
    description:
      - "Si tu pouvais le faire à ma place, ça serait génial !"
      - "Si je ne lui donnais pas de mes nouvelles, elle le prendrait mal."
      - "Si vous ne savez pas quoi faire, passez me voir."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "s_informer_sur_les_lieux_et_decrire_et_caracteriser_des_lieux"
    id: "french.functions.descriptors.descriptions_et_recits.s_informer_sur_les_lieux_et_decrire_et_caracteriser_des_lieux.b1"
    description:
      - "Pourrais-tu me donner quelques renseignements sur Prague, sur les lieux à visiter, les plats typiques, etc. ? Je pars en vacances dans deux semaines."
      - "Nous avons visité un monastère qui se trouve à 15 minutes de Carcassonne, dans le Sud de la France. Il y avait beaucoup de vignes tout autour. C’était magnifique."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "presenter_un_pays_une_ville_et_ses_habitants"
    id: "french.functions.descriptors.descriptions_et_recits.presenter_un_pays_une_ville_et_ses_habitants.b1"
    description:
      - "La France est aussi appelée l’Hexagone."
      - "Les habitants de cette ville sortent plus le soir que chez nous."
      - "Je vais vous présenter un pays caractérisé par la diversité de ses paysages et connu pour son avancée technologique."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "s_informer_sur_les_personnes_et_decrire_et_caracteriser_des_personnes"
    id: "french.functions.descriptors.descriptions_et_recits.s_informer_sur_les_personnes_et_decrire_et_caracteriser_des_personnes.b1"
    description:
      - "C’est le grand couturier qui s’est installé près de chez moi. On dirait qu’il est timide mais ce n’est pas le cas, tout au contraire, il est abordable et très sympathique."
      - "C’est qui le monsieur avec la cravate rouge ? C’est le nouveau responsable du magasin."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "decrire_les_relations_entre_des_personnes"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_les_relations_entre_des_personnes.b1"
    description:
      - "Comme mon voisin ne supporte aucun bruit même dans la journée, personne ne s’entend avec lui."
      - "J’ai une relation très cordiale avec elle et comme elle est très généreuse et a bon caractère, elle est appréciée de tous."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "faire_une_biographie_ou_le_portrait_d_une_personne"
    id: "french.functions.descriptors.descriptions_et_recits.faire_une_biographie_ou_le_portrait_d_une_personne.b1"
    description:
      - "Ma meilleure amie est une personne très drôle qui porte toujours des vêtements à la mode et excentriques et qui aime tester tous les nouveaux restaurants."
      - "Nelson Mandela est né en juillet 1918 dans le village de Mvezo. Il s’est engagé assez tôt en politique en assistant aux réunions de Walter Sisulu. Défendant les droits des Noirs face à l’Apartheid, il est arrêté et mis en prison en 1962. Après être sorti de prison en 1990 et avoir reçu le prix Nobel en 1993, il est élu président de la République d’Afrique du Sud en 1994."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "rapporter_les_propos_ou_les_paroles_de_quelqu_un"
    id: "french.functions.descriptors.descriptions_et_recits.rapporter_les_propos_ou_les_paroles_de_quelqu_un.b1"
    description:
      - "Michel m’a dit qu’il arriverait en retard."
      - "Elle dit qu’elle a beaucoup aimé la pièce de théâtre."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "s_informer_sur_les_choses_et_decrire_et_caracteriser_des_choses"
    id: "french.functions.descriptors.descriptions_et_recits.s_informer_sur_les_choses_et_decrire_et_caracteriser_des_choses.b1"
    description:
      - "C’est le meuble ancien qu’il a acheté chez le brocanteur ?"
      - "C’est une tente de camping pour deux personnes. Elle est en nylon. Elle est très facile à monter. De plus, elle est imperméable et résistante. Elle ne pèse que 2 kilos et ne coûte que 55 euros."
      - "Le logiciel que Philippe a acheté est très performant pour gérer la comptabilité d’une PME. Tout le monde, même avec peu de notions informatiques, peut l’utiliser sans difficultés."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "comparer_les_choses_les_personnes_et_les_medias"
    id: "french.functions.descriptors.descriptions_et_recits.comparer_les_choses_les_personnes_et_les_medias.b1"
    description:
      - "Mon ordinateur personnel a toujours été plus performant que celui de mon travail."
      - "Tel père, tel fils, ils ont le même caractère !"
      - "Le Monde a plus d’articles intéressants que le quotidien que tu lis habituellement."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "faire_une_presentation_d_un_theme_ou_d_un_projet"
    id: "french.functions.descriptors.descriptions_et_recits.faire_une_presentation_d_un_theme_ou_d_un_projet.b1"
    description:
      - "Nous allons maintenant parler d’un problème qui nous concerne tous."
      - "Voilà ce que nous allons faire ce week-end : d’abord, nous irons voir Serge à Lyon, par la suite, ensuite, nous visiterons Lausanne."

  - scale: "descriptions_et_recits"
    level: "b1"
    code: "decrire_un_fait_de_societe_ou_un_phenomene_ou_une_activite_artistique"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_un_fait_de_societe_ou_un_phenomene_ou_une_activite_artistique.b1"
    description:
      - "L’augmentation du nombre de personnes au chômage est constante ces dernières années."
      - "Les personnes tatouées sont de plus en plus nombreuses dans ce pays."
      - "Le Rap est une musique qui permet à de nombreux jeunes de s’exprimer."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "demander_des_renseignements_et_des_informations"
    id: "french.functions.descriptors.echanges_d_informations.demander_des_renseignements_et_des_informations.b1"
    description:
      - "T’as quelque chose de prévu pour les vacances ?"
      - "Pardon, pourriez-vous m’indiquer où se trouve le département marketing ?"
      - "Est-ce que ça vaut la peine de visiter ce musée ?"
      - "Quel est le dernier délai pour régler la facture ?"

  - scale: "echanges_d_informations"
    level: "b1"
    code: "fournir_des_renseignements_et_des_informations"
    id: "french.functions.descriptors.echanges_d_informations.fournir_des_renseignements_et_des_informations.b1"
    description:
      - "Hier, j’ai appris que David allait bientôt se marier."
      - "On vient d’annoncer la date des prochaines élections présidentielles."
      - "La station de métro dont vous me parlez est en rénovation."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "expliquer_le_mode_d_emploi_d_un_appareil"
    id: "french.functions.descriptors.echanges_d_informations.expliquer_le_mode_d_emploi_d_un_appareil.b1"
    description:
      - "Par précaution, il faut que tu éteignes ton portable avant d’enlever la batterie."
      - "Tu appuies d’abord sur le bouton de droite de la cafetière et tu attends que la lumière rouge passe au vert avant de servir le café."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "demander_et_donner_une_explication_et_des_precisions"
    id: "french.functions.descriptors.echanges_d_informations.demander_et_donner_une_explication_et_des_precisions.b1"
    description:
      - "Quelle est la quantité exacte de chaque ingrédient pour bien faire le gâteau dont tu m’as parlé ?"
      - "Afin d’être plus clair, j’ai préparé un PowerPoint et des photocopies pour que tout le monde suive."
      - "Il n’est pas venu parce qu’il avait trop de travail à finir."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "realiser_une_interview_ou_passer_un_entretien"
    id: "french.functions.descriptors.echanges_d_informations.realiser_une_interview_ou_passer_un_entretien.b1"
    description:
      - "Monsieur le Président, quelles seraient d’après vous les priorités en matière d’énergies renouvelables ?"
      - "Pourquoi êtes-vous intéressé par ce travail ?"
      - "Parce que le poste est en relation avec mon expérience professionnelle. J’ai travaillé 6 ans à « Ikea » et 4 ans à « Maisons du Monde »."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "reformuler_pour_expliquer_ou_generaliser"
    id: "french.functions.descriptors.echanges_d_informations.reformuler_pour_expliquer_ou_generaliser.b1"
    description:
      - "« Il a le cafard », ça veut dire qu’il est déprimé et qu’il voit tout en noir."
      - "Si j’ai bien compris vos messages, tout le monde est d’accord. Tout va bien."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "exprimer_une_supposition"
    id: "french.functions.descriptors.echanges_d_informations.exprimer_une_supposition.b1"
    description:
      - "Je suppose qu’il pourra faire la randonnée avec nous. Hier, il n’avait plus de fièvre, et sa toux avait quasiment disparu."
      - "Comme il ne m’a pas rappelé, j’imagine qu’il est fâché."

  - scale: "echanges_d_informations"
    level: "b1"
    code: "synthetiser_un_bref_recit_un_article_un_expose_une_interview_ou_un_documentaire_et_donner_son_opinion"
    id: "french.functions.descriptors.echanges_d_informations.synthetiser_un_bref_recit_un_article_un_expose_une_interview_ou_un_documentaire_et_donner_son_opinion.b1"
    description:
      - "C’est un article qui expose la situation dramatique dont souffrent chaque jour des milliers de civils et que j’ai trouvé choquant à cause de la violence des faits qu’il décrit."
      - "L’exposé de mon camarade a traité d’un problème qui nous concerne tous : le réchauffement climatique et ses conséquences. À mon avis, il l’a présenté simplement et d’une façon très claire."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "exprimer_l_accord_et_le_desaccord"
    id: "french.functions.descriptors.opinions_et_arguments.exprimer_l_accord_et_le_desaccord.b1"
    description:
      - "En ce qui me concerne, je suis tout à fait d’accord avec ce qu’il vient de dire."
      - "Effectivement, on est de ton avis ! Si on ne fait rien, la situation va s’aggraver."
      - "Tu te trompes complètement, les produits bio ne sont pas forcément plus chers, bien au contraire…"

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "exprimer_et_defendre_un_point_de_vue_ou_une_opinion"
    id: "french.functions.descriptors.opinions_et_arguments.exprimer_et_defendre_un_point_de_vue_ou_une_opinion.b1"
    description:
      - "Il me semble que la situation est tendue entre vous, parce que vous ne parlez jamais de vos problèmes personnels."
      - "Personnellement, je pense que parler plusieurs langues est aussi important que d’avoir un diplôme universitaire. Cela permet la mobilité et la communication internationale."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "exprimer_la_cause_et_la_consequence"
    id: "french.functions.descriptors.opinions_et_arguments.exprimer_la_cause_et_la_consequence.b1"
    description:
      - "Comme il a été malade la semaine dernière, il a manqué beaucoup de cours et ne sera pas prêt pour l’examen."
      - "À cause de ses problèmes financiers, je ne suis pas sûr qu’il puisse faire le voyage dont il rêve depuis si longtemps."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "poser_un_probleme_et_proposer_des_solutions"
    id: "french.functions.descriptors.opinions_et_arguments.poser_un_probleme_et_proposer_des_solutions.b1"
    description:
      - "Il y a de plus en plus de bouchons au départ des vacances scolaires. Il faudrait mieux répartir les dates des congés entre les régions."
      - "Il n’y a plus de responsable pour organiser les voyages scolaires, on pourrait proposer cette tâche à Benjamin, je suis sûr qu’il acceptera."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "formuler_des_hypotheses"
    id: "french.functions.descriptors.opinions_et_arguments.formuler_des_hypotheses.b1"
    description:
      - "Si nous avions plus d’argent, nous pourrions partir plus longtemps et plus loin en vacances."
      - "Je demanderais un autographe à mon acteur préféré si je le rencontrais."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "presenter_les_avantages_et_les_inconvenients_d_options_differentes"
    id: "french.functions.descriptors.opinions_et_arguments.presenter_les_avantages_et_les_inconvenients_d_options_differentes.b1"
    description:
      - "Il est vrai qu’avec de grandes fenêtres, vous aurez plus de lumière mais vous aurez aussi plus chaud en été."
      - "Si on rénove le château médiéval, cela rapportera des bénéfices avec les visites mais le village perdra sa tranquillité."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "developper_une_idee_ou_un_raisonnement_simple"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_idee_ou_un_raisonnement_simple.b1"
    description:
      - "Les produits bio sont bons pour la santé. On devrait donc en manger plus souvent."
      - "Il est innocent même si tout l’accuse. En effet, bien qu’il mente de temps en temps, il est incapable de faire du mal à quelqu’un."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "developper_une_argumentation_logique_et_coherente"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_argumentation_logique_et_coherente.b1"
    description:
      - "Manger local permet de développer l’économie de la région et de créer des emplois."
      - "L’énergie produite par le soleil devrait être le principal but de toutes les recherches énergétiques car celle-ci est inépuisable et présente partout sur la planète."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "argumenter_une_prise_de_position_et_la_defendre"
    id: "french.functions.descriptors.opinions_et_arguments.argumenter_une_prise_de_position_et_la_defendre.b1"
    description:
      - "Les patrons peuvent toujours prétendre que l’égalité de salaire existe dans leur entreprise mais les statistiques démontrent le contraire. En effet, pour 80 % des entreprises évaluées, on constate que les hommes touchent en moyenne 15 % de salaire en plus que les femmes pour le même poste."
      - "Je suis pour le partage des tâches ménagères. Actuellement, les femmes comme les hommes mènent une vie active. Donc, dans les couples, il devrait exister un partage des obligations domestiques. Malheureusement, ce n’est pas le cas d’après les enquêtes réalisées."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "mettre_en_valeur_des_arguments"
    id: "french.functions.descriptors.opinions_et_arguments.mettre_en_valeur_des_arguments.b1"
    description:
      - "J’insiste sur l’aspect positif des énergies renouvelables, ce sont elles qui permettront de changer notre futur."
      - "Vous pouvez remarquer que ce sont vraiment nos efforts dans la recherche qui ont permis d’améliorer la qualité de nos produits."
      - "C’est l’embauche de ces deux nouveaux ingénieurs qui a facilité l’amélioration de notre production."

  - scale: "opinions_et_arguments"
    level: "b1"
    code: "evaluer_et_apprecier_des_films_et_des_livres"
    id: "french.functions.descriptors.opinions_et_arguments.evaluer_et_apprecier_des_films_et_des_livres.b1"
    description:
      - "Son dernier film ne m’a vraiment pas plu : je l’ai trouvé beaucoup trop violent, même si les acteurs jouent bien."
      - "Il a adoré le style de Stendhal dans « Le rouge et le noir ». D’après lui, les descriptions sont très visuelles et permettent au lecteur de s’identifier aux personnages."

  - scale: "biens_et_services"
    level: "b1"
    code: "confirmer_et_demander_une_confirmation"
    id: "french.functions.descriptors.biens_et_services.confirmer_et_demander_une_confirmation.b1"
    description:
      - "Vous pouvez me confirmer que vous arriverez bien à 20 h 35 à Orly ?"
      - "Alors, comme convenu, vous passez me prendre à la gare ?"
      - "Comme je te l’ai déjà dit, je t’enverrai un courriel pour te confirmer l’heure du rendez-vous."

  - scale: "biens_et_services"
    level: "b1"
    code: "exprimer_clairement_ses_attentes"
    id: "french.functions.descriptors.biens_et_services.exprimer_clairement_ses_attentes.b1"
    description:
      - "Elle te demande d’aller chercher les enfants à l’école, à 16 h 30. N’oublie pas de leur apporter un goûter."
      - "Il aimerait bien que tu l’aides à organiser son voyage."
      - "Je préférerais que tu viennes le plus tôt possible."

  - scale: "biens_et_services"
    level: "b1"
    code: "exprimer_sa_satisfaction_ou_son_mecontentement_et_se_plaindre"
    id: "french.functions.descriptors.biens_et_services.exprimer_sa_satisfaction_ou_son_mecontentement_et_se_plaindre.b1"
    description:
      - "C’est génial ! Je suis ravi d’apprendre que vous avez trouvé du travail."
      - "J’en ai assez de voir traîner tes chaussettes partout. Range-les !"
      - "J’ai vraiment trop de travail en ce moment, je n’en peux plus."

  - scale: "autres_notions"
    level: "b1"
    code: "exprimer_une_obligation"
    id: "french.functions.descriptors.autres_notions.exprimer_une_obligation.b1"
    description:
      - "Il faut absolument répondre à la lettre recommandée que t’a envoyée Madame Blanchard."
      - "Je dois lui préparer deux rapports pour son prochain voyage en Angleterre."
      - "Il faudrait que tu connaisses personnellement ton locataire avant de signer le contrat de location."

  - scale: "autres_notions"
    level: "b1"
    code: "exprimer_son_hesitation"
    id: "french.functions.descriptors.autres_notions.exprimer_son_hesitation.b1"
    description:
      - "Eh bien, je voudrais parler avec toi mais j’ai peur que tu te fâches de nouveau."
      - "Pour les vacances, j’hésite entre la maison de mes parents ou un petit hôtel à la montagne."
      - "Je ne sais pas si je veux rester à la maison ou partir avec vous au cinéma. Je ne sais pas quoi faire."

  - scale: "autres_notions"
    level: "b1"
    code: "exprimer_des_regrets"
    id: "french.functions.descriptors.autres_notions.exprimer_des_regrets.b1"
    description:
      - "J’aurais dû terminer mes études… Aujourd’hui, j’aurais une meilleure situation financière."
      - "J’aurais mieux fait de rester chez moi, je n’aurais pas eu cet accident."
      - "Il regrette de ne pas t’avoir envoyé un petit mot pour t’annoncer la bonne nouvelle."

  - scale: "autres_notions"
    level: "b1"
    code: "exprimer_la_possibilite_et_la_probabilite"
    id: "french.functions.descriptors.autres_notions.exprimer_la_possibilite_et_la_probabilite.b1"
    description:
      - "Il est possible qu’il revienne demain."
      - "Je pense qu’il est tout à fait probable qu’il s’installe au Japon."
      - "Il me semble qu’il a toutes les chances de réussir son entretien d’embauche."

  - scale: "autres_notions"
    level: "b1"
    code: "exprimer_des_certitudes_et_le_doute"
    id: "french.functions.descriptors.autres_notions.exprimer_des_certitudes_et_le_doute.b1"
    description:
      - "J’ai l’impression qu’il est très amoureux."
      - "Margaux n’est pas sûre que ses parents acceptent sa décision."
      - "Je doute que cette information soit correcte. Je me demande si on t’a dit la vérité."

  - scale: "interactions_sociales"
    level: "b2"
    code: "parler_de_ses_gouts_et_de_ses_degouts_de_ses_centres_d_interet_et_de_ses_desinterets"
    id: "french.functions.descriptors.interactions_sociales.parler_de_ses_gouts_et_de_ses_degouts_de_ses_centres_d_interet_et_de_ses_desinterets.b2"
    description:
      - "Je m’initie depuis peu au réalisme dans la littérature."
      - "Je suis sensible à la douceur de ce paysage."
      - "Je suis horrifié[e] par ces images brutales."
      - "La politique, ça me laisse indifférent."

  - scale: "interactions_sociales"
    level: "b2"
    code: "parler_de_ses_projets"
    id: "french.functions.descriptors.interactions_sociales.parler_de_ses_projets.b2"
    description:
      - "Il se pourrait que, l’année prochaine, je travaille dans une agence de presse et que j’écrive des dépêches pour un quotidien."
      - "Si j’obtenais ce poste, je pourrais enfin mettre en œuvre tous les projets que mon équipe et moi-même avons envisagés."
      - "Il serait intéressant de reprendre le dossier sur les ventes de nos produits au Japon et de recontacter des personnes sur place."

  - scale: "interactions_sociales"
    level: "b2"
    code: "avertir_mettre_en_garde"
    id: "french.functions.descriptors.interactions_sociales.avertir_mettre_en_garde.b2"
    description:
      - "Fais attention, si tu continues comme ça, ça va déplaire à tout le monde."
      - "Si tu insistes, tu finiras par l’agacer."
      - "Un tel comportement ne te mènera nulle part."

  - scale: "interactions_sociales"
    level: "b2"
    code: "parler_de_son_experience_professionnelle_et_de_son_environnement_de_travail"
    id: "french.functions.descriptors.interactions_sociales.parler_de_son_experience_professionnelle_et_de_son_environnement_de_travail.b2"
    description:
      - "Dans mon travail, je dois essentiellement négocier avec les clients, mais aussi, organiser et gérer le suivi des commandes."
      - "Je suis diplômé en économie, j’ai un master, spécialité finances, qui correspond à un bac+5."
      - "Je dirige un département, j’ai cinq collaborateurs sous ma responsabilité directe et vingt-cinq personnes en management indirect."

  - scale: "interactions_sociales"
    level: "b2"
    code: "exprimer_et_interagir_a_propos_de_ses_sentiments"
    id: "french.functions.descriptors.interactions_sociales.exprimer_et_interagir_a_propos_de_ses_sentiments.b2"
    description:
      - "Je me suis mis en colère quand j’ai vu que mon vélo avait été abîmé."
      - "Elle hurlait de rage tellement son frère l’avait énervée."
      - "Marie était ravie de ce qu’elle avait fait et son visage traduisait sa fierté."
      - "Pourquoi devrions-nous accepter que nos voisins fassent du bruit pendant leurs soirées ?"
      - "Ça me dépasse que les passagers mettent leurs pieds sur les sièges."

  - scale: "interactions_sociales"
    level: "b2"
    code: "exprimer_des_souhaits_et_des_espoirs"
    id: "french.functions.descriptors.interactions_sociales.exprimer_des_souhaits_et_des_espoirs.b2"
    description:
      - "Je me réjouis qu’on puisse travailler sur ce projet ensemble."
      - "J’espère être retenu[e] pour ce poste en Australie, l’année prochaine."

  - scale: "interactions_sociales"
    level: "b2"
    code: "exprimer_des_intentions_et_des_ambitions"
    id: "french.functions.descriptors.interactions_sociales.exprimer_des_intentions_et_des_ambitions.b2"
    description:
      - "Je vous appellerai dans les plus brefs délais."
      - "Je ferai le tour du monde une fois que j’aurai mis assez d’argent de côté."
      - "Nous avons une réunion vendredi avec notre supérieur et l’ordre du jour est chargé."
      - "Je n’ai pas l’intention de lui faire de cadeaux."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "raconter_des_evenements_passes_en_detail"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_des_evenements_passes_en_detail.b2"
    description:
      - "Le jour de mon mariage, il pleuvait des cordes et nous avons dû prendre toutes les photos sous le chapiteau. Malgré cela, j’en garde un merveilleux souvenir. Le repas était fabuleux et tous les invités se sont bien régalés."
      - "L’été dernier, sachant que mon groupe favori allait donner un concert à Londres, j’ai sauté dans un avion. Le concert était génial, j’ai dansé, chanté, crié même si je savais que, le lendemain, je n’aurais plus de voix. J’en ai aussi profité pour aller visiter des quartiers de Londres que j’avais toujours voulu découvrir."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "raconter_un_souvenir_ou_une_anecdote_ou_une_suite_de_faits_en_detail"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_un_souvenir_ou_une_anecdote_ou_une_suite_de_faits_en_detail.b2"
    description:
      - "Tu ne sais pas ce qui m’est arrivé ? Figure-toi que je promenais mon chien dans le parc quand soudain, j’ai entendu un bruit assourdissant. En regardant autour de moi, j’ai vu qu’un arbre énorme venait de tomber. Il y avait des gens qui criaient et qui appelaient au secours et quelques personnes semblaient coincées sous l’une des grosses branches. Heureusement que j’avais mon portable, j’ai pu appeler les pompiers."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "raconter_des_faits_divers_en_detail"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_des_faits_divers_en_detail.b2"
    description:
      - "Hier soir, un terrible carambolage a eu lieu sur l’autoroute A63. Les conditions météo sont à l’origine de l’accident. Les secours sont arrivés rapidement sur les lieux et malgré l’ampleur des dégâts, il n’y a que des blessés légers. Cependant, on déplore que le responsable de l’accident se soit enfui."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "raconter_une_experience_passee_en_detail"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_une_experience_passee_en_detail.b2"
    description:
      - "Après avoir fini mes études universitaires, je suis parti[e] au Canada où j’ai bossé dans un laboratoire. Là-bas j’ai découvert de super paysages et je me suis fait des potes."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "decrire_une_situation_hypothetique"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_une_situation_hypothetique.b2"
    description:
      - "Tu aurais été à ma place, qu’est-ce que tu aurais fait ?"
      - "Nous arriverons à temps à l’aéroport à moins qu’il y ait un embouteillage."
      - "Je t’appellerai au cas où je serais en retard pour le dîner."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "s_informer_sur_les_lieux_et_decrire_et_caracteriser_des_lieux_en_detail"
    id: "french.functions.descriptors.descriptions_et_recits.s_informer_sur_les_lieux_et_decrire_et_caracteriser_des_lieux_en_detail.b2"
    description:
      - "Le village où je passais mes vacances était pittoresque. J’aimais entendre tous ces petits bruits de la campagne dès l’aube."
      - "C’est une maison ancienne dont la façade principale est recouverte de lierre. Bien que très rustique, on s’y sent bien."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "decrire_les_relations_entre_des_personnes"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_les_relations_entre_des_personnes.b2"
    description:
      - "Ce sont des amies de longue date, elles se sont connues sur les bancs de l’école et ont fait les 400 coups ensemble. Elles savent qu’elles peuvent compter l’une sur l’autre, à tout moment et quelle que soit la situation."
      - "Le jour où ils se sont rencontrés, ils ont eu un coup de foudre et depuis ils ne se sont plus quittés. Ils rayonnent tous les deux et leur bonheur fait plaisir à voir. D’ailleurs, ils comptent se marier l’an prochain et fêter ça avec leur entourage."
      - "Il a rendu visite à sa cousine qu’il n’avait pas vue depuis des années. Petits, ils n’avaient pas beaucoup de différence d’âge et jouaient bien ensemble lors des grandes vacances chez leurs grands-parents."
      - "Entre eux, l’ambiance n’est pas au beau fixe. C’est à peine s’ils se disent bonjour. Une de leurs collègues a tenté d’apaiser la situation en jouant les médiatrices, en vain. L’ambiance est particulièrement glaciale."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "faire_une_biographie_ou_le_portrait_d_une_personne"
    id: "french.functions.descriptors.descriptions_et_recits.faire_une_biographie_ou_le_portrait_d_une_personne.b2"
    description:
      - "Jean-Baptiste Poquelin (Molière) naquit à Paris en 1622. Il y étudia jusqu’en 1637 puis il entra dans le théâtre en 1643. Il parcourut la France avec une compagnie de théâtre et cette période marqua le début de son œuvre comique. Il s’installa à Lyon en 1653 où il écrivit certaines pièces qui connurent un grand succès."
      - "Te souviens-tu de cette collègue timide et un peu effacée qui était arrivée en France à l’âge de vingt-sept ans ? Je l’ai revue la semaine dernière : elle se présente aux élections municipales."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "rapporter_les_propos_ou_les_paroles_de_quelqu_un_au_passe"
    id: "french.functions.descriptors.descriptions_et_recits.rapporter_les_propos_ou_les_paroles_de_quelqu_un_au_passe.b2"
    description:
      - "Elle a dit qu’elle avait attendu longtemps chez le médecin."
      - "On a annoncé que le volcan pouvait à tout moment entrer en éruption."
      - "Elle pensait qu’il aurait pu lui téléphoner."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "faire_une_presentation_detaillee_d_un_theme_ou_d_un_projet"
    id: "french.functions.descriptors.descriptions_et_recits.faire_une_presentation_detaillee_d_un_theme_ou_d_un_projet.b2"
    description:
      - "À Pâques, nous séjournerons trois jours à Paris, au cours desquels nous explorerons les trésors de la capitale. Après avoir flâné dans le Quartier Latin, nous nous rendrons à Montmartre où nous participerons à un atelier de caricature sur la Place du Tertre. Le point culminant de notre escapade sera un dîner aux chandelles sur un bateau-mouche."

  - scale: "descriptions_et_recits"
    level: "b2"
    code: "decrire_un_fait_de_societe_ou_un_phenomene_ou_une_activite_artistique"
    id: "french.functions.descriptors.descriptions_et_recits.decrire_un_fait_de_societe_ou_un_phenomene_ou_une_activite_artistique.b2"
    description:
      - "L’œuvre de François Truffaut est considérable et l’empreinte qu’il a laissée dans le cinéma est indéniable."
      - "La dépendance aux nouvelles technologies est devenue telle qu’aujourd’hui on la nomme « nomophobie »."
      - "La destruction d’une barre du quartier des Mimosas tire un trait sur l’existence des grands ensembles issus des cités dortoirs."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "fournir_des_renseignements_et_des_informations_avec_assurance"
    id: "french.functions.descriptors.echanges_d_informations.fournir_des_renseignements_et_des_informations_avec_assurance.b2"
    description:
      - "Cet hôtel, situé au bord d’un lac, offre des prestations de qualité : piscine, climatisation, salle de jeux. Le décor est simple et élégant, le petit-déjeuner copieux et le personnel tout à fait serviable."
      - "Je vous recommande ce collaborateur qui nous a donné entière satisfaction durant les quinze ans où il a été cadre dans notre entreprise. Il nous a toujours rendu des dossiers impeccables et s’est bien intégré dans les différentes équipes."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "realiser_une_interview_ou_passer_un_entretien"
    id: "french.functions.descriptors.echanges_d_informations.realiser_une_interview_ou_passer_un_entretien.b2"
    description:
      - "Parlez-moi de votre parcours, s’il vous plaît."
      - "Après avoir été licencié, j’ai retrouvé rapidement un poste de cadre dans une entreprise à deux pas de chez moi."
      - "Pourriez-vous nous préciser ce que vous entendez par « exception culturelle » ?"

  - scale: "echanges_d_informations"
    level: "b2"
    code: "reformuler_pour_expliquer_ou_generaliser"
    id: "french.functions.descriptors.echanges_d_informations.reformuler_pour_expliquer_ou_generaliser.b2"
    description:
      - "Le portable a changé nos vies, autrement dit, les gens y sont complètement accros et n’arrivent plus à s’en passer."
      - "Ce que je veux dire exactement, c’est qu’il faudrait revoir tout le dossier avant de le rendre au responsable."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "exprimer_une_supposition"
    id: "french.functions.descriptors.echanges_d_informations.exprimer_une_supposition.b2"
    description:
      - "Puisqu’il te l’a demandé, je suppose que tu vas partir avec lui !"
      - "Il insiste tellement qu’il finira bien par obtenir un rendez-vous."
      - "Il se peut qu’il pleuve dans les prochains jours."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "rediger_un_commentaire_des_donnees_chiffrees"
    id: "french.functions.descriptors.echanges_d_informations.rediger_un_commentaire_des_donnees_chiffrees.b2"
    description:
      - "Ces données font apparaître un écart considérable entre le chiffre officiel et le nombre réel des participants."
      - "Le déficit budgétaire s’élève à 20 milliards d’euros, ce qui constitue une augmentation de 10 % par rapport à l’an dernier."
      - "La plupart des Parisiens prennent les transports en commun, un grand nombre d’entre eux, notamment, utilise le métro."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "rediger_un_compte_rendu"
    id: "french.functions.descriptors.echanges_d_informations.rediger_un_compte_rendu.b2"
    description:
      - "Suite à la réunion qui s’est tenue le mois dernier et dont l’ordre du jour proposait le vote pour les travaux de réparation des chaudières, il a été décidé de demander plusieurs devis auprès de professionnels recommandés par le syndic."
      - "L’analyse des différents composants électroniques a permis de mettre en évidence les défauts du système, une étude plus approfondie va être effectuée sur les machines."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "resumer_un_bref_recit_un_article_un_expose_une_interview_ou_un_documentaire_et_donner_son_opinion"
    id: "french.functions.descriptors.echanges_d_informations.resumer_un_bref_recit_un_article_un_expose_une_interview_ou_un_documentaire_et_donner_son_opinion.b2"
    description:
      - "Pour ma part, le témoignage de M. Duval a permis de lever le voile sur les mécanismes opaques de cette ONG."
      - "En résumé, le documentaire montre les causes de la forte croissance démographique dans les villes et, de ce fait, devrait servir de base aux discussions entre élus. Je le trouve très bien fait."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "resumer_un_texte_ou_une_discussion_en_restituant_les_prises_de_position_et_les_raisonnements"
    id: "french.functions.descriptors.echanges_d_informations.resumer_un_texte_ou_une_discussion_en_restituant_les_prises_de_position_et_les_raisonnements.b2"
    description:
      - "Nous retenons les arguments en faveur de l’achat de nouveaux matériels informatiques et étudierons de près les différents devis présentés lors de la réunion."
      - "Après analyse de ses dernières performances décevantes, le journaliste sportif souligne la faible probabilité qu’a ce joueur de tennis de remporter la finale du tournoi."

  - scale: "echanges_d_informations"
    level: "b2"
    code: "synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses"
    id: "french.functions.descriptors.echanges_d_informations.synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses.b2"
    description:
      - "Conformément à l’opinion générale ainsi qu’aux arguments contenus dans les articles de ces deux derniers jours, nous pouvons supposer que les négociations annoncées n’aboutiront pas."
      - "Suite aux différents entretiens et aux journées d’essai avec les candidats potentiels, le DRH et la Direction ont finalement retenu trois dossiers à présenter au conseil d’administration."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "exprimer_et_defendre_un_point_de_vue_ou_une_opinion"
    id: "french.functions.descriptors.opinions_et_arguments.exprimer_et_defendre_un_point_de_vue_ou_une_opinion.b2"
    description:
      - "À ta place, je renoncerais car les enjeux sont trop importants pour qu’on prenne ça à la légère."
      - "Vu la concurrence féroce dans ta branche, à mon avis, tu devrais te bouger davantage."
      - "Tu as tort, l’œuvre de cet architecte n’est pas si avant-gardiste que cela. Le Corbusier avait déjà travaillé sur ce concept dans les années 30 !"

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "exprimer_la_cause_et_la_consequence"
    id: "french.functions.descriptors.opinions_et_arguments.exprimer_la_cause_et_la_consequence.b2"
    description:
      - "Du fait de son emploi du temps chargé, il n’a pas déjeuné."
      - "J’ai complètement réorganisé le classement de la bibliothèque de sorte que les livres de référence soient plus facilement repérables."
      - "Il avait le mal du pays, de ce fait, il a écourté son séjour à l’étranger."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "poser_un_probleme_et_proposer_des_solutions"
    id: "french.functions.descriptors.opinions_et_arguments.poser_un_probleme_et_proposer_des_solutions.b2"
    description:
      - "Les vacances approchant, nous devons absolument organiser les remplacements. Et si on recrutait du personnel ?"
      - "Le budget est insuffisant pour les travaux à réaliser, il faut impérativement le réajuster. Nous sommes donc contraints de définir des priorités et renoncer à certains investissements."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "formuler_des_hypotheses"
    id: "french.functions.descriptors.opinions_et_arguments.formuler_des_hypotheses.b2"
    description:
      - "Si Paul se pointe à la bourre à la fête, elle risque de se barrer."
      - "Si elle se présente aux élections, elle sera probablement élue à condition qu’elle soit suffisamment soutenue par la municipalité."
      - "À votre avis, s’il y avait du pétrole dans cette vallée, en quoi la vie locale serait-elle bouleversée ?"

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "presenter_les_avantages_et_les_inconvenients_de_positions_differentes"
    id: "french.functions.descriptors.opinions_et_arguments.presenter_les_avantages_et_les_inconvenients_de_positions_differentes.b2"
    description:
      - "Je suis d’accord avec toi sur le fait que les prix de l’immobilier ont baissé mais je pense, et ne te fâche pas, que cette tendance ne m’incitera pas à acheter."
      - "S’il est vrai, et je partage ton point de vue, que la majorité des ados passent trop de temps devant l’ordinateur, je pense néanmoins qu’il existe aussi un bon nombre de jeunes qui vont au cinéma, qui sortent avec leurs amis ou qui pratiquent un sport."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "developper_une_idee_ou_un_raisonnement_simple"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_idee_ou_un_raisonnement_simple.b2"
    description:
      - "L’éducation est le fondement le plus important d’un pays : si un citoyen a une bonne formation, il aura des atouts évidents pour sa vie professionnelle et sera apte à jouer pleinement son rôle au sein d’une société démocratique."
      - "Le festival de Cannes ouvrant demain ses portes, les amoureux du 7e art ne manqueront pas de venir à nouveau en masse faire un tour sur la Croisette, ce dont les médias du monde entier se réjouissent. Néanmoins, on aurait pu attendre des autorités qu’elles mettent en place des moyens suffisants pour gérer l’afflux des visiteurs car cet événement nuit à la qualité de vie des Cannois, d’année en année."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "developper_une_argumentation_logique_et_coherente"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_argumentation_logique_et_coherente.b2"
    description:
      - "Pour commencer, l’absence prolongée de Mme Durand a des conséquences plus graves que ce que vous pensiez car je ne vois pas qui dans notre équipe peut être aussi efficace qu’elle à son poste. C’est la raison officielle pour laquelle je vous ai réunis ce matin : nous devons passer une annonce au cas où Mme Durand ne reviendrait pas avant plusieurs mois."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "argumenter_une_prise_de_position_et_la_defendre_methodiquement"
    id: "french.functions.descriptors.opinions_et_arguments.argumenter_une_prise_de_position_et_la_defendre_methodiquement.b2"
    description:
      - "Je suis contre le diktat de la beauté qui conduit de nombreuses personnes à recourir à la chirurgie esthétique. Non seulement, les opérations peuvent mal tourner. En outre, elles peuvent comporter des risques pour la santé. Bien souvent, les patients qui se font retoucher regrettent leur décision. Il est également bien connu que certains d’entre eux agissent sur un coup de tête, sans penser aux conséquences."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "mettre_en_valeur_des_arguments"
    id: "french.functions.descriptors.opinions_et_arguments.mettre_en_valeur_des_arguments.b2"
    description:
      - "Je maintiens mon point de vue, l’affluence touristique est à double tranchant : certes, elle garantit la stabilité économique locale mais au détriment de l’authenticité et du charme des sites visités. J’en veux pour preuve les paysages dénaturés d’une bonne partie du littoral de la Méditerranée."
      - "L’an dernier, un reportage télévisé avait déjà mis en valeur les magouilles existant dans le monde de la finance. Les événements de ces derniers jours en sont une nouvelle fois une parfaite illustration."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "nuancer"
    id: "french.functions.descriptors.opinions_et_arguments.nuancer.b2"
    description:
      - "C’est plus compliqué que cela : certains arguments n’ont pas été suffisamment pris en compte, il va falloir revoir le dossier avant de le présenter lors de la prochaine réunion."
      - "Certes, il a fait des efforts depuis le début de l’année. Cependant, ses résultats restent relativement décevants et son attitude générale face à l’apprentissage insuffisante. Toutefois, les enseignants notent une réelle amélioration dans son comportement."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "evaluer_et_apprecier_des_films_et_des_livres"
    id: "french.functions.descriptors.opinions_et_arguments.evaluer_et_apprecier_des_films_et_des_livres.b2"
    description:
      - "Je pense que ce bouquin est toujours aussi populaire bien qu’il ne soit plus d’actualité. Le dénouement m’a vraiment bluffé !"
      - "Malgré son succès dans l’Hexagone, j’ai l’impression qu’il s’agit d’un film surestimé. Pour moi, c’est un vrai navet, excepté le moment où l’acteur joue cette scène culte. Ça, ça va rester gravé !"

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "analyser_un_texte_polemique_politique_ou_diplomatique"
    id: "french.functions.descriptors.opinions_et_arguments.analyser_un_texte_polemique_politique_ou_diplomatique.b2"
    description:
      - "Le premier paragraphe de cet article développe les arguments avancés par le député de la Charente lors de son discours à l’Assemblée nationale."
      - "Les conclusions du rapport publié par la commission de l’aménagement du territoire sont extrêmement claires en ce qui concerne les conséquences des phosphates dans les cours d’eau, les pages 25 à 32 reprennent en détail les points essentiels."

  - scale: "opinions_et_arguments"
    level: "b2"
    code: "organiser_et_donner_son_avis_dans_un_debat"
    id: "french.functions.descriptors.opinions_et_arguments.organiser_et_donner_son_avis_dans_un_debat.b2"
    description:
      - "Merci, madame, nous avons bien entendu vos arguments, j’aimerais maintenant passer la parole à monsieur Macoin afin qu’il expose, lui aussi, son point de vue sur la question."
      - "Pour rebondir sur ce qui vient d’être dit, j’aimerais souligner que…"
      - "C’est insupportable d’écouter, encore aujourd’hui, ce genre de propos. Il est clair que je ne partage absolument pas votre avis…"

  - scale: "biens_et_services"
    level: "b2"
    code: "exprimer_clairement_ses_attentes"
    id: "french.functions.descriptors.biens_et_services.exprimer_clairement_ses_attentes.b2"
    description:
      - "J’attends de toi que tu me fasses un compte rendu précis de ce qui s’est passé au bureau vendredi dernier."
      - "Je vous demande de me changer immédiatement de chambre, les nuisances sonores de la climatisation défectueuse m’empêchent de dormir."

  - scale: "biens_et_services"
    level: "b2"
    code: "exprimer_sa_satisfaction_ou_son_mecontentement_et_se_plaindre_par_telephone"
    id: "french.functions.descriptors.biens_et_services.exprimer_sa_satisfaction_ou_son_mecontentement_et_se_plaindre_par_telephone.b2"
    description:
      - "Quel plaisir de pouvoir enfin faire une grasse matinée !"
      - "Pourquoi me poser la question ? C’est n’importe quoi !"
      - "Vous vous prenez pour qui ?"
      - "Comment est-ce possible ? M. Durand n’est pas là ! Dites-lui de me téléphoner dès son arrivée."
      - "C’est inadmissible, passez-moi immédiatement le responsable du secteur."

  - scale: "autres_notions"
    level: "b2"
    code: "exprimer_son_hesitation"
    id: "french.functions.descriptors.autres_notions.exprimer_son_hesitation.b2"
    description:
      - "Entre les deux, mon cœur balance et je ne sais pas lequel choisir."
      - "Le violet a une très jolie coupe mais le bleu irait mieux avec tes yeux."

  - scale: "autres_notions"
    level: "b2"
    code: "exprimer_des_regrets"
    id: "french.functions.descriptors.autres_notions.exprimer_des_regrets.b2"
    description:
      - "Je regrette de ne pas avoir fait attention à ma santé quand il le fallait."
      - "J’aurais dû chercher d’autres renseignements sur notre voyage en Thaïlande et tout se serait mieux déroulé."
      - "Tu n’aurais pas dû téléphoner à ton père dans l’état où tu te trouvais."

  - scale: "autres_notions"
    level: "b2"
    code: "exprimer_la_possibilite_et_la_probabilite"
    id: "french.functions.descriptors.autres_notions.exprimer_la_possibilite_et_la_probabilite.b2"
    description:
      - "Il se peut qu’il ait eu un empêchement."
      - "Il est peu probable qu’il soit allé à la bibliothèque si tôt."

  - scale: "autres_notions"
    level: "b2"
    code: "exprimer_des_certitudes_et_le_doute"
    id: "french.functions.descriptors.autres_notions.exprimer_des_certitudes_et_le_doute.b2"
    description:
      - "Moi, je te dis que l’Espagne, ce n’est pas pour tout de suite car nous devons nous serrer la ceinture !"
      - "Je doute que nous arrivions à temps."

  - scale: "descriptions_et_recits"
    level: "c1"
    code: "raconter_des_evenements_passes_avec_precision"
    id: "french.functions.descriptors.descriptions_et_recits.raconter_des_evenements_passes_avec_precision.c1"
    description:
      - "La sonnerie informant les retardataires du début de la représentation a retenti. Dans la salle, les lumières ont progressivement baissé d’intensité tandis que les dernières ouvreuses quittaient discrètement leur poste. Les conversations du public se sont arrêtées. Les écrans des portables sur lesquels quelques spectateurs pianotaient se sont éteints. Une fois le noir complet, l’épais rideau de velours rouge s’est levé, dévoilant le décor soigné d’un appartement cossu. Dès les premières secondes, le public a ri et a applaudi l’entrée simultanée, par des portes différentes qu’ils ont fait claquer derrière eux, de comédiens titubant comme après une soirée trop arrosée."
      - "Suite à la défaite de son parti aux élections de la semaine passée, le Président de la République a opté pour une brève intervention télévisée afin de confirmer aux électeurs qu’il avait bien saisi le message qu’ils lui avaient envoyé en votant massivement pour le parti de l’opposition. De ce fait, le chef du pouvoir exécutif a décidé de donner un nouvel élan à sa politique, en remaniant le gouvernement en place. Il a redéfini les principales lignes conductrices de sa politique pour la suite de son mandat, résumables en un seul et unique mot d’ordre : l’efficacité, cela pour mieux faire face aux difficultés économiques actuelles."

  - scale: "descriptions_et_recits"
    level: "c1"
    code: "rapporter_les_propos_ou_les_paroles_de_quelqu_un_de_facon_implicite"
    id: "french.functions.descriptors.descriptions_et_recits.rapporter_les_propos_ou_les_paroles_de_quelqu_un_de_facon_implicite.c1"
    description:
      - "Elle a spécifié qu’il ne fallait pas que nous l’attendions plus de trente minutes, qu’au cas où elle ne serait pas là, elle n’aurait pas la tête à faire la fête : tu sais qu’elle a tout misé sur son admissibilité à ce concours d’entrée des grandes écoles…"
      - "Il a déclaré qu’après tout ce qu’il avait déjà fait pour nous, il n’était plus question qu’il nous rende un autre service si nous le lui demandions."
      - "J’ai constaté que Tom appréciait les soirées festives en compagnie de ses amis alors que ceux-ci le dépeignaient comme un solitaire endurci. En revanche, ils reconnaissent que son amitié est indéfectible."

  - scale: "descriptions_et_recits"
    level: "c1"
    code: "faire_une_presentation_d_un_theme_ou_d_un_projet_avec_precision"
    id: "french.functions.descriptors.descriptions_et_recits.faire_une_presentation_d_un_theme_ou_d_un_projet_avec_precision.c1"
    description:
      - "Je vous remercie de l’attention que vous semblez d’ores et déjà accorder à ce projet innovant qui me tient à cœur et j’espère que votre intérêt se sera accru lorsque j’aurai terminé cette présentation au cours de laquelle toutes vos questions seront non seulement les bienvenues mais également ardemment souhaitées."
      - "J’adhère entièrement à la stratégie prônée par le directeur qui consiste à mener trois actions distinctes et néanmoins concomitantes que nous allons analyser parallèlement."
      - "Plusieurs facteurs ont engendré l’essor de cet outil. Pour illustrer mes propos, je vais vous faire part d’une expérience à laquelle j’ai assisté."

  - scale: "echanges_d_informations"
    level: "c1"
    code: "rediger_un_compte_rendu"
    id: "french.functions.descriptors.echanges_d_informations.rediger_un_compte_rendu.c1"
    description:
      - "J’ai eu le plaisir d’assister à la réunion qui s’est tenue le 10 du mois dernier au sein de la société X. Au cours de cette réunion dont l’ordre du jour était organisé comme suit, il a été mentionné que chaque salarié serait rétribué comme il se doit."
      - "À l’ouverture des débats, lors de notre dernière assemblée, il a été décidé qu’un représentant serait élu à tous les niveaux de responsabilité de l’entreprise. Je rappelle d’ailleurs que cette décision était applicable dès la réception du procès-verbal qui a été produit dans la foulée. L’objet de la réunion d’aujourd’hui était donc l’occasion de pouvoir faire un premier bilan de l’application de cette nouvelle mesure en présence de toutes les personnes nouvellement investies."
      - "Dix ans après avoir publié son émouvant roman, la romancière fétiche de notre rédaction signe son retour avec le premier volet d’une trilogie, dans lequel elle relate la carrière brisée d’un acteur qui adore le septième art mais ignore tout de la profession, à l’instar de son frère aîné qui se prédestinait à une carrière footballistique et se découvre véritablement talentueux devant la caméra."

  - scale: "echanges_d_informations"
    level: "c1"
    code: "resumer_une_discussion_ou_un_texte_long_et_difficile_en_restituant_les_prises_de_position_et_les_raisonnements"
    id: "french.functions.descriptors.echanges_d_informations.resumer_une_discussion_ou_un_texte_long_et_difficile_en_restituant_les_prises_de_position_et_les_raisonnements.c1"
    description:
      - "Ce qu’il faut retenir de cet article, c’est que pour son auteur, l’utilisation de la graphologie par les cabinets de recrutement n’est pas un critère pertinent."
      - "Le journaliste met en évidence la vulnérabilité des victimes dans cette affaire."
      - "Le résultat de l’étude fait apparaître un accroissement du nombre de grossesses multiples."
      - "L’enquête démontre la volonté des jeunes de se porter candidats à l’expatriation."
      - "L’article couvre toutes les étapes de la libération des otages."
      - "L’auteur distingue la féminisation des fonctions de celle des professions."
      - "Le journaliste révèle les dessous de l’affaire et condamne l’immobilisme des responsables politiques qui ont laissé faire."
      - "L’auteur s’indigne contre la sur-prescription d’antibiotiques pour les enfants."
      - "L’écrivain s’offense de l’invasion permanente de la presse dans l’intimité des élus."
      - "Les membres du parti se réjouissent de l’arrivée d’une nouvelle génération pleine d’entrain."
      - "Les partenaires déplorent le manque de moyens financiers pour mener à terme leur projet."
      - "Le critique redoute que les prix soient attribués en fonction d’intérêts politiques."
      - "L’auteur fanfaronne à propos de l’accueil de ses œuvres par le public."

  - scale: "echanges_d_informations"
    level: "c1"
    code: "synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses"
    id: "french.functions.descriptors.echanges_d_informations.synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses.c1"
    description:
      - "Dans une première partie, nous allons présenter quelques expériences de commerce équitable réussies dans le monde à travers des entretiens avec un responsable écologiste et un agriculteur bio et, dans une seconde partie, nous mettrons en valeur les changements que cette nouvelle approche apporte à d’autres secteurs professionnels et aux modes de vie des consommateurs à travers le point de vue d’un voyagiste et d’un économiste."
      - "Tous les éditorialistes des grands quotidiens nationaux s’unissent ce matin pour saluer l’exploit de l’équipe nationale qui, à travers sa victoire en Coupe du monde, a redonné espoir à tout un peuple et démontré l’importance de la solidarité dans la recherche d’un objectif commun. Certains journalistes politiques restent cependant sceptiques quant à la capacité de nos dirigeants à adapter une stratégie identique pour réaliser leurs promesses électorales. Un doute que ne semble pas partager le ministre des Sports qui, dans un communiqué, a affirmé que chacun saurait tirer les leçons de ce succès sportif."

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "developper_une_argumentation_logique_et_coherente"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_argumentation_logique_et_coherente.c1"
    description:
      - "Doit-on analyser cette prise de position d’un point de vue culturel ou politique ? Les deux, dirais-je sans hésitation, vu qu’il y a tant à apprendre de ces deux perspectives. En lisant ces témoignages, nous découvrons avant tout les divers malaises de notre civilisation. Nous avons vu plus haut qu’une approche comparatiste permet de dépasser les limites souvent imposées tacitement. En s’intéressant aux multiples contextes culturels, en observant ces diverses traditions avec un certain recul, nous croisons nos regards pour pouvoir développer une nouvelle approche. C’est dans cette mise en perspective que nous axerons notre argumentation."

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "argumenter_une_prise_de_position_et_la_defendre_avec_aisance_et_pertinence"
    id: "french.functions.descriptors.opinions_et_arguments.argumenter_une_prise_de_position_et_la_defendre_avec_aisance_et_pertinence.c1"
    description:
      - "Il est clair qu’avec l’expansion des nouvelles technologies, ce sont les distances physiques qui disparaissent. C’est ainsi qu’un même message peut trouver un écho universel via les messageries et les réseaux sociaux, enseignant aux hommes l’entraide et le respect mutuels."
      - "Avec le développement des nouvelles technologies, on peut envoyer tout et n’importe quoi aux quatre coins du monde et cet effacement des distances physiques ne garantit pas une meilleure compréhension entre les Hommes : les destinataires n’ont pas la même culture, pas toujours la même langue et leurs intérêts divergent souvent."
      - "« Jour après jour, il semble donc qu’à travers son accessibilité, sa quasi-exhaustivité, sa gratuité, sa diversité, le numérique offre les garanties d’un paysage culturel idéal », c’est ce que déclare David Lacombled, expert en numérique, auteur d’un manifeste pour une citoyenneté numérique."

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "mettre_en_valeur_des_arguments"
    id: "french.functions.descriptors.opinions_et_arguments.mettre_en_valeur_des_arguments.c1"
    description:
      - "Vous n’êtes pas sans savoir que les juges ont tous été corrompus dans cette histoire."
      - "Vous n’ignorez pas que ces établissements sont réservés à une élite."
      - "Il est indéniable qu’elle y est pour quelque chose."
      - "On sait bien que certains mettent en doute son professionnalisme mais je lui accorde toute ma confiance pour mener à bien ce projet."
      - "À coup sûr, elle a trempé dans cette histoire !"

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "nuancer"
    id: "french.functions.descriptors.opinions_et_arguments.nuancer.c1"
    description:
      - "Je n’irais pas jusque-là mais je suis assez d’accord avec la teneur principale de votre point de vue."
      - "Admettons qu’il s’agisse d’un oubli, tu aurais pu te rattraper en lui envoyant un message le surlendemain."
      - "Vous vous êtes fourvoyé ! Il faut bien l’admettre. Certes, nous aurions dû vous avertir, mais vous n’auriez pas dû agir de la sorte."
      - "J’admets qu’ils ont commis des erreurs mais relativisons ! Ça ne sert à rien d’en faire tout un fromage !"

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "analyser_un_texte_polemique_politique_ou_diplomatique"
    id: "french.functions.descriptors.opinions_et_arguments.analyser_un_texte_polemique_politique_ou_diplomatique.c1"
    description:
      - "L’enjeu est, plus précisément ici, de pouvoir rendre compte du fonctionnement de l’argumentation afin de percevoir les différents points de vue soutenus par ces deux thèses. Le premier axe de l’analyse s’intéresse au travail de cadrage opéré par les journalistes. Les questions posées ici ont une charge polémique évidente dans la mesure où elles pointent des dissensions entre les deux partis."
      - "L’argumentation de l’auteur est fondée sur des statistiques, des données de recensement plus précisément. Il convient, généralement, d’être prudent lors de l’interprétation de ce genre d’informations. Cependant, l’auteur s’appuie affirmativement sur les chiffres qu’il avance et en tire des conclusions alarmistes."
      - "On constate à l’évidence une tonalité polémique à travers les textes de cette écrivaine."
      - "Cet homme politique adopte toujours dans ses interventions télévisées un raisonnement dialectique, en d’autres termes, il démontre, réfute, convainc."
      - "Plusieurs experts s’accordent à dire que les procédés rhétoriques et syntaxiques utilisés par ce critique discréditent sans cesse le travail cinématographique des réalisateurs."

  - scale: "opinions_et_arguments"
    level: "c1"
    code: "organiser_et_donner_son_avis_dans_un_debat"
    id: "french.functions.descriptors.opinions_et_arguments.organiser_et_donner_son_avis_dans_un_debat.c1"
    description:
      - "Vous introduisez le débat par une fausse question, c’est n’importe quoi ! C’est totalement absurde ! Par ailleurs, vous coupez la parole en permanence, c’est critiquable ! De plus, les invités ici présents ne connaissent pas la problématique pour avoir si peu à argumenter, j’aurais préféré un débat plus structuré et constructif !"
      - "D’une part, je ne vous cache pas mon inquiétude quant à la prise d’une telle décision, d’autre part, j’attends de vous, transparence et rigueur."
      - "Je n’en crois pas mes oreilles ! Comment osez-vous remettre en cause cette théorie ? Celle-ci a été fondée depuis des lustres, appliquée par le plus grand nombre de scientifiques et a incontestablement permis une avancée dans le domaine de la physique nucléaire."

  - scale: "descriptions_et_recits"
    level: "c2"
    code: "rapporter_les_propos_ou_les_paroles_de_quelqu_un_de_facon_implicite"
    id: "french.functions.descriptors.descriptions_et_recits.rapporter_les_propos_ou_les_paroles_de_quelqu_un_de_facon_implicite.c2"
    description:
      - "Sans le dire franchement, la directrice nous a bien fait comprendre que le projet serait enterré si aucun financement n’arrivait avant l’été."
      - "Il répétait qu’il respectait la procédure, mais le ton laissait entendre que tout était déjà décidé en coulisses."
      - "L’article a l’air mesuré, mais entre les lignes on comprend clairement que l’auteur juge la réforme mal préparée et ses effets largement sous-estimés."

  - scale: "echanges_d_informations"
    level: "c2"
    code: "rediger_un_compte_rendu"
    id: "french.functions.descriptors.echanges_d_informations.rediger_un_compte_rendu.c2"
    description:
      - "Voici le compte rendu consolidé de la réunion extraordinaire : j’y ai regroupé les arbitrages validés, les points bloquants, les réserves exprimées et le calendrier revu, pour que chacun sache exactement où on en est."
      - "Dans le relevé de décisions, j’ai séparé ce qui est acté de ce qui doit encore être confirmé, avec les délais, les responsables et les suites prévues pour chaque point."

  - scale: "echanges_d_informations"
    level: "c2"
    code: "resumer_une_discussion_ou_un_texte_long_et_difficile_en_restituant_les_prises_de_position_et_les_raisonnements"
    id: "french.functions.descriptors.echanges_d_informations.resumer_une_discussion_ou_un_texte_long_et_difficile_en_restituant_les_prises_de_position_et_les_raisonnements.c2"
    description:
      - "Tout le monde s’accorde sur l’urgence d’agir, mais le désaccord reste entier sur le financement, le calendrier et le niveau de contrainte acceptable."
      - "Pour lui, le vrai problème, c’est surtout la méthode, les présupposés idéologiques et les effets de bord de la réforme."
      - "Deux lignes apparaissent nettement : ceux qui veulent sécuriser l’existant et ceux qui veulent aller vite au nom de l’efficacité."

  - scale: "echanges_d_informations"
    level: "c2"
    code: "synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses"
    id: "french.functions.descriptors.echanges_d_informations.synthetiser_des_informations_et_des_arguments_issus_de_sources_diverses.c2"
    description:
      - "Les chiffres, les retours du terrain, les expertises sectorielles et les comparaisons locales vont dans le même sens : la réforme élargit l’accès au service, mais elle déplace aussi une partie du coût vers les collectivités locales."
      - "Rapports récents, projections budgétaires et comparaisons internationales disent globalement la même chose : à court terme, le dispositif tient. À long terme, tout dépendra d’un pilotage beaucoup plus fin."

  - scale: "echanges_d_informations"
    level: "c2"
    code: "rediger_un_commentaire_des_donnees_chiffrees"
    id: "french.functions.descriptors.echanges_d_informations.rediger_un_commentaire_des_donnees_chiffrees.c2"
    description:
      - "La série complète montre une vraie cassure à partir du troisième trimestre, pas juste une variation passagère."
      - "La baisse mise en avant est trompeuse : une fois l’inflation, le changement de méthode et les effets de base pris en compte, on est plutôt sur un plateau."
      - "La moyenne donne une impression de stabilité, mais dans le détail les écarts se creusent nettement entre les territoires."

  - scale: "echanges_d_informations"
    level: "c2"
    code: "realiser_une_interview_ou_passer_un_entretien"
    id: "french.functions.descriptors.echanges_d_informations.realiser_une_interview_ou_passer_un_entretien.c2"
    description:
      - "Vous êtes d’accord sur le principe, mais pas sur le calendrier. Concrètement, quels arbitrages faudrait-il revoir ?"
      - "Vous ne contestez pas l’objectif. Vous contestez les moyens retenus. C’est bien ça ?"
      - "Au vu de votre parcours, sur quoi vous appuyez-vous pour dire que ce modèle peut tenir à grande échelle sans créer d’effets pervers majeurs ?"

  - scale: "biens_et_services"
    level: "c2"
    code: "exprimer_clairement_ses_attentes"
    id: "french.functions.descriptors.biens_et_services.exprimer_clairement_ses_attentes.c2"
    description:
      - "Je veux une facture corrigée aujourd’hui, avec le détail ligne par ligne, et une confirmation écrite dès que c’est fait."
      - "J’attends un remplacement complet du matériel défectueux, pas une solution provisoire, ainsi qu’une confirmation écrite des modalités de prise en charge. Sinon, je transmettrai le dossier au médiateur."

  - scale: "opinions_et_arguments"
    level: "c2"
    code: "developper_une_argumentation_logique_et_coherente"
    id: "french.functions.descriptors.opinions_et_arguments.developper_une_argumentation_logique_et_coherente.c2"
    description:
      - "Les chiffres, les coûts cachés et l’impact selon les territoires montrent que garder le système actuel coûte plus cher, corrige moins d’inégalités et produit moins de résultats."
      - "Le dispositif actuel s’essouffle et les correctifs testés jusque-là n’ont pas marché. Il faut donc une gouvernance plus claire si on veut arrêter de bricoler."

  - scale: "opinions_et_arguments"
    level: "c2"
    code: "argumenter_une_prise_de_position_et_la_defendre_avec_aisance_et_pertinence"
    id: "french.functions.descriptors.opinions_et_arguments.argumenter_une_prise_de_position_et_la_defendre_avec_aisance_et_pertinence.c2"
    description:
      - "Je reste sur cette position pour une raison simple : on ne peut pas demander aux gens de faire confiance à une réforme si, dès le départ, elle contourne ses propres règles."
      - "J’entends vos objections, mais mon désaccord reste le même : la méthode me paraît mauvaise, même quand l’objectif affiché peut se défendre."
      - "Je peux comprendre l’inquiétude qui vous pousse à défendre cette option, mais elle me paraît séduisante en surface et beaucoup plus fragile dès qu’on regarde ses conséquences concrètes."

  - scale: "opinions_et_arguments"
    level: "c2"
    code: "analyser_un_texte_polemique_politique_ou_diplomatique"
    id: "french.functions.descriptors.opinions_et_arguments.analyser_un_texte_polemique_politique_ou_diplomatique.c2"
    description:
      - "La force du texte tient autant à l’ironie, aux sous-entendus, au rythme et au choix des mots qu’aux arguments eux-mêmes."
      - "Le discours donne l’impression d’être objectif, mais il trie les faits, choisit qui a le droit de parler et enferme peu à peu le lecteur dans un cadre très dirigé."
      - "Dans ce passage, les connotations, les décalages de ton et le rythme des phrases guident la lecture bien plus sûrement que l’argument explicite."

  - scale: "opinions_et_arguments"
    level: "c2"
    code: "organiser_et_donner_son_avis_dans_un_debat"
    id: "french.functions.descriptors.opinions_et_arguments.organiser_et_donner_son_avis_dans_un_debat.c2"
    description:
      - "On confond tout si on ne distingue pas d’abord les faits des interprétations, puis les décisions qui en découlent."
      - "Je reprends vos objections une par une : elles partent d’un point de départ que je ne partage pas."
      - "Je repars de l’argument central de mon contradicteur, puis j’explique pourquoi il tient mal face aux données qu’on a."
